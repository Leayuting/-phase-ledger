      <div className="pl-card no-print" style={{ padding: 12, marginBottom: 12, display: "flex", flexWrap: "wrap", gap: 8, alignItems: "center" }}>
        <MonthPicker value={month} onChange={setMonth} />
        <div style={{ marginLeft: "auto", color: T.sub, fontSize: 13 }}>
          共 {rows.length} 筆・一般收入 <b style={{ color: T.ink }}>{fmt(generalTotal)}</b>・固定收入 <b style={{ color: T.brown }}>{fmt(fixedTotal)}</b>・合計 <b style={{ color: T.green }}>{fmt(total)}</b>
        </div>
      </div>

      {selRows.length > 0 && (
        <div className="pl-card no-print" style={{ padding: 10, marginBottom: 12, display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 13 }}>已選 {selRows.length} 筆</span>
          <button className="pl-btn small danger" onClick={batchRemove}>批次刪除</button>
          <button className="pl-btn small" onClick={() => setSelected(new Set())}>取消選取</button>
        </div>
      )}

      {blockStores.map((s) => {
        const bRows = rows.filter((r) => r.storeId === s.id);
        const bCounted = bRows.filter((r) => r.status !== "已退回");
        const bTotal = bCounted.reduce((a, r) => a + num(r.amount), 0);
        const bFixedTotal = bCounted.filter((r) => r.fixedItemId).reduce((a, r) => a + num(r.amount), 0);
        const bGeneralTotal = bTotal - bFixedTotal;
        const bGeneralRows = bRows.filter((r) => !r.fixedItemId);
        const bFixedRows = bRows.filter((r) => r.fixedItemId);
        const { forStore: bFixedForStore, todo: bFixedTodo } = fixedTodoFor(s.id);
        return (
          <div key={s.id} style={{ marginBottom: 26 }}>
            <div style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: 8, marginBottom: 10 }}>
              <div className="pl-serif" style={{ fontWeight: 700, fontSize: 16 }}>{s.name}</div>
              {bFixedForStore.length > 0 && (
                <button className="pl-btn small" disabled={bFixedTodo.length === 0} onClick={() => setFixedModalOpenFor(s.id)}
                  title={bFixedTodo.length === 0 ? `本月${s.name}固定收入已全部帶入` : ""}>
                  {bFixedTodo.length === 0 ? "✓ 固定收入已帶入" : `帶入固定收入（${bFixedTodo.length}）`}
                </button>
              )}
              <button className="pl-btn primary small" style={{ background: T.green, borderColor: T.green }}
                onClick={() => setEditing({ ...INC_EMPTY, id: null, date: todayStr(), storeId: s.id, payer: user.name, status: "草稿" })}>
                ＋ 新增收入
              </button>
              <span style={{ marginLeft: "auto", fontSize: 12.5, color: T.sub }}>
                {s.name}小計・一般 <b style={{ color: T.ink }}>{fmt(bGeneralTotal)}</b>・固定 <b style={{ color: T.brown }}>{fmt(bFixedTotal)}</b>・合計 <b style={{ color: T.green }}>{fmt(bTotal)}</b>
              </span>
            </div>
            <div style={{ fontSize: 13, color: T.sub, margin: "0 0 6px" }}>一般收入（{bGeneralRows.length} 筆）</div>
            <IncomeRowsTable rows={bGeneralRows} selected={selected} toggleSel={toggleSel} toggleSelAllIn={toggleSelAllIn}
              catOf={catOf} user={user} setEditing={setEditing} review={review} remove={remove} emptyText={`${s.name}本月尚無一般收入`} />
            <div style={{ fontSize: 13, color: T.sub, margin: "10px 0 6px" }}>固定收入（{bFixedRows.length} 筆）</div>
            <IncomeRowsTable rows={bFixedRows} selected={selected} toggleSel={toggleSel} toggleSelAllIn={toggleSelAllIn}
              catOf={catOf} user={user} setEditing={setEditing} review={review} remove={remove} emptyText={`${s.name}本月尚無固定收入帶入紀錄`} />
          </div>
        );
      })}

      {blockStores.length > 1 && (
        <div className="pl-card" style={{ padding: 16, marginBottom: 14 }}>
          <div className="pl-serif" style={{ fontWeight: 700, marginBottom: 10 }}>{nameOf(blockStores[0].id)}收入合計</div>
          <div style={{ display: "grid", gap: 6 }}>
            {blockStores.map((s) => (
              <StoreRow key={s.id} label={`${s.name}小計`}
                value={fmt(rows.filter((r) => r.storeId === s.id && r.status !== "已退回").reduce((a, r) => a + num(r.amount), 0))} />
            ))}
            <StoreRow label={`${nameOf(blockStores[0].id)}合計（${blockStores.map((s) => s.name).join("＋")}）`} value={fmt(total)} strong />
          </div>
        </div>
      )}

      {editing && (
        <Modal title={editing.id ? "收入明細" : "新增收入"} onClose={() => setEditing(null)} width={680}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(160px,1fr))", gap: 12 }}>
            <Field label="收入日期" required><DateInput value={editing.date} onChange={(e) => setEditing({ ...editing, date: e.target.value })} /></Field>
            <Field label="門店"><input className="pl-input" value={nameOf(editing.storeId)} disabled /></Field>
            <Field label="收入類別" required>
              <select className="pl-input" value={editing.categoryId} onChange={(e) => setEditing({ ...editing, categoryId: e.target.value })}>
                <option value="">選擇類別</option>{cats.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </Field>
            <Field label="收入項目" required span={2}><input className="pl-input" value={editing.item} onChange={(e) => setEditing({ ...editing, item: e.target.value })} placeholder="例：場地租借、課程收入" /></Field>
            <Field label="金額" required><input className="pl-input" inputMode="decimal" value={editing.amount} onChange={(e) => setEditing({ ...editing, amount: e.target.value })} /></Field>
            <Field label="收款方式">
              <select className="pl-input" value={editing.payMethod} onChange={(e) => setEditing({ ...editing, payMethod: e.target.value })}>
                {PAY_METHODS.map((p) => <option key={p}>{p}</option>)}
              </select>
            </Field>
            <Field label="經手人"><input className="pl-input" value={editing.payer} onChange={(e) => setEditing({ ...editing, payer: e.target.value })} /></Field>
            <Field label="發票號碼"><input className="pl-input" value={editing.invoiceNo} onChange={(e) => setEditing({ ...editing, invoiceNo: e.target.value })} /></Field>
            <DocumentField docType={editing.docType} noDocReason={editing.noDocReason} attachment={editing.attachment}
              onChange={(patch) => setEditing({ ...editing, ...patch })} />
            <Field label="備註" span={3}><input className="pl-input" value={editing.note} onChange={(e) => setEditing({ ...editing, note: e.target.value })} /></Field>
          </div>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "flex-end", gap: 8, marginTop: 18 }}>
            {editing.status !== "過審" && <span style={{ fontSize: 12, color: T.sub, marginRight: "auto" }}>收款方式選「現金」會直接入帳，否則送出後待審核</span>}
            <button className="pl-btn" onClick={() => setEditing(null)}>取消</button>
            <button className="pl-btn primary" style={{ background: T.green, borderColor: T.green }} onClick={() => save(editing)}>
              {editing.status === "過審" ? "儲存修改" : "儲存"}
            </button>
          </div>
        </Modal>
      )}

      {fixedModalOpenFor && (() => {
        const { todo } = fixedTodoFor(fixedModalOpenFor);
        return (
          <FixedBringInModal items={todo} month={month} storeName={nameOf(fixedModalOpenFor)} catOf={catOf}
            onClose={() => setFixedModalOpenFor(null)} onCommit={(picked) => commitFixed(picked, fixedModalOpenFor)} />
        );
      })()}
    </div>
  );
}

/* 每日收支・收入表格：一般收入／固定收入共用同一份表格結構，只是餵進去的 rows 不同 */
function IncomeRowsTable({ rows, selected, toggleSel, toggleSelAllIn, catOf, user, setEditing, review, remove, emptyText }) {
  const allSelected = rows.length > 0 && rows.every((r) => selected.has(r.id));
  return (
    <div className="pl-card pl-scroll-x" style={{ marginBottom: 14 }}>
      <table className="pl-table">
        <thead><tr>
          <th style={{ width: 30 }}><input type="checkbox" checked={allSelected} onChange={() => toggleSelAllIn(rows)} /></th>
          <th>日期</th><th>類別</th><th>項目</th>
          <th className="num">金額</th><th>收款方式</th><th>經手人</th><th>發票</th><th>附件</th><th>狀態</th><th></th>
        </tr></thead>
        <tbody>
          {rows.length === 0 && <tr><td colSpan={11}><Empty text={emptyText} /></td></tr>}
          {rows.map((r) => (
            <tr key={r.id}>
              <td><input type="checkbox" checked={selected.has(r.id)} onChange={() => toggleSel(r.id)} /></td>
              <td style={{ whiteSpace: "nowrap" }}>{r.date}</td>
              <td>{catOf(r.categoryId)}</td>
              <td>{r.item}{r.postClose && <> <Badge text="日結後新增" tone="yellow" /></>}</td>
              <td className="num" style={{ fontWeight: 600, color: T.green }}>{fmtN(r.amount)}</td>
              <td>{r.payMethod}</td>
              <td>{r.payer}</td>
              <td style={{ fontSize: 12.5 }}>{r.invoiceNo || "—"}</td>
              <td><DocCell docType={r.docType} noDocReason={r.noDocReason} attachment={r.attachment} /></td>
              <td><Badge text={r.status} /></td>
              <td style={{ whiteSpace: "nowrap" }}>
                {perm.canEdit(user, r) &&
                  <button className="pl-btn small" onClick={() => setEditing({ ...r })}>編輯</button>}
                {r.status === "待審核" && perm.canApprove(user, r) && (
                  <>
                    {" "}<button className="pl-btn small" style={{ color: T.green }} onClick={() => review(r, true)}>通過</button>
                    {" "}<button className="pl-btn small danger" onClick={() => review(r, false)}>退回</button>
                  </>
                )}
                {" "}<button className="pl-btn small danger" onClick={() => remove(r)}>刪除</button>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

/* 固定收入／支出帶入前的確認畫面：金額每月可能不同，預設帶入主檔設定值但可逐筆修改，
   也可把金額清空或改 0，代表先帶入項目、實際金額之後再自行編輯填寫。 */
function FixedBringInModal({ items, month, storeName, catOf, onClose, onCommit }) {
  const [rows, setRows] = useState(items.map((f) => ({ ...f, checked: true, amount: String(f.amount) })));
  const setRow = (id, patch) => setRows((rs) => rs.map((r) => (r.id === id ? { ...r, ...patch } : r)));
  const pickedCount = rows.filter((r) => r.checked).length;
  const commit = () => {
    const picked = rows.filter((r) => r.checked).map((r) => ({ ...r, amount: num(r.amount) }));
    if (picked.length === 0) return alert("請至少選擇一項");
    onCommit(picked);
  };
  return (
    <Modal title={`帶入 ${storeName} ${monthLabel(month)} 固定收入`} onClose={onClose} width={640}>
      <div style={{ fontSize: 12.5, color: T.sub, marginBottom: 10 }}>
        金額預設帶入主檔設定值，可依當月實際情況逐筆修改；金額欄清空或改 0，代表先帶入項目，實際金額之後再自行編輯填寫。
      </div>
      <div className="pl-scroll-x">
        <table className="pl-table">
          <thead><tr><th style={{ width: 30 }}></th><th>項目</th><th>類別</th><th className="num">金額</th></tr></thead>
          <tbody>
            {rows.map((r) => (
              <tr key={r.id} style={r.checked ? {} : { opacity: .5 }}>
                <td><input type="checkbox" checked={r.checked} onChange={(e) => setRow(r.id, { checked: e.target.checked })} /></td>
                <td>{r.item}</td>
                <td>{catOf(r.categoryId)}</td>
                <td className="num" style={{ width: 140 }}>
                  <input className="pl-input" style={{ textAlign: "right" }} inputMode="decimal" value={r.amount}
                    disabled={!r.checked} onChange={(e) => setRow(r.id, { amount: e.target.value })} />
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 18 }}>
        <button className="pl-btn" onClick={onClose}>取消</button>
        <button className="pl-btn primary" style={{ background: T.green, borderColor: T.green }} onClick={commit}>
          確定帶入（{pickedCount}）
        </button>
      </div>
    </Modal>
  );
}

function ExpenseForm({ form, setForm, data, stores, onSave, onClose, user }) {
  const locked = form.status === "過審" && !perm.isAdmin(user);
  const set = (k) => (e) => setForm({ ...form, [k]: e.target.type === "checkbox" ? e.target.checked : e.target.value });
  /* 類別選單：一般可選項排除系統保留類別（廠商原料叫貨）；
     若這筆紀錄目前的類別已停用（或不在可選清單中），仍把該類別加回選項，避免編輯舊紀錄時選不到原值 */
  const catOptions = data.categories.filter((c) => c.active && c.id !== ORDER_CAT_ID);
  if (form.categoryId && !catOptions.some((c) => c.id === form.categoryId)) {
    const cur = data.categories.find((c) => c.id === form.categoryId);
    if (cur) catOptions.push(cur);
  }
  return (
    <Modal title={form.id ? "支出明細" : "新增支出"} onClose={onClose} width={760}>
      {form.status === "過審" && perm.isAdmin(user) && (
        <div style={{ background: T.yellowBg, color: T.yellow, borderRadius: 8, padding: "8px 12px", marginBottom: 14, fontSize: 13 }}>
          此筆已過審。修改將完整寫入修改紀錄。
        </div>
      )}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(160px,1fr))", gap: 12 }}>
        <Field label="支出日期" required><DateInput value={form.date} onChange={set("date")} disabled={locked} /></Field>
        <Field label="門店／部門" required>
          <select className="pl-input" value={form.storeId} onChange={set("storeId")} disabled={locked}>
            <option value="">選擇</option>{stores.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
        </Field>
        <Field label="支出類別" required>
          <select className="pl-input" value={form.categoryId} onChange={set("categoryId")} disabled={locked}>
            <option value="">選擇類別</option>{catOptions.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </Field>
        <Field label="支出品項" required span={2}><input className="pl-input" value={form.item} onChange={set("item")} placeholder="例：鮮乳補貨、吧台清潔耗材" disabled={locked} /></Field>
        <Field label="廠商">
          <select className="pl-input" value={form.vendorId || ""} onChange={set("vendorId")} disabled={locked}>
            <option value="">無</option>{data.vendors.filter(v=>v.active).map((v) => <option key={v.id} value={v.id}>{v.name}</option>)}
          </select>
        </Field>
        <Field label="金額" required><input className="pl-input" inputMode="decimal" value={form.amount} onChange={set("amount")} placeholder="0" disabled={locked} /></Field>
        <Field label="付款方式">
          <select className="pl-input" value={form.payMethod} onChange={set("payMethod")} disabled={locked}>
            {PAY_METHODS.map((p) => <option key={p}>{p}</option>)}
          </select>
        </Field>
        <Field label="付款人"><input className="pl-input" value={form.payer} onChange={set("payer")} disabled={locked} /></Field>
        <Field label="發票號碼"><input className="pl-input" value={form.invoiceNo} onChange={set("invoiceNo")} placeholder="AB-12345678" disabled={locked} /></Field>
        <Field label="員工代墊">
          <label style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 0" }}>
            <input type="checkbox" checked={form.isAdvance} onChange={set("isAdvance")} disabled={locked} /> 是
          </label>
        </Field>
        {form.isAdvance && (
          <>
            <Field label="已核銷">
              <label style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 0" }}>
                <input type="checkbox" checked={form.isReimbursed} onChange={set("isReimbursed")} disabled={locked} /> 是
              </label>
            </Field>
            {form.isReimbursed && <Field label="核銷日期"><DateInput value={form.reimburseDate} onChange={set("reimburseDate")} disabled={locked} /></Field>}
          </>
        )}
        <DocumentField docType={form.docType} noDocReason={form.noDocReason} attachment={form.attachment}
          onChange={(patch) => setForm({ ...form, ...patch })} disabled={locked} />
        <Field label="備註" span={2}><input className="pl-input" value={form.note} onChange={set("note")} disabled={locked} /></Field>
      </div>
      {!locked && (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "flex-end", gap: 8, marginTop: 18 }}>
          {form.status !== "過審" && <span style={{ fontSize: 12, color: T.sub, marginRight: "auto" }}>付款方式選「現金」會直接入帳，否則送出後待審核</span>}
          <button className="pl-btn" onClick={onClose}>取消</button>
          <button className="pl-btn primary" onClick={() => onSave(form)}>
            {form.status === "過審" ? "儲存修改" : "儲存"}
          </button>
        </div>
      )}
    </Modal>
  );
}

/* ────────────────────────────────────────────
   廠商叫貨
──────────────────────────────────────────────*/
const ORD_EMPTY = {
  date: "", storeId: "", vendorId: "", items: "", amount: "", billing: "現結",
  dueDate: "", paidDate: "", payStatus: "未付款", invoiceStatus: "未收到",
  invoiceNo: "", attachment: null, docType: "", noDocReason: "", note: "",
};

function OrderModule({ data, update, user, users, logAudit }) {
  const [month, setMonth] = usePersisted("pl_orders_month", monthOf(todayStr()));
  const [dateFlt, setDateFlt] = usePersisted("pl_orders_dateFlt", "");
  const [editing, setEditing] = useState(null);
  const [vFlt, setVFlt] = useState("");
  const [view, setView] = useState("orders"); // orders | settle
  const [openVendor, setOpenVendor] = useState(null);
  const [batchOpenFor, setBatchOpenFor] = useState(null); // storeId：哪個門店區塊的「新增叫貨」批次視窗開著
  const [selected, setSelected] = useState(new Set());
  const scope = perm.storeScope(user);
  const stores = data.stores.filter((s) => s.active && (!scope || scope.includes(s.id)));
  /* 門店分頁只列「會計主體」層級：烘豆場不再單獨列成一個可選門店分頁，
     選到中山店時會在頁面內以獨立區塊（中山門市／烘豆場）呈現，兩者資料各自獨立、
     合計自動加總，不需要跨分頁切換或自行加總 */
  const topStores = stores.filter((s) => !s.parentId);
  const [storeTab, setStoreTab] = usePersisted("pl_orders_storeTab", "");
  const curStore = topStores.some((s) => s.id === storeTab) ? storeTab : (topStores[0]?.id || "");
  const childStores = stores.filter((s) => s.parentId === curStore);
  const blockStores = [...topStores.filter((s) => s.id === curStore), ...childStores];
  const nameOf = (id) => data.stores.find((s) => s.id === id)?.name || "—";
  const venOf = (id) => data.vendors.find((v) => v.id === id)?.name || "—";
  const today = todayStr();

  const viewStoreIds = blockStores.map((s) => s.id);
  const visibleAll = data.orders.filter((r) => !scope || scope.includes(r.storeId));
  const visible = visibleAll.filter((r) => viewStoreIds.includes(r.storeId));
  const rows = visible.filter((r) => (dateFlt ? r.date === dateFlt : monthOf(r.date) === month) && (!vFlt || r.vendorId === vFlt))
    .sort((a, b) => cmpDate(a.date, b.date));

  /* 統計 */
  const monthSum = rows.reduce((a, o) => a + num(o.amount), 0);
  const todaySum = visible.filter((o) => o.date === today).reduce((a, o) => a + num(o.amount), 0);
  const byVendor = {}; rows.forEach((o) => { byVendor[o.vendorId] = (byVendor[o.vendorId] || 0) + num(o.amount); });
  const monthlyUnpaid = visible.filter((o) => o.billing === "月結" && o.payStatus !== "已付款").reduce((a, o) => a + num(o.amount), 0);
  const overdue = visible.filter((o) => o.payStatus !== "已付款" && o.dueDate && cmpDate(o.dueDate, today) < 0);
  const overdueSum = overdue.reduce((a, o) => a + num(o.amount), 0);

  const save = (form) => {
    if (!form.date || !validDate(form.date)) return alert("請填寫正確叫貨日期（YYYY/MM/DD）");
    if (!form.storeId) return alert("請選擇使用門店");
    if (!form.vendorId) return alert("請選擇廠商");
    if (num(form.amount) <= 0) return alert("金額需大於 0");
    if (form.billing === "月結" && !form.dueDate) return alert("月結叫貨請填寫預計付款日");
    if (form.dueDate && !validDate(form.dueDate)) return alert("預計付款日格式錯誤（需 YYYY/MM/DD）");
    if (form.billing !== "月結") {
      const docErr = validateDoc(form);
      if (docErr) return alert(docErr);
    }
    const rec = { ...form, amount: num(form.amount) };
    if (rec.billing === "月結") { rec.docType = ""; rec.noDocReason = ""; }
    if (!rec.id) {
      rec.id = uid("po"); rec.createdBy = user.id;
      update((d) => ({ ...d, orders: [...d.orders, rec] }));
    } else {
      const old = data.orders.find((o) => o.id === rec.id);
      logAudit("廠商叫貨", rec.id, old, rec, true);
      update((d) => ({ ...d, orders: d.orders.map((o) => (o.id === rec.id ? rec : o)) }));
    }
    setEditing(null);
  };

  const remove = (rec) => {
    if (!confirm(`確定刪除 ${rec.date} ${venOf(rec.vendorId)} 的叫貨？`)) return;
    logAudit("廠商叫貨", rec.id, rec, { ...rec, deleted: true });
    update((d) => ({ ...d, orders: d.orders.filter((o) => o.id !== rec.id) }));
  };

  const selRows = rows.filter((r) => selected.has(r.id));
  const toggleSel = (id) => setSelected((s) => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const toggleSelAllIn = (list) => setSelected((s) => {
    const allSelected = list.length > 0 && list.every((r) => s.has(r.id));
    const n = new Set(s);
    list.forEach((r) => (allSelected ? n.delete(r.id) : n.add(r.id)));
    return n;
  });
  const batchRemove = () => {
    if (selRows.length === 0) return;
    if (!confirm(`確定刪除選取的 ${selRows.length} 筆叫貨紀錄？`)) return;
    selRows.forEach((r) => logAudit("廠商叫貨", r.id, r, { ...r, deleted: true }));
    const ids = new Set(selRows.map((r) => r.id));
    update((d) => ({ ...d, orders: d.orders.filter((o) => !ids.has(o.id)) }));
    setSelected(new Set());
  };

  return (
    <div>
      <SectionTitle right={
        <>
          <MonthPicker value={month} exactDate={dateFlt} onChange={(m) => { setMonth(m); setDateFlt(""); }}
            onToday={(d) => { setDateFlt(d); setMonth(monthOf(d)); }}
            onPickDate={(d) => { setDateFlt(d); setMonth(monthOf(d)); }}
            onClearDate={() => setDateFlt("")} />
          <select className="pl-input" style={{ width: 140 }} value={vFlt} onChange={(e) => setVFlt(e.target.value)}>
            <option value="">全部廠商</option>{data.vendors.map((v) => <option key={v.id} value={v.id}>{v.name}</option>)}
          </select>
        </>
      }>廠商</SectionTitle>

      {/* 叫貨紀錄／月結對帳 切換（月結對帳僅會計與管理者） */}
      {perm.isAcct(user) && (
        <div className="no-print" style={{ display: "inline-flex", border: `1px solid ${T.line}`, borderRadius: 10, overflow: "hidden", marginBottom: 14 }}>
          {[["orders", "叫貨紀錄"], ["settle", "月結對帳・匯款"]].map(([k, label]) => (
            <button key={k} onClick={() => setView(k)} style={{
              padding: "7px 20px", border: "none", cursor: "pointer", fontSize: 13.5,
              background: view === k ? T.brown : "#fff",
              color: view === k ? "#fff" : T.sub, fontWeight: view === k ? 700 : 400,
            }}>{label}</button>
          ))}
        </div>
      )}

      {view === "settle" && perm.isAcct(user) && (
        <SettleSection data={data} update={update} user={user} users={users} logAudit={logAudit} scope={scope} nameOf={nameOf} venOf={venOf} />
      )}

      {view === "orders" && <>
      <StoreTabs stores={topStores} value={curStore} onChange={setStoreTab} />

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(160px,1fr))", gap: 12, marginBottom: 14 }}>
        <KPI label="今日叫貨總額" value={fmt(todaySum)} />
        <KPI label="本月叫貨總額" value={fmt(monthSum)} />
        <KPI label="月結待付款總額" value={fmt(monthlyUnpaid)} />
        <KPI label="已逾期未付款" value={fmt(overdueSum)} tone={overdueSum > 0 ? "red" : "green"} sub={overdue.length ? `${overdue.length} 筆逾期` : "無逾期款項"} />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(260px,1fr))", gap: 12, marginBottom: 14 }}>
        <div className="pl-card" style={{ padding: 14 }}>
          <div className="pl-serif" style={{ fontWeight: 600, marginBottom: 8 }}>本月各廠商叫貨</div>
          {Object.keys(byVendor).length === 0 ? <Empty /> : Object.entries(byVendor).sort((a, b) => b[1] - a[1]).map(([vid, amt]) => {
            const opened = openVendor === vid;
            const detail = rows.filter((o) => o.vendorId === vid).sort((a, b) => cmpDate(a.date, b.date));
            return (
              <div key={vid} style={{ borderBottom: `1px dashed ${T.line}` }}>
                <div onClick={() => setOpenVendor(opened ? null : vid)}
                  style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", fontSize: 13.5, cursor: "pointer" }}>
                  <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={{ color: T.sub, fontSize: 10 }}>{opened ? "▼" : "▶"}</span>
                    {venOf(vid)}
                    <span style={{ color: T.sub, fontSize: 12 }}>{detail.length} 筆</span>
                  </span>
                  <b>{fmt(amt)}</b>
                </div>
                {opened && (
                  <div style={{ padding: "2px 0 8px 22px" }}>
                    {detail.map((o) => (
                      <div key={o.id} style={{ display: "flex", justifyContent: "space-between", padding: "3px 0", fontSize: 13, color: T.ink }}>
                        <span style={{ fontVariantNumeric: "tabular-nums", color: T.sub }}>{o.date}</span>
                        <span style={{ fontVariantNumeric: "tabular-nums" }}>{fmt(num(o.amount))}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {selRows.length > 0 && (
        <div className="pl-card no-print" style={{ padding: 10, marginBottom: 12, display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 13 }}>已選 {selRows.length} 筆</span>
          <button className="pl-btn small danger" onClick={batchRemove}>批次刪除</button>
          <button className="pl-btn small" onClick={() => setSelected(new Set())}>取消選取</button>
        </div>
      )}

      {blockStores.map((s) => {
        const bRows = rows.filter((r) => r.storeId === s.id);
        const bTotal = bRows.reduce((a, r) => a + num(r.amount), 0);
        return (
          <div key={s.id} style={{ marginBottom: 26 }}>
            <div style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: 8, marginBottom: 10 }}>
              <div className="pl-serif" style={{ fontWeight: 700, fontSize: 16 }}>{s.name}</div>
              <button className="pl-btn primary small" onClick={() => setBatchOpenFor(s.id)}>＋ 新增叫貨</button>
              <span style={{ marginLeft: "auto", fontSize: 12.5, color: T.sub }}>
                {s.name}小計・{bRows.length} 筆・<b style={{ color: T.ink }}>{fmt(bTotal)}</b>
              </span>
            </div>
            <OrderRowsTable rows={bRows} selected={selected} toggleSel={toggleSel} toggleSelAllIn={toggleSelAllIn}
              nameOf={nameOf} venOf={venOf} today={today} setEditing={setEditing} remove={remove} emptyText={`${s.name}本月尚無叫貨紀錄`} />
          </div>
        );
      })}

      {blockStores.length > 1 && (
        <div className="pl-card" style={{ padding: 16, marginBottom: 14 }}>
          <div className="pl-serif" style={{ fontWeight: 700, marginBottom: 10 }}>{nameOf(curStore)}叫貨合計</div>
          <div style={{ display: "grid", gap: 6 }}>
            {blockStores.map((s) => (
              <StoreRow key={s.id} label={`${s.name}小計`}
                value={fmt(rows.filter((r) => r.storeId === s.id).reduce((a, r) => a + num(r.amount), 0))} />
            ))}
            <StoreRow label={`${nameOf(curStore)}合計（${blockStores.map((s) => s.name).join("＋")}）`} value={fmt(monthSum)} strong />
          </div>
        </div>
      )}

      </>}

      {batchOpenFor && (
        <BatchOrderModal data={data} user={user} curStore={batchOpenFor} nameOf={nameOf}
          onClose={() => setBatchOpenFor(null)}
          onCommit={(recs) => { update((d) => ({ ...d, orders: [...d.orders, ...recs] })); setBatchOpenFor(null); }} />
      )}
      {editing && <OrderForm form={editing} setForm={setEditing} data={data} stores={stores} onSave={save} onClose={() => setEditing(null)} />}
    </div>
  );
}

/* 廠商叫貨表格：門店區塊共用同一份表格結構，只是餵進去的 rows 不同 */
function OrderRowsTable({ rows, selected, toggleSel, toggleSelAllIn, nameOf, venOf, today, setEditing, remove, emptyText }) {
  const allSelected = rows.length > 0 && rows.every((r) => selected.has(r.id));
  return (
    <div className="pl-card pl-scroll-x" style={{ marginBottom: 14 }}>
      <table className="pl-table">
        <thead><tr>
          <th style={{ width: 30 }}><input type="checkbox" checked={allSelected} onChange={() => toggleSelAllIn(rows)} /></th>
          <th>日期</th><th>使用門店</th><th>廠商</th><th>品項說明</th>
          <th className="num">金額</th><th>結帳方式</th><th>預計付款日</th><th>付款狀態</th><th>發票狀態</th><th>附件</th><th></th>
        </tr></thead>
        <tbody>
          {rows.length === 0 && <tr><td colSpan={12}><Empty text={emptyText} /></td></tr>}
          {rows.map((r) => {
            const isOverdue = r.payStatus !== "已付款" && r.dueDate && cmpDate(r.dueDate, today) < 0;
            return (
              <tr key={r.id}>
                <td><input type="checkbox" checked={selected.has(r.id)} onChange={() => toggleSel(r.id)} /></td>
                <td style={{ whiteSpace: "nowrap" }}>{r.date}</td>
                <td>{nameOf(r.storeId)}</td>
                <td>{venOf(r.vendorId)}</td>
                <td style={{ maxWidth: 240 }}>{r.items}</td>
                <td className="num" style={{ fontWeight: 600 }}>{fmtN(r.amount)}</td>
                <td>{r.billing}</td>
                <td style={{ whiteSpace: "nowrap", color: isOverdue ? T.red : undefined }}>
                  {r.dueDate || "—"}{isOverdue && <Badge text="逾期" tone="red" />}
                </td>
                <td><Badge text={r.payStatus} /></td>
                <td><Badge text={r.invoiceStatus} /></td>
                <td>{r.billing === "月結"
                  ? <span style={{ fontSize: 12.5, color: T.sub }}>月結憑證見對帳</span>
                  : <DocCell docType={r.docType} noDocReason={r.noDocReason} attachment={r.attachment} />}</td>
                <td style={{ whiteSpace: "nowrap" }}>
                  <button className="pl-btn small" onClick={() => setEditing({ ...r })}>編輯</button>
                  {" "}<button className="pl-btn small danger" onClick={() => remove(r)}>刪除</button>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

/* ── 月結對帳・匯款區：當月月結叫貨，次月憑廠商發票匯款 ── */
/* 月結廠商以「一個月一張統一發票」為原則：叫貨明細先按廠商＋月份彙整成一筆應付帳款，
   不要求每筆叫貨都個別綁發票；廠商開立統一發票後，使用者在該應付帳款登錄發票號碼／金額／
   附件，系統自動核對發票金額與已彙整的叫貨總金額，兩者不一致時要求填寫差異原因才能儲存。 */
function SettleSection({ data, update, user, users, logAudit, scope, nameOf, venOf }) {
  const [settleMonth, setSettleMonth] = usePersisted("pl_settle_month", prevMonth(monthOf(todayStr())));
  const [open, setOpen] = useState(null);
  const [invoiceEditing, setInvoiceEditing] = useState(null); // { vid, period, ...payable }
  const [cancelling, setCancelling] = useState(null); // { payable, rawSum, reason }
  const today = todayStr();
  const userName = (id) => (users || []).find((u) => u.id === id)?.name || "—";
  const acctOf = (sid) => acctStoreId(data.stores, sid);

  /* 月結對帳也比照「叫貨紀錄」用門店分頁呈現，點選門店才顯示該門店的對帳資料 */
  const stores = data.stores.filter((s) => s.active && (!scope || scope.includes(s.id)));
  const topStores = stores.filter((s) => !s.parentId);
  const [storeTab, setStoreTab] = usePersisted("pl_settle_storeTab", "");
  const curStore = topStores.some((s) => s.id === storeTab) ? storeTab : (topStores[0]?.id || "");

  const monthly = data.orders.filter((o) =>
    o.billing === "月結" && monthOf(o.date) === settleMonth && (!scope || scope.includes(o.storeId)) && acctOf(o.storeId) === curStore
  );

  /* 依「廠商＋門店」彙整；每組（廠商＋門店＋月份）對應唯一一筆應付帳款／統一發票——
     廠商如果同一個月同時服務多間門店，會拆成多筆各自登錄發票、各自對帳、各自確認匯款，
     不會合併成一筆整體金額 */
  const byGroup = {};
  monthly.forEach((o) => {
    const sid = acctOf(o.storeId);
    const key = o.vendorId + "__" + sid;
    (byGroup[key] = byGroup[key] || { vid: o.vendorId, storeId: sid, list: [] }).list.push(o);
  });
  const groups = Object.values(byGroup).map((g) => {
    const total = g.list.reduce((a, o) => a + num(o.amount), 0);
    const unpaid = g.list.filter((o) => o.payStatus !== "已付款");
    const dueDates = g.list.map((o) => o.dueDate).filter(Boolean).sort(cmpDate);
    const overdue = unpaid.some((o) => o.dueDate && cmpDate(o.dueDate, today) < 0);
    const payable = (data.payables || []).find((p) => p.vendorId === g.vid && p.storeId === g.storeId && p.period === settleMonth) || null;
    return { ...g, total, unpaid, due: dueDates[0] || "—", overdue, payable };
  }).sort((a, b) => b.total - a.total);

  const totalAll = groups.reduce((a, g) => a + g.total, 0);
  const totalUnpaid = groups.reduce((a, g) => a + g.unpaid.reduce((x, o) => x + num(o.amount), 0), 0);

  const settle = (g) => {
    if (g.unpaid.length === 0) return;
    if (!g.payable || g.payable.cancelled) {
      if (!confirm(`${venOf(g.vid)} 這個月尚未登錄統一發票。月結應憑發票匯款，仍要確認匯款？`)) return;
    } else if (g.payable.status === "金額不符") {
      if (!confirm(`${venOf(g.vid)} 這個月的發票金額與叫貨總額不符（原因：${g.payable.discrepancyReason || "未填寫"}）。仍要確認匯款？`)) return;
    } else {
      if (!confirm(`確認已匯款給 ${venOf(g.vid)}？將把 ${g.unpaid.length} 筆月結叫貨標記為已付款（付款日 ${today}）。`)) return;
    }
    const ids = g.unpaid.map((o) => o.id);
    g.unpaid.forEach((o) => logAudit("廠商叫貨", o.id, o, { ...o, payStatus: "已付款", paidDate: today }, true));
    update((d) => ({
      ...d,
      orders: d.orders.map((o) => ids.includes(o.id) ? { ...o, payStatus: "已付款", paidDate: today } : o),
    }));
  };

  const openInvoiceForm = (g) => {
    setInvoiceEditing(g.payable
      ? { ...g.payable }
      : { id: null, vendorId: g.vid, storeId: g.storeId, period: settleMonth, invoiceNo: "", invoiceAmount: "", invoiceDate: today, attachment: null, discrepancyReason: "" });
  };

  const saveInvoice = (form, ordersTotal) => {
    if (!form.invoiceNo.trim()) return alert("請填寫發票號碼");
    if (!validDate(form.invoiceDate)) return alert("請填寫正確發票日期（YYYY/MM/DD）");
    const invoiceAmount = num(form.invoiceAmount);
    if (invoiceAmount <= 0) return alert("發票金額需大於 0");
    const diff = invoiceAmount - ordersTotal;
    if (diff !== 0 && !form.discrepancyReason.trim()) {
      return alert(`發票金額（${fmt(invoiceAmount)}）與本月彙整的叫貨總額（${fmt(ordersTotal)}）不一致，差異 ${fmt(diff)}，請先填寫差異原因才能儲存。`);
    }
    const rec = {
      ...form, invoiceAmount, ordersTotal, discrepancy: diff,
      status: diff === 0 ? "已核對" : "金額不符",
      /* 存檔（不論新增或編輯）一律視為重新套用發票調整，取消狀態自動解除 */
      cancelled: false, cancelledBy: null, cancelledAt: null, cancelReason: "",
      adjustedBy: user.id, adjustedAt: nowStamp(),
    };
    if (!rec.id) {
      rec.id = uid("ap"); rec.createdBy = user.id; rec.createdAt = nowStamp();
      update((d) => ({ ...d, payables: [...(d.payables || []), rec] }));
    } else {
      const old = (data.payables || []).find((p) => p.id === rec.id);
      logAudit("應付帳款", rec.id, old, rec, true);
      update((d) => ({ ...d, payables: (d.payables || []).map((p) => p.id === rec.id ? rec : p) }));
    }
    setInvoiceEditing(null);
  };

  const openCancel = (g) => setCancelling({ payable: g.payable, rawSum: g.total, reason: "" });

  const confirmCancel = () => {
    if (!cancelling.reason.trim()) return alert("請填寫取消原因");
    const payable = cancelling.payable;
    const rec = { ...payable, cancelled: true, cancelledBy: user.id, cancelledAt: nowStamp(), cancelReason: cancelling.reason.trim() };
    logAudit("應付帳款", rec.id, payable, rec, true);
    update((d) => ({ ...d, payables: (d.payables || []).map((p) => (p.id === rec.id ? rec : p)) }));
    setCancelling(null);
  };

  return (
    <div>
      <div className="pl-card no-print" style={{ padding: 12, marginBottom: 12, display: "flex", flexWrap: "wrap", gap: 12, alignItems: "center" }}>
        <span style={{ fontSize: 13, color: T.sub }}>結帳月份（貨款月）</span>
        <MonthPicker value={settleMonth} onChange={setSettleMonth} />
        <div style={{ marginLeft: "auto", display: "flex", gap: 18, fontSize: 13 }}>
          <span style={{ color: T.sub }}>{nameOf(curStore)}月結總額 <b style={{ color: T.ink }}>{fmt(totalAll)}</b></span>
          <span style={{ color: T.sub }}>待匯款 <b style={{ color: totalUnpaid > 0 ? T.red : T.green }}>{fmt(totalUnpaid)}</b></span>
        </div>
      </div>

      <StoreTabs stores={topStores} value={curStore} onChange={setStoreTab} />

      <div style={{ fontSize: 12.5, color: T.sub, marginBottom: 10 }}>
        彙整 {nameOf(curStore)}・{monthLabel(settleMonth)}各廠商月結叫貨。每個廠商在每間門店各自一個月開立一張統一發票，
        不需要每筆叫貨都個別綁發票——叫貨明細先歸屬在這裡，等廠商開立發票後，於該筆登錄發票號碼／
        金額／附件即可，系統會自動核對發票金額跟該門店的叫貨總額；同一廠商如果同時服務多間門店，切到不同門店分頁會分開對帳。
      </div>

      {groups.length === 0 && <div className="pl-card" style={{ padding: 24 }}><Empty text="此月份沒有月結叫貨紀錄" /></div>}

      {groups.map((g) => {
        const groupKey = g.vid + "__" + g.storeId;
        return (
        <div key={groupKey} className="pl-card" style={{ marginBottom: 12, overflow: "hidden" }}>
          <div style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: 14, padding: "13px 16px", cursor: "pointer" }}
            onClick={() => setOpen(open === groupKey ? null : groupKey)}>
            <div className="pl-serif" style={{ fontWeight: 700, fontSize: 15, minWidth: 120 }}>{venOf(g.vid)}</div>
            <div style={{ fontSize: 13, color: T.sub }}>{g.list.length} 筆</div>
            <div>
              <div style={{ fontSize: 15, fontWeight: 700, fontVariantNumeric: "tabular-nums" }}>
                {g.payable && !g.payable.cancelled ? fmt(g.payable.invoiceAmount) : fmt(g.total)}
              </div>
              {g.payable && !g.payable.cancelled && g.payable.invoiceAmount !== g.total && (
                <div style={{ fontSize: 11.5, color: T.sub }}>原始叫貨 {fmt(g.total)}</div>
              )}
            </div>
            {(!g.payable || g.payable.cancelled) && <Badge text="尚未登錄統一發票" tone="yellow" />}
            {g.payable && !g.payable.cancelled && g.payable.status === "已核對" && <Badge text={`發票已核對・${g.payable.invoiceNo}`} tone="green" />}
            {g.payable && !g.payable.cancelled && g.payable.status === "金額不符" && <Badge text={`發票金額不符（差 ${fmt(g.payable.discrepancy)}）`} tone="red" />}
            {g.payable && g.payable.cancelled && <Badge text="發票調整已取消" tone="gray" />}
            {g.unpaid.length === 0
              ? <Badge text="已匯款" tone="green" />
              : <Badge text={g.overdue ? "已逾期未匯" : "待匯款"} tone={g.overdue ? "red" : "yellow"} />}
            <div style={{ fontSize: 12.5, color: T.sub }}>預計付款日 {g.due}</div>
            <div style={{ marginLeft: "auto", display: "flex", gap: 8, alignItems: "center" }}>
              <button className="pl-btn small" onClick={(e) => { e.stopPropagation(); openInvoiceForm(g); }}>
                {g.payable ? "編輯統一發票" : "登錄統一發票"}
              </button>
              {g.payable && !g.payable.cancelled && (
                <button className="pl-btn small danger" onClick={(e) => { e.stopPropagation(); openCancel(g); }}>
                  取消發票調整
                </button>
              )}
              {g.unpaid.length > 0 && (
                <button className="pl-btn primary" onClick={(e) => { e.stopPropagation(); settle(g); }}>
                  確認匯款 {fmt(g.unpaid.reduce((a, o) => a + num(o.amount), 0))}
                </button>
              )}
              <span style={{ color: T.sub, fontSize: 12 }}>{open === groupKey ? "▲" : "▼"}</span>
            </div>
          </div>

          {g.payable && !g.payable.cancelled && (
            <div style={{ padding: "0 16px 12px", fontSize: 12.5, color: T.sub }}>
              統一發票 {g.payable.invoiceNo}・{g.payable.invoiceDate}・發票金額 {fmt(g.payable.invoiceAmount)}
              ・原始叫貨累計 {fmt(g.payable.ordersTotal)}
              {g.payable.discrepancy !== 0 && <>・調整差額 <b style={{ color: g.payable.discrepancy > 0 ? T.red : T.green }}>{g.payable.discrepancy > 0 ? "+" : ""}{fmt(g.payable.discrepancy)}</b></>}
              {g.payable.status === "金額不符" && <span style={{ color: T.red }}>・差異原因：{g.payable.discrepancyReason}</span>}
              {g.payable.attachment && <> ・<AttachmentView value={g.payable.attachment} /></>}
              <br />調整人員 {userName(g.payable.adjustedBy || g.payable.createdBy)}・調整時間 {g.payable.adjustedAt || g.payable.createdAt}
            </div>
          )}
          {g.payable && g.payable.cancelled && (
            <div style={{ padding: "0 16px 12px", fontSize: 12.5, color: T.sub }}>
              先前登錄的發票 {g.payable.invoiceNo}（金額 {fmt(g.payable.invoiceAmount)}）已取消調整，「廠商叫貨」統計恢復採原始叫貨累計 {fmt(g.payable.ordersTotal)}。
              <br />取消原因：{g.payable.cancelReason}・取消人員 {userName(g.payable.cancelledBy)}・取消時間 {g.payable.cancelledAt}
            </div>
          )}

          {open === groupKey && (
            <div className="pl-scroll-x" style={{ borderTop: `1px solid ${T.line}` }}>
              <table className="pl-table">
                <thead><tr>
                  <th>日期</th><th>門店</th><th>品項</th>
                  <th className="num">金額</th><th>預計付款日</th><th>付款狀態</th><th></th>
                </tr></thead>
                <tbody>
                  {g.list.sort((a, b) => cmpDate(a.date, b.date)).map((o) => (
                    <tr key={o.id}>
                      <td style={{ whiteSpace: "nowrap" }}>{o.date}</td>
                      <td>{nameOf(o.storeId)}</td>
                      <td>{o.items}</td>
                      <td className="num" style={{ fontWeight: 600 }}>{fmtN(o.amount)}</td>
                      <td style={{ whiteSpace: "nowrap", color: o.payStatus !== "已付款" && o.dueDate && cmpDate(o.dueDate, today) < 0 ? T.red : T.ink }}>{o.dueDate || "—"}</td>
                      <td>
                        <Badge text={o.payStatus} tone={o.payStatus === "已付款" ? "green" : "yellow"} />
                        {o.paidDate ? <span style={{ fontSize: 12, color: T.sub }}> {o.paidDate}</span> : null}
                      </td>
                      <td></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
        );
      })}

      {invoiceEditing && (() => {
        const g = groups.find((x) => x.vid === invoiceEditing.vendorId && x.storeId === invoiceEditing.storeId);
        const ordersTotal = g ? g.total : 0;
        return (
          <PayableInvoiceForm form={invoiceEditing} setForm={setInvoiceEditing} vendorName={venOf(invoiceEditing.vendorId)}
            storeName={nameOf(invoiceEditing.storeId)}
            ordersTotal={ordersTotal} onSave={(f) => saveInvoice(f, ordersTotal)} onClose={() => setInvoiceEditing(null)} />
        );
      })()}

      {cancelling && (
        <Modal title={`取消發票調整・${venOf(cancelling.payable.vendorId)}・${nameOf(cancelling.payable.storeId)}・${monthLabel(cancelling.payable.period)}`} onClose={() => setCancelling(null)} width={480}>
          <div style={{ fontSize: 13, color: T.sub, marginBottom: 12 }}>
            取消後，「廠商叫貨」統計（營運總覽／月報／年報）會恢復採用系統原始叫貨累計金額 {fmt(cancelling.rawSum)}，
            不再套用發票金額 {fmt(cancelling.payable.invoiceAmount)}。這筆發票登錄紀錄仍會保留供查閱，之後也可以重新編輯套用。
          </div>
          <Field label="取消原因" required>
            <input className="pl-input" value={cancelling.reason} onChange={(e) => setCancelling({ ...cancelling, reason: e.target.value })}
              placeholder="例：發票金額登錄有誤、廠商重開發票" />
          </Field>
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 18 }}>
            <button className="pl-btn" onClick={() => setCancelling(null)}>返回</button>
            <button className="pl-btn danger" onClick={confirmCancel}>確定取消調整</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function PayableInvoiceForm({ form, setForm, vendorName, storeName, ordersTotal, onSave, onClose }) {
  const set = (k) => (e) => setForm({ ...form, [k]: e.target.value });
  const diff = num(form.invoiceAmount) - ordersTotal;
  return (
    <Modal title={`登錄統一發票・${vendorName}・${storeName}・${monthLabel(form.period)}`} onClose={onClose} width={560}>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(160px,1fr))", gap: 12 }}>
        <Field label="本月叫貨總額（系統彙整，唯讀）"><input className="pl-input" value={fmt(ordersTotal)} disabled /></Field>
        <Field label="發票號碼" required><input className="pl-input" value={form.invoiceNo} onChange={set("invoiceNo")} placeholder="AB-12345678" /></Field>
        <Field label="發票金額" required><input className="pl-input" inputMode="decimal" value={form.invoiceAmount} onChange={set("invoiceAmount")} /></Field>
        <Field label="發票日期" required><DateInput value={form.invoiceDate} onChange={set("invoiceDate")} /></Field>
        <Field label="發票附件" span={2}><AttachmentInput value={form.attachment} onChange={(a) => setForm({ ...form, attachment: a })} /></Field>
      </div>
      {form.invoiceAmount !== "" && diff !== 0 && (
        <div style={{ marginTop: 12, background: T.redBg, borderRadius: 8, padding: 10 }}>
          <div style={{ color: T.red, fontSize: 13, marginBottom: 6 }}>
            發票金額與叫貨總額不一致，差異 {fmt(diff)}（{diff > 0 ? "發票較高" : "發票較低"}），請填寫原因才能儲存。
          </div>
          <input className="pl-input" value={form.discrepancyReason} onChange={set("discrepancyReason")} placeholder="差異原因（例：含運費、折讓、單筆漏登）" />
        </div>
      )}
      <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 18 }}>
        <button className="pl-btn" onClick={onClose}>取消</button>
        <button className="pl-btn primary" onClick={() => onSave(form)}>儲存</button>
      </div>
    </Modal>
  );
}

function OrderForm({ form, setForm, data, stores, onSave, onClose }) {
  const set = (k) => (e) => setForm({ ...form, [k]: e.target.value });
  return (
    <Modal title={form.id ? "叫貨明細" : "新增叫貨"} onClose={onClose} width={760}>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(160px,1fr))", gap: 12 }}>
        <Field label="叫貨日期" required><DateInput value={form.date} onChange={set("date")} /></Field>
        <Field label="使用門店" required>
          <select className="pl-input" value={form.storeId} onChange={set("storeId")}>
            <option value="">選擇</option>{stores.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
        </Field>
        <Field label="廠商" required>
          <select className="pl-input" value={form.vendorId} onChange={set("vendorId")}>
            <option value="">選擇廠商</option>{data.vendors.filter(v=>v.active).map((v) => <option key={v.id} value={v.id}>{v.name}</option>)}
          </select>
        </Field>
        <Field label="品項說明" required span={2}><input className="pl-input" value={form.items} onChange={set("items")} placeholder="例：衣索比亞水洗 30kg" /></Field>
        <Field label="金額" required><input className="pl-input" inputMode="decimal" value={form.amount} onChange={set("amount")} placeholder="0" /></Field>
        <Field label="結帳方式">
          <select className="pl-input" value={form.billing} onChange={set("billing")}>
            {ORDER_BILLING.map((b) => <option key={b}>{b}</option>)}
          </select>
        </Field>
        <Field label="預計付款日" required={form.billing === "月結"}><DateInput value={form.dueDate} onChange={set("dueDate")} /></Field>
        <Field label="實際付款日"><DateInput value={form.paidDate} onChange={set("paidDate")} /></Field>
        <Field label="付款狀態">
          <select className="pl-input" value={form.payStatus} onChange={set("payStatus")}>
            {ORDER_PAY_STATUS.map((s) => <option key={s}>{s}</option>)}
          </select>
        </Field>
        <Field label="發票狀態">
          <select className="pl-input" value={form.invoiceStatus} onChange={set("invoiceStatus")}>
            {INVOICE_STATUS.map((s) => <option key={s}>{s}</option>)}
          </select>
        </Field>
        <Field label="發票號碼"><input className="pl-input" value={form.invoiceNo} onChange={set("invoiceNo")} /></Field>
        {form.billing === "月結" ? (
          <Field label="單據／憑證" span={2}>
            <span style={{ fontSize: 13, color: T.sub }}>月結叫貨的憑證於「月結對帳」登錄廠商統一發票，這裡不用個別上傳</span>
          </Field>
        ) : (
          <DocumentField docType={form.docType} noDocReason={form.noDocReason} attachment={form.attachment}
            onChange={(patch) => setForm({ ...form, ...patch })} />
        )}
        <Field label="備註" span={2}><input className="pl-input" value={form.note} onChange={set("note")} /></Field>

/* ────────────────────────────────────────────
   應收帳款
──────────────────────────────────────────────*/
const AR_EMPTY = {
  date: "", customer: "", invoiceNo: "", amount: "", requester: "", requestDate: "",
  dueDate: "", received: "", receivedDate: "", status: "未請款", note: "", attachment: null,
  docType: "", noDocReason: "",
};

function ARModule({ data, update, user, logAudit }) {
  const [editing, setEditing] = useState(null);
  const [showAll, setShowAll] = useState(true);
  const [selected, setSelected] = useState(new Set());
  const today = todayStr();
  if (!perm.canAR(user)) return <Empty text="應收帳款僅開放會計與系統管理者查看。" />;

  const rows = data.receivables
    .filter((r) => showAll || num(r.amount) - num(r.received) > 0)
    .sort((a, b) => cmpDate(a.date, b.date));
  const totalUnpaid = data.receivables.filter((r) => r.status !== "呆帳").reduce((a, r) => a + Math.max(0, num(r.amount) - num(r.received)), 0);

  const nextNo = (date) => {
    const prefix = "AR-" + date.slice(2, 7).replace("/", "") + "-";
    const n = data.receivables.filter((r) => r.no && r.no.startsWith(prefix)).length + 1;
    return prefix + pad2(n);
  };

  const save = (form) => {
    if (!form.date || !validDate(form.date)) return alert("請填寫正確建立日期");
    if (!form.customer.trim()) return alert("請填寫客戶或公司名稱");
    if (num(form.amount) <= 0) return alert("請款金額需大於 0");
    if (num(form.received) > num(form.amount)) return alert("已收金額不可大於請款金額");
    const docErr = validateDoc(form);
    if (docErr) return alert(docErr);
    const rec = { ...form, amount: num(form.amount), received: num(form.received) };
    if (!rec.id) {
      rec.id = uid("ar"); rec.no = nextNo(rec.date); rec.createdBy = user.id; rec.createdAt = nowStamp();
      update((d) => ({ ...d, receivables: [...d.receivables, rec] }));
    } else {
      const old = data.receivables.find((r) => r.id === rec.id);
      logAudit("應收帳款", rec.id, old, rec, true);
      update((d) => ({ ...d, receivables: d.receivables.map((r) => (r.id === rec.id ? rec : r)) }));
    }
    setEditing(null);
  };

  const remove = (rec) => {
    if (!confirm(`確定刪除應收帳款 ${rec.no}（${rec.customer}）？`)) return;
    logAudit("應收帳款", rec.id, rec, { ...rec, deleted: true });
    update((d) => ({ ...d, receivables: d.receivables.filter((r) => r.id !== rec.id) }));
  };

  const selRows = rows.filter((r) => selected.has(r.id));
  const toggleSel = (id) => setSelected((s) => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const toggleSelAll = () => setSelected(rows.length && selRows.length === rows.length ? new Set() : new Set(rows.map((r) => r.id)));
  const batchRemove = () => {
    if (selRows.length === 0) return;
    if (!confirm(`確定刪除選取的 ${selRows.length} 筆應收帳款？`)) return;
    selRows.forEach((r) => logAudit("應收帳款", r.id, r, { ...r, deleted: true }));
    const ids = new Set(selRows.map((r) => r.id));
    update((d) => ({ ...d, receivables: d.receivables.filter((r) => !ids.has(r.id)) }));
    setSelected(new Set());
  };

  return (
    <div>
      <SectionTitle right={
        <>
          <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 13.5, color: T.sub }}>
            <input type="checkbox" checked={!showAll} onChange={(e) => setShowAll(!e.target.checked)} /> 僅顯示未收清
          </label>
          <button className="pl-btn primary" onClick={() => setEditing({ ...AR_EMPTY, id: null, date: todayStr(), requester: user.name })}>＋ 新增應收</button>
        </>
      }>應收帳款</SectionTitle>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(180px,1fr))", gap: 12, marginBottom: 14 }}>
        <KPI label="應收未收合計" value={fmt(totalUnpaid)} tone={totalUnpaid > 0 ? undefined : "green"} />
      </div>

      {selRows.length > 0 && (
        <div className="pl-card no-print" style={{ padding: 10, marginBottom: 12, display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 13 }}>已選 {selRows.length} 筆</span>
          <button className="pl-btn small danger" onClick={batchRemove}>批次刪除</button>
          <button className="pl-btn small" onClick={() => setSelected(new Set())}>取消選取</button>
        </div>
      )}

      <div className="pl-card pl-scroll-x">
        <table className="pl-table">
          <thead><tr>
            <th style={{ width: 30 }}><input type="checkbox" checked={rows.length > 0 && selRows.length === rows.length} onChange={toggleSelAll} /></th>
            <th>編號</th><th>建立日期</th><th>客戶／公司</th><th>發票號碼</th>
            <th className="num">請款金額</th><th className="num">已收金額</th><th className="num">未收金額</th>
            <th>到期日</th><th>收款狀態</th><th>對帳單</th><th></th>
          </tr></thead>
          <tbody>
            {rows.length === 0 && <tr><td colSpan={12}><Empty text="尚無應收帳款" /></td></tr>}
            {rows.map((r) => {
              const unpaid = num(r.amount) - num(r.received);
              const isOverdue = r.dueDate && cmpDate(r.dueDate, today) < 0 && unpaid > 0 && r.status !== "呆帳";
              return (
                <tr key={r.id}>
                  <td><input type="checkbox" checked={selected.has(r.id)} onChange={() => toggleSel(r.id)} /></td>
                  <td style={{ whiteSpace: "nowrap" }}>{r.no}</td>
                  <td style={{ whiteSpace: "nowrap" }}>{r.date}</td>
                  <td>{r.customer}</td>
                  <td style={{ fontSize: 12.5 }}>{r.invoiceNo || "—"}</td>
                  <td className="num">{fmtN(r.amount)}</td>
                  <td className="num">{fmtN(r.received)}</td>
                  <td className="num" style={{ fontWeight: 600, color: unpaid > 0 ? T.red : T.green }}>{fmtN(unpaid)}</td>
                  <td style={{ whiteSpace: "nowrap", color: isOverdue ? T.red : undefined }}>
                    {r.dueDate || "—"}{isOverdue && <Badge text="逾期" tone="red" />}
                  </td>
                  <td><Badge text={r.status} /></td>
                  <td><DocCell docType={r.docType} noDocReason={r.noDocReason} attachment={r.attachment} /></td>
                  <td style={{ whiteSpace: "nowrap" }}>
                    <button className="pl-btn small" onClick={() => setEditing({ ...r })}>編輯</button>
                    {" "}<button className="pl-btn small danger" onClick={() => remove(r)}>刪除</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {editing && <ARForm form={editing} setForm={setEditing} onSave={save} onClose={() => setEditing(null)} />}
    </div>
  );
}

      </div>
      <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 18 }}>

  );

/* ────────────────────────────────────────────
   月報
──────────────────────────────────────────────*/
function computeMonthReport(data, month, storeFilter) {
  const catById = Object.fromEntries(data.categories.map((c) => [c.id, c]));
  const acctOf = (sid) => acctStoreId(data.stores, sid);
  const pick = (arr) => arr.filter((r) => monthOf(r.date) === month && (!storeFilter || acctOf(r.storeId) === storeFilter));
  const salesM = pick(data.dailySales);
  const expAll = pick(data.expenses).filter((e) => e.status !== "已退回" && e.categoryId !== ORDER_CAT_ID);

  const byStore = {};
  data.stores.filter((s) => s.retail).forEach((s) => {
    byStore[s.id] = data.dailySales.filter((r) => monthOf(r.date) === month && r.storeId === s.id).reduce((a, r) => a + calcSales(r).net, 0);
  });
  const revenue = salesM.reduce((a, s) => a + calcSales(s).net, 0);
  const incM = pick(data.incomes || []).filter((r) => r.status !== "已退回");
  const bizInc = incM.reduce((a, r) => a + num(r.amount), 0);
  const totalInc = revenue + bizInc;
  const tgt = data.targets[month] || {};
  const tgtSum = storeFilter ? num(tgt[storeFilter]) : data.stores.filter((s) => s.retail).reduce((a, s) => a + num(tgt[s.id]), 0);

  const catSum = (name) => expAll.filter((e) => catById[e.categoryId]?.name === name).reduce((a, e) => a + num(e.amount), 0);
  /* 廠商叫貨：月結廠商有未取消的發票調整時（僅限「全部門店」）採發票金額，跟營運總覽口徑一致 */
  const { total: orders, adjustments: ordAdjustments } = adjustedOrderSum(data, month, storeFilter);
  const named = ["租金", "水費", "電費", "瓦斯費", "勞保", "健保", "勞退", "人事成本", "稅金"];
  const namedSums = Object.fromEntries(named.map((n) => [n, catSum(n)]));
  const namedTotal = Object.values(namedSums).reduce((a, b) => a + b, 0);
  const expTotal = expAll.reduce((a, e) => a + num(e.amount), 0);
  const otherExp = expTotal - namedTotal;
  const general = expAll.filter((e) => !catById[e.categoryId]?.fixed && !named.includes(catById[e.categoryId]?.name)).reduce((a, e) => a + num(e.amount), 0);

  return {
    revenue, bizInc, totalInc, tgtSum, byStore,
    achieve: tgtSum > 0 ? (revenue / tgtSum) * 100 : null,
    rows: [
      ["廠商叫貨", orders],
      ["一般支出", general],
      ...named.map((n) => [n, namedSums[n]]),
      ["其他支出", Math.max(0, otherExp - general)],
    ],
    orders, ordAdjustments, general, namedSums, otherFixed: Math.max(0, otherExp - general),
    totalExp: orders + expTotal,
    profit: totalInc - (orders + expTotal),
  };
}

function ReportModule({ data, update, user, users }) {
  const [reportTab, setReportTab] = usePersisted("pl_report_tab", "monthly");
  const [month, setMonth] = usePersisted("pl_report_month", monthOf(todayStr()));
  const [storeFilter, setStoreFilter] = usePersisted("pl_report_storeFilter", null);
  const cur = computeMonthReport(data, month, storeFilter);
  const prev = computeMonthReport(data, prevMonth(month), storeFilter);
  const stores = data.stores.filter((s) => s.retail && s.active);

  const pct = (v) => cur.revenue > 0 ? ((v / cur.revenue) * 100).toFixed(1) + "%" : "—";
  const delta = (a, b) => {
    const d = a - b;
    const p = b > 0 ? ((d / b) * 100).toFixed(1) + "%" : "—";
    return { d, p };
  };

  const exportExcel = () => {
    const wb = XLSX.utils.book_new();
    const rows = [
      ["PHASE 門店月度營運報表", "", "", "", ""],
      ["月份", monthLabel(month), "門店範圍", storeFilter ? stores.find((s) => s.id === storeFilter)?.name : "全部門店", ""],
      [],
      ["收入區", "金額", "", "", ""],
      ["營業額目標", cur.tgtSum],
      ...stores.filter((s) => !storeFilter || s.id === storeFilter).map((s) => [s.name + " 營業額", cur.byStore[s.id] || 0]),
      ["門店收入（業外）", cur.bizInc],
      ["總收入", cur.totalInc],
      ["營業額達成率", cur.achieve !== null ? cur.achieve.toFixed(1) + "%" : "未設定目標"],
      [],
      ["支出區", "金額", "占營業額比例", "與上月差額", "與上月增減%"],
      ...cur.rows.map(([name, v], i) => {
        const pv = prev.rows[i] ? prev.rows[i][1] : 0;
        const { d, p } = delta(v, pv);
        return [name, v, cur.revenue > 0 ? (v / cur.revenue) : 0, d, p];
      }),
      ["總支出", cur.totalExp],
      [],
      ["本月損益", cur.profit],
    ];
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws["!cols"] = [{ wch: 16 }, { wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 14 }];
    XLSX.utils.book_append_sheet(wb, ws, "月報");
    XLSX.writeFile(wb, `PHASE_月報_${month.replace("/", "-")}.xlsx`);
  };

    <div>

        reportTab === "monthly" ? (
          <>

            <select className="pl-input" style={{ width: 130 }} value={storeFilter || ""} onChange={(e) => setStoreFilter(e.target.value || null)}>

            </select>
            <button className="pl-btn" onClick={() => window.print()}>列印／PDF</button>
            {perm.canExport(user) && <button className="pl-btn primary" onClick={exportExcel}>匯出 Excel</button>}
          </>
        ) : null
      }>{reportTab === "monthly" ? "月度營運報表" : "年度財務報表"}</SectionTitle>

      {perm.isAcct(user) && (
        <div className="no-print" style={{ display: "inline-flex", border: `1px solid ${T.line}`, borderRadius: 10, overflow: "hidden", marginBottom: 14 }}>
          {[["monthly", "月度報表"], ["annual", "年度報表（股東用）"]].map(([k, l]) => (
            <button key={k} onClick={() => setReportTab(k)} style={{
              padding: "7px 20px", border: "none", cursor: "pointer", fontSize: 13.5,
              background: reportTab === k ? T.brown : "#fff",
              color: reportTab === k ? "#fff" : T.sub, fontWeight: reportTab === k ? 700 : 400,
            }}>{l}</button>
          ))}
        </div>
      )}

      {reportTab === "annual" && perm.isAcct(user) && <AnnualReportTab data={data} update={update} user={user} />}

      {reportTab === "monthly" && <>
      <div className="pl-card print-area" style={{ padding: "28px 30px", maxWidth: 860 }}>
        <div style={{ textAlign: "center", marginBottom: 22 }}>
          <div className="pl-serif" style={{ fontSize: 22, fontWeight: 700, letterSpacing: ".12em" }}>PHASE COFFEE ROASTERS</div>
          <div style={{ color: T.sub, marginTop: 4, letterSpacing: ".2em", fontSize: 13 }}>
            月度營運報表　{monthLabel(month)}{storeFilter ? "　" + stores.find((s) => s.id === storeFilter)?.name : ""}
          </div>
        </div>

        <ReportSection title="收入">
          <RRow name="營業額目標" value={cur.tgtSum ? fmt(cur.tgtSum) : "尚未設定"} />
          {stores.filter((s) => !storeFilter || s.id === storeFilter).map((s) => (
            <RRow key={s.id} name={s.name + " 營業額"} value={fmt(cur.byStore[s.id] || 0)} indent />
          ))}
          <RRow name="營業額合計" value={fmt(cur.revenue)} strong />

          <RRow name="總收入" value={fmt(cur.totalInc)} strong />

              </tr></thead>
              <tbody>
                {cur.rows.map(([name, v], i) => {

                      <td className="num" style={{ color: d > 0 ? T.red : d < 0 ? T.green : T.sub }}>{pv > 0 ? (d > 0 ? "+" : "") + p : "—"}</td>
                    </tr>
                  );
                })}
                <tr style={{ fontWeight: 700 }}>
                  <td>總支出</td>
                  <td className="num">{fmtN(cur.totalExp)}</td>
                  <td className="num">{pct(cur.totalExp)}</td>
                  <td className="num" colSpan={2}>{(() => { const { d } = delta(cur.totalExp, prev.totalExp); return d === 0 ? "—" : (d > 0 ? "+" : "") + fmtN(d); })()}</td>

      </>}
    </div>

/* ────────────────────────────────────────────
   年度財務報表（股東用）：逐月套用 computeMonthReport，
   人事成本＝人事成本＋勞保＋健保＋勞退合併；股東/銀行借貸收入與投資支出/盈餘分配
   系統本身沒有對應資料來源，存在 data.annualFinance（key 為 "YYYY/MM"）由會計/系統管理者手動填寫。
──────────────────────────────────────────────*/
function computeAnnualReport(data, year, storeFilter) {
  const months = Array.from({ length: 12 }, (_, i) => `${year}/${pad2(i + 1)}`);
  const af = data.annualFinance || {};
  let cumProfit = 0;
  const rows = months.map((m) => {
    const r = computeMonthReport(data, m, storeFilter);
    const rent = num(r.namedSums["租金"]);
    const personnel = num(r.namedSums["人事成本"]) + num(r.namedSums["勞保"]) + num(r.namedSums["健保"]) + num(r.namedSums["勞退"]);
    const utilities = num(r.namedSums["水費"]) + num(r.namedSums["電費"]) + num(r.namedSums["瓦斯費"]);
    const tax = num(r.namedSums["稅金"]);
    const otherExpense = num(r.general) + num(r.otherFixed);
    const fin = af[m] || {};
    const loanIncome = num(fin.loanIncome);
    const investmentOut = num(fin.investmentOut);
    const netMonth = r.profit + loanIncome - investmentOut;
    cumProfit += netMonth;
    return {
      month: m, revenue: r.revenue, bizInc: r.bizInc, totalInc: r.totalInc,
      orders: r.orders, rent, personnel, utilities, tax, otherExpense, totalExp: r.totalExp,
      profit: r.profit, loanIncome, investmentOut, netMonth, cumProfit,
      note: fin.note || "",
    };
  });
  const sumKeys = ["revenue", "bizInc", "totalInc", "orders", "rent", "personnel", "utilities", "tax", "otherExpense", "totalExp", "profit", "loanIncome", "investmentOut", "netMonth"];
  const totals = Object.fromEntries(sumKeys.map((k) => [k, rows.reduce((a, r) => a + r[k], 0)]));
  return { rows, totals, annualProfit: totals.netMonth };
}

/* 拖曳排序共用邏輯：把 id 為 dragId 的項目搬到 id 為 targetId 的項目旁邊，在「完整清單」full
   裡操作（不是畫面上可能篩選過的子集合），這樣「固定支出項目」這種依門店篩選顯示的清單，
   排序結果還是正確地反映在完整資料裡，不會把其他門店的項目順序打亂。after 由拖曳方向決定
   （往下拖插在目標後面，往上拖插在目標前面），呼叫端只要負責存回資料就好 */
function reorderList(full, dragId, targetId, after) {
  const item = full.find((x) => x.id === dragId);
  const rest = full.filter((x) => x.id !== dragId);
  const idx = rest.findIndex((x) => x.id === targetId);
  rest.splice(after ? idx + 1 : idx, 0, item);
  return rest;
}

/* 排序編輯模式共用的拖曳把手：平時列表是一般瀏覽模式，不顯示拖曳功能；
   點「排序編輯」後才顯示每列左側的拖曳把手（≡），可直接拖放調整順序 */
function DragHandle({ draggable, onDragStart, onDragOver, onDrop, onDragEnd }) {
  return (
    <span draggable={draggable} onDragStart={onDragStart} onDragOver={onDragOver} onDrop={onDrop} onDragEnd={onDragEnd}
      style={{ cursor: "grab", padding: "0 8px", color: T.sub, fontSize: 16, userSelect: "none" }} title="拖曳調整順序">≡</span>
  );
}

function VendorMaster({ data, update }) {
  const [editing, setEditing] = useState(null);
  const [reorderMode, setReorderMode] = useState(false);
  const dragRef = useRef({ id: null, idx: null });
  const save = (v) => {
    if (!v.name.trim()) return alert("請填寫廠商名稱");
    if (!v.id) {
      v.id = uid("v");
      update((d) => ({ ...d, vendors: [...d.vendors, v] }));
    } else {
      update((d) => ({ ...d, vendors: d.vendors.map((x) => (x.id === v.id ? v : x)) }));
    }
    setEditing(null);
  };
  const usageOf = (v) => data.orders.filter((o) => o.vendorId === v.id).length + data.expenses.filter((e) => e.vendorId === v.id).length;
  const remove = (v) => {
    const n = usageOf(v);
    if (n > 0) return alert(`「${v.name}」使用中（共 ${n} 筆叫貨／支出關聯），無法刪除。若不再合作可改為停用。`);
    if (!confirm(`確定刪除廠商「${v.name}」？`)) return;
    update((d) => ({ ...d, vendors: d.vendors.filter((x) => x.id !== v.id) }));
  };
  const onDrop = (targetV, targetIdx) => (e) => {
    e.preventDefault();
    if (dragRef.current.id == null || dragRef.current.id === targetV.id) return;
    const arr = reorderList(data.vendors, dragRef.current.id, targetV.id, dragRef.current.idx < targetIdx);
    update((d) => ({ ...d, vendors: arr }));
    dragRef.current = { id: null, idx: null };
  };
  return (
    <div className="pl-card pl-scroll-x">
      <div style={{ padding: 12, borderBottom: `1px solid ${T.line}`, display: "flex", gap: 8, alignItems: "center" }}>
        <button className="pl-btn primary small" onClick={() => setEditing({ id: null, name: "", contact: "", phone: "", billing: "現結", monthlyDay: "", payMethod: "現金", active: true, note: "" })}>＋ 新增廠商</button>
        <button className={"pl-btn small" + (reorderMode ? " primary" : "")} onClick={() => setReorderMode((m) => !m)}>
          {reorderMode ? "✓ 完成排序" : "排序編輯"}
        </button>
      </div>
      <table className="pl-table">
        <thead><tr>{reorderMode && <th></th>}<th>廠商名稱</th><th>聯絡人</th><th>電話</th><th>結帳方式</th><th>月結日</th><th>預設付款</th><th>狀態</th><th>備註</th><th></th></tr></thead>
        <tbody>
          {data.vendors.map((v, idx) => (
            <tr key={v.id}
              onDragOver={reorderMode ? (e) => e.preventDefault() : undefined}
              onDrop={reorderMode ? onDrop(v, idx) : undefined}
              style={reorderMode ? { background: dragRef.current.id === v.id ? T.brownSoft : undefined } : undefined}>
              {reorderMode && (
                <td>
                  <DragHandle draggable onDragStart={() => { dragRef.current = { id: v.id, idx }; }} />
                </td>
              )}
              <td>{v.name}</td><td>{v.contact}</td><td>{v.phone}</td>
              <td>{v.billing}</td><td>{v.monthlyDay ? "每月 " + v.monthlyDay + " 日" : "—"}</td><td>{v.payMethod}</td>
              <td><Badge text={v.active ? "啟用中" : "停用"} tone={v.active ? "green" : "gray"} /></td>
              <td style={{ fontSize: 12.5, color: T.sub }}>{v.note}</td>
              <td style={{ whiteSpace: "nowrap" }}>
                <button className="pl-btn small" onClick={() => setEditing({ ...v })}>編輯</button>
                {" "}<button className="pl-btn small danger" disabled={usageOf(v) > 0} title={usageOf(v) > 0 ? "使用中無法刪除" : ""} onClick={() => remove(v)}>刪除</button>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
      {editing && (
        <Modal title={editing.id ? "編輯廠商" : "新增廠商"} onClose={() => setEditing(null)} width={640}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(160px,1fr))", gap: 12 }}>
            <Field label="廠商名稱" required><input className="pl-input" value={editing.name} onChange={(e) => setEditing({ ...editing, name: e.target.value })} /></Field>
            <Field label="聯絡人"><input className="pl-input" value={editing.contact} onChange={(e) => setEditing({ ...editing, contact: e.target.value })} /></Field>
            <Field label="電話"><input className="pl-input" value={editing.phone} onChange={(e) => setEditing({ ...editing, phone: e.target.value })} /></Field>
            <Field label="結帳方式">
              <select className="pl-input" value={editing.billing} onChange={(e) => setEditing({ ...editing, billing: e.target.value })}>
                {ORDER_BILLING.map((b) => <option key={b}>{b}</option>)}

            </Field>
            <Field label="月結日（1–31）"><input className="pl-input" inputMode="numeric" value={editing.monthlyDay || ""} onChange={(e) => setEditing({ ...editing, monthlyDay: e.target.value ? parseInt(e.target.value) : null })} /></Field>
            <Field label="預設付款方式">
              <select className="pl-input" value={editing.payMethod} onChange={(e) => setEditing({ ...editing, payMethod: e.target.value })}>
                {PAY_METHODS.map((p) => <option key={p}>{p}</option>)}

            </Field>
            <Field label="是否啟用">
              <label style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 0" }}>
                <input type="checkbox" checked={editing.active} onChange={(e) => setEditing({ ...editing, active: e.target.checked })} /> 啟用

            <button className="pl-btn" onClick={() => setEditing(null)}>取消</button>
