          </div>
        </Modal>
      )}
    </div>
  );
}

function CategoryMaster({ data, update }) {
  const [tab, setTab] = useState("exp"); // exp | inc
  const [name, setName] = useState("");
  const [editing, setEditing] = useState(null); // { id, name }
  const isExp = tab === "exp";
  const list = isExp ? data.categories : (data.incomeCategories || []);
  const key = isExp ? "categories" : "incomeCategories";

  /* 使用中檢查：使用中的類別不可刪除，僅能停用 */
  const usageOf = (c) => {
    if (isExp) {
      const n = data.expenses.filter((r) => r.categoryId === c.id).length;
      const f = (data.fixedItems || []).filter((r) => r.categoryId === c.id).length;
      /* 廠商叫貨（orders）以 vendorId 記錄，不帶 categoryId，但系統保留類別視同一律使用中 */
      const o = c.id === ORDER_CAT_ID ? data.orders.length : 0;
      return { n: n + f + o, desc: [n ? `${n} 筆支出` : "", f ? `${f} 項固定支出` : "", o ? `${o} 筆廠商叫貨` : ""].filter(Boolean).join("、") };
    }
    const n = (data.incomes || []).filter((r) => r.categoryId === c.id).length;
    const f = (data.fixedIncomeItems || []).filter((r) => r.categoryId === c.id).length;
    return { n: n + f, desc: [n ? `${n} 筆收入` : "", f ? `${f} 項固定收入` : ""].filter(Boolean).join("、") };
  };

  const add = () => {
    const nm = name.trim();
    if (!nm) return;
    if (list.some((c) => c.name === nm)) return alert(`類別「${nm}」已存在。`);
    const c = isExp ? { id: uid("cat"), name: nm, fixed: false, active: true } : { id: uid("ic"), name: nm, active: true };
    update((d) => ({ ...d, [key]: [...(d[key] || []), c] }));
    setName("");
  };
  const remove = (c) => {
    if (c.id === ORDER_CAT_ID) return alert("系統保留類別，用於廠商叫貨自動歸類，無法刪除。");
    const u = usageOf(c);
    if (u.n > 0) return alert(`「${c.name}」使用中（${u.desc}），無法刪除。若不再使用可改為停用。`);
    if (!confirm(`確定刪除類別「${c.name}」？`)) return;
    update((d) => ({ ...d, [key]: d[key].filter((x) => x.id !== c.id) }));
  };
  const toggle = (c) => {
    if (c.id === ORDER_CAT_ID) return alert("系統保留類別，用於廠商叫貨自動歸類，無法停用。");
    update((d) => ({ ...d, [key]: d[key].map((x) => x.id === c.id ? { ...x, active: !x.active } : x) }));
  };
  const toggleFixed = (c) => update((d) => ({ ...d, categories: d.categories.map((x) => x.id === c.id ? { ...x, fixed: !x.fixed } : x) }));
  const rename = () => {
    const nm = editing.name.trim();
    if (!nm) return alert("名稱不可空白");
    if (list.some((c) => c.id !== editing.id && c.name === nm)) return alert(`類別「${nm}」已存在。`);
    update((d) => ({ ...d, [key]: d[key].map((x) => x.id === editing.id ? { ...x, name: nm } : x) }));
    setEditing(null);
  };
  const [reorderMode, setReorderMode] = useState(false);
  const dragRef = useRef({ id: null, idx: null });
  const onDrop = (targetC, targetIdx) => (e) => {
    e.preventDefault();
    if (dragRef.current.id == null || dragRef.current.id === targetC.id) return;
    const arr = reorderList(list, dragRef.current.id, targetC.id, dragRef.current.idx < targetIdx);
    update((d) => ({ ...d, [key]: arr }));
    dragRef.current = { id: null, idx: null };
  };

  return (
    <div>
      <div style={{ display: "flex", gap: 6, marginBottom: 12, alignItems: "center" }}>
        {[["exp", "支出類別"], ["inc", "收入類別"]].map(([k, label]) => (
          <button key={k} className={"pl-btn small" + (tab === k ? " primary" : "")} onClick={() => { setTab(k); setName(""); }}>{label}</button>
        ))}
        <button className={"pl-btn small" + (reorderMode ? " primary" : "")} onClick={() => setReorderMode((m) => !m)} style={{ marginLeft: "auto" }}>
          {reorderMode ? "✓ 完成排序" : "排序編輯"}
        </button>
      </div>

      <div className="pl-card">
        <div style={{ padding: 12, borderBottom: `1px solid ${T.line}`, display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
          <input className="pl-input" style={{ maxWidth: 240 }} placeholder={`新增${isExp ? "支出" : "收入"}類別名稱`}
            value={name} onChange={(e) => setName(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") add(); }} />
          <button className="pl-btn primary" onClick={add}>＋ 新增類別</button>
          <span style={{ fontSize: 12.5, color: T.sub, marginLeft: "auto" }}>
            使用中的類別無法刪除，可改為停用；未使用的類別可直接刪除。
          </span>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(280px,1fr))", gap: 8, padding: 14 }}>
          {list.length === 0 && <Empty text="尚無類別" />}
          {list.map((c, idx) => {
            const u = usageOf(c);
            return (
              <div key={c.id}
                onDragOver={reorderMode ? (e) => e.preventDefault() : undefined}
                onDrop={reorderMode ? onDrop(c, idx) : undefined}
                style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8, border: `1px solid ${T.line}`, borderRadius: 8, padding: "8px 12px", opacity: c.active ? 1 : .5, background: reorderMode && dragRef.current.id === c.id ? T.brownSoft : undefined }}>
                <span style={{ minWidth: 0, display: "flex", alignItems: "center" }}>
                  {reorderMode && <DragHandle draggable onDragStart={() => { dragRef.current = { id: c.id, idx }; }} />}
                  {c.name}
                  {u.n > 0 && <span style={{ fontSize: 11.5, color: T.sub, marginLeft: 6 }}>{u.desc}</span>}
                </span>
                <span style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                  {isExp && <button className="pl-btn small" title="固定支出會納入月報固定支出統計" onClick={() => toggleFixed(c)}>{c.fixed ? "固定" : "一般"}</button>}
                  <button className="pl-btn small" disabled={c.id === ORDER_CAT_ID} title={c.id === ORDER_CAT_ID ? "系統保留類別，無法編輯名稱" : ""} onClick={() => setEditing({ id: c.id, name: c.name })}>編輯</button>
                  <button className="pl-btn small" disabled={c.id === ORDER_CAT_ID} title={c.id === ORDER_CAT_ID ? "系統保留類別，用於廠商叫貨自動歸類，無法停用" : ""} onClick={() => toggle(c)}>{c.active ? "停用" : "啟用"}</button>
                  <button className="pl-btn small danger" disabled={u.n > 0 || c.id === ORDER_CAT_ID} title={c.id === ORDER_CAT_ID ? "系統保留類別，用於廠商叫貨自動歸類，無法刪除" : u.n > 0 ? "使用中無法刪除" : ""} onClick={() => remove(c)}>刪除</button>
                </span>
              </div>
            );
          })}
        </div>
      </div>

      {editing && (
        <Modal title="編輯類別名稱" onClose={() => setEditing(null)} width={420}>
          <Field label="類別名稱" required>
            <input className="pl-input" value={editing.name} onChange={(e) => setEditing({ ...editing, name: e.target.value })}
              onKeyDown={(e) => { if (e.key === "Enter") rename(); }} autoFocus />
          </Field>
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 16 }}>
            <button className="pl-btn" onClick={() => setEditing(null)}>取消</button>
            <button className="pl-btn primary" onClick={rename}>儲存</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function FixedMaster({ data, update }) {
  const [fkind, setFkind] = useState("expense"); // expense | income
  const isExp = fkind === "expense";
  const stores = data.stores.filter((s) => s.active);
  const cats = (isExp ? data.categories : data.incomeCategories).filter((c) => c.active);
  const [storeId, setStoreId] = useState(stores[0]?.id || "");
  const [form, setForm] = useState({ categoryId: "", item: "", amount: "", payMethod: "銀行轉帳" });
  const listKey = isExp ? "fixedItems" : "fixedIncomeItems";
  const items = (data[listKey] || []).filter((f) => f.storeId === storeId);
  const catOf = (id) => (isExp ? data.categories : data.incomeCategories).find((c) => c.id === id)?.name || "—";

  const add = () => {
    if (!form.categoryId) return alert(isExp ? "請選擇支出類別" : "請選擇收入類別");
    if (!form.item.trim()) return alert("請填寫項目名稱");
    /* 金額可以先不填：有些固定項目每個月金額不同（如水電費、業績抽成類收入），
       先建立項目、每月帶入時再逐筆填實際金額（見 FixedBringInModal） */
    update((d) => ({
      ...d,
      [listKey]: [...(d[listKey] || []), { id: uid(isExp ? "fx" : "fi"), storeId, categoryId: form.categoryId, item: form.item.trim(), amount: num(form.amount), payMethod: form.payMethod, active: true }],
    }));
    setForm({ categoryId: "", item: "", amount: "", payMethod: "銀行轉帳" });
  };
  const setAmt = (f, v) => update((d) => ({ ...d, [listKey]: d[listKey].map((x) => x.id === f.id ? { ...x, amount: num(v) } : x) }));
  const toggle = (f) => update((d) => ({ ...d, [listKey]: d[listKey].map((x) => x.id === f.id ? { ...x, active: !x.active } : x) }));
  const remove = (f) => { if (confirm(`刪除固定項目「${f.item}」？`)) update((d) => ({ ...d, [listKey]: d[listKey].filter((x) => x.id !== f.id) })); };
  /* items 是依門店篩選過的子集合，拖曳排序要用 id 去底下完整的清單裡操作，
     不能直接對調 items 裡的相鄰 index（不然會跟其他門店的項目混在一起，順序對不起來） */
  const [reorderMode, setReorderMode] = useState(false);
  const dragRef = useRef({ id: null, idx: null });
  const onDrop = (targetF, targetIdx) => (e) => {
    e.preventDefault();
    if (dragRef.current.id == null || dragRef.current.id === targetF.id) return;
    const full = reorderList(data[listKey] || [], dragRef.current.id, targetF.id, dragRef.current.idx < targetIdx);
    update((d) => ({ ...d, [listKey]: full }));
    dragRef.current = { id: null, idx: null };
  };

  return (
    <div>
      <div style={{ display: "flex", gap: 6, marginBottom: 12, alignItems: "center" }}>
        <button className={"pl-btn small" + (fkind === "expense" ? " primary" : "")} onClick={() => { setFkind("expense"); setForm({ categoryId: "", item: "", amount: "", payMethod: "銀行轉帳" }); }}>固定支出</button>
        <button className={"pl-btn small" + (fkind === "income" ? " primary" : "")} style={fkind === "income" ? { background: T.green, borderColor: T.green } : {}} onClick={() => { setFkind("income"); setForm({ categoryId: "", item: "", amount: "", payMethod: "銀行轉帳" }); }}>固定收入</button>
        <button className={"pl-btn small" + (reorderMode ? " primary" : "")} onClick={() => setReorderMode((m) => !m)} style={{ marginLeft: "auto" }}>
          {reorderMode ? "✓ 完成排序" : "排序編輯"}
        </button>
      </div>

      <div style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap" }}>
        {stores.map((s) => (
          <button key={s.id} className={"pl-btn small" + (storeId === s.id ? " primary" : "")} onClick={() => setStoreId(s.id)}>{s.name}</button>
        ))}
      </div>

      <div className="pl-card" style={{ padding: 12, marginBottom: 12, display: "flex", flexWrap: "wrap", gap: 8, alignItems: "center" }}>
        <select className="pl-input" style={{ width: 140 }} value={form.categoryId} onChange={(e) => setForm({ ...form, categoryId: e.target.value })}>
          <option value="">{isExp ? "支出類別" : "收入類別"}</option>{cats.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <input className="pl-input" style={{ width: 160 }} placeholder={isExp ? "項目名稱（如：店面租金）" : "項目名稱（如：場地租借）"} value={form.item} onChange={(e) => setForm({ ...form, item: e.target.value })} />
        <input className="pl-input" style={{ width: 110 }} placeholder="每月金額（可留空）" inputMode="decimal" value={form.amount} onChange={(e) => setForm({ ...form, amount: e.target.value })} />
        <select className="pl-input" style={{ width: 140 }} value={form.payMethod} onChange={(e) => setForm({ ...form, payMethod: e.target.value })}>
          {PAY_METHODS.map((p) => <option key={p}>{p}</option>)}
        </select>
        <button className="pl-btn primary" onClick={add}>新增項目</button>
      </div>

      <div className="pl-card pl-scroll-x">
        <table className="pl-table">
          <thead><tr>{reorderMode && <th></th>}<th>{isExp ? "支出類別" : "收入類別"}</th><th>項目</th><th className="num">每月金額（可直接修改）</th><th>{isExp ? "付款方式" : "收款方式"}</th><th>狀態</th><th></th></tr></thead>
          <tbody>
            {items.length === 0 && <tr><td colSpan={7}><Empty text={`此門店尚未設定固定${isExp ? "支出" : "收入"}項目`} /></td></tr>}
            {items.map((f, idx) => (
              <tr key={f.id}
                onDragOver={reorderMode ? (e) => e.preventDefault() : undefined}
                onDrop={reorderMode ? onDrop(f, idx) : undefined}
                style={{ opacity: f.active ? 1 : .5, background: reorderMode && dragRef.current.id === f.id ? T.brownSoft : undefined }}>
                {reorderMode && (
                  <td>
                    <DragHandle draggable onDragStart={() => { dragRef.current = { id: f.id, idx }; }} />
                  </td>
                )}
                <td>{catOf(f.categoryId)}</td>
                <td>{f.item}</td>
                <td className="num" style={{ width: 180 }}>
                  <input className="pl-input" style={{ textAlign: "right" }} defaultValue={f.amount} inputMode="decimal"
                    onBlur={(e) => setAmt(f, e.target.value)} />
                </td>
                <td>{f.payMethod}</td>
                <td><Badge text={f.active ? "啟用中" : "已停用"} tone={f.active ? "green" : "gray"} /></td>
                <td style={{ whiteSpace: "nowrap" }}>
                  <button className="pl-btn small" onClick={() => toggle(f)}>{f.active ? "停用" : "啟用"}</button>
                  {" "}<button className="pl-btn small danger" onClick={() => remove(f)}>刪除</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div style={{ marginTop: 10, fontSize: 12.5, color: T.sub }}>
        設定完成後，各門店可在「每日收支」頁面一鍵帶入當月固定{isExp ? "支出" : "收入"}，金額可逐筆調整後送審。
      </div>
    </div>
  );
}

/* 各門店「日結營收」非現金收款方式細項主檔：每日營業額欄位固定不變，這裡管理的是
   店家配合／信用卡／台灣Pay…等可由管理者自行新增、改名、停用、刪除、排序的動態項目 */
function SalesPayMaster({ data, update }) {
  const stores = data.stores.filter((s) => s.active && s.retail);
  const [storeId, setStoreId] = useState(stores[0]?.id || "");
  const [name, setName] = useState("");
  const items = (data.salesPayItems || []).filter((p) => p.storeId === storeId);
  const [reorderMode, setReorderMode] = useState(false);
  const dragRef = useRef({ id: null, idx: null });

  const add = () => {
    const n = name.trim();
    if (!n) return alert("請填寫收款方式名稱");
    if (items.some((p) => p.name === n)) return alert("此門店已有相同名稱的項目");
    update((d) => ({ ...d, salesPayItems: [...(d.salesPayItems || []), { id: uid("spi"), storeId, name: n, active: true }] }));
    setName("");
  };
  const toggle = (p) => update((d) => ({ ...d, salesPayItems: d.salesPayItems.map((x) => x.id === p.id ? { ...x, active: !x.active } : x) }));
  const rename = (p, v) => {
    const n = v.trim();
    if (!n || n === p.name) return;
    update((d) => ({ ...d, salesPayItems: d.salesPayItems.map((x) => x.id === p.id ? { ...x, name: n } : x) }));
  };
  const usageOf = (p) => (data.dailySales || []).filter((r) => num((r.pay || {})[p.id]) !== 0).length;
  const remove = (p) => {
    const n = usageOf(p);
    if (n > 0) return alert(`「${p.name}」使用中（共 ${n} 筆日結資料關聯），無法刪除。若不再使用可改為停用。`);
    if (!confirm(`確定刪除收款方式項目「${p.name}」？`)) return;
    update((d) => ({ ...d, salesPayItems: d.salesPayItems.filter((x) => x.id !== p.id) }));
  };
  const onDrop = (targetP, targetIdx) => (e) => {
    e.preventDefault();
    if (dragRef.current.id == null || dragRef.current.id === targetP.id) return;
    const full = reorderList(data.salesPayItems || [], dragRef.current.id, targetP.id, dragRef.current.idx < targetIdx);
    update((d) => ({ ...d, salesPayItems: full }));
    dragRef.current = { id: null, idx: null };
  };

  return (
    <div>
      <div style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap", alignItems: "center" }}>
        {stores.map((s) => (
          <button key={s.id} className={"pl-btn small" + (storeId === s.id ? " primary" : "")} onClick={() => setStoreId(s.id)}>{s.name}</button>
        ))}
        <button className={"pl-btn small" + (reorderMode ? " primary" : "")} onClick={() => setReorderMode((m) => !m)} style={{ marginLeft: "auto" }}>
          {reorderMode ? "✓ 完成排序" : "排序編輯"}
        </button>
      </div>

      <div className="pl-card" style={{ padding: 12, marginBottom: 12, display: "flex", flexWrap: "wrap", gap: 8, alignItems: "center" }}>
        <input className="pl-input" style={{ width: 220 }} placeholder="收款方式名稱（如：Apple Pay）" value={name} onChange={(e) => setName(e.target.value)} />
        <button className="pl-btn primary" onClick={add}>新增項目</button>
      </div>

      <div className="pl-card pl-scroll-x">
        <table className="pl-table">
          <thead><tr>{reorderMode && <th></th>}<th>收款方式</th><th>狀態</th><th></th></tr></thead>
          <tbody>
            {items.length === 0 && <tr><td colSpan={4}><Empty text="此門店尚未設定收款方式項目" /></td></tr>}
            {items.map((p, idx) => (
              <tr key={p.id}
                onDragOver={reorderMode ? (e) => e.preventDefault() : undefined}
                onDrop={reorderMode ? onDrop(p, idx) : undefined}
                style={{ opacity: p.active ? 1 : .5, background: reorderMode && dragRef.current.id === p.id ? T.brownSoft : undefined }}>
                {reorderMode && (
                  <td><DragHandle draggable onDragStart={() => { dragRef.current = { id: p.id, idx }; }} /></td>
                )}
                <td><input className="pl-input" defaultValue={p.name} onBlur={(e) => rename(p, e.target.value)} /></td>
                <td><Badge text={p.active ? "啟用中" : "已停用"} tone={p.active ? "green" : "gray"} /></td>
                <td style={{ whiteSpace: "nowrap" }}>
                  <button className="pl-btn small" onClick={() => toggle(p)}>{p.active ? "停用" : "啟用"}</button>
                  {" "}<button className="pl-btn small danger" onClick={() => remove(p)}>刪除</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div style={{ marginTop: 10, fontSize: 12.5, color: T.sub }}>
        「每日營業額」總額欄位固定不變；這裡設定的是各門店「日結營收」中非現金收款方式的細項，停用後不會出現在新增日結的表單中，但既有資料仍會保留、金額仍計入現金推算。
      </div>
    </div>
  );
}

function StoreMaster({ data, update, profiles }) {
  const [name, setName] = useState("");
  const [editing, setEditing] = useState(null); // { id, name }

  const usageOf = (s) => {
    const n = data.dailySales.filter((r) => r.storeId === s.id).length
      + data.expenses.filter((r) => r.storeId === s.id).length
      + (data.incomes || []).filter((r) => r.storeId === s.id).length
      + data.orders.filter((r) => r.storeId === s.id).length
      + (data.fixedItems || []).filter((r) => r.storeId === s.id).length
      + (data.fixedIncomeItems || []).filter((r) => r.storeId === s.id).length;
    const children = data.stores.filter((x) => x.parentId === s.id).length;
    const usersAssigned = (profiles || []).filter((p) => p.storeId === s.id).length;
    return { n: n + children + usersAssigned, children, usersAssigned };
  };
  const remove = (s) => {
    const u = usageOf(s);
    if (u.n > 0) {
      const extra = [u.children ? `${u.children} 個附屬門店` : "", u.usersAssigned ? `${u.usersAssigned} 位使用者` : ""].filter(Boolean).join("、");
      return alert(`「${s.name}」使用中${extra ? `（另有 ${extra} 指向此門店）` : ""}，無法刪除。若不再使用可改為停用。`);
    }
    if (!confirm(`確定刪除門店／部門「${s.name}」？`)) return;
    update((d) => ({ ...d, stores: d.stores.filter((x) => x.id !== s.id) }));
  };
  const rename = () => {
    const nm = editing.name.trim();
    if (!nm) return alert("名稱不可空白");
    if (data.stores.some((x) => x.id !== editing.id && x.name === nm)) return alert(`門店「${nm}」已存在。`);
    update((d) => ({ ...d, stores: d.stores.map((x) => x.id === editing.id ? { ...x, name: nm } : x) }));
    setEditing(null);
  };
  const [reorderMode, setReorderMode] = useState(false);
  const dragRef = useRef({ id: null, idx: null });
  const onDrop = (targetS, targetIdx) => (e) => {
    e.preventDefault();
    if (dragRef.current.id == null || dragRef.current.id === targetS.id) return;
    const arr = reorderList(data.stores, dragRef.current.id, targetS.id, dragRef.current.idx < targetIdx);
    update((d) => ({ ...d, stores: arr }));
    dragRef.current = { id: null, idx: null };
  };

  return (
    <div className="pl-card">
      <div style={{ padding: 12, borderBottom: `1px solid ${T.line}`, display: "flex", gap: 8, alignItems: "center" }}>
        <input className="pl-input" style={{ maxWidth: 240 }} placeholder="新增門店／部門名稱" value={name} onChange={(e) => setName(e.target.value)} />
        <button className="pl-btn primary" onClick={() => { if (name.trim()) { update((d) => ({ ...d, stores: [...d.stores, { id: uid("st"), name: name.trim(), retail: true, active: true }] })); setName(""); } }}>新增</button>
        <button className={"pl-btn small" + (reorderMode ? " primary" : "")} onClick={() => setReorderMode((m) => !m)} style={{ marginLeft: "auto" }}>
          {reorderMode ? "✓ 完成排序" : "排序編輯"}
        </button>
      </div>
      <table className="pl-table">
        <thead><tr>{reorderMode && <th></th>}<th>名稱</th><th>類型</th><th>狀態</th><th></th></tr></thead>
        <tbody>
          {data.stores.map((s, idx) => {
            const u = usageOf(s);
            return (
              <tr key={s.id}
                onDragOver={reorderMode ? (e) => e.preventDefault() : undefined}
                onDrop={reorderMode ? onDrop(s, idx) : undefined}
                style={reorderMode && dragRef.current.id === s.id ? { background: T.brownSoft } : undefined}>
                {reorderMode && (
                  <td>
                    <DragHandle draggable onDragStart={() => { dragRef.current = { id: s.id, idx }; }} />
                  </td>
                )}
                <td>{s.name}</td>
                <td>{s.retail ? "門市（列入營收）" : "後勤／共用"}</td>
                <td><Badge text={s.active ? "啟用中" : "停用"} tone={s.active ? "green" : "gray"} /></td>
                <td style={{ whiteSpace: "nowrap" }}>
                  <button className="pl-btn small" onClick={() => setEditing({ id: s.id, name: s.name })}>編輯</button>
                  {" "}<button className="pl-btn small" onClick={() => update((d) => ({ ...d, stores: d.stores.map((x) => x.id === s.id ? { ...x, retail: !x.retail } : x) }))}>切換類型</button>
                  {" "}<button className="pl-btn small" onClick={() => update((d) => ({ ...d, stores: d.stores.map((x) => x.id === s.id ? { ...x, active: !x.active } : x) }))}>{s.active ? "停用" : "啟用"}</button>
                  {" "}<button className="pl-btn small danger" disabled={u.n > 0} title={u.n > 0 ? "使用中無法刪除" : ""} onClick={() => remove(s)}>刪除</button>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>

      {editing && (
        <Modal title="編輯門店名稱" onClose={() => setEditing(null)} width={420}>
          <Field label="門店／部門名稱" required>
            <input className="pl-input" value={editing.name} onChange={(e) => setEditing({ ...editing, name: e.target.value })}
              onKeyDown={(e) => { if (e.key === "Enter") rename(); }} autoFocus />
          </Field>

/* ────────────────────────────────────────────
   Excel 帳務匯入：自動解析・檢查・分類・匯入
──────────────────────────────────────────────*/
const IMP_TYPES = {
  sales:   { label: "每日營收", tone: "green" },
  expense: { label: "支出明細", tone: "yellow" },
  income:  { label: "收入明細", tone: "green" },
  order:   { label: "廠商叫貨", tone: "gray" },
  ar:      { label: "應收帳款", tone: "gray" },
};

/* 欄位別名：對應公司既有 Excel 的常見欄名 */
/* Excel 匯入日結營收時，欄位名稱對應到各門店「收款方式細項」主檔中的項目名稱 */
const SALES_PAY_COL_TO_NAME = { coop: "店家配合", card: "信用卡", twpay: "台灣Pay", linepay: "LINE Pay", online: "線上商城", transfer: "轉帳" };

const COL_ALIAS = {
  date: ["日期", "營業日期", "支出日期", "收入日期", "叫貨日期", "建立日期", "交易日期"],
  store: ["門店", "門市", "店別", "分店", "門店／部門", "部門"],
  pos: ["每日營業額", "POS營業額", "POS 營業額", "營業額", "POS"],
  coop: ["店家配合", "配合"],
  linepay: ["LINE Pay", "LINEPAY", "LinePay", "Line Pay"],
  twpay: ["台灣Pay", "台灣 Pay", "TaiwanPay", "台灣pay"],
  card: ["信用卡", "刷卡"],
  online: ["線上商城", "官網", "線上"],
  transfer: ["轉帳", "銀行轉帳"],
  category: ["支出類別", "類別", "收入類別", "科目"],
  item: ["支出品項", "品項", "項目", "收入項目", "品名", "內容", "摘要", "品項說明"],
  vendor: ["廠商", "供應商", "廠商名稱"],
  amount: ["金額", "支出金額", "收入金額", "請款金額"],
  payMethod: ["付款方式", "收款方式", "支付方式"],
  payer: ["付款人", "經手人", "請款人"],
  invoiceNo: ["發票號碼", "發票"],
  billing: ["結帳方式", "結帳", "付款條件"],
  dueDate: ["預計付款日", "付款日", "到期日"],
  payStatus: ["付款狀態"],
  invoiceStatus: ["發票狀態"],
  customer: ["客戶", "客戶／公司", "客戶公司", "客戶名稱", "公司"],
  requestDate: ["請款日期"],
  received: ["已收金額", "已收款"],
  receivedDate: ["實際收款日", "收款日期"],
  status: ["狀態", "收款狀態", "審核狀態"],
  note: ["備註", "說明"],
};

const pickCol = (row, key) => {
  for (const a of COL_ALIAS[key]) if (a in row && row[a] !== "") return row[a];
  return "";
};
const hasCol = (headers, key) => COL_ALIAS[key].some((a) => headers.includes(a));

/* 依表頭自動判斷工作表類型 */
const detectType = (headers) => {
  if (hasCol(headers, "pos") || headers.some((h) => /淨營業額|付款方式合計/.test(h))) return "sales";
  if (hasCol(headers, "customer") && hasCol(headers, "amount")) return "ar";
  if (hasCol(headers, "billing") || headers.includes("品項說明")) return "order";
  if (headers.some((h) => /收入類別|收入項目|收款方式/.test(h))) return "income";
  if (headers.some((h) => /支出/.test(h)) || (hasCol(headers, "category") && hasCol(headers, "item"))) return "expense";
  if (hasCol(headers, "vendor") && hasCol(headers, "amount") && !hasCol(headers, "category")) return "order";
  return null;
};

function ImportModule({ data, update, user }) {
  const [sheets, setSheets] = useState(null); // [{name, type, rows:[{raw, rec, errs, warns}], headers}]
  const [autoVendor, setAutoVendor] = useState(true);
  const fileRef = useRef();
  if (!perm.isAcct(user)) return <Empty text="資料匯入僅開放會計與系統管理者。" />;

  const nameOf = (id) => data.stores.find((s) => s.id === id)?.name || "—";

  const normDate = (v) => {
    if (v instanceof Date) return dstr(v);
    if (typeof v === "number") { const d = XLSX.SSF.parse_date_code(v); return d ? `${d.y}/${pad2(d.m)}/${pad2(d.d)}` : String(v); }
    return String(v || "").trim().replace(/-/g, "/").replace(/\./g, "/");
  };

  const downloadTemplates = () => {
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([["營業日期", "門店", "每日營業額", "店家配合", "信用卡", "台灣Pay", "LINE Pay", "線上商城", "轉帳", "備註"]]), "每日營收");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([["支出日期", "門店", "支出類別", "支出品項", "廠商", "金額", "付款方式", "付款人", "發票號碼", "備註"]]), "支出明細");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([["收入日期", "門店", "收入類別", "收入項目", "金額", "收款方式", "經手人", "發票號碼", "備註"]]), "收入明細");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([["叫貨日期", "門店", "廠商", "品項說明", "金額", "結帳方式", "預計付款日", "付款狀態", "發票狀態", "備註"]]), "廠商叫貨");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([["建立日期", "客戶", "請款金額", "發票號碼", "請款日期", "到期日", "已收金額", "收款狀態", "備註"]]), "應收帳款");
    XLSX.writeFile(wb, "PHASE_帳務匯入範本.xlsx");
  };

  /* 門店名稱模糊比對：中山店／中山／烘豆場… */
  const matchStore = (name) => {
    const n = String(name || "").trim();
    if (!n) return "";
    const exact = data.stores.find((s) => s.name === n);
    if (exact) return exact.id;
    const fuzzy = data.stores.find((s) => n.includes(s.name) || s.name.includes(n));
    return fuzzy ? fuzzy.id : "";
  };

  const checkSheet = (name, ws) => {
    /* 找表頭列（前 6 列中關鍵字命中最多者） */
    const aoa = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
    const allAlias = Object.values(COL_ALIAS).flat();
    let hi = 0, hscore = -1;
    for (let i = 0; i < Math.min(6, aoa.length); i++) {
      const score = aoa[i].filter((c) => allAlias.includes(String(c).trim())).length;
      if (score > hscore) { hscore = score; hi = i; }
    }
    if (hscore < 2) return null; // 非資料表
    const headers = aoa[hi].map((h) => String(h).trim());
    const type = detectType(headers);
    if (!type) return null;
    const rows = XLSX.utils.sheet_to_json(ws, { defval: "", range: hi });

    const catByName = Object.fromEntries(data.categories.map((c) => [c.name, c.id]));
    const incCatByName = Object.fromEntries((data.incomeCategories || []).map((c) => [c.name, c.id]));
    const venByName = Object.fromEntries(data.vendors.map((v) => [v.name, v.id]));

    const seenSalesKey = new Set();
    const checked = rows.map((raw) => {
      const errs = [], warns = [];
      const date = normDate(pickCol(raw, "date"));
      if (!validDate(date)) errs.push("日期格式錯誤（需 YYYY/MM/DD）");
      const storeName = pickCol(raw, "store");
      const storeId = matchStore(storeName);
      const needStore = type !== "ar";
      if (needStore && !storeId) errs.push(`門店「${storeName || "空白"}」無法辨識`);
      let rec = null;

      if (type === "sales") {
        ["pos", "coop", "card", "twpay", "linepay", "online", "transfer"].forEach((k) => {
          const v = pickCol(raw, k); if (v !== "" && isNaN(num(v))) errs.push(`${COL_ALIAS[k][0]} 金額格式錯誤`);
        });
        const key = date + "|" + storeId;
        if (storeId && validDate(date)) {
          if (data.dailySales.some((r) => r.date === date && r.storeId === storeId)) errs.push("重複：該門店該日系統已有日結");
          if (seenSalesKey.has(key)) errs.push("重複：檔案內同門店同日出現多筆");
          seenSalesKey.add(key);
        }
        /* 非現金收款方式細項是各門店可自訂的動態項目，匯入時依欄位名稱對應到該門店已設定的項目；
           該門店尚未設定同名項目的欄位，金額不會匯入，需先至主檔管理／營收項目建立後再手動補上 */
        const pay = {};
        Object.entries(SALES_PAY_COL_TO_NAME).forEach(([field, itemName]) => {
          const v = num(pickCol(raw, field));
          if (!v) return;
          const item = storeId && (data.salesPayItems || []).find((p) => p.storeId === storeId && p.name === itemName);
          if (item) pay[item.id] = v;
          else warns.push(`「${itemName}」門店尚未設定對應收款方式項目，此欄位金額未匯入`);
        });
        rec = {
          date, storeId, pos: num(pickCol(raw, "pos")), pay,
          note: String(pickCol(raw, "note") || ""), diffReason: "", status: "草稿",
        };
        if (rec.storeId && calcSales(rec).cash < 0) warns.push(`非現金合計超過營業額 ${fmt(-calcSales(rec).cash)}，匯入後請補差異原因`);
      }

      if (type === "expense") {
        const amount = num(pickCol(raw, "amount"));
        if (!(amount > 0)) errs.push("金額需大於 0");
        const catName = String(pickCol(raw, "category")).trim();
        const categoryId = catByName[catName];
        if (!categoryId) errs.push(`支出類別「${catName || "空白"}」不存在`);
        const item = String(pickCol(raw, "item")).trim();
        if (!item) errs.push("品項不可空白");
        const vName = String(pickCol(raw, "vendor")).trim();
        let vendorId = vName ? venByName[vName] : "";
        if (vName && !vendorId) { if (autoVendor) warns.push(`將自動新增廠商「${vName}」`); else errs.push(`廠商「${vName}」不存在`); }
        if (storeId && validDate(date) && data.expenses.some((r) => r.date === date && r.storeId === storeId && r.item === item && num(r.amount) === amount)) errs.push("重複：同日同門店已有相同品項與金額");
        const pm = String(pickCol(raw, "payMethod")).trim();
        rec = {
          ...EXP_EMPTY, date, storeId, categoryId: categoryId || "", vendorId: vendorId || "", vendorName: vName,
          item, amount, payMethod: PAY_METHODS.includes(pm) ? pm : "其他",
          payer: String(pickCol(raw, "payer") || "").trim() || user.name,
          invoiceNo: String(pickCol(raw, "invoiceNo") || "").trim(), note: String(pickCol(raw, "note") || ""), status: "草稿",
          docType: NO_DOC, noDocReason: "Excel 匯入舊資料，原始憑證未逐筆登錄（如有需要請補件）",
        };
      }

      if (type === "income") {
        const amount = num(pickCol(raw, "amount"));
        if (!(amount > 0)) errs.push("金額需大於 0");
        const catName = String(pickCol(raw, "category")).trim();
        let categoryId = incCatByName[catName];
        if (!categoryId) { categoryId = incCatByName["其他收入"]; warns.push(`收入類別「${catName || "空白"}」歸入「其他收入」`); }
        const item = String(pickCol(raw, "item")).trim();
        if (!item) errs.push("項目不可空白");
        const pm = String(pickCol(raw, "payMethod")).trim();
        rec = {
          ...INC_EMPTY, date, storeId, categoryId, item, amount,
          payMethod: PAY_METHODS.includes(pm) ? pm : "現金",
          payer: String(pickCol(raw, "payer") || "").trim() || user.name,
          invoiceNo: String(pickCol(raw, "invoiceNo") || "").trim(), note: String(pickCol(raw, "note") || ""), status: "草稿",
          docType: NO_DOC, noDocReason: "Excel 匯入舊資料，原始憑證未逐筆登錄（如有需要請補件）",
        };
      }

      if (type === "order") {
        const amount = num(pickCol(raw, "amount"));
        if (!(amount > 0)) errs.push("金額需大於 0");
        const vName = String(pickCol(raw, "vendor")).trim();
        let vendorId = venByName[vName];
        if (!vName) errs.push("廠商不可空白");
        else if (!vendorId) { if (autoVendor) warns.push(`將自動新增廠商「${vName}」`); else errs.push(`廠商「${vName}」不存在`); }
        let billing = String(pickCol(raw, "billing")).trim();
        if (!ORDER_BILLING.includes(billing)) { billing = "現結"; if (pickCol(raw, "billing")) warns.push("結帳方式無法辨識，以現結匯入"); }
        const dueDate = normDate(pickCol(raw, "dueDate"));
        if (billing === "月結" && !validDate(dueDate)) errs.push("月結需填預計付款日");
        const ps = String(pickCol(raw, "payStatus")).trim();
        const payStatus = ["未付款", "部分付款", "已付款"].includes(ps) ? ps : (billing === "現結" ? "已付款" : "未付款");
        const ivs = String(pickCol(raw, "invoiceStatus")).trim();
        rec = {
          date, storeId, vendorId: vendorId || "", vendorName: vName,
          items: String(pickCol(raw, "item") || "").trim(), amount, billing,
          dueDate: billing === "月結" ? dueDate : "", paidDate: payStatus === "已付款" ? date : "",
          payStatus, invoiceStatus: ["未收到", "已收到", "不需發票"].includes(ivs) ? ivs : "未收到",
          invoiceNo: "", attachment: null,
          docType: billing === "月結" ? "" : NO_DOC,
          noDocReason: billing === "月結" ? "" : "Excel 匯入舊資料，原始憑證未逐筆登錄（如有需要請補件）",
          note: String(pickCol(raw, "note") || ""),
        };
      }

      if (type === "ar") {
        const amount = num(pickCol(raw, "amount"));
        if (!(amount > 0)) errs.push("請款金額需大於 0");
        const customer = String(pickCol(raw, "customer")).trim();
        if (!customer) errs.push("客戶不可空白");
        const received = num(pickCol(raw, "received"));
        const st = String(pickCol(raw, "status")).trim();
        const status = AR_STATUS.includes(st) ? st
          : received >= amount && amount > 0 ? "已收款"
          : received > 0 ? "部分收款" : "未請款";
        if (data.receivables.some((r) => r.date === date && r.customer === customer && num(r.amount) === amount)) errs.push("重複：已有相同日期／客戶／金額的應收");
        rec = {
          date, customer, amount, invoiceNo: String(pickCol(raw, "invoiceNo") || "").trim(),
          requester: String(pickCol(raw, "payer") || "").trim(), requestDate: normDate(pickCol(raw, "requestDate")) || "",
          dueDate: normDate(pickCol(raw, "dueDate")) || "", received, receivedDate: normDate(pickCol(raw, "receivedDate")) || "",
          status, note: String(pickCol(raw, "note") || ""),
          docType: NO_DOC, noDocReason: "Excel 匯入舊資料，原始憑證未逐筆登錄（如有需要請補件）",
        };
      }

      return { raw, rec, errs, warns, date };
    }).filter((r) => Object.values(r.raw).some((v) => String(v).trim() !== ""));

    return { name, type, headers, rows: checked };
  };

  const handleFile = (e) => {
    const f = e.target.files[0]; if (!f) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const wb = XLSX.read(ev.target.result, { type: "array", cellDates: true });
      const parsed = wb.SheetNames.map((n) => checkSheet(n, wb.Sheets[n])).filter(Boolean);
      if (parsed.length === 0) alert("無法在此檔案中辨識出帳務資料表。請確認表頭欄位，或下載範本比對。");
      setSheets(parsed);
    };
    reader.readAsArrayBuffer(f);
    e.target.value = "";
  };

  const retype = (idx, t) => setSheets(sheets.map((s, i) => i === idx ? { ...s, type: t } : s));

  const doImport = () => {
    const allValid = sheets.flatMap((s) => s.rows.filter((r) => r.errs.length === 0).map((r) => ({ ...r, type: s.type })));
    if (allValid.length === 0) return alert("沒有可匯入的正確資料。");
    const errTotal = sheets.reduce((a, s) => a + s.rows.filter((r) => r.errs.length > 0).length, 0);
    if (!confirm(`即將匯入 ${allValid.length} 筆資料${errTotal ? `（另有 ${errTotal} 筆錯誤列不會匯入）` : ""}。確定執行？`)) return;

    update((d) => {
      let vendors = [...d.vendors];
      const venByName = Object.fromEntries(vendors.map((v) => [v.name, v.id]));
      const ensureVendor = (name) => {
        if (!name) return "";
        if (venByName[name]) return venByName[name];
        const v = { id: uid("v"), code: "V" + String(vendors.length + 1).padStart(3, "0"), name, contact: "", phone: "", billing: "月結", monthlyDay: null, payMethod: "銀行轉帳", active: true, note: "Excel 匯入自動建立" };
        vendors.push(v); venByName[name] = v.id;
        return v.id;
      };
      const dailySales = [...d.dailySales], expenses = [...d.expenses], incomes = [...(d.incomes || [])], orders = [...d.orders], receivables = [...d.receivables];
      let arSeq = {};
      allValid.forEach(({ rec, type }) => {
        const base = { createdBy: user.id, createdAt: nowStamp(), reviewedBy: null, reviewedAt: null };
        if (type === "sales") dailySales.push({ ...rec, ...base, id: uid("ds") });
        if (type === "expense") { const { vendorName, ...r } = rec; expenses.push({ ...r, ...base, id: uid("ex"), vendorId: r.vendorId || ensureVendor(vendorName), postClose: isDayClosed({ dailySales }, r.date, r.storeId) }); }
        if (type === "income") incomes.push({ ...rec, ...base, id: uid("in"), postClose: isDayClosed({ dailySales }, rec.date, rec.storeId) });
        if (type === "order") { const { vendorName, ...r } = rec; orders.push({ ...r, id: uid("po"), createdBy: user.id, vendorId: r.vendorId || ensureVendor(vendorName) }); }
        if (type === "ar") {
          const prefix = "AR-" + (rec.date || todayStr()).slice(2, 7).replace("/", "") + "-";
          arSeq[prefix] = (arSeq[prefix] || receivables.filter((r) => r.no && r.no.startsWith(prefix)).length) + 1;
          receivables.push({ ...rec, id: uid("ar"), no: prefix + pad2(arSeq[prefix]), createdBy: user.id, createdAt: nowStamp() });
        }
      });
      return { ...d, vendors, dailySales, expenses, incomes, orders, receivables };
    });
    const byType = {};
    allValid.forEach(({ type }) => { byType[type] = (byType[type] || 0) + 1; });
    alert("匯入完成：" + Object.entries(byType).map(([t, n]) => `${IMP_TYPES[t].label} ${n} 筆`).join("、") + "。日結／支出／收入皆為草稿，請於各模組確認後送審。");
    setSheets(null);
  };

  const totalValid = sheets ? sheets.reduce((a, s) => a + s.rows.filter((r) => r.errs.length === 0).length, 0) : 0;
  const totalErr = sheets ? sheets.reduce((a, s) => a + s.rows.filter((r) => r.errs.length > 0).length, 0) : 0;

  return (
    <div>
      <SectionTitle>Excel 帳務匯入</SectionTitle>

      <div className="pl-card" style={{ padding: 14, marginBottom: 12, display: "flex", flexWrap: "wrap", gap: 10, alignItems: "center" }}>
        <button className="pl-btn primary" onClick={() => fileRef.current.click()}>選擇 Excel 檔案</button>
        <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{ display: "none" }} onChange={handleFile} />
        <button className="pl-btn" onClick={downloadTemplates}>下載匯入範本（五類工作表）</button>
        <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 13, color: T.sub, marginLeft: "auto", cursor: "pointer" }}>
          <input type="checkbox" checked={autoVendor} onChange={(e) => setAutoVendor(e.target.checked)} />
          未建檔廠商自動新增
        </label>
      </div>

      <div style={{ fontSize: 12.5, color: T.sub, marginBottom: 14, lineHeight: 1.7 }}>
        上傳公司每月帳務 Excel，系統會逐一讀取工作表、依表頭自動判斷資料類型（每日營收／支出／收入／廠商叫貨／應收帳款），
        並逐列檢查日期、金額、門店、類別、廠商與重複資料。錯誤列以紅色標示且不會寫入；判斷錯誤時可手動改選類型。
        常見欄名（日期、門市、品項、摘要…）皆可自動對應，不需完全依範本命名。
      </div>

      {sheets && sheets.length > 0 && (
        <>
          <div className="pl-card" style={{ padding: "12px 16px", marginBottom: 12, display: "flex", flexWrap: "wrap", gap: 16, alignItems: "center" }}>
            <span style={{ fontSize: 13.5 }}>辨識出 <b>{sheets.length}</b> 個資料表・可匯入 <b style={{ color: T.green }}>{totalValid}</b> 筆
              {totalErr > 0 && <>・<b style={{ color: T.red }}>{totalErr} 筆錯誤（不會匯入）</b></>}</span>
            <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
              <button className="pl-btn" onClick={() => setSheets(null)}>清除重來</button>
              <button className="pl-btn primary" disabled={totalValid === 0} onClick={doImport}>匯入正確資料（{totalValid}）</button>
            </div>
          </div>

          {sheets.map((s, si) => {
            const ok = s.rows.filter((r) => r.errs.length === 0).length;
            return (
              <div key={si} className="pl-card" style={{ marginBottom: 14, overflow: "hidden" }}>
                <div style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: 12, padding: "12px 16px", borderBottom: `1px solid ${T.line}` }}>
                  <div className="pl-serif" style={{ fontWeight: 700 }}>{s.name}</div>
                  <span style={{ fontSize: 12.5, color: T.sub }}>判斷類型</span>
                  <select className="pl-input" style={{ width: 130 }} value={s.type} onChange={(e) => retype(si, e.target.value)}>
                    {Object.entries(IMP_TYPES).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                  </select>
                  <span style={{ fontSize: 13 }}>{s.rows.length} 列・<b style={{ color: T.green }}>{ok} 可匯入</b>
                    {s.rows.length - ok > 0 && <>・<b style={{ color: T.red }}>{s.rows.length - ok} 錯誤</b></>}</span>
                </div>
                <div className="pl-scroll-x" style={{ maxHeight: 300, overflowY: "auto" }}>
                  <table className="pl-table">
                    <thead><tr><th style={{ width: 36 }}>#</th><th>日期</th><th>摘要</th><th className="num">金額</th><th>檢查結果</th></tr></thead>
                    <tbody>
                      {s.rows.map((r, ri) => {
                        const summary = s.type === "sales" ? `${nameOf(r.rec?.storeId)}日結` :
                          s.type === "ar" ? r.rec?.customer :
                          `${r.rec?.storeId ? nameOf(r.rec.storeId) + "・" : ""}${r.rec?.item || r.rec?.items || ""}`;
                        const amt = s.type === "sales" ? r.rec?.pos : r.rec?.amount;
                        return (
                          <tr key={ri} style={r.errs.length ? { background: T.redBg } : {}}>
                            <td style={{ color: T.sub }}>{ri + 1}</td>
                            <td style={{ whiteSpace: "nowrap" }}>{r.date}</td>
                            <td>{summary}</td>
                            <td className="num">{fmtN(amt)}</td>
                            <td style={{ fontSize: 12.5, color: r.errs.length ? T.red : r.warns.length ? T.yellow : T.green }}>
                              {r.errs.length ? r.errs.join("；") : r.warns.length ? "⚠ " + r.warns.join("；") : "✓ 可匯入"}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            );
          })}
        </>
      )}
    </div>
  );
}

/* ────────────────────────────────────────────
   每日 Key 帳：同頁完成 日結營收＋當日收支＋叫貨
──────────────────────────────────────────────*/
function DailyKeyModule({ data, update, user, users, logAudit, logApproval, goto }) {
  const scope = perm.storeScope(user);
  const stores = data.stores.filter((s) => s.active && s.retail && (!scope || scope.includes(s.id)));
  const [storeTab, setStoreTab] = usePersisted("pl_daily_storeTab", "");
  const curStore = stores.some((s) => s.id === storeTab) ? storeTab : (stores[0]?.id || "");
  const [date, setDate] = usePersisted("pl_daily_date", todayStr());
  const nameOf = (id) => data.stores.find((s) => s.id === id)?.name || "—";
  const venOf = (id) => data.vendors.find((v) => v.id === id)?.name || "—";
  const catOf = (id) => data.categories.find((c) => c.id === id)?.name || "—";
  const incCatOf = (id) => (data.incomeCategories || []).find((c) => c.id === id)?.name || "—";
  const userName = (id) => users.find((u) => u.id === id)?.name || "—";
  const salesPayItems = (data.salesPayItems || []).filter((p) => p.storeId === curStore && p.active);

  /* ── 日結營收表單 ── */
  const existing = data.dailySales.find((r) => r.date === date && r.storeId === curStore);
  const [sf, setSf] = useState(null);
  useEffect(() => {
    setSf(existing ? { ...existing } : { ...SALES_EMPTY, id: null, date, storeId: curStore, status: "草稿" });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [curStore, date, existing?.id]);

  const salesLocked = sf && sf.status === "已審核" && !perm.isAdmin(user);
  /* 舊資料若仍停留在待審核狀態，保留手動通過／退回（新流程送出後不會再產生待審核） */
  const reviewSales = (pass) => {
    const status = pass ? "已審核" : "退回修改";
    logApproval("每日營收", sf.id, status, `${date} ${nameOf(curStore)}`);
    update((d) => ({ ...d, dailySales: d.dailySales.map((r) => r.id === sf.id ? { ...r, status, reviewedBy: user.id, reviewedAt: nowStamp() } : r) }));
    setSf({ ...sf, status });
  };

  /* ── 重新開啟日結／重新結帳：僅系統管理者與會計，重新以目前資料計算並鎖定現金推算，
     完整記錄原因、操作人員與時間（另存於該筆日結的 reopenLogs，並寫入稽核紀錄頁） ── */
  const canReopen = perm.isAdmin(user) || perm.isAcct(user);
  const [reopening, setReopening] = useState(null); // { reason }
  const confirmReopen = () => {
    if (!reopening.reason.trim()) return alert("請填寫重新開啟日結／重新結帳的原因。");
    const rec = existing;
    const freshExpSum = data.expenses.filter((r) => r.date === rec.date && r.storeId === rec.storeId).reduce((a, r) => a + num(r.amount), 0);
    const freshIncSum = (data.incomes || []).filter((r) => r.date === rec.date && r.storeId === rec.storeId).reduce((a, r) => a + num(r.amount), 0);
    const cs = calcSales(rec);
    const newCashCalc = cs.net - cs.paySum - freshExpSum + freshIncSum;
    const reason = reopening.reason.trim();
    const logEntry = { reason, by: user.id, at: nowStamp(), prevCashCalc: rec.cashCalc, prevLockedExpSum: rec.lockedExpSum, prevLockedIncSum: rec.lockedIncSum };
    const updated = {
      ...rec, lockedExpSum: freshExpSum, lockedIncSum: freshIncSum, cashCalc: newCashCalc,
      cashLockedAt: nowStamp(), cashLockedBy: user.id, reopenLogs: [...(rec.reopenLogs || []), logEntry],
    };
    logApproval("每日營收", rec.id, "重新結帳", `${date} ${nameOf(curStore)}：原因 ${reason}（現金推算 ${fmt(rec.cashCalc)} → ${fmt(newCashCalc)}）`);
    update((d) => ({ ...d, dailySales: d.dailySales.map((r) => r.id === rec.id ? updated : r) }));
    setSf(updated);
    setReopening(null);
  };

  /* ── 當日已記錄清單 ── */
  const dayExp = data.expenses.filter((r) => r.date === date && r.storeId === curStore && perm.canSeeRecord(user, r)).sort((a, b) => (a.createdAt || "").localeCompare(b.createdAt || ""));
  const dayInc = (data.incomes || []).filter((r) => r.date === date && r.storeId === curStore && perm.canSeeRecord(user, r));
  const dayOrd = data.orders.filter((r) => r.date === date && r.storeId === curStore);
  const expSum = dayExp.reduce((a, r) => a + num(r.amount), 0);
  const incSum = dayInc.reduce((a, r) => a + num(r.amount), 0);
  const ordSum = dayOrd.reduce((a, r) => a + num(r.amount), 0);

  const submitDraft = (kind, rec) => {
    const key = kind === "exp" ? "expenses" : "incomes";
    update((d) => ({ ...d, [key]: d[key].map((r) => r.id === rec.id ? { ...r, status: "待審核" } : r) }));
  };
  const delRec = (kind, rec) => {
    const label = kind === "exp" ? "支出" : kind === "inc" ? "收入" : "叫貨";
    if (kind !== "ord" && rec.status === "過審" && !perm.isAdmin(user)) return alert(`過審的${label}無法刪除。`);
    if (!confirm(`確定刪除${label}「${rec.item || rec.items || ""}」？`)) return;
    const key = kind === "exp" ? "expenses" : kind === "inc" ? "incomes" : "orders";
    logAudit(kind === "exp" ? "每日支出" : kind === "inc" ? "門店收入" : "廠商叫貨", rec.id, rec, { ...rec, deleted: true });
    update((d) => ({ ...d, [key]: d[key].filter((r) => r.id !== rec.id) }));
  };

  /* 舊資料若仍留有草稿，保留一鍵送審（新流程送出後不會再產生草稿） */
  const draftCount = dayExp.filter((r) => r.status === "草稿").length + dayInc.filter((r) => r.status === "草稿").length;
  const submitAllDrafts = () => {
    if (!confirm(`將當日 ${draftCount} 筆草稿（支出／收入）全部送出審核？`)) return;
    update((d) => ({
      ...d,
      expenses: d.expenses.map((r) => r.date === date && r.storeId === curStore && r.status === "草稿" ? { ...r, status: "待審核" } : r),
      incomes: (d.incomes || []).map((r) => r.date === date && r.storeId === curStore && r.status === "草稿" ? { ...r, status: "待審核" } : r),
    }));
  };

  /* ── 本次新增（尚未送出，先暫存在畫面上，可自由增減列） ── */
  const blankExp = () => ({ key: uid("d"), categoryName: "", item: "", vendorId: "", amount: "", payMethod: "現金", docType: "", noDocReason: "" });
  const blankInc = () => ({ key: uid("d"), categoryName: "", item: "", amount: "", payMethod: "現金", docType: "", noDocReason: "" });
  const blankOrd = () => ({ key: uid("d"), vendorId: "", items: "", amount: "", billing: "現結", dueDate: "", docType: "", noDocReason: "" });
  const [expRows, setExpRows] = useState([blankExp()]);
  const [incRows, setIncRows] = useState([blankInc()]);
  const [ordRows, setOrdRows] = useState([blankOrd()]);
  const setExpRow = (key, k, v) => setExpRows((rows) => rows.map((r) => r.key === key ? { ...r, [k]: v } : r));
  const setIncRow = (key, k, v) => setIncRows((rows) => rows.map((r) => r.key === key ? { ...r, [k]: v } : r));
  const setOrdRow = (key, k, v) => setOrdRows((rows) => rows.map((r) => r.key === key ? { ...r, [k]: v } : r));
  const patchExpRow = (key, patch) => setExpRows((rows) => rows.map((r) => r.key === key ? { ...r, ...patch } : r));
  const patchIncRow = (key, patch) => setIncRows((rows) => rows.map((r) => r.key === key ? { ...r, ...patch } : r));
  const patchOrdRow = (key, patch) => setOrdRows((rows) => rows.map((r) => r.key === key ? { ...r, ...patch } : r));
  const delExpRow = (key) => setExpRows((rows) => rows.length > 1 ? rows.filter((r) => r.key !== key) : [blankExp()]);
  const delIncRow = (key) => setIncRows((rows) => rows.length > 1 ? rows.filter((r) => r.key !== key) : [blankInc()]);
  const delOrdRow = (key) => setOrdRows((rows) => rows.length > 1 ? rows.filter((r) => r.key !== key) : [blankOrd()]);

  const filledExp = expRows.filter((r) => r.categoryName.trim() || r.item.trim() || num(r.amount) > 0);
  const filledInc = incRows.filter((r) => r.categoryName.trim() || r.item.trim() || num(r.amount) > 0);
  const filledOrd = ordRows.filter((r) => r.vendorId || r.items.trim() || num(r.amount) > 0);

  const resolveCat = (list, pending, name) => {
    const n = name.trim();
    const hit = list.find((c) => c.name === n) || pending.find((c) => c.name === n);
    if (hit) return { id: hit.id, newCat: null };
    const c = { id: uid("cat"), name: n, active: true };
    return { id: c.id, newCat: c };
  };

  /* ── 一次送出：日結營收＋本次新增的支出／收入／叫貨，全部直接過審／已審核入帳，不經草稿或待審核 ── */
  const submitAll = () => {
    if (!validDate(date)) return alert("請輸入正確日期（YYYY/MM/DD）");
    for (const r of filledExp) {
      if (!r.categoryName.trim()) return alert("支出：請選擇或輸入類別");
      if (r.categoryName.trim() === "廠商原料叫貨") return alert("「廠商原料叫貨」為系統保留類別（用於廠商叫貨自動歸類），一般支出請選擇其他類別。");
      if (!r.item.trim()) return alert("支出：請填寫品項");
      if (!(num(r.amount) > 0)) return alert("支出：金額需大於 0");
      const docErr = validateDoc(r);
      if (docErr) return alert(`支出：${docErr}`);
    }
    for (const r of filledInc) {
      if (!r.categoryName.trim()) return alert("收入：請選擇或輸入類別");
      if (!r.item.trim()) return alert("收入：請填寫項目");
      if (!(num(r.amount) > 0)) return alert("收入：金額需大於 0");
      const docErr = validateDoc(r);
      if (docErr) return alert(`收入：${docErr}`);
    }
    for (const r of filledOrd) {
      if (!r.vendorId) return alert("叫貨：請選擇廠商");
      if (!(num(r.amount) > 0)) return alert("叫貨：金額需大於 0");
      if (r.billing === "月結" && !r.dueDate) return alert("叫貨：月結需填寫預計付款日");
      if (r.billing !== "月結") {
        const docErr = validateDoc(r);
        if (docErr) return alert(`叫貨：${docErr}`);
      }
    }

    const salesFilled = sf && !salesLocked && (num(sf.pos) > 0 || Object.values(sf.pay || {}).some((v) => num(v) > 0));
    if (salesFilled) {
      const c = calcSales(sf);
      if (c.cash < 0 && !sf.diffReason.trim()) return alert("日結營收：非現金合計超過營業額，請填寫差異原因。");
    }
    if (!salesFilled && filledExp.length === 0 && filledInc.length === 0 && filledOrd.length === 0) {
      return alert("尚未輸入任何資料。");
    }

    const newExpCats = [];
    const newIncCats = [];
    const expRecs = filledExp.map((r) => {
      const { id: categoryId, newCat } = resolveCat(data.categories, newExpCats, r.categoryName);
      if (newCat) newExpCats.push(newCat);
      return {
        ...EXP_EMPTY, id: uid("ex"), date, storeId: curStore, categoryId, item: r.item.trim(),
        vendorId: r.vendorId, amount: num(r.amount), payMethod: r.payMethod, payer: user.name,
        docType: r.docType, noDocReason: r.docType === NO_DOC ? r.noDocReason.trim() : "",
        status: "過審", createdBy: user.id, createdAt: nowStamp(), reviewedBy: null, reviewedAt: null,
      };
    });
    const incRecs = filledInc.map((r) => {
      const { id: categoryId, newCat } = resolveCat(data.incomeCategories || [], newIncCats, r.categoryName);
      if (newCat) newIncCats.push(newCat);
      return {
        ...INC_EMPTY, id: uid("in"), date, storeId: curStore, categoryId, item: r.item.trim(),
        amount: num(r.amount), payMethod: r.payMethod, payer: user.name,
        docType: r.docType, noDocReason: r.docType === NO_DOC ? r.noDocReason.trim() : "",
        status: "過審", createdBy: user.id, createdAt: nowStamp(), reviewedBy: null, reviewedAt: null,
      };
    });
    const ordRecs = filledOrd.map((r) => ({
      id: uid("po"), date, storeId: curStore, vendorId: r.vendorId, items: r.items,
      amount: num(r.amount), billing: r.billing, dueDate: r.billing === "月結" ? r.dueDate : "",
      paidDate: r.billing === "現結" ? date : "", payStatus: r.billing === "現結" ? "已付款" : "未付款",
      invoiceStatus: "未收到", invoiceNo: "", attachment: null,
      docType: r.billing !== "月結" ? r.docType : "", noDocReason: r.billing !== "月結" && r.docType === NO_DOC ? r.noDocReason.trim() : "",
      note: "", createdBy: user.id,
    }));

    let salesRec = null;
    if (salesFilled) {
      salesRec = { ...sf, date, storeId: curStore, status: "已審核", reviewedBy: user.id, reviewedAt: nowStamp() };
      if (!existing) { salesRec.id = uid("ds"); salesRec.createdBy = user.id; salesRec.createdAt = nowStamp(); }
      else logAudit("每日營收", salesRec.id, existing, salesRec);
    }

    /* 當日日結若已完成（非草稿），本次新增的支出／收入視為「日結後新增」，不得自動納入
       已鎖定的現金推算；日結本身若已鎖定，這次編輯也不重新計算現金推算，除非走「重新結帳」 */
    const dayWasLocked = !!(existing && existing.status !== "草稿");
    if (dayWasLocked) {
      expRecs.forEach((r) => { r.postClose = true; });
      incRecs.forEach((r) => { r.postClose = true; });
    }
    if (salesRec) {
      if (!dayWasLocked) {
        const lockedExpSum = expSum + expRecs.reduce((a, r) => a + r.amount, 0);
        const lockedIncSum = incSum + incRecs.reduce((a, r) => a + r.amount, 0);
        const cs = calcSales(salesRec);
        salesRec.lockedExpSum = lockedExpSum;
        salesRec.lockedIncSum = lockedIncSum;
        salesRec.cashCalc = cs.net - cs.paySum - lockedExpSum + lockedIncSum;
        salesRec.cashLockedAt = nowStamp();
        salesRec.cashLockedBy = user.id;
        salesRec.reopenLogs = existing?.reopenLogs || [];
      } else {
        salesRec.lockedExpSum = existing.lockedExpSum;
        salesRec.lockedIncSum = existing.lockedIncSum;
        salesRec.cashCalc = existing.cashCalc;
        salesRec.cashLockedAt = existing.cashLockedAt;
        salesRec.cashLockedBy = existing.cashLockedBy;
        salesRec.reopenLogs = existing.reopenLogs || [];
      }
    }

    const newCatNames = [...newExpCats, ...newIncCats].map((c) => c.name);
    const parts = [
      salesFilled && "日結營收",
      expRecs.length && `支出 ${expRecs.length} 筆${dayWasLocked ? "（日結後新增）" : ""}`,
      incRecs.length && `收入 ${incRecs.length} 筆${dayWasLocked ? "（日結後新增）" : ""}`,
      ordRecs.length && `叫貨 ${ordRecs.length} 筆`,
    ].filter(Boolean).join("、");
    const confirmMsg = `確定送出今日資料？（${parts}）` + (newCatNames.length ? `\n將自動新增類別：${newCatNames.join("、")}` : "")
      + (dayWasLocked && (expRecs.length || incRecs.length) ? `\n\n注意：當日日結已完成並鎖定現金推算，本次新增的支出／收入將標示為「日結後新增」，不會納入現金推算，除非後續執行「重新開啟日結／重新結帳」。` : "");
    if (!confirm(confirmMsg)) return;

    update((d) => ({
      ...d,
      categories: newExpCats.length ? [...d.categories, ...newExpCats] : d.categories,
      incomeCategories: newIncCats.length ? [...(d.incomeCategories || []), ...newIncCats] : d.incomeCategories,
      expenses: expRecs.length ? [...d.expenses, ...expRecs] : d.expenses,
      incomes: incRecs.length ? [...(d.incomes || []), ...incRecs] : d.incomes,
      orders: ordRecs.length ? [...d.orders, ...ordRecs] : d.orders,
      dailySales: !salesRec ? d.dailySales
        : existing ? d.dailySales.map((r) => r.id === salesRec.id ? salesRec : r)
        : [...d.dailySales, salesRec],
    }));

    setExpRows([blankExp()]);
    setIncRows([blankInc()]);
    setOrdRows([blankOrd()]);
  };

  if (!sf) return null;
  const c = calcSales(sf);
  const set = (k) => (e) => setSf({ ...sf, [k]: e.target.value });
  const nIn = (k) => <input className="pl-input" inputMode="decimal" value={sf[k]} onChange={set(k)} disabled={salesLocked} placeholder="0" />;
  const setPay = (itemId) => (e) => setSf({ ...sf, pay: { ...(sf.pay || {}), [itemId]: e.target.value } });
  const payIn = (itemId) => <input className="pl-input" inputMode="decimal" value={(sf.pay || {})[itemId] ?? ""} onChange={setPay(itemId)} disabled={salesLocked} placeholder="0" />;
  const cardHead = (title, right) => (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
      <div className="pl-serif" style={{ fontWeight: 700, fontSize: 15.5 }}>{title}</div>
      <div style={{ display: "flex", gap: 8, alignItems: "center" }}>{right}</div>
    </div>
  );
  const totalNewItems = filledExp.length + filledInc.length + filledOrd.length;

  /* 現金（推算）＝每日對帳資訊，獨立於日結營收區塊。日結一旦完成送出即鎖定當時的現金推算，
     之後不再自動重新計算；未完成日結前則即時試算（含本次尚未送出的新增支出／收入），
     方便使用者在正式送出前先預覽 */
  const dayLocked = !!(existing && existing.cashLockedAt);
  const postCloseExpCount = dayExp.filter((r) => r.postClose).length;
  const postCloseIncCount = dayInc.filter((r) => r.postClose).length;
  let cashNet, cashPaySum, cashExpSum, cashIncSum, cashCalc;
  if (dayLocked) {
    const cs = calcSales(existing);
    cashNet = cs.net; cashPaySum = cs.paySum;
    cashExpSum = existing.lockedExpSum; cashIncSum = existing.lockedIncSum; cashCalc = existing.cashCalc;
  } else {
    cashNet = num(sf.pos); cashPaySum = c.paySum;
    cashExpSum = expSum + filledExp.reduce((a, r) => a + num(r.amount), 0);
    cashIncSum = incSum + filledInc.reduce((a, r) => a + num(r.amount), 0);
    cashCalc = cashNet - cashPaySum - cashExpSum + cashIncSum;
  }

  return (
    <div>
      <SectionTitle right={
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          {perm.isAcct(user) && <button className="pl-btn" onClick={() => goto("import")}>⬆ Excel 匯入</button>}
          <button className="pl-btn small" onClick={() => setDate(dayShift(date, -1))}>‹</button>
          <DateInput style={{ width: 150, textAlign: "center" }} value={date} onChange={(e) => setDate(e.target.value)} />
          <button className="pl-btn small" onClick={() => setDate(dayShift(date, 1))}>›</button>
          {date !== todayStr() && <button className="pl-btn small" onClick={() => setDate(todayStr())}>今天</button>}
        </div>
      }>每日 Key 帳</SectionTitle>

      <StoreTabs stores={stores} value={curStore} onChange={setStoreTab} />

      {!validDate(date) ? <div className="pl-card" style={{ padding: 24 }}><Empty text="請輸入正確日期（YYYY/MM/DD）" /></div> : <>

      <div className="pl-card" style={{ padding: "10px 16px", marginBottom: 14, fontSize: 12.5, color: T.sub }}>
        下面把今天的日結營收、支出、收入、叫貨一次填完，最後按一次「送出今日資料」整批入帳，不用分頁操作、不會卡在待審核。
      </div>

      {/* ① 日結營收 */}
      <div className="pl-card" style={{ padding: 16, marginBottom: 14, borderTop: `3px solid ${T.brown}` }}>
        {cardHead(`① 日結營收`, <>
          <Badge text={sf.id ? sf.status : "尚未日結"} tone={sf.id ? undefined : "yellow"} />
          {sf.id && sf.status === "待審核" && perm.canApprove(user, sf) && (
            <>
              <button className="pl-btn small" style={{ color: T.green }} onClick={() => reviewSales(true)}>通過</button>
              <button className="pl-btn small danger" onClick={() => reviewSales(false)}>退回</button>
            </>
          )}
        </>)}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(140px,1fr))", gap: 10 }}>
          <Field label="每日營業額" required>{nIn("pos")}</Field>
          {salesPayItems.map((p) => <Field key={p.id} label={p.name}>{payIn(p.id)}</Field>)}
          <Field label="備註"><input className="pl-input" value={sf.note} onChange={set("note")} disabled={salesLocked} /></Field>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(140px,1fr))", gap: 10, marginTop: 12, background: "#FCFAF6", border: `1px solid ${T.line}`, borderRadius: 8, padding: 12 }}>
          <MiniStat label="每日營業額" value={fmt(c.net)} />
          <MiniStat label="非現金合計" value={fmt(c.paySum)} />
        </div>
        {c.cash < 0 && (
          <div style={{ marginTop: 10, background: T.redBg, borderRadius: 8, padding: 10 }}>
            <div style={{ color: T.red, fontSize: 12.5, marginBottom: 6 }}>非現金合計超過每日營業額（超出 {fmt(-c.cash)}），送出前請填寫差異原因。</div>
            <input className="pl-input" value={sf.diffReason} onChange={set("diffReason")} placeholder="差異原因" disabled={salesLocked} />
          </div>
        )}
        {salesLocked && <div style={{ marginTop: 10, fontSize: 12.5, color: T.sub }}>已審核僅系統管理者可修改。</div>}
      </div>

      {/* ② 當日支出 */}
      <div className="pl-card" style={{ padding: 16, marginBottom: 14 }}>
        {cardHead(`② 當日支出（已記錄 ${dayExp.length} 筆・${fmt(expSum)}）`, null)}
        {dayExp.length > 0 && (
          <div className="pl-scroll-x" style={{ marginBottom: 14 }}>
            <table className="pl-table">
              <thead><tr><th>類別</th><th>品項</th><th className="num">金額</th><th>付款方式</th><th>付款人</th><th>狀態</th><th></th></tr></thead>
              <tbody>
                {dayExp.map((r) => (
                  <tr key={r.id}>
                    <td>{catOf(r.categoryId)}</td><td>{r.item}{r.postClose && <> <Badge text="日結後新增" tone="yellow" /></>}</td>
                    <td className="num" style={{ fontWeight: 600 }}>{fmtN(r.amount)}</td>
                    <td>{r.payMethod}</td><td>{r.payer}</td>
                    <td><Badge text={r.status} /></td>
                    <td style={{ whiteSpace: "nowrap" }}>
                      {r.status === "草稿" && <button className="pl-btn small" onClick={() => submitDraft("exp", r)}>送審</button>}
                      {" "}<button className="pl-btn small danger" disabled={r.status === "過審" && !perm.isAdmin(user)} title={r.status === "過審" && !perm.isAdmin(user) ? "過審的支出無法刪除" : ""} onClick={() => delRec("exp", r)}>刪除</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
        <div style={{ fontSize: 12.5, color: T.sub, marginBottom: 8 }}>本次新增（尚未送出）</div>
        <datalist id="dl-daily-expcat">{data.categories.filter((x) => x.active && x.id !== ORDER_CAT_ID).map((x) => <option key={x.id} value={x.name} />)}</datalist>
        <div className="pl-scroll-x">
          <table className="pl-table">
            <thead><tr><th>類別</th><th>品項</th><th className="num">金額</th><th>付款方式</th><th>單據／憑證 *</th><th></th></tr></thead>
            <tbody>
              {expRows.map((r) => (
                <tr key={r.key}>
                  <td style={{ minWidth: 130 }}>
                    <input className="pl-input" list="dl-daily-expcat" value={r.categoryName}
                      onChange={(e) => setExpRow(r.key, "categoryName", e.target.value)} placeholder="類別（可輸入）" />
                  </td>
                  <td style={{ minWidth: 150 }}><input className="pl-input" placeholder="支出品項" value={r.item} onChange={(e) => setExpRow(r.key, "item", e.target.value)} /></td>
                  <td style={{ minWidth: 90 }}><input className="pl-input" style={{ textAlign: "right" }} placeholder="金額" inputMode="decimal" value={r.amount} onChange={(e) => setExpRow(r.key, "amount", e.target.value)} /></td>
                  <td style={{ minWidth: 110 }}>
                    <select className="pl-input" value={r.payMethod} onChange={(e) => setExpRow(r.key, "payMethod", e.target.value)}>
                      {PAY_METHODS.map((p) => <option key={p}>{p}</option>)}
                    </select>
                  </td>
                  <DocTypeCell docType={r.docType} noDocReason={r.noDocReason} onChange={(patch) => patchExpRow(r.key, patch)} />
                  <td><button className="pl-btn small danger" onClick={() => delExpRow(r.key)}>✕</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <button className="pl-btn small" style={{ marginTop: 8 }} onClick={() => setExpRows([...expRows, blankExp()])}>＋ 新增一列</button>
      </div>

      {/* ③ 當日收入 */}
      <div className="pl-card" style={{ padding: 16, marginBottom: 14 }}>
        {cardHead(`③ 當日收入（已記錄 ${dayInc.length} 筆・${fmt(incSum)}）`, null)}
        {dayInc.length > 0 && (
          <div className="pl-scroll-x" style={{ marginBottom: 14 }}>
            <table className="pl-table">
              <thead><tr><th>類別</th><th>項目</th><th className="num">金額</th><th>收款方式</th><th>經手人</th><th>狀態</th><th></th></tr></thead>
              <tbody>
                {dayInc.map((r) => (
                  <tr key={r.id}>
                    <td>{incCatOf(r.categoryId)}</td><td>{r.item}{r.postClose && <> <Badge text="日結後新增" tone="yellow" /></>}</td>
                    <td className="num" style={{ fontWeight: 600, color: T.green }}>{fmtN(r.amount)}</td>
                    <td>{r.payMethod}</td><td>{r.payer}</td>
                    <td><Badge text={r.status} /></td>
                    <td style={{ whiteSpace: "nowrap" }}>
                      {r.status === "草稿" && <button className="pl-btn small" onClick={() => submitDraft("inc", r)}>送審</button>}
                      {" "}<button className="pl-btn small danger" disabled={r.status === "過審" && !perm.isAdmin(user)} title={r.status === "過審" && !perm.isAdmin(user) ? "過審的收入無法刪除" : ""} onClick={() => delRec("inc", r)}>刪除</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
        <div style={{ fontSize: 12.5, color: T.sub, marginBottom: 8 }}>本次新增（尚未送出）</div>
        <datalist id="dl-daily-inccat">{(data.incomeCategories || []).filter((x) => x.active).map((x) => <option key={x.id} value={x.name} />)}</datalist>
        <div className="pl-scroll-x">
          <table className="pl-table">
            <thead><tr><th>類別</th><th>項目</th><th className="num">金額</th><th>收款方式</th><th>單據／憑證 *</th><th></th></tr></thead>
            <tbody>
              {incRows.map((r) => (
                <tr key={r.key}>
                  <td style={{ minWidth: 130 }}>
                    <input className="pl-input" list="dl-daily-inccat" value={r.categoryName}
                      onChange={(e) => setIncRow(r.key, "categoryName", e.target.value)} placeholder="類別（可輸入）" />
                  </td>
                  <td style={{ minWidth: 150 }}><input className="pl-input" placeholder="收入項目" value={r.item} onChange={(e) => setIncRow(r.key, "item", e.target.value)} /></td>
                  <td style={{ minWidth: 90 }}><input className="pl-input" style={{ textAlign: "right" }} placeholder="金額" inputMode="decimal" value={r.amount} onChange={(e) => setIncRow(r.key, "amount", e.target.value)} /></td>
                  <td style={{ minWidth: 110 }}>
                    <select className="pl-input" value={r.payMethod} onChange={(e) => setIncRow(r.key, "payMethod", e.target.value)}>
                      {PAY_METHODS.map((p) => <option key={p}>{p}</option>)}
                    </select>
                  </td>
                  <DocTypeCell docType={r.docType} noDocReason={r.noDocReason} onChange={(patch) => patchIncRow(r.key, patch)} />
                  <td><button className="pl-btn small danger" onClick={() => delIncRow(r.key)}>✕</button></td>
                </tr>
              ))}
            </tbody>

   （避免還原舊備份時，把既有主檔結構或真實的稽核歷程覆蓋掉） */
const RESTORE_TABLE_KEYS = ["dailySales", "expenses", "incomes", "orders", "receivables"];
const RESTORE_TABLE_HAS_STORE = { dailySales: true, expenses: true, incomes: true, orders: true, receivables: false };

const sanitizeFilename = (s) => String(s || "").replace(/[\/\\:*?"<>|]/g, "_");

/* SHA-256 雜湊（十六進位字串），供備份完整性驗證使用 */
async function sha256Hex(input) {
  const buf = typeof input === "string" ? new TextEncoder().encode(input) : input;
  const digest = await crypto.subtle.digest("SHA-256", buf);
  return Array.from(new Uint8Array(digest)).map((b) => b.toString(16).padStart(2, "0")).join("");
}

/* 統一的下載觸發方式：Blob + createObjectURL + 隱藏 <a> 點擊 + revokeObjectURL */
function downloadBlobFile(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* 讀回 CSV 文字內容為物件陣列（供還原時解析備份 zip 內的 CSV，與匯出時的 json_to_sheet 對稱） */
function csvToRows(csvText) {
  const clean = String(csvText || "").replace(/^﻿/, "");
  if (!clean.trim()) return [];
  const wb = XLSX.read(clean, { type: "string" });
  const ws = wb.Sheets[wb.SheetNames[0]];
  return XLSX.utils.sheet_to_json(ws, { defval: "" });
}

/* key 順序無關的物件序列化，用於還原預覽時判斷「更新」或「不變」，避免因欄位順序不同誤判 */
function stableStringify(v) {
  if (v === null || typeof v !== "object") return JSON.stringify(v);
  if (Array.isArray(v)) return "[" + v.map(stableStringify).join(",") + "]";
  return "{" + Object.keys(v).sort().map((k) => JSON.stringify(k) + ":" + stableStringify(v[k])).join(",") + "}";
}

/* 匯出／備份／下載／還原稽核紀錄：不管成功失敗都要記一筆，寫入失敗不中斷主流程（僅記主控台） */
async function logExportAudit(user, { actionType, scope, dataTypes, fileName, fileSize, recordCount, hasPii, hasAttachments, result, failReason }) {
  try {
    await sb.from("export_audit_log").insert({
      user_id: user.id, user_name: user.name, user_role: user.role,
      action_type: actionType, scope: scope || "", data_types: dataTypes || [],
      file_name: fileName || null, file_size: fileSize ?? null, record_count: recordCount ?? null,
      has_pii: !!hasPii, has_attachments: !!hasAttachments,
      device: navigator.userAgent,
      source_ip: null,
      result, fail_reason: failReason || null,
    });
  } catch (e) {
    console.error("匯出稽核紀錄寫入失敗", e);
  }
}

  const catOf = (id) => (data.categories.find((c) => c.id === id) || {}).name || "";

  const userNm = (id) => (profiles.find((u) => u.id === id) || {}).name || (id || "");
  return { nameOf, catOf, incCatOf, venOf, userNm };
}

  status: row["審核狀態"] || "草稿", reviewedBy: row["審核人ID"] || null, reviewedAt: row["審核時間"] || "",
});

const parseOrder = (row) => ({
  id: row["紀錄ID"], date: row["日期"], storeId: row["門店ID"] || "", vendorId: row["廠商ID"] || null,
  items: row["品項說明"] || "", amount: num(row["金額"]), billing: row["結帳方式"] || "現結",
  dueDate: row["預計付款日"] || "", paidDate: row["實際付款日"] || "", payStatus: row["付款狀態"] || "未付款",
  invoiceStatus: row["發票狀態"] || "未收到", invoiceNo: row["發票號碼"] || "",
  docType: row["憑證類型"] || "", noDocReason: row["無憑證原因"] || "", attachment: null,
  createdBy: row["建立人ID"] || null, note: row["備註"] || "",
});

const parseAR = (row) => ({
  id: row["紀錄ID"], no: row["編號"] || "", date: row["日期"], customer: row["客戶"] || "",
  invoiceNo: row["發票號碼"] || "", amount: num(row["請款金額"]), requester: row["請款人"] || "",
  requestDate: row["請款日期"] || "", dueDate: row["到期日"] || "", received: num(row["已收金額"]),
  receivedDate: row["實際收款日"] || "", status: row["收款狀態"] || "未請款", note: row["備註"] || "",
  docType: row["憑證類型"] || "", noDocReason: row["無憑證原因"] || "",
  attachment: null, createdBy: row["建立人ID"] || null, createdAt: row["建立時間"] || "",
});

const parseVendor = (row) => ({
  id: row["廠商ID"], name: row["廠商名稱"] || "", contact: row["聯絡人"] || "", phone: row["電話"] || "",
  billing: row["結帳方式"] || "現結", monthlyDay: row["月結日"] ? parseInt(row["月結日"], 10) : null,
  payMethod: row["預設付款方式"] || "現金", active: row["狀態"] === "啟用中", note: row["備註"] || "",
});

const parseApproval = (row) => ({
  id: row["紀錄ID"], time: row["時間"], userId: row["操作人ID"] || "",
  table: row["資料表"] || "", recordId: row["對應紀錄ID"] || "", result: row["結果"] || "", summary: row["摘要"] || "",
});

const parseAudit = (row) => {
  let before = null, after = null;
  try { before = row["修改前"] ? JSON.parse(row["修改前"]) : null; } catch (e) { before = null; }
  try { after = row["修改後"] ? JSON.parse(row["修改後"]) : null; } catch (e) { after = null; }
