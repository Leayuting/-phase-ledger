/* ────────────────────────────────────────────
   月報
──────────────────────────────────────────────*/
function computeMonthReport(data, month, storeFilter) {
  const catById = Object.fromEntries(data.categories.map((c) => [c.id, c]));
  const acctOf = (sid) => acctStoreId(data.stores, sid);
  const pick = (arr) => arr.filter((r) => monthOf(r.date) === month && (!storeFilter || acctOf(r.storeId) === storeFilter));
  const salesM = pick(data.dailySales);
  const expAll = pick(data.expenses).filter((e) => e.status !== "已退回" && e.categoryId !== ORDER_CAT_ID);
  const ordM = pick(data.orders);

  const byStore = {};
  data.stores.filter((s) => s.retail).forEach((s) => {
    byStore[s.id] = data.dailySales.filter((r) => monthOf(r.date) === month && r.storeId === s.id).reduce((a, r) => a + calcSales(r).net, 0);
  });
  const revenue = salesM.reduce((a, s) => a + calcSales(s).net, 0);
  const incM = pick(data.incomes || []).filter((r) => r.status !== "已退回");
  const bizInc = incM.reduce((a, r) => a + num(r.amount), 0);
  const totalInc = revenue + bizInc;
  const tgt = data.targets[month] || {};
  const tgtSum = storeFilter ? num(tgt[storeFilter]) : data.stores.filter((s) => s.retail).reduce((a, s) => a + num(tgt[s.id]), 0);

  const catSum = (name) => expAll.filter((e) => catById[e.categoryId]?.name === name).reduce((a, e) => a + num(e.amount), 0);
  const orders = ordM.reduce((a, o) => a + num(o.amount), 0);
  const named = ["租金", "水費", "電費", "瓦斯費", "勞保", "健保", "勞退", "人事成本", "稅金"];
  const namedSums = Object.fromEntries(named.map((n) => [n, catSum(n)]));
  const namedTotal = Object.values(namedSums).reduce((a, b) => a + b, 0);
  const expTotal = expAll.reduce((a, e) => a + num(e.amount), 0);
  const otherExp = expTotal - namedTotal;
  const general = expAll.filter((e) => !catById[e.categoryId]?.fixed && !named.includes(catById[e.categoryId]?.name)).reduce((a, e) => a + num(e.amount), 0);

  return {
    revenue, bizInc, totalInc, tgtSum, byStore,
    achieve: tgtSum > 0 ? (revenue / tgtSum) * 100 : null,
    rows: [
      ["廠商叫貨", orders],
      ["一般支出", general],
      ...named.map((n) => [n, namedSums[n]]),
      ["其他支出", Math.max(0, otherExp - general)],
    ],
    totalExp: orders + expTotal,
    profit: totalInc - (orders + expTotal),
  };
}

function ReportModule({ data, user, users }) {
  const [month, setMonth] = useState(monthOf(todayStr()));
  const [storeFilter, setStoreFilter] = useState(null);
  const cur = computeMonthReport(data, month, storeFilter);
  const prev = computeMonthReport(data, prevMonth(month), storeFilter);
  const stores = data.stores.filter((s) => s.retail && s.active);

  const pct = (v) => cur.revenue > 0 ? ((v / cur.revenue) * 100).toFixed(1) + "%" : "—";
  const delta = (a, b) => {
    const d = a - b;
    const p = b > 0 ? ((d / b) * 100).toFixed(1) + "%" : "—";
    return { d, p };
  };

  const exportExcel = () => {
    const wb = XLSX.utils.book_new();
    const rows = [
      ["PHASE 門店月度營運報表", "", "", "", ""],
      ["月份", monthLabel(month), "門店範圍", storeFilter ? stores.find((s) => s.id === storeFilter)?.name : "全部門店", ""],
      [],
      ["收入區", "金額", "", "", ""],
      ["營業額目標", cur.tgtSum],
      ...stores.filter((s) => !storeFilter || s.id === storeFilter).map((s) => [s.name + " 營業額", cur.byStore[s.id] || 0]),
      ["門店收入（業外）", cur.bizInc],
      ["總收入", cur.totalInc],
      ["營業額達成率", cur.achieve !== null ? cur.achieve.toFixed(1) + "%" : "未設定目標"],
      [],
      ["支出區", "金額", "占營業額比例", "與上月差額", "與上月增減%"],
      ...cur.rows.map(([name, v], i) => {
        const pv = prev.rows[i] ? prev.rows[i][1] : 0;
        const { d, p } = delta(v, pv);
        return [name, v, cur.revenue > 0 ? (v / cur.revenue) : 0, d, p];
      }),
      ["總支出", cur.totalExp],
      [],
      ["本月損益", cur.profit],
    ];
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws["!cols"] = [{ wch: 16 }, { wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 14 }];
    XLSX.utils.book_append_sheet(wb, ws, "月報");
    XLSX.writeFile(wb, `PHASE_月報_${month.replace("/", "-")}.xlsx`);
  };

  return (
    <div>
      <SectionTitle right={
        <>
          <MonthPicker value={month} onChange={setMonth} />
          <select className="pl-input" style={{ width: 130 }} value={storeFilter || ""} onChange={(e) => setStoreFilter(e.target.value || null)}>
            <option value="">全部門店</option>
            {stores.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
          <button className="pl-btn" onClick={() => window.print()}>列印／PDF</button>
          {perm.canExport(user) && <button className="pl-btn primary" onClick={exportExcel}>匯出 Excel</button>}
        </>
      }>月度營運報表</SectionTitle>

      <div className="pl-card print-area" style={{ padding: "28px 30px", maxWidth: 860 }}>
        <div style={{ textAlign: "center", marginBottom: 22 }}>
          <div className="pl-serif" style={{ fontSize: 22, fontWeight: 700, letterSpacing: ".12em" }}>PHASE COFFEE ROASTERS</div>
          <div style={{ color: T.sub, marginTop: 4, letterSpacing: ".2em", fontSize: 13 }}>
            月度營運報表　{monthLabel(month)}{storeFilter ? "　" + stores.find((s) => s.id === storeFilter)?.name : ""}
          </div>
        </div>

        <ReportSection title="收入">
          <RRow name="營業額目標" value={cur.tgtSum ? fmt(cur.tgtSum) : "尚未設定"} />
          {stores.filter((s) => !storeFilter || s.id === storeFilter).map((s) => (
            <RRow key={s.id} name={s.name + " 營業額"} value={fmt(cur.byStore[s.id] || 0)} indent />
          ))}
          <RRow name="營業額合計" value={fmt(cur.revenue)} strong />
          <RRow name="門店收入（業外）" value={fmt(cur.bizInc)} />
          <RRow name="總收入" value={fmt(cur.totalInc)} strong />
          <RRow name="營業額達成率" value={cur.achieve !== null ? cur.achieve.toFixed(1) + "%" : "—"}
            tone={cur.achieve !== null ? (cur.achieve >= 100 ? "green" : cur.achieve >= 85 ? "yellow" : "red") : undefined} />
        </ReportSection>

        <ReportSection title="支出">
          <div className="pl-scroll-x">
            <table className="pl-table" style={{ fontSize: 13.5 }}>
              <thead><tr>
                <th>項目</th><th className="num">金額</th><th className="num">占營業額</th>
                <th className="num">與上月差額</th><th className="num">增減 %</th>
              </tr></thead>
              <tbody>
                {cur.rows.map(([name, v], i) => {
                  const pv = prev.rows[i] ? prev.rows[i][1] : 0;
                  const { d, p } = delta(v, pv);
                  return (
                    <tr key={name}>
                      <td>{name}</td>
                      <td className="num">{fmtN(v)}</td>
                      <td className="num">{pct(v)}</td>
                      <td className="num" style={{ color: d > 0 ? T.red : d < 0 ? T.green : T.sub }}>{d === 0 ? "—" : (d > 0 ? "+" : "") + fmtN(d)}</td>
                      <td className="num" style={{ color: d > 0 ? T.red : d < 0 ? T.green : T.sub }}>{pv > 0 ? (d > 0 ? "+" : "") + p : "—"}</td>
                    </tr>
                  );
                })}
                <tr style={{ fontWeight: 700 }}>
                  <td>總支出</td>
                  <td className="num">{fmtN(cur.totalExp)}</td>
                  <td className="num">{pct(cur.totalExp)}</td>
                  <td className="num" colSpan={2}>{(() => { const { d } = delta(cur.totalExp, prev.totalExp); return d === 0 ? "—" : (d > 0 ? "+" : "") + fmtN(d); })()}</td>
                </tr>
              </tbody>
            </table>
          </div>
        </ReportSection>

        <div style={{ marginTop: 20, padding: "16px 18px", background: cur.profit >= 0 ? T.greenBg : T.redBg, borderRadius: 10, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div className="pl-serif" style={{ fontWeight: 600 }}>本月損益</div>
          <div className="pl-serif" style={{ fontSize: 22, fontWeight: 700, color: cur.profit >= 0 ? T.green : T.red }}>{fmt(cur.profit)}</div>
        </div>

        <div style={{ marginTop: 18, color: T.sub, fontSize: 11.5, textAlign: "right" }}>
          產出時間 {nowStamp()}・PHASE 門店帳務管理系統
        </div>
      </div>
    </div>
  );
}

function ReportSection({ title, children }) {
  return (
    <div style={{ marginBottom: 22 }}>
      <div className="pl-serif" style={{ fontWeight: 600, fontSize: 16, borderBottom: `2px solid ${T.ink}`, paddingBottom: 6, marginBottom: 8 }}>{title}</div>
      {children}
    </div>
  );
}
function RRow({ name, value, strong, indent, tone }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: `1px dashed ${T.line}`, fontWeight: strong ? 700 : 400, paddingLeft: indent ? 16 : 0 }}>
      <span style={{ color: indent ? T.sub : T.ink }}>{name}</span>
      <span style={{ fontVariantNumeric: "tabular-nums", color: tone === "green" ? T.green : tone === "red" ? T.red : tone === "yellow" ? T.yellow : undefined }}>{value}</span>
    </div>
  );
}

function MasterModule({ data, update, user, profiles }) {
  const [tab, setTab] = useState("vendors");
  if (!perm.canMaster(user)) return <Empty text="主檔管理僅開放系統管理者。" />;
  const tabs = [["vendors", "廠商主檔"], ["categories", "類別管理"], ["fixed", "固定支出項目"], ["stores", "門店主檔"], ["targets", "營業額目標"], ["users", "使用者"]];
  return (
    <div>
      <SectionTitle>主檔管理</SectionTitle>
      <div style={{ display: "flex", gap: 6, marginBottom: 14, flexWrap: "wrap" }}>
        {tabs.map(([k, l]) => (
          <button key={k} className="pl-btn small" style={tab === k ? { background: T.brown, color: "#fff", borderColor: T.brown } : {}} onClick={() => setTab(k)}>{l}</button>
        ))}
      </div>
      {tab === "vendors" && <VendorMaster data={data} update={update} />}
      {tab === "categories" && <CategoryMaster data={data} update={update} />}
      {tab === "fixed" && <FixedMaster data={data} update={update} />}
      {tab === "stores" && <StoreMaster data={data} update={update} />}

function VendorMaster({ data, update }) {
  const [editing, setEditing] = useState(null);
  const save = (v) => {
    if (!v.name.trim()) return alert("請填寫廠商名稱");
    if (!v.id) {
      v.id = uid("v");
      v.code = "V" + pad2(data.vendors.length + 1).padStart(3, "0");
      update((d) => ({ ...d, vendors: [...d.vendors, v] }));
    } else {
      update((d) => ({ ...d, vendors: d.vendors.map((x) => (x.id === v.id ? v : x)) }));
    }
    setEditing(null);
  };
  return (
    <div className="pl-card pl-scroll-x">
      <div style={{ padding: 12, borderBottom: `1px solid ${T.line}` }}>
        <button className="pl-btn primary small" onClick={() => setEditing({ id: null, code: "", name: "", contact: "", phone: "", billing: "現結", monthlyDay: "", payMethod: "現金", active: true, note: "" })}>＋ 新增廠商</button>
      </div>
      <table className="pl-table">
        <thead><tr><th>編號</th><th>廠商名稱</th><th>聯絡人</th><th>電話</th><th>結帳方式</th><th>月結日</th><th>預設付款</th><th>狀態</th><th>備註</th><th></th></tr></thead>
        <tbody>
          {data.vendors.map((v) => (
            <tr key={v.id}>
              <td>{v.code}</td><td>{v.name}</td><td>{v.contact}</td><td>{v.phone}</td>
              <td>{v.billing}</td><td>{v.monthlyDay ? "每月 " + v.monthlyDay + " 日" : "—"}</td><td>{v.payMethod}</td>
              <td><Badge text={v.active ? "啟用中" : "停用"} tone={v.active ? "green" : "gray"} /></td>
              <td style={{ fontSize: 12.5, color: T.sub }}>{v.note}</td>
              <td><button className="pl-btn small" onClick={() => setEditing({ ...v })}>編輯</button></td>
            </tr>
          ))}
        </tbody>
      </table>
      {editing && (
        <Modal title={editing.id ? "編輯廠商" : "新增廠商"} onClose={() => setEditing(null)} width={640}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(160px,1fr))", gap: 12 }}>
            <Field label="廠商名稱" required><input className="pl-input" value={editing.name} onChange={(e) => setEditing({ ...editing, name: e.target.value })} /></Field>
            <Field label="聯絡人"><input className="pl-input" value={editing.contact} onChange={(e) => setEditing({ ...editing, contact: e.target.value })} /></Field>
            <Field label="電話"><input className="pl-input" value={editing.phone} onChange={(e) => setEditing({ ...editing, phone: e.target.value })} /></Field>
            <Field label="結帳方式">
              <select className="pl-input" value={editing.billing} onChange={(e) => setEditing({ ...editing, billing: e.target.value })}>
                {ORDER_BILLING.map((b) => <option key={b}>{b}</option>)}
              </select>
            </Field>
            <Field label="月結日（1–31）"><input className="pl-input" inputMode="numeric" value={editing.monthlyDay || ""} onChange={(e) => setEditing({ ...editing, monthlyDay: e.target.value ? parseInt(e.target.value) : null })} /></Field>
            <Field label="預設付款方式">
              <select className="pl-input" value={editing.payMethod} onChange={(e) => setEditing({ ...editing, payMethod: e.target.value })}>
                {PAY_METHODS.map((p) => <option key={p}>{p}</option>)}
              </select>
            </Field>
            <Field label="是否啟用">
              <label style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 0" }}>
                <input type="checkbox" checked={editing.active} onChange={(e) => setEditing({ ...editing, active: e.target.checked })} /> 啟用
              </label>
            </Field>
            <Field label="備註" span={2}><input className="pl-input" value={editing.note} onChange={(e) => setEditing({ ...editing, note: e.target.value })} /></Field>
          </div>
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 16 }}>
            <button className="pl-btn" onClick={() => setEditing(null)}>取消</button>
            <button className="pl-btn primary" onClick={() => save(editing)}>儲存</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function CategoryMaster({ data, update }) {
  const [tab, setTab] = useState("exp"); // exp | inc
  const [name, setName] = useState("");
  const isExp = tab === "exp";
  const list = isExp ? data.categories : (data.incomeCategories || []);
  const key = isExp ? "categories" : "incomeCategories";

  /* 使用中檢查：使用中的類別不可刪除，僅能停用 */
  const usageOf = (c) => {
    if (isExp) {
      const n = data.expenses.filter((r) => r.categoryId === c.id).length;
      const f = (data.fixedItems || []).filter((r) => r.categoryId === c.id).length;
      /* 廠商叫貨（orders）以 vendorId 記錄，不帶 categoryId，但系統保留類別視同一律使用中 */
      const o = c.id === ORDER_CAT_ID ? data.orders.length : 0;
      return { n: n + f + o, desc: [n ? `${n} 筆支出` : "", f ? `${f} 項固定支出` : "", o ? `${o} 筆廠商叫貨` : ""].filter(Boolean).join("、") };
    }
    const n = (data.incomes || []).filter((r) => r.categoryId === c.id).length;
    return { n, desc: n ? `${n} 筆收入` : "" };
  };

  const add = () => {
    const nm = name.trim();
    if (!nm) return;
    if (list.some((c) => c.name === nm)) return alert(`類別「${nm}」已存在。`);
    const c = isExp ? { id: uid("cat"), name: nm, fixed: false, active: true } : { id: uid("ic"), name: nm, active: true };
    update((d) => ({ ...d, [key]: [...(d[key] || []), c] }));
    setName("");
  };
  const remove = (c) => {
    if (c.id === ORDER_CAT_ID) return alert("系統保留類別，用於廠商叫貨自動歸類，無法刪除。");
    const u = usageOf(c);
    if (u.n > 0) return alert(`「${c.name}」使用中（${u.desc}），無法刪除。若不再使用可改為停用。`);
    if (!confirm(`確定刪除類別「${c.name}」？`)) return;
    update((d) => ({ ...d, [key]: d[key].filter((x) => x.id !== c.id) }));
  };
  const toggle = (c) => {
    if (c.id === ORDER_CAT_ID) return alert("系統保留類別，用於廠商叫貨自動歸類，無法停用。");
    update((d) => ({ ...d, [key]: d[key].map((x) => x.id === c.id ? { ...x, active: !x.active } : x) }));
  };
  const toggleFixed = (c) => update((d) => ({ ...d, categories: d.categories.map((x) => x.id === c.id ? { ...x, fixed: !x.fixed } : x) }));

  return (
    <div>
      <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
        {[["exp", "支出類別"], ["inc", "收入類別"]].map(([k, label]) => (
          <button key={k} className={"pl-btn small" + (tab === k ? " primary" : "")} onClick={() => { setTab(k); setName(""); }}>{label}</button>
        ))}
      </div>

      <div className="pl-card">
        <div style={{ padding: 12, borderBottom: `1px solid ${T.line}`, display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
          <input className="pl-input" style={{ maxWidth: 240 }} placeholder={`新增${isExp ? "支出" : "收入"}類別名稱`}
            value={name} onChange={(e) => setName(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") add(); }} />
          <button className="pl-btn primary" onClick={add}>＋ 新增類別</button>
          <span style={{ fontSize: 12.5, color: T.sub, marginLeft: "auto" }}>
            使用中的類別無法刪除，可改為停用；未使用的類別可直接刪除。
          </span>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(260px,1fr))", gap: 8, padding: 14 }}>
          {list.length === 0 && <Empty text="尚無類別" />}
          {list.map((c) => {
            const u = usageOf(c);
            return (
              <div key={c.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8, border: `1px solid ${T.line}`, borderRadius: 8, padding: "8px 12px", opacity: c.active ? 1 : .5 }}>
                <span style={{ minWidth: 0 }}>
                  {c.name}
                  {u.n > 0 && <span style={{ fontSize: 11.5, color: T.sub, marginLeft: 6 }}>{u.desc}</span>}
                </span>
                <span style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                  {isExp && <button className="pl-btn small" title="固定支出會納入月報固定支出統計" onClick={() => toggleFixed(c)}>{c.fixed ? "固定" : "一般"}</button>}
                  <button className="pl-btn small" disabled={c.id === ORDER_CAT_ID} title={c.id === ORDER_CAT_ID ? "系統保留類別，用於廠商叫貨自動歸類，無法停用" : ""} onClick={() => toggle(c)}>{c.active ? "停用" : "啟用"}</button>
                  <button className="pl-btn small danger" disabled={u.n > 0 || c.id === ORDER_CAT_ID} title={c.id === ORDER_CAT_ID ? "系統保留類別，用於廠商叫貨自動歸類，無法刪除" : u.n > 0 ? "使用中無法刪除" : ""} onClick={() => remove(c)}>刪除</button>
                </span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function FixedMaster({ data, update }) {
  const stores = data.stores.filter((s) => s.active);
  const cats = data.categories.filter((c) => c.active);
  const [storeId, setStoreId] = useState(stores[0]?.id || "");
  const [form, setForm] = useState({ categoryId: "", item: "", amount: "", payMethod: "銀行轉帳" });
  const items = (data.fixedItems || []).filter((f) => f.storeId === storeId);
  const catOf = (id) => data.categories.find((c) => c.id === id)?.name || "—";

  const add = () => {
    if (!form.categoryId) return alert("請選擇支出類別");
    if (!form.item.trim()) return alert("請填寫項目名稱");
    if (num(form.amount) <= 0) return alert("金額需大於 0");
    update((d) => ({
      ...d,
      fixedItems: [...(d.fixedItems || []), { id: uid("fx"), storeId, categoryId: form.categoryId, item: form.item.trim(), amount: num(form.amount), payMethod: form.payMethod, active: true }],
    }));
    setForm({ categoryId: "", item: "", amount: "", payMethod: "銀行轉帳" });
  };
  const setAmt = (f, v) => update((d) => ({ ...d, fixedItems: d.fixedItems.map((x) => x.id === f.id ? { ...x, amount: num(v) } : x) }));
  const toggle = (f) => update((d) => ({ ...d, fixedItems: d.fixedItems.map((x) => x.id === f.id ? { ...x, active: !x.active } : x) }));
  const remove = (f) => { if (confirm(`刪除固定項目「${f.item}」？`)) update((d) => ({ ...d, fixedItems: d.fixedItems.filter((x) => x.id !== f.id) })); };

  return (
    <div>
      <div style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap" }}>
        {stores.map((s) => (
          <button key={s.id} className={"pl-btn small" + (storeId === s.id ? " primary" : "")} onClick={() => setStoreId(s.id)}>{s.name}</button>
        ))}
      </div>

      <div className="pl-card" style={{ padding: 12, marginBottom: 12, display: "flex", flexWrap: "wrap", gap: 8, alignItems: "center" }}>
        <select className="pl-input" style={{ width: 140 }} value={form.categoryId} onChange={(e) => setForm({ ...form, categoryId: e.target.value })}>
          <option value="">支出類別</option>{cats.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <input className="pl-input" style={{ width: 160 }} placeholder="項目名稱（如：店面租金）" value={form.item} onChange={(e) => setForm({ ...form, item: e.target.value })} />
        <input className="pl-input" style={{ width: 110 }} placeholder="每月金額" inputMode="decimal" value={form.amount} onChange={(e) => setForm({ ...form, amount: e.target.value })} />
        <select className="pl-input" style={{ width: 140 }} value={form.payMethod} onChange={(e) => setForm({ ...form, payMethod: e.target.value })}>
          {PAY_METHODS.map((p) => <option key={p}>{p}</option>)}
        </select>
        <button className="pl-btn primary" onClick={add}>新增項目</button>
      </div>

      <div className="pl-card pl-scroll-x">
        <table className="pl-table">
          <thead><tr><th>支出類別</th><th>項目</th><th className="num">每月金額（可直接修改）</th><th>付款方式</th><th>狀態</th><th></th></tr></thead>
          <tbody>
            {items.length === 0 && <tr><td colSpan={6}><Empty text="此門店尚未設定固定支出項目" /></td></tr>}
            {items.map((f) => (
              <tr key={f.id} style={f.active ? {} : { opacity: .5 }}>
                <td>{catOf(f.categoryId)}</td>
                <td>{f.item}</td>
                <td className="num" style={{ width: 180 }}>
                  <input className="pl-input" style={{ textAlign: "right" }} defaultValue={f.amount} inputMode="decimal"
                    onBlur={(e) => setAmt(f, e.target.value)} />
                </td>
                <td>{f.payMethod}</td>
                <td><Badge text={f.active ? "啟用中" : "已停用"} tone={f.active ? "green" : "gray"} /></td>
                <td style={{ whiteSpace: "nowrap" }}>
                  <button className="pl-btn small" onClick={() => toggle(f)}>{f.active ? "停用" : "啟用"}</button>
                  {" "}<button className="pl-btn small danger" onClick={() => remove(f)}>刪除</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div style={{ marginTop: 10, fontSize: 12.5, color: T.sub }}>
        設定完成後，各門店可在「每日支出」頁面一鍵帶入當月固定支出（草稿），金額可逐筆調整後送審。
      </div>
    </div>
  );
}

function StoreMaster({ data, update }) {
  const [name, setName] = useState("");
  return (
    <div className="pl-card">
      <div style={{ padding: 12, borderBottom: `1px solid ${T.line}`, display: "flex", gap: 8 }}>
        <input className="pl-input" style={{ maxWidth: 240 }} placeholder="新增門店／部門名稱" value={name} onChange={(e) => setName(e.target.value)} />
        <button className="pl-btn primary" onClick={() => { if (name.trim()) { update((d) => ({ ...d, stores: [...d.stores, { id: uid("st"), name: name.trim(), retail: true, active: true }] })); setName(""); } }}>新增</button>
      </div>
      <table className="pl-table">
        <thead><tr><th>名稱</th><th>類型</th><th>狀態</th><th></th></tr></thead>
        <tbody>
          {data.stores.map((s) => (
            <tr key={s.id}>
              <td>{s.name}</td>
              <td>{s.retail ? "門市（列入營收）" : "後勤／共用"}</td>
              <td><Badge text={s.active ? "啟用中" : "停用"} tone={s.active ? "green" : "gray"} /></td>
              <td>
                <button className="pl-btn small" onClick={() => update((d) => ({ ...d, stores: d.stores.map((x) => x.id === s.id ? { ...x, retail: !x.retail } : x) }))}>切換類型</button>
                {" "}<button className="pl-btn small" onClick={() => update((d) => ({ ...d, stores: d.stores.map((x) => x.id === s.id ? { ...x, active: !x.active } : x) }))}>{s.active ? "停用" : "啟用"}</button>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function TargetMaster({ data, update }) {
  const [month, setMonth] = useState(monthOf(todayStr()));
  const retail = data.stores.filter((s) => s.retail && s.active);
  const tgt = data.targets[month] || {};
  const set = (sid, v) => update((d) => ({ ...d, targets: { ...d.targets, [month]: { ...(d.targets[month] || {}), [sid]: num(v) } } }));
  const total = retail.reduce((a, s) => a + num(tgt[s.id]), 0);
  return (
    <div className="pl-card" style={{ padding: 16, maxWidth: 520 }}>
      <div style={{ marginBottom: 12 }}><MonthPicker value={month} onChange={setMonth} /></div>
      {retail.map((s) => (
        <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
          <div style={{ width: 90 }}>{s.name}</div>
          <input className="pl-input" inputMode="decimal" value={tgt[s.id] || ""} onChange={(e) => set(s.id, e.target.value)} placeholder="本月營業額目標" />
        </div>
      ))}
      <div style={{ borderTop: `1px solid ${T.line}`, paddingTop: 10, display: "flex", justifyContent: "space-between", fontWeight: 600 }}>
        <span>目標合計</span><span>{fmt(total)}</span>
      </div>
    </div>
  );
}

function UserMaster({ data, profiles }) {
  const [editing, setEditing] = useState(null);
  const [saving, setSaving] = useState(false);
  const roles = ["門店人員", "店長", "會計", "系統管理者"];

  /* 使用者帳號本身已改由 Supabase Auth 提供，這裡只能指派角色／門店／啟用狀態，
     直接寫入 profiles 表（不透過帳務資料 update()，因為使用者已不在那包 JSON 裡）*/
  const save = async (u) => {
    if (!u.name.trim()) return alert("請填寫姓名");
    if (["門店人員", "店長"].includes(u.role) && !u.storeId) return alert("門店人員與店長需指定所屬門店");
    setSaving(true);
    const { error } = await sb.from("profiles").update({
      name: u.name.trim(), role: u.role, store_id: u.storeId || null, active: u.active !== false,
    }).eq("id", u.id);
    setSaving(false);
    if (error) return alert("儲存失敗：" + error.message);
    setEditing(null);
  };

  return (
    <div className="pl-card">
      <div style={{ padding: 14, borderBottom: `1px solid ${T.line}`, fontSize: 13, color: T.sub, lineHeight: 1.7 }}>

      <table className="pl-table">
        <thead><tr><th>姓名</th><th>角色</th><th>所屬門店</th><th>狀態</th><th></th></tr></thead>
        <tbody>
          {profiles.length === 0 && <tr><td colSpan={5}><Empty text="尚無使用者，請先到 Supabase 後台建立帳號。" /></td></tr>}

            <tr key={u.id}>
              <td>{u.name}</td>
              <td><Badge text={u.role} tone="brown" /></td>
              <td>{u.storeId ? data.stores.find((s) => s.id === u.storeId)?.name : "全公司"}</td>
              <td><Badge text={u.active === false ? "已停用" : "啟用中"} tone={u.active === false ? "gray" : "green"} /></td>
              <td><button className="pl-btn small" onClick={() => setEditing({ ...u })}>編輯</button></td>

        <Modal title="編輯使用者" onClose={() => setEditing(null)} width={480}>

            <Field label="姓名" required><input className="pl-input" value={editing.name} onChange={(e) => setEditing({ ...editing, name: e.target.value })} /></Field>
            <Field label="角色">

                {roles.map((r) => <option key={r}>{r}</option>)}
              </select>
            </Field>
            {["門店人員", "店長"].includes(editing.role) && (
              <Field label="所屬門店" required>
                <select className="pl-input" value={editing.storeId || ""} onChange={(e) => setEditing({ ...editing, storeId: e.target.value })}>
                  <option value="">選擇門店</option>
                  {data.stores.filter((s) => s.active).map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
                </select>
              </Field>
            )}

              <label style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 0" }}>

              </label>
            </Field>
          </div>
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 16 }}>
            <button className="pl-btn" onClick={() => setEditing(null)}>取消</button>

/* 匯入（舊 Excel） */
/* ────────────────────────────────────────────
   Excel 帳務匯入：自動解析・檢查・分類・匯入
──────────────────────────────────────────────*/
const IMP_TYPES = {
  sales:   { label: "每日營收", tone: "green" },
  expense: { label: "支出明細", tone: "yellow" },
  income:  { label: "收入明細", tone: "green" },
  order:   { label: "廠商叫貨", tone: "gray" },
  ar:      { label: "應收帳款", tone: "gray" },
};

/* 欄位別名：對應公司既有 Excel 的常見欄名 */
const COL_ALIAS = {
  date: ["日期", "營業日期", "支出日期", "收入日期", "叫貨日期", "建立日期", "交易日期"],
  store: ["門店", "門市", "店別", "分店", "門店／部門", "部門"],
  pos: ["每日營業額", "POS營業額", "POS 營業額", "營業額", "POS"],
  coop: ["店家配合", "配合"],
  linepay: ["LINE Pay", "LINEPAY", "LinePay", "Line Pay"],
  twpay: ["台灣Pay", "台灣 Pay", "TaiwanPay", "台灣pay"],
  card: ["信用卡", "刷卡"],
  online: ["線上商城", "官網", "線上"],
  transfer: ["轉帳", "銀行轉帳"],
  category: ["支出類別", "類別", "收入類別", "科目"],
  item: ["支出品項", "品項", "項目", "收入項目", "品名", "內容", "摘要", "品項說明"],
  vendor: ["廠商", "供應商", "廠商名稱"],
  amount: ["金額", "支出金額", "收入金額", "請款金額"],
  payMethod: ["付款方式", "收款方式", "支付方式"],
  payer: ["付款人", "經手人", "請款人"],
  invoiceNo: ["發票號碼", "發票"],
  billing: ["結帳方式", "結帳", "付款條件"],
  dueDate: ["預計付款日", "付款日", "到期日"],
  payStatus: ["付款狀態"],
  invoiceStatus: ["發票狀態"],
  customer: ["客戶", "客戶／公司", "客戶公司", "客戶名稱", "公司"],
  requestDate: ["請款日期"],
  received: ["已收金額", "已收款"],
  receivedDate: ["實際收款日", "收款日期"],
  status: ["狀態", "收款狀態", "審核狀態"],
  note: ["備註", "說明"],
};

const pickCol = (row, key) => {
  for (const a of COL_ALIAS[key]) if (a in row && row[a] !== "") return row[a];
  return "";
};
const hasCol = (headers, key) => COL_ALIAS[key].some((a) => headers.includes(a));

/* 依表頭自動判斷工作表類型 */
const detectType = (headers) => {
  if (hasCol(headers, "pos") || headers.some((h) => /淨營業額|付款方式合計/.test(h))) return "sales";
  if (hasCol(headers, "customer") && hasCol(headers, "amount")) return "ar";
  if (hasCol(headers, "billing") || headers.includes("品項說明")) return "order";
  if (headers.some((h) => /收入類別|收入項目|收款方式/.test(h))) return "income";
  if (headers.some((h) => /支出/.test(h)) || (hasCol(headers, "category") && hasCol(headers, "item"))) return "expense";
  if (hasCol(headers, "vendor") && hasCol(headers, "amount") && !hasCol(headers, "category")) return "order";
  return null;
};

function ImportModule({ data, update, user }) {
  const [sheets, setSheets] = useState(null); // [{name, type, rows:[{raw, rec, errs, warns}], headers}]
  const [autoVendor, setAutoVendor] = useState(true);
  const fileRef = useRef();
  if (!perm.isAcct(user)) return <Empty text="資料匯入僅開放會計與系統管理者。" />;

  const nameOf = (id) => data.stores.find((s) => s.id === id)?.name || "—";

  const normDate = (v) => {
    if (v instanceof Date) return dstr(v);
    if (typeof v === "number") { const d = XLSX.SSF.parse_date_code(v); return d ? `${d.y}/${pad2(d.m)}/${pad2(d.d)}` : String(v); }
    return String(v || "").trim().replace(/-/g, "/").replace(/\./g, "/");
  };

  const downloadTemplates = () => {
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([["營業日期", "門店", "每日營業額", "店家配合", "信用卡", "台灣Pay", "LINE Pay", "線上商城", "轉帳", "備註"]]), "每日營收");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([["支出日期", "門店", "支出類別", "支出品項", "廠商", "金額", "付款方式", "付款人", "發票號碼", "備註"]]), "支出明細");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([["收入日期", "門店", "收入類別", "收入項目", "金額", "收款方式", "經手人", "發票號碼", "備註"]]), "收入明細");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([["叫貨日期", "門店", "廠商", "品項說明", "金額", "結帳方式", "預計付款日", "付款狀態", "發票狀態", "備註"]]), "廠商叫貨");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([["建立日期", "客戶", "請款金額", "發票號碼", "請款日期", "到期日", "已收金額", "收款狀態", "備註"]]), "應收帳款");
    XLSX.writeFile(wb, "PHASE_帳務匯入範本.xlsx");
  };

  /* 門店名稱模糊比對：中山店／中山／烘豆場… */
  const matchStore = (name) => {
    const n = String(name || "").trim();
    if (!n) return "";
    const exact = data.stores.find((s) => s.name === n);
    if (exact) return exact.id;
    const fuzzy = data.stores.find((s) => n.includes(s.name) || s.name.includes(n));
    return fuzzy ? fuzzy.id : "";
  };

  const checkSheet = (name, ws) => {
    /* 找表頭列（前 6 列中關鍵字命中最多者） */
    const aoa = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
    const allAlias = Object.values(COL_ALIAS).flat();
    let hi = 0, hscore = -1;
    for (let i = 0; i < Math.min(6, aoa.length); i++) {
      const score = aoa[i].filter((c) => allAlias.includes(String(c).trim())).length;
      if (score > hscore) { hscore = score; hi = i; }
    }
    if (hscore < 2) return null; // 非資料表
    const headers = aoa[hi].map((h) => String(h).trim());
    const type = detectType(headers);
    if (!type) return null;
    const rows = XLSX.utils.sheet_to_json(ws, { defval: "", range: hi });

    const catByName = Object.fromEntries(data.categories.map((c) => [c.name, c.id]));
    const incCatByName = Object.fromEntries((data.incomeCategories || []).map((c) => [c.name, c.id]));
    const venByName = Object.fromEntries(data.vendors.map((v) => [v.name, v.id]));

    const seenSalesKey = new Set();
    const checked = rows.map((raw) => {
      const errs = [], warns = [];
      const date = normDate(pickCol(raw, "date"));
      if (!validDate(date)) errs.push("日期格式錯誤（需 YYYY/MM/DD）");
      const storeName = pickCol(raw, "store");
      const storeId = matchStore(storeName);
      const needStore = type !== "ar";
      if (needStore && !storeId) errs.push(`門店「${storeName || "空白"}」無法辨識`);
      let rec = null;

      if (type === "sales") {
        ["pos", "coop", "card", "twpay", "linepay", "online", "transfer"].forEach((k) => {
          const v = pickCol(raw, k); if (v !== "" && isNaN(num(v))) errs.push(`${COL_ALIAS[k][0]} 金額格式錯誤`);
        });
        const key = date + "|" + storeId;
        if (storeId && validDate(date)) {
          if (data.dailySales.some((r) => r.date === date && r.storeId === storeId)) errs.push("重複：該門店該日系統已有日結");
          if (seenSalesKey.has(key)) errs.push("重複：檔案內同門店同日出現多筆");
          seenSalesKey.add(key);
        }
        rec = {
          date, storeId, pos: num(pickCol(raw, "pos")), coop: num(pickCol(raw, "coop")),
          card: num(pickCol(raw, "card")), twpay: num(pickCol(raw, "twpay")), linepay: num(pickCol(raw, "linepay")),
          online: num(pickCol(raw, "online")), transfer: num(pickCol(raw, "transfer")),
          note: String(pickCol(raw, "note") || ""), diffReason: "", status: "草稿",
        };
        if (rec.storeId && calcSales(rec).cash < 0) warns.push(`非現金合計超過營業額 ${fmt(-calcSales(rec).cash)}，匯入後請補差異原因`);
      }

      if (type === "expense") {
        const amount = num(pickCol(raw, "amount"));
        if (!(amount > 0)) errs.push("金額需大於 0");
        const catName = String(pickCol(raw, "category")).trim();
        const categoryId = catByName[catName];
        if (!categoryId) errs.push(`支出類別「${catName || "空白"}」不存在`);
        const item = String(pickCol(raw, "item")).trim();
        if (!item) errs.push("品項不可空白");
        const vName = String(pickCol(raw, "vendor")).trim();
        let vendorId = vName ? venByName[vName] : "";
        if (vName && !vendorId) { if (autoVendor) warns.push(`將自動新增廠商「${vName}」`); else errs.push(`廠商「${vName}」不存在`); }
        if (storeId && validDate(date) && data.expenses.some((r) => r.date === date && r.storeId === storeId && r.item === item && num(r.amount) === amount)) errs.push("重複：同日同門店已有相同品項與金額");
        const pm = String(pickCol(raw, "payMethod")).trim();
        rec = {
          ...EXP_EMPTY, date, storeId, categoryId: categoryId || "", vendorId: vendorId || "", vendorName: vName,
          item, amount, payMethod: PAY_METHODS.includes(pm) ? pm : "其他",
          payer: String(pickCol(raw, "payer") || "").trim() || user.name,
          invoiceNo: String(pickCol(raw, "invoiceNo") || "").trim(), note: String(pickCol(raw, "note") || ""), status: "草稿",
        };
      }

      if (type === "income") {
        const amount = num(pickCol(raw, "amount"));
        if (!(amount > 0)) errs.push("金額需大於 0");
        const catName = String(pickCol(raw, "category")).trim();
        let categoryId = incCatByName[catName];
        if (!categoryId) { categoryId = incCatByName["其他收入"]; warns.push(`收入類別「${catName || "空白"}」歸入「其他收入」`); }
        const item = String(pickCol(raw, "item")).trim();
        if (!item) errs.push("項目不可空白");
        const pm = String(pickCol(raw, "payMethod")).trim();
        rec = {
          ...INC_EMPTY, date, storeId, categoryId, item, amount,
          payMethod: PAY_METHODS.includes(pm) ? pm : "現金",
          payer: String(pickCol(raw, "payer") || "").trim() || user.name,
          invoiceNo: String(pickCol(raw, "invoiceNo") || "").trim(), note: String(pickCol(raw, "note") || ""), status: "草稿",
        };
      }

      if (type === "order") {
        const amount = num(pickCol(raw, "amount"));
        if (!(amount > 0)) errs.push("金額需大於 0");
        const vName = String(pickCol(raw, "vendor")).trim();
        let vendorId = venByName[vName];
        if (!vName) errs.push("廠商不可空白");
        else if (!vendorId) { if (autoVendor) warns.push(`將自動新增廠商「${vName}」`); else errs.push(`廠商「${vName}」不存在`); }
        let billing = String(pickCol(raw, "billing")).trim();
        if (!ORDER_BILLING.includes(billing)) { billing = "現結"; if (pickCol(raw, "billing")) warns.push("結帳方式無法辨識，以現結匯入"); }
        const dueDate = normDate(pickCol(raw, "dueDate"));
        if (billing === "月結" && !validDate(dueDate)) errs.push("月結需填預計付款日");
        const ps = String(pickCol(raw, "payStatus")).trim();
        const payStatus = ["未付款", "部分付款", "已付款"].includes(ps) ? ps : (billing === "現結" ? "已付款" : "未付款");
        const ivs = String(pickCol(raw, "invoiceStatus")).trim();
        rec = {
          date, storeId, vendorId: vendorId || "", vendorName: vName,
          items: String(pickCol(raw, "item") || "").trim(), amount, billing,
          dueDate: billing === "月結" ? dueDate : "", paidDate: payStatus === "已付款" ? date : "",
          payStatus, invoiceStatus: ["未收到", "已收到", "不需發票"].includes(ivs) ? ivs : "未收到",
          invoiceNo: "", attachment: null, note: String(pickCol(raw, "note") || ""),
        };
      }

      if (type === "ar") {
        const amount = num(pickCol(raw, "amount"));
        if (!(amount > 0)) errs.push("請款金額需大於 0");
        const customer = String(pickCol(raw, "customer")).trim();
        if (!customer) errs.push("客戶不可空白");
        const received = num(pickCol(raw, "received"));
        const st = String(pickCol(raw, "status")).trim();
        const status = AR_STATUS.includes(st) ? st
          : received >= amount && amount > 0 ? "已收款"
          : received > 0 ? "部分收款" : "未請款";
        if (data.receivables.some((r) => r.date === date && r.customer === customer && num(r.amount) === amount)) errs.push("重複：已有相同日期／客戶／金額的應收");
        rec = {
          date, customer, amount, invoiceNo: String(pickCol(raw, "invoiceNo") || "").trim(),
          requester: String(pickCol(raw, "payer") || "").trim(), requestDate: normDate(pickCol(raw, "requestDate")) || "",
          dueDate: normDate(pickCol(raw, "dueDate")) || "", received, receivedDate: normDate(pickCol(raw, "receivedDate")) || "",
          status, note: String(pickCol(raw, "note") || ""),
        };
      }

      return { raw, rec, errs, warns, date };
    }).filter((r) => Object.values(r.raw).some((v) => String(v).trim() !== ""));

    return { name, type, headers, rows: checked };
  };

  const handleFile = (e) => {
    const f = e.target.files[0]; if (!f) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const wb = XLSX.read(ev.target.result, { type: "array", cellDates: true });
      const parsed = wb.SheetNames.map((n) => checkSheet(n, wb.Sheets[n])).filter(Boolean);
      if (parsed.length === 0) alert("無法在此檔案中辨識出帳務資料表。請確認表頭欄位，或下載範本比對。");
      setSheets(parsed);
    };
    reader.readAsArrayBuffer(f);
    e.target.value = "";
  };

  const retype = (idx, t) => setSheets(sheets.map((s, i) => i === idx ? { ...s, type: t } : s));

  const doImport = () => {
    const allValid = sheets.flatMap((s) => s.rows.filter((r) => r.errs.length === 0).map((r) => ({ ...r, type: s.type })));
    if (allValid.length === 0) return alert("沒有可匯入的正確資料。");
    const errTotal = sheets.reduce((a, s) => a + s.rows.filter((r) => r.errs.length > 0).length, 0);
    if (!confirm(`即將匯入 ${allValid.length} 筆資料${errTotal ? `（另有 ${errTotal} 筆錯誤列不會匯入）` : ""}。確定執行？`)) return;

    update((d) => {
      let vendors = [...d.vendors];
      const venByName = Object.fromEntries(vendors.map((v) => [v.name, v.id]));
      const ensureVendor = (name) => {
        if (!name) return "";
        if (venByName[name]) return venByName[name];
        const v = { id: uid("v"), code: "V" + String(vendors.length + 1).padStart(3, "0"), name, contact: "", phone: "", billing: "月結", monthlyDay: null, payMethod: "銀行轉帳", active: true, note: "Excel 匯入自動建立" };
        vendors.push(v); venByName[name] = v.id;
        return v.id;
      };
      const dailySales = [...d.dailySales], expenses = [...d.expenses], incomes = [...(d.incomes || [])], orders = [...d.orders], receivables = [...d.receivables];
      let arSeq = {};
      allValid.forEach(({ rec, type }) => {
        const base = { createdBy: user.id, createdAt: nowStamp(), reviewedBy: null, reviewedAt: null };
        if (type === "sales") dailySales.push({ ...rec, ...base, id: uid("ds") });
        if (type === "expense") { const { vendorName, ...r } = rec; expenses.push({ ...r, ...base, id: uid("ex"), vendorId: r.vendorId || ensureVendor(vendorName) }); }
        if (type === "income") incomes.push({ ...rec, ...base, id: uid("in") });
        if (type === "order") { const { vendorName, ...r } = rec; orders.push({ ...r, id: uid("po"), createdBy: user.id, vendorId: r.vendorId || ensureVendor(vendorName) }); }
        if (type === "ar") {
          const prefix = "AR-" + (rec.date || todayStr()).slice(2, 7).replace("/", "") + "-";
          arSeq[prefix] = (arSeq[prefix] || receivables.filter((r) => r.no && r.no.startsWith(prefix)).length) + 1;
          receivables.push({ ...rec, id: uid("ar"), no: prefix + pad2(arSeq[prefix]), createdBy: user.id, createdAt: nowStamp() });
        }
      });
      return { ...d, vendors, dailySales, expenses, incomes, orders, receivables };
    });
    const byType = {};
    allValid.forEach(({ type }) => { byType[type] = (byType[type] || 0) + 1; });
    alert("匯入完成：" + Object.entries(byType).map(([t, n]) => `${IMP_TYPES[t].label} ${n} 筆`).join("、") + "。日結／支出／收入皆為草稿，請於各模組確認後送審。");
    setSheets(null);
  };

  const totalValid = sheets ? sheets.reduce((a, s) => a + s.rows.filter((r) => r.errs.length === 0).length, 0) : 0;
  const totalErr = sheets ? sheets.reduce((a, s) => a + s.rows.filter((r) => r.errs.length > 0).length, 0) : 0;

  return (
    <div>
      <SectionTitle>Excel 帳務匯入</SectionTitle>

      <div className="pl-card" style={{ padding: 14, marginBottom: 12, display: "flex", flexWrap: "wrap", gap: 10, alignItems: "center" }}>
        <button className="pl-btn primary" onClick={() => fileRef.current.click()}>選擇 Excel 檔案</button>
        <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{ display: "none" }} onChange={handleFile} />
        <button className="pl-btn" onClick={downloadTemplates}>下載匯入範本（五類工作表）</button>
        <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 13, color: T.sub, marginLeft: "auto", cursor: "pointer" }}>
          <input type="checkbox" checked={autoVendor} onChange={(e) => setAutoVendor(e.target.checked)} />
          未建檔廠商自動新增
        </label>
      </div>

      <div style={{ fontSize: 12.5, color: T.sub, marginBottom: 14, lineHeight: 1.7 }}>
        上傳公司每月帳務 Excel，系統會逐一讀取工作表、依表頭自動判斷資料類型（每日營收／支出／收入／廠商叫貨／應收帳款），
        並逐列檢查日期、金額、門店、類別、廠商與重複資料。錯誤列以紅色標示且不會寫入；判斷錯誤時可手動改選類型。
        常見欄名（日期、門市、品項、摘要…）皆可自動對應，不需完全依範本命名。
      </div>

      {sheets && sheets.length > 0 && (
        <>
          <div className="pl-card" style={{ padding: "12px 16px", marginBottom: 12, display: "flex", flexWrap: "wrap", gap: 16, alignItems: "center" }}>
            <span style={{ fontSize: 13.5 }}>辨識出 <b>{sheets.length}</b> 個資料表・可匯入 <b style={{ color: T.green }}>{totalValid}</b> 筆
              {totalErr > 0 && <>・<b style={{ color: T.red }}>{totalErr} 筆錯誤（不會匯入）</b></>}</span>
            <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
              <button className="pl-btn" onClick={() => setSheets(null)}>清除重來</button>
              <button className="pl-btn primary" disabled={totalValid === 0} onClick={doImport}>匯入正確資料（{totalValid}）</button>
            </div>
          </div>

          {sheets.map((s, si) => {
            const ok = s.rows.filter((r) => r.errs.length === 0).length;
            return (
              <div key={si} className="pl-card" style={{ marginBottom: 14, overflow: "hidden" }}>
                <div style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: 12, padding: "12px 16px", borderBottom: `1px solid ${T.line}` }}>
                  <div className="pl-serif" style={{ fontWeight: 700 }}>{s.name}</div>
                  <span style={{ fontSize: 12.5, color: T.sub }}>判斷類型</span>
                  <select className="pl-input" style={{ width: 130 }} value={s.type} onChange={(e) => retype(si, e.target.value)}>
                    {Object.entries(IMP_TYPES).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                  </select>
                  <span style={{ fontSize: 13 }}>{s.rows.length} 列・<b style={{ color: T.green }}>{ok} 可匯入</b>
                    {s.rows.length - ok > 0 && <>・<b style={{ color: T.red }}>{s.rows.length - ok} 錯誤</b></>}</span>
                </div>
                <div className="pl-scroll-x" style={{ maxHeight: 300, overflowY: "auto" }}>
                  <table className="pl-table">
                    <thead><tr><th style={{ width: 36 }}>#</th><th>日期</th><th>摘要</th><th className="num">金額</th><th>檢查結果</th></tr></thead>
                    <tbody>
                      {s.rows.map((r, ri) => {
                        const summary = s.type === "sales" ? `${nameOf(r.rec?.storeId)}日結` :
                          s.type === "ar" ? r.rec?.customer :
                          `${r.rec?.storeId ? nameOf(r.rec.storeId) + "・" : ""}${r.rec?.item || r.rec?.items || ""}`;
                        const amt = s.type === "sales" ? r.rec?.pos : r.rec?.amount;
                        return (
                          <tr key={ri} style={r.errs.length ? { background: T.redBg } : {}}>
                            <td style={{ color: T.sub }}>{ri + 1}</td>
                            <td style={{ whiteSpace: "nowrap" }}>{r.date}</td>
                            <td>{summary}</td>
                            <td className="num">{fmtN(amt)}</td>
                            <td style={{ fontSize: 12.5, color: r.errs.length ? T.red : r.warns.length ? T.yellow : T.green }}>
                              {r.errs.length ? r.errs.join("；") : r.warns.length ? "⚠ " + r.warns.join("；") : "✓ 可匯入"}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            );
          })}
        </>
      )}
    </div>
  );
}

/* ────────────────────────────────────────────
   每日 Key 帳：同頁完成 日結營收＋當日收支＋叫貨
──────────────────────────────────────────────*/
function DailyKeyModule({ data, update, user, users, logAudit, logApproval, goto }) {
  const scope = perm.storeScope(user);
  const stores = data.stores.filter((s) => s.active && s.retail && (!scope || scope.includes(s.id)));
  const [storeTab, setStoreTab] = useState("");
  const curStore = stores.some((s) => s.id === storeTab) ? storeTab : (stores[0]?.id || "");
  const [date, setDate] = useState(todayStr());
  const nameOf = (id) => data.stores.find((s) => s.id === id)?.name || "—";
  const venOf = (id) => data.vendors.find((v) => v.id === id)?.name || "—";
  const catOf = (id) => data.categories.find((c) => c.id === id)?.name || "—";
  const incCatOf = (id) => (data.incomeCategories || []).find((c) => c.id === id)?.name || "—";

  /* ── 日結 ── */
  const existing = data.dailySales.find((r) => r.date === date && r.storeId === curStore);
  const [sf, setSf] = useState(null);
  useEffect(() => {
    setSf(existing ? { ...existing } : { ...SALES_EMPTY, id: null, date, storeId: curStore, status: "草稿" });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [curStore, date, existing?.id]);

  const salesLocked = sf && sf.status === "已審核" && !perm.isAdmin(user);
  const saveSales = (submit) => {
    const c = calcSales(sf);
    if (num(sf.pos) <= 0 && submit) return alert("請填寫每日營業額");
    if (c.cash < 0 && submit && !sf.diffReason.trim()) return alert("非現金合計超過營業額，請填寫差異原因。");
    const dup = data.dailySales.find((r) => r.date === date && r.storeId === curStore && r.id !== sf.id);
    if (dup) return alert("同門店同一天僅能有一筆日結。");
    const rec = { ...sf, date, storeId: curStore, status: submit ? "待審核" : sf.status === "退回修改" ? "草稿" : sf.status || "草稿" };
    if (!rec.id) {
      rec.id = uid("ds"); rec.createdBy = user.id; rec.createdAt = nowStamp(); rec.reviewedBy = null; rec.reviewedAt = null;
      update((d) => ({ ...d, dailySales: [...d.dailySales, rec] }));
    } else {
      const old = data.dailySales.find((r) => r.id === rec.id);
      if (old.status === "已審核") {
        if (!perm.isAdmin(user)) return alert("已審核日結僅系統管理者可修改。");
        logAudit("每日營收", rec.id, old, rec);
      }
      update((d) => ({ ...d, dailySales: d.dailySales.map((r) => (r.id === rec.id ? rec : r)) }));
    }
    setSf(rec);
  };
  const reviewSales = (pass) => {
    const status = pass ? "已審核" : "退回修改";
    logApproval("每日營收", sf.id, status, `${date} ${nameOf(curStore)}`);
    update((d) => ({ ...d, dailySales: d.dailySales.map((r) => r.id === sf.id ? { ...r, status, reviewedBy: user.id, reviewedAt: nowStamp() } : r) }));
    setSf({ ...sf, status });
  };

  /* ── 當日支出／收入／叫貨 清單 ── */
  const dayExp = data.expenses.filter((r) => r.date === date && r.storeId === curStore && perm.canSeeRecord(user, r)).sort((a, b) => (a.createdAt || "").localeCompare(b.createdAt || ""));
  const dayInc = (data.incomes || []).filter((r) => r.date === date && r.storeId === curStore && perm.canSeeRecord(user, r));
  const dayOrd = data.orders.filter((r) => r.date === date && r.storeId === curStore);
  const expSum = dayExp.reduce((a, r) => a + num(r.amount), 0);
  const incSum = dayInc.reduce((a, r) => a + num(r.amount), 0);
  const ordSum = dayOrd.reduce((a, r) => a + num(r.amount), 0);

  /* 快速新增列狀態 */
  const [qe, setQe] = useState({ categoryName: "", item: "", amount: "", payMethod: "現金" });
  const [qi, setQi] = useState({ categoryName: "", item: "", amount: "", payMethod: "現金" });
  const [qo, setQo] = useState({ vendorId: "", items: "", amount: "", billing: "現結", dueDate: "" });

  const resolveCat = (list, name, extra) => {
    const n = name.trim();
    const hit = list.find((c) => c.name === n);
    if (hit) return { id: hit.id, newCat: null };
    const c = { id: uid("cat"), name: n, active: true, ...extra };
    return { id: c.id, newCat: c };
  };
  const addExp = () => {
    if (!qe.categoryName.trim()) return alert("請選擇或輸入支出類別");
    if (qe.categoryName.trim() === "廠商原料叫貨") return alert("「廠商原料叫貨」為系統保留類別（用於廠商叫貨自動歸類），一般支出請選擇其他類別。");
    if (!qe.item.trim()) return alert("請填寫支出品項");
    if (num(qe.amount) <= 0) return alert("金額需大於 0");
    const { id: categoryId, newCat } = resolveCat(data.categories, qe.categoryName, { fixed: false });
    const { categoryName, ...qrest } = qe;
    const rec = {
      ...EXP_EMPTY, ...qrest, categoryId, id: uid("ex"), date, storeId: curStore, amount: num(qe.amount),
      payer: user.name, status: "草稿", createdBy: user.id, createdAt: nowStamp(), reviewedBy: null, reviewedAt: null,
    };
    update((d) => ({ ...d, categories: newCat ? [...d.categories, newCat] : d.categories, expenses: [...d.expenses, rec] }));
    setQe({ categoryName: "", item: "", amount: "", payMethod: qe.payMethod });
  };
  const addInc = () => {
    if (!qi.categoryName.trim()) return alert("請選擇或輸入收入類別");
    if (!qi.item.trim()) return alert("請填寫收入項目");
    if (num(qi.amount) <= 0) return alert("金額需大於 0");
    const { id: categoryId, newCat } = resolveCat(data.incomeCategories || [], qi.categoryName, {});
    const { categoryName, ...qrest } = qi;
    const rec = {
      ...INC_EMPTY, ...qrest, categoryId, id: uid("in"), date, storeId: curStore, amount: num(qi.amount),
      payer: user.name, status: "草稿", createdBy: user.id, createdAt: nowStamp(), reviewedBy: null, reviewedAt: null,
    };
    update((d) => ({
      ...d,
      incomeCategories: newCat ? [...(d.incomeCategories || []), newCat] : d.incomeCategories,
      incomes: [...(d.incomes || []), rec],
    }));
    setQi({ categoryName: "", item: "", amount: "", payMethod: qi.payMethod });
  };
  const addOrd = () => {
    if (!qo.vendorId) return alert("請選擇廠商");
    if (num(qo.amount) <= 0) return alert("金額需大於 0");
    if (qo.billing === "月結" && !qo.dueDate) return alert("月結叫貨請填寫預計付款日");
    const rec = {
      id: uid("po"), date, storeId: curStore, vendorId: qo.vendorId, items: qo.items,
      amount: num(qo.amount), billing: qo.billing, dueDate: qo.billing === "月結" ? qo.dueDate : "",
      paidDate: qo.billing === "現結" ? date : "", payStatus: qo.billing === "現結" ? "已付款" : "未付款",
      invoiceStatus: "未收到", invoiceNo: "", attachment: null, note: "", createdBy: user.id,
    };
    update((d) => ({ ...d, orders: [...d.orders, rec] }));
    setQo({ vendorId: "", items: "", amount: "", billing: qo.billing, dueDate: "" });
  };

  const submitDraft = (kind, rec) => {
    const key = kind === "exp" ? "expenses" : "incomes";
    update((d) => ({ ...d, [key]: d[key].map((r) => r.id === rec.id ? { ...r, status: "待審核" } : r) }));
  };
  const delRec = (kind, rec) => {
    const label = kind === "exp" ? "支出" : kind === "inc" ? "收入" : "叫貨";
    if (kind !== "ord" && rec.status === "已通過" && !perm.isAdmin(user)) return alert(`已通過的${label}無法刪除。`);
    if (!confirm(`確定刪除${label}「${rec.item || rec.items || ""}」？`)) return;
    const key = kind === "exp" ? "expenses" : kind === "inc" ? "incomes" : "orders";
    logAudit(kind === "exp" ? "每日支出" : kind === "inc" ? "門店收入" : "廠商叫貨", rec.id, rec, { ...rec, deleted: true });
    update((d) => ({ ...d, [key]: d[key].filter((r) => r.id !== rec.id) }));
  };

  const draftCount = dayExp.filter((r) => r.status === "草稿").length + dayInc.filter((r) => r.status === "草稿").length;
  const submitAllDrafts = () => {
    if (!confirm(`將當日 ${draftCount} 筆草稿（支出／收入）全部送出審核？`)) return;
    update((d) => ({
      ...d,
      expenses: d.expenses.map((r) => r.date === date && r.storeId === curStore && r.status === "草稿" ? { ...r, status: "待審核" } : r),
      incomes: (d.incomes || []).map((r) => r.date === date && r.storeId === curStore && r.status === "草稿" ? { ...r, status: "待審核" } : r),
    }));
  };

  if (!sf) return null;
  const c = calcSales(sf);
  const set = (k) => (e) => setSf({ ...sf, [k]: e.target.value });
  const nIn = (k) => <input className="pl-input" inputMode="decimal" value={sf[k]} onChange={set(k)} disabled={salesLocked} placeholder="0" />;
  const cardHead = (title, right) => (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
      <div className="pl-serif" style={{ fontWeight: 700, fontSize: 15.5 }}>{title}</div>
      <div style={{ display: "flex", gap: 8, alignItems: "center" }}>{right}</div>
    </div>
  );

  return (
    <div>
      <SectionTitle right={
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          {perm.isAcct(user) && <button className="pl-btn" onClick={() => goto("import")}>⬆ Excel 匯入</button>}
          <button className="pl-btn small" onClick={() => setDate(dayShift(date, -1))}>‹</button>
          <input className="pl-input" style={{ width: 120, textAlign: "center" }} value={date}
            onChange={(e) => setDate(e.target.value)} placeholder="YYYY/MM/DD" />
          <button className="pl-btn small" onClick={() => setDate(dayShift(date, 1))}>›</button>

const dayShift = (dateStr, n) => {
  const [y, m, d] = dateStr.split("/").map(Number);
  const dt = new Date(y, m - 1, d + n);
  return `${dt.getFullYear()}/${pad2(dt.getMonth() + 1)}/${pad2(dt.getDate())}`;
};

/* ── 登入畫面：Supabase Auth 真登入，帳號一律由系統管理者於後台建立，不開放自行註冊 ── */
function Login() {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const [resetSent, setResetSent] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    if (!email.trim() || !password) return;
    setErr(""); setResetSent(false); setLoading(true);
    const { error } = await sb.auth.signInWithPassword({ email: email.trim(), password });
    setLoading(false);
    if (error) setErr(error.message === "Invalid login credentials" ? "帳號或密碼錯誤，請確認後再試一次。" : error.message);
  };

  const forgot = async () => {
    if (!email.trim()) { setErr("請先在上方輸入 email，再點擊忘記密碼。"); return; }
    setErr(""); setLoading(true);
    const { error } = await sb.auth.resetPasswordForEmail(email.trim());
    setLoading(false);
    if (error) setErr(error.message);
    else setResetSent(true);
  };

  return (
    <div className="pl-root" style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", padding: 16 }}>
      <style>{css}</style>
      <div className="pl-card" style={{ width: "100%", maxWidth: 360, padding: 28 }}>
        <div className="pl-serif" style={{ fontSize: 22, fontWeight: 700, letterSpacing: ".12em", textAlign: "center" }}>PHASE</div>
        <div style={{ textAlign: "center", color: T.sub, fontSize: 12, letterSpacing: ".06em", marginBottom: 24 }}>門店帳務管理系統・登入</div>
        <form onSubmit={submit} style={{ display: "grid", gap: 14 }}>
          <Field label="Email" required>
            <input className="pl-input" type="email" autoComplete="username" value={email} onChange={(e) => setEmail(e.target.value)} required />
          </Field>
          <Field label="密碼" required>
            <input className="pl-input" type="password" autoComplete="current-password" value={password} onChange={(e) => setPassword(e.target.value)} required />
          </Field>
          {err && <div style={{ color: T.red, fontSize: 13 }}>{err}</div>}
          {resetSent && <div style={{ color: T.green, fontSize: 13 }}>重設密碼信件已寄出，請至信箱查收。</div>}
          <button className="pl-btn primary" type="submit" disabled={loading}>{loading ? "登入中…" : "登入"}</button>
        </form>
        <button type="button" onClick={forgot} style={{ display: "block", margin: "14px auto 0", background: "none", border: "none", color: T.sub, fontSize: 12.5, textDecoration: "underline", cursor: "pointer" }}>
          忘記密碼？
        </button>
      </div>
    </div>
  );
}

function App() {
  /* undefined = 確認登入狀態中；null = 確定未登入；物件 = 已登入 */
  const [session, setSession] = useState(undefined);
  const [profiles, setProfiles] = useState([]);
  const [data, setData] = useState(null);
  const [page, setPage] = useState("dashboard");
  const [month, setMonth] = useState(monthOf(todayStr()));
  const [storeFilter, setStoreFilter] = useState(null);
  const [saveState, setSaveState] = useState("idle"); // idle | saving | saved | error
  const saveTimer = useRef(null);
  const firstLoad = useRef(true);
  const applyingRemote = useRef(false); // 遠端 Realtime 同步進來的變動，避免又存回去造成迴圈

  /* 登入狀態：初始確認 + 監聽變化 */
  useEffect(() => {
    sb.auth.getSession().then(({ data: d }) => setSession(d.session));
    const { data: sub } = sb.auth.onAuthStateChange((_event, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);

  /* 使用者清單：登入後從 profiles 表抓取，並訂閱異動即時更新 */
  useEffect(() => {
    if (!session) return;
    let cancelled = false;
    const fetchProfiles = async () => {
      const { data: rows, error } = await sb.from("profiles").select("*");
      if (!error && rows && !cancelled) {
        setProfiles(rows.map((r) => ({ id: r.id, name: r.name, role: r.role, storeId: r.store_id, active: r.active })));
      }
    };
    fetchProfiles();
    const channel = sb.channel("profiles_sync")
      .on("postgres_changes", { event: "*", schema: "public", table: "profiles" }, fetchProfiles)
      .subscribe();
    return () => { cancelled = true; sb.removeChannel(channel); };
  }, [session]);

  /* 登入後載入帳務資料，無資料時建立示範資料並立即寫回資料庫 */
  useEffect(() => {
    if (!session) return;
    (async () => {
      const stored = await loadData();
      if (stored) {
        if (!stored.fixedItems) stored.fixedItems = FIXED_SEED;
        if (!stored.incomes) stored.incomes = [];
        if (!stored.incomeCategories) stored.incomeCategories = INCOME_CAT_SEED;
        /* 公司共用併入中山店；烘豆場為獨立單位（帳務歸屬中山店） */
        const gone = ["st5"];
        stored.stores = stored.stores.filter((s) => !gone.includes(s.id));
        if (!stored.stores.some((s) => s.id === "st4")) {
          stored.stores.push({ id: "st4", name: "烘豆場", retail: false, active: true, parentId: "st1" });
        } else {
          stored.stores = stored.stores.map((s) => s.id === "st4" ? { ...s, parentId: "st1", retail: false } : s);
        }
        ["expenses", "orders", "dailySales", "incomes"].forEach((k) => {
          stored[k] = (stored[k] || []).map((r) => gone.includes(r.storeId) ? { ...r, storeId: "st1" } : r);
        });
        stored.fixedItems = stored.fixedItems.filter((f) => !gone.includes(f.storeId));
        if (!stored.fixedItems.some((f) => f.storeId === "st4")) {
          stored.fixedItems = [...stored.fixedItems, ...FIXED_SEED.filter((f) => f.storeId === "st4")];
        }
        stored.orders = (stored.orders || []).map((o) => ORDER_BILLING.includes(o.billing) ? o : { ...o, billing: "現結" });
        /* 日結欄位改版：舊格式（含 cash 欄）轉為 每日營業額＋店家配合／信用卡／台灣Pay／LINE Pay */
        stored.dailySales = (stored.dailySales || []).map((r) => {
          if (!("cash" in r)) return r;
          const { cash, jko, delivery, otherPay, refund, otherIncome, ...rest } = r;
          return { ...rest, pos: num(r.pos) - num(refund), coop: num(jko) + num(delivery) + num(otherPay), twpay: 0 };
        });
        delete stored.users; delete stored.currentUserId; // 舊資料殘留欄位，使用者現改由 profiles 提供
        setData(stored);
      } else {
        /* 全新資料庫：建立示範資料並立即寫回，避免不同裝置各自生成對不上的示範資料 */
        const seed = buildSeedData();
        setData(seed);
        await saveData(seed);
      }
    })();
  }, [session]);

  /* 訂閱 ledger_state 的 Realtime 異動，做多裝置即時同步 */
  useEffect(() => {
    if (!session) return;
    const channel = sb.channel("ledger_state_sync")
      .on("postgres_changes", { event: "UPDATE", schema: "public", table: "ledger_state", filter: `id=eq.${LEDGER_ROW_ID}` }, (payload) => {
        applyingRemote.current = true;
        setData(payload.new.data);
      })
      .subscribe();
    return () => sb.removeChannel(channel);
  }, [session]);

  /* 資料變動時延遲寫入儲存（遠端同步進來的變動不需要再存回去） */
  useEffect(() => {
    if (!data) return;
    if (applyingRemote.current) { applyingRemote.current = false; return; }
    if (firstLoad.current) { firstLoad.current = false; return; }
    setSaveState("saving");
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      const ok = await saveData(data);
      setSaveState(ok ? "saved" : "error");
    }, 600);
    return () => clearTimeout(saveTimer.current);
  }, [data]);

  const update = useCallback((fn) => setData((d) => fn(d)), []);

  if (session === undefined) {
    return (
      <div className="pl-root" style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", color: T.sub }}>
        <style>{css}</style>
        載入中…
      </div>
    );
  }

  if (session === null) {
    return <Login />;
  }

  const user = profiles.find((p) => p.id === session.user.id);

  if (!user) {
    return (
      <div className="pl-root" style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", color: T.sub }}>
        <style>{css}</style>
        帳號設定中，請稍候…
      </div>
    );
  }

  if (!data) {
    return (
      <div className="pl-root" style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", color: T.sub }}>
        <style>{css}</style>
        載入中…
      </div>
    );
  }

  /* 紀錄：資料修改 */
  const logAudit = (table, recordId, before, after, silent) => {
    update((d) => ({
      ...d,
      auditLogs: [...d.auditLogs, {
        id: uid("al"), time: nowStamp(), userId: user.id, table, recordId,
        before: silent ? null : before, after: silent ? null : after,
        summary: silent ? "資料更新" : "資料修改（含前後對照）",
      }],
    }));
  };

  /* 紀錄：審核動作 */
  const logApproval = (table, recordId, result, summary) => {
    update((d) => ({
      ...d,
      approvalLogs: [...d.approvalLogs, {
        id: uid("ap"), time: nowStamp(), userId: user.id, table, recordId, result, summary,
      }],
    }));
  };

  const goto = (p) => { setPage(p); window.scrollTo(0, 0); };

  const logout = () => sb.auth.signOut();

  /* 依權限過濾導航項目 */
  const navItems = NAV.filter(([k]) => {
    if (k === "ar" || k === "import") return perm.isAcct(user);
    if (k === "master" || k === "settings") return perm.isAdmin(user);
    if (k === "logs") return perm.isAcct(user);
    if (k === "report") return perm.isAcct(user) || user.role === "店長";
    return true;
  });

  const modProps = { data, update, user, users: profiles, logAudit, logApproval };

  const body = (() => {
    switch (page) {
      case "dashboard": return <Dashboard data={data} month={month} setMonth={setMonth} storeFilter={storeFilter} setStoreFilter={setStoreFilter} users={profiles} goto={goto} />;
      case "daily": return <DailyKeyModule {...modProps} goto={goto} />;
      case "sales": return <SalesModule {...modProps} />;
      case "expenses": return <ExpenseModule {...modProps} />;
      case "orders": return <OrderModule {...modProps} />;
      case "ar": return perm.canAR(user) ? <ARModule {...modProps} /> : <Empty text="應收帳款僅開放會計與系統管理者。" />;
      case "report": return <ReportModule data={data} user={user} users={profiles} />;
      case "import": return <ImportModule data={data} update={update} user={user} />;
      case "master": return <MasterModule data={data} update={update} user={user} profiles={profiles} />;
      case "logs": return <LogsModule data={data} users={profiles} />;
      case "settings": return <SettingsModule data={data} update={update} user={user} setData={setData} users={profiles} />;
      default: return null;
    }
  })();

  const saveLabel = saveState === "saving" ? "儲存中…" : saveState === "error" ? "儲存失敗" : "已儲存";

  return (
    <div className="pl-root">
      <style>{css}</style>

      {/* 桌機側邊欄 */}
      <div style={{ display: "flex", minHeight: "100vh" }}>
        <aside className="pl-sidebar no-print" style={{
          width: 210, flexShrink: 0, borderRight: `1px solid ${T.line}`,
          background: "#F5F0E7", padding: "20px 12px", position: "sticky", top: 0,
          height: "100vh", overflowY: "auto", display: "block",
        }}>
          <div className="pl-serif" style={{ padding: "0 10px 18px", borderBottom: `1px solid ${T.line}`, marginBottom: 14 }}>
            <div style={{ fontSize: 19, fontWeight: 700, letterSpacing: ".12em" }}>PHASE</div>
            <div style={{ fontSize: 11.5, color: T.sub, letterSpacing: ".06em", marginTop: 3 }}>門店帳務管理系統</div>
          </div>
          <nav>
            {navItems.map(([k, label, icon]) => (
              <button key={k} className={"pl-nav-item" + (page === k ? " active" : "")} onClick={() => goto(k)}>
                <span style={{ width: 18, textAlign: "center", opacity: .8 }}>{icon}</span>{label}
              </button>
            ))}
          </nav>
          <div style={{ marginTop: 18, padding: "12px 10px", borderTop: `1px solid ${T.line}`, fontSize: 12.5 }}>
            <div style={{ color: T.sub, marginBottom: 6 }}>目前身分</div>
            <div style={{ fontWeight: 600 }}>{user.name}｜{user.role}{user.storeId ? "・" + (data.stores.find((s) => s.id === user.storeId)?.name || "") : ""}</div>
            <button className="pl-btn small" style={{ marginTop: 8, width: "100%" }} onClick={logout}>登出</button>
            <div style={{ marginTop: 10, color: saveState === "error" ? T.red : T.sub, fontSize: 11.5 }}>{saveLabel}</div>
          </div>
        </aside>

        {/* 主內容 */}
        <main style={{ flex: 1, minWidth: 0, padding: "22px 22px 90px" }}>
          {/* 手機頂欄 */}
          <div className="pl-mobile-top no-print" style={{ display: "none", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
            <div className="pl-serif" style={{ fontSize: 17, fontWeight: 700, letterSpacing: ".1em" }}>PHASE</div>
            <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12.5 }}>
              <span>{user.name}｜{user.role}</span>
              <button className="pl-btn small" onClick={logout}>登出</button>
            </div>
          </div>
          {body}
        </main>
      </div>

      {/* 手機底部導航 */}
      <nav className="pl-mobile-nav no-print" style={{
        display: "none", position: "fixed", bottom: 0, left: 0, right: 0,
        background: "#fff", borderTop: `1px solid ${T.line}`, zIndex: 40,
      }}>
        {[["dashboard", "總覽"], ["daily", "Key 帳"], ["expenses", "收支"], ["orders", "廠商"],
          ...(perm.isAcct(user) ? [["report", "月報"]] : [])].map(([k, label]) => (
          <button key={k} onClick={() => goto(k)} style={{
            flex: 1, padding: "10px 0 12px", border: "none", background: "none", cursor: "pointer",
            color: page === k ? T.brown : T.sub, fontWeight: page === k ? 700 : 400, fontSize: 12.5,
            borderTop: page === k ? `2px solid ${T.brown}` : "2px solid transparent",
          }}>{label}</button>
        ))}
      </nav>
    </div>
  );
}

/* ── 系統設定 ── */
function SettingsModule({ data, update, user, setData, users }) {
  if (!perm.isAdmin(user)) return <Empty text="系統設定僅開放系統管理者。" />;

  const clearDemo = () => {
    if (!confirm("將清除所有交易資料（日結、支出、叫貨、應收與紀錄），主檔保留。確定執行？")) return;
    update((d) => ({ ...d, dailySales: [], expenses: [], incomes: [], orders: [], receivables: [], auditLogs: [], approvalLogs: [] }));
  };
  const resetAll = () => {
    if (!confirm("將重設整個系統為初始示範狀態，所有資料將被覆蓋。確定執行？")) return;
    setData(buildSeedData());
  };

  return (
    <div>
      <SectionTitle>系統設定</SectionTitle>
      <div className="pl-card" style={{ padding: 18, maxWidth: 560, display: "grid", gap: 14 }}>
        <div>
          <div style={{ fontWeight: 700, marginBottom: 4 }}>匯出全部帳務 Excel</div>
          <div style={{ fontSize: 12.5, color: T.sub, marginBottom: 8 }}>四個工作表：每日營收、每日支出、廠商叫貨、應收帳款。</div>
          <button className="pl-btn primary" onClick={() => exportAllExcel(data, users)}>匯出 Excel</button>
        </div>
        <div style={{ borderTop: `1px solid ${T.line}`, paddingTop: 14 }}>
          <div style={{ fontWeight: 700, marginBottom: 4 }}>清除交易資料</div>
          <div style={{ fontSize: 12.5, color: T.sub, marginBottom: 8 }}>清空示範交易，保留門店、廠商、類別與使用者主檔，開始正式使用。</div>
          <button className="pl-btn danger" onClick={clearDemo}>清除交易資料</button>
        </div>
        <div style={{ borderTop: `1px solid ${T.line}`, paddingTop: 14 }}>
          <div style={{ fontWeight: 700, marginBottom: 4 }}>重設為示範狀態</div>
          <div style={{ fontSize: 12.5, color: T.sub, marginBottom: 8 }}>還原初始主檔與示範資料。</div>
          <button className="pl-btn danger" onClick={resetAll}>重設系統</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
