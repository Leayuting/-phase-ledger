/* 營收自動計算 */
const calcSales = (s) => {
  const net = num(s.pos);                                             // 每日營業額
  const paySum = num(s.coop) + num(s.card) + num(s.twpay) + num(s.linepay) + num(s.online) + num(s.transfer); // 非現金合計
  const cash = net - paySum;                                          // 現金（推算）
  const diff = cash < 0 ? cash : 0;                                   // 非現金超過營業額 → 異常
  return { net, total: net, paySum, cash, diff };
};

/* 附件上傳（圖片自動縮圖壓縮，避免超出儲存上限） */
function AttachmentInput({ value, onChange }) {
  const ref = useRef();
  const handle = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    if (f.type.startsWith("image/")) {
      const img = new Image();
      img.onload = () => {
        const max = 1100;
        const scale = Math.min(1, max / Math.max(img.width, img.height));
        const c = document.createElement("canvas");
        c.width = Math.round(img.width * scale); c.height = Math.round(img.height * scale);
        c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
        onChange({ name: f.name, type: "image", data: c.toDataURL("image/jpeg", 0.72) });
      };
      img.src = URL.createObjectURL(f);
    } else {
      onChange({ name: f.name, type: "file", data: null });
    }
    e.target.value = "";
  };
  return (
    <div>
      <input ref={ref} type="file" accept="image/*,.pdf" style={{ display: "none" }} onChange={handle} />
      {value ? (
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          {value.type === "image" && value.data
            ? <img src={value.data} alt={value.name} style={{ width: 54, height: 54, objectFit: "cover", borderRadius: 6, border: `1px solid ${T.line}` }} />
            : <Badge text="📎 已附檔" tone="brown" />}
          <span style={{ fontSize: 12.5, color: T.sub, overflow: "hidden", textOverflow: "ellipsis", maxWidth: 160 }}>{value.name}</span>
          <button className="pl-btn small danger" onClick={() => onChange(null)}>移除</button>
        </div>
      ) : (
        <button className="pl-btn small" onClick={() => ref.current.click()}>＋ 拍照／上傳單據</button>
      )}
    </div>
  );
}

function AttachmentView({ value }) {
  const [open, setOpen] = useState(false);
  if (!value) return <span style={{ color: T.sub }}>—</span>;
  return (
    <>
      <button className="pl-btn small" onClick={() => value.data && setOpen(true)}>📎 附件</button>
      {open && (
        <Modal title={value.name} onClose={() => setOpen(false)} width={860}>
          <img src={value.data} alt={value.name} style={{ maxWidth: "100%", borderRadius: 8 }} />
        </Modal>
      )}
    </>
  );
}

/* 帳務歸屬：烘豆場等附屬單位併入其母門店計算 */
const acctStoreId = (stores, sid) => {
  const s = stores.find((x) => x.id === sid);
  return (s && s.parentId) || sid;
};

const perm = {
  isAdmin: (u) => u.role === "系統管理者",
  isAcct: (u) => u.role === "會計" || u.role === "系統管理者",
  isMgr: (u) => u.role === "店長",
  // 可見門店範圍：null = 全部
  storeScope: (u) => {
    if (u.role !== "門店人員" && u.role !== "店長") return null;
    return u.storeId === "st1" ? ["st1", "st4"] : [u.storeId];
  },
  canSeeRecord: (u, rec) => {
    if (perm.isAcct(u)) return true;
    if (!rec.storeId) return false;
    const inScope = (perm.storeScope(u) || []).includes(rec.storeId);
    if (u.role === "店長") return inScope;
    if (u.role === "門店人員")
      return inScope && !["已審核", "已通過"].includes(rec.status);
    return false;
  },
  canApprove: (u, rec) => {
    if (perm.isAcct(u)) return true;
    if (u.role === "店長") return (perm.storeScope(u) || []).includes(rec.storeId);
    return false;
  },
  canEdit: (u, rec) => {
    const locked = ["已審核", "已通過"].includes(rec.status);
    if (locked) return perm.isAdmin(u); // 已審核僅管理者可修改（留紀錄）
    if (perm.isAcct(u)) return true;
    if (u.role === "店長") return rec.storeId === u.storeId;
    if (u.role === "門店人員") return rec.storeId === u.storeId;
    return false;
  },
  canMaster: (u) => u.role === "系統管理者",
  canExport: (u) => perm.isAcct(u),
  canAR: (u) => perm.isAcct(u),
};

function Dashboard({ data, month, setMonth, storeFilter, setStoreFilter, users, goto }) {
  const stores = data.stores.filter((s) => s.active);

  const acctOf = (sid) => acctStoreId(data.stores, sid);
  const inMonth = (r) => monthOf(r.date) === month && (!storeFilter || acctOf(r.storeId) === storeFilter);
  const catById = Object.fromEntries(data.categories.map((c) => [c.id, c]));

  const salesM = data.dailySales.filter(inMonth);
  const expM = data.expenses.filter((r) => inMonth(r) && r.status !== "已退回" && r.categoryId !== ORDER_CAT_ID);
  const ordM = data.orders.filter(inMonth);

  const revenue = salesM.reduce((a, s) => a + calcSales(s).net, 0);
  const cashSum = salesM.reduce((a, s) => a + calcSales(s).cash, 0);
  const incM = (data.incomes || []).filter((r) => inMonth(r) && r.status !== "已退回");
  const bizInc = incM.reduce((a, r) => a + num(r.amount), 0);
  const totalInc = revenue + bizInc;
  const ordSum = ordM.reduce((a, o) => a + num(o.amount), 0);
  const fixedExp = expM.filter((e) => catById[e.categoryId]?.fixed).reduce((a, e) => a + num(e.amount), 0);
  const generalExp = expM.filter((e) => !catById[e.categoryId]?.fixed).reduce((a, e) => a + num(e.amount), 0);
  const totalExp = ordSum + fixedExp + generalExp;
  const profit = totalInc - totalExp;

  const arUnpaid = data.receivables.filter((r) => r.status !== "呆帳").reduce((a, r) => a + Math.max(0, num(r.amount) - num(r.received)), 0);
  const monthlyUnpaid = data.orders.filter((o) => o.billing === "月結" && o.payStatus !== "已付款").reduce((a, o) => a + num(o.amount), 0);
  const tgt = data.targets[month] || {};
  const tgtSum = storeFilter ? num(tgt[storeFilter]) : retail.reduce((a, s) => a + num(tgt[s.id]), 0);
  const achieve = tgtSum > 0 ? (revenue / tgtSum) * 100 : null;

  /* 圖表資料 */
  const [y, mo] = month.split("/").map(Number);

              <StoreRow label="日結筆數" value={`${days} 筆${diffCnt ? `・差異 ${diffCnt} 筆` : ""}`} tone={diffCnt ? T.red : undefined} />

        ))}

      {(missingToday.length + diffRecs.length + pendingExp.length + overdueAR.length + overdueAP.length) > 0 && (
        <div className="pl-card" style={{ padding: 16, marginBottom: 16 }}>
          <div className="pl-serif" style={{ fontWeight: 600, marginBottom: 10 }}>需要處理的事項</div>
          <div style={{ display: "grid", gap: 8 }}>
            {missingToday.length > 0 && (
              <AlertRow tone="yellow" onClick={() => goto("sales")}
                text={`今日（${today}）尚未完成日結：${missingToday.map((s) => s.name).join("、")}`} />
            )}
            {diffRecs.map((s) => (
              <AlertRow key={s.id} tone="red" onClick={() => goto("sales")}
                text={`${s.date} ${nameOf(s.storeId)} 日結帳務差異 ${fmt(calcSales(s).diff)}${s.diffReason ? `（原因：${s.diffReason}）` : "，尚未填寫差異原因"}`} />
            ))}
            {pendingExp.length > 0 && (
              <AlertRow tone="yellow" onClick={() => goto("expenses")}
                text={`${pendingExp.length} 筆支出待審核（合計 ${fmt(pendingExp.reduce((a, e) => a + num(e.amount), 0))}）`} />
            )}
            {overdueAR.map((r) => (
              <AlertRow key={r.id} tone="red" onClick={() => goto("ar")}
                text={`應收逾期：${r.customer}，到期 ${r.dueDate}，未收 ${fmt(num(r.amount) - num(r.received))}`} />
            ))}
            {overdueAP.map((o) => (
              <AlertRow key={o.id} tone="red" onClick={() => goto("orders")}
                text={`月結逾期未付：${data.vendors.find((v) => v.id === o.vendorId)?.name || "—"}，應付日 ${o.dueDate}，${fmt(o.amount)}`} />
            ))}
          </div>
        </div>
      )}

      <div style={{ ...gridStyle, gridTemplateColumns: "repeat(auto-fit,minmax(320px,1fr))" }}>
        <ChartCard title="每日營業額">
          <ResponsiveContainer width="100%" height={220}>
            <LineChart data={dailyLine} margin={{ top: 6, right: 10, left: 0, bottom: 0 }}>
              <CartesianGrid stroke={T.line} strokeDasharray="3 3" />
              <XAxis dataKey="day" tick={{ fontSize: 11 }} />
              <YAxis tick={{ fontSize: 11 }} tickFormatter={(v) => (v / 1000) + "k"} width={40} />
              <Tooltip formatter={tooltipFmt} labelFormatter={(d) => `${month}/${pad2(d)}`} />
              <Line type="monotone" dataKey="營業額" stroke={T.brown} strokeWidth={2} dot={false} />
            </LineChart>
          </ResponsiveContainer>
        </ChartCard>
        <ChartCard title="各門店營業額比較">
          <ResponsiveContainer width="100%" height={220}>
            <BarChart data={storeBar} margin={{ top: 6, right: 10, left: 0, bottom: 0 }}>
              <CartesianGrid stroke={T.line} strokeDasharray="3 3" />
              <XAxis dataKey="name" tick={{ fontSize: 12 }} />
              <YAxis tick={{ fontSize: 11 }} tickFormatter={(v) => (v / 1000) + "k"} width={40} />
              <Tooltip formatter={tooltipFmt} />
              <Bar dataKey="營業額" fill={T.brown} radius={[4, 4, 0, 0]} maxBarSize={56} />
            </BarChart>
          </ResponsiveContainer>
        </ChartCard>
        <ChartCard title="支出類別占比">
          {catPie.length === 0 ? <Empty /> : (
            <ResponsiveContainer width="100%" height={220}>
              <PieChart>
                <Pie data={catPie} dataKey="value" nameKey="name" innerRadius={45} outerRadius={80} paddingAngle={2}>
                  {catPie.map((_, i) => <Cell key={i} fill={CHART_COLORS[i % CHART_COLORS.length]} />)}
                </Pie>
                <Tooltip formatter={tooltipFmt} />
                <Legend wrapperStyle={{ fontSize: 12 }} />
              </PieChart>
            </ResponsiveContainer>
          )}
        </ChartCard>
        <ChartCard title="各廠商叫貨金額排名">
          {vendorRank.length === 0 ? <Empty /> : (
            <ResponsiveContainer width="100%" height={220}>
              <BarChart data={vendorRank} layout="vertical" margin={{ top: 6, right: 20, left: 10, bottom: 0 }}>
                <CartesianGrid stroke={T.line} strokeDasharray="3 3" />
                <XAxis type="number" tick={{ fontSize: 11 }} tickFormatter={(v) => (v / 1000) + "k"} />
                <YAxis type="category" dataKey="name" tick={{ fontSize: 12 }} width={110} />
                <Tooltip formatter={tooltipFmt} />
                <Bar dataKey="金額" fill={T.yellow} radius={[0, 4, 4, 0]} maxBarSize={20} />
              </BarChart>
            </ResponsiveContainer>

        </ChartCard>
        <ChartCard title="每月收入與支出比較" wide>
          <ResponsiveContainer width="100%" height={230}>
            <BarChart data={sixMonths} margin={{ top: 6, right: 10, left: 0, bottom: 0 }}>
              <CartesianGrid stroke={T.line} strokeDasharray="3 3" />
              <XAxis dataKey="name" tick={{ fontSize: 12 }} />
              <YAxis tick={{ fontSize: 11 }} tickFormatter={(v) => (v / 1000) + "k"} width={44} />
              <Tooltip formatter={tooltipFmt} />
              <Legend wrapperStyle={{ fontSize: 12 }} />
              <Bar dataKey="收入" fill={T.green} radius={[4, 4, 0, 0]} maxBarSize={30} />
              <Bar dataKey="支出" fill={T.red} radius={[4, 4, 0, 0]} maxBarSize={30} />
            </BarChart>
          </ResponsiveContainer>
        </ChartCard>
        <ChartCard title="最近六個月損益趨勢" wide>
          <ResponsiveContainer width="100%" height={230}>
            <LineChart data={sixMonths} margin={{ top: 6, right: 10, left: 0, bottom: 0 }}>
              <CartesianGrid stroke={T.line} strokeDasharray="3 3" />
              <XAxis dataKey="name" tick={{ fontSize: 12 }} />
              <YAxis tick={{ fontSize: 11 }} tickFormatter={(v) => (v / 1000) + "k"} width={44} />
              <Tooltip formatter={tooltipFmt} />
              <Line type="monotone" dataKey="損益" stroke={T.brown} strokeWidth={2} dot={{ r: 3 }} />

      </div>
    </div>
  );
}

function StoreRow({ label, value, tone, strong }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
      <span style={{ color: T.sub, fontSize: 12.5 }}>{label}</span>
      <span style={{ color: tone || T.ink, fontWeight: strong ? 700 : 500, fontVariantNumeric: "tabular-nums" }}>{value}</span>
    </div>
  );
}

function AlertRow({ tone, text, onClick }) {
  const c = tone === "red" ? [T.redBg, T.red] : [T.yellowBg, T.yellow];
  return (
    <button onClick={onClick} style={{ background: c[0], color: c[1], border: "none", borderRadius: 8, padding: "9px 12px", textAlign: "left", cursor: "pointer", fontSize: 13.5, width: "100%" }}>
      {text} <span style={{ opacity: .6 }}>→</span>

function ChartCard({ title, children, wide }) {

    <div className="pl-card" style={{ padding: 16, gridColumn: wide ? "1 / -1" : undefined }}>

}

function StoreTabs({ stores, value, onChange }) {
  if (stores.length <= 1) return null;

    <div className="no-print" style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap" }}>
      {stores.map((s) => (
        <button key={s.id} className={"pl-btn small" + (value === s.id ? " primary" : "")}
          style={value === s.id ? {} : { background: "#fff" }}

function MonthPicker({ value, onChange }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 4 }}>

/* ────────────────────────────────────────────
   每日營收（日結）
──────────────────────────────────────────────*/
const SALES_EMPTY = {
  date: "", storeId: "", pos: "", coop: "", card: "", twpay: "", linepay: "", online: "", transfer: "",
  note: "", diffReason: "",
};

function SalesModule({ data, update, user, users, logAudit, logApproval }) {
  const [month, setMonth] = useState(monthOf(todayStr()));
  const [editing, setEditing] = useState(null);
  const scope = perm.storeScope(user);
  const stores = data.stores.filter((s) => s.active && s.retail && (!scope || scope.includes(s.id)));
  const [storeTab, setStoreTab] = useState("");
  const curStore = stores.some((s) => s.id === storeTab) ? storeTab : (stores[0]?.id || "");
  const nameOf = (id) => data.stores.find((s) => s.id === id)?.name || "—";
  const userName = (id) => users.find((u) => u.id === id)?.name || "—";

  const rows = data.dailySales
    .filter((r) => monthOf(r.date) === month && r.storeId === curStore && perm.canSeeRecord(user, r))
    .sort((a, b) => cmpDate(b.date, a.date));

  const openNew = () => setEditing({ ...SALES_EMPTY, id: null, date: todayStr(), storeId: curStore, status: "草稿" });

  const save = (form, submit) => {
    const c = calcSales(form);
    if (!form.date || !validDate(form.date)) return alert("請填寫正確日期（YYYY/MM/DD）");
    if (!form.storeId) return alert("請選擇門店");
    // 同門店同日期唯一（排除自身；不得與已審核重複）
    const dup = data.dailySales.find((r) => r.id !== form.id && r.date === form.date && r.storeId === form.storeId);
    if (dup) return alert(`${form.date} ${nameOf(form.storeId)} 已有日結資料（狀態：${dup.status}），同一門店同一天僅能有一筆。`);
    if (c.cash < 0 && submit && !form.diffReason.trim()) return alert(`非現金合計超過營業額 ${fmt(-c.cash)}，送審前請填寫差異原因。`);

    const rec = {
      ...form,
      pos: num(form.pos), coop: num(form.coop), card: num(form.card),
      twpay: num(form.twpay), linepay: num(form.linepay), online: num(form.online), transfer: num(form.transfer),
      status: submit ? "待審核" : form.status === "退回修改" ? "草稿" : form.status,
    };
    if (!rec.id) {
      rec.id = uid("ds"); rec.createdBy = user.id; rec.createdAt = nowStamp();
      rec.reviewedBy = null; rec.reviewedAt = null;
      update((d) => ({ ...d, dailySales: [...d.dailySales, rec] }));
    } else {
      const old = data.dailySales.find((r) => r.id === rec.id);
      if (["已審核"].includes(old.status)) {
        if (!perm.isAdmin(user)) return alert("已審核資料僅系統管理者可修改。");
        logAudit("每日營收", rec.id, old, rec);
      }
      update((d) => ({ ...d, dailySales: d.dailySales.map((r) => (r.id === rec.id ? rec : r)) }));
    }
    setEditing(null);
  };

  const review = (rec, pass) => {
    const status = pass ? "已審核" : "退回修改";
    logApproval("每日營收", rec.id, status, `${rec.date} ${nameOf(rec.storeId)}`);
    update((d) => ({
      ...d,
      dailySales: d.dailySales.map((r) => r.id === rec.id ? { ...r, status, reviewedBy: user.id, reviewedAt: nowStamp() } : r),
    }));
  };

  const remove = (rec) => {
    if (rec.status === "已審核" && !perm.isAdmin(user)) return alert("已審核資料無法刪除。");
    if (!confirm(`確定刪除 ${rec.date} ${nameOf(rec.storeId)} 的日結？`)) return;
    logAudit("每日營收", rec.id, rec, { ...rec, deleted: true });
    update((d) => ({ ...d, dailySales: d.dailySales.filter((r) => r.id !== rec.id) }));
  };

  return (
    <div>
      <SectionTitle right={
        <>
          <MonthPicker value={month} onChange={setMonth} />
          <button className="pl-btn primary" onClick={openNew}>＋ 新增日結</button>
        </>
      }>每日營收</SectionTitle>

      <StoreTabs stores={stores} value={curStore} onChange={setStoreTab} />

      <div className="pl-card pl-scroll-x">
        <table className="pl-table">
          <thead><tr>
            <th>營業日期</th><th>門店</th><th className="num">每日營業額</th>
            <th className="num">店家配合</th><th className="num">信用卡</th><th className="num">台灣Pay</th><th className="num">LINE Pay</th>
            <th className="num">線上商城</th><th className="num">轉帳</th>
            <th className="num">現金（推算）</th><th>日結狀態</th><th>建立／審核</th><th></th>
          </tr></thead>
          <tbody>
            {rows.length === 0 && <tr><td colSpan={13}><Empty text="本月尚無日結資料" action={<button className="pl-btn primary" onClick={openNew}>＋ 新增日結</button>} /></td></tr>}
            {rows.map((r) => {
              const c = calcSales(r);
              return (
                <tr key={r.id}>
                  <td style={{ whiteSpace: "nowrap" }}>{r.date}</td>
                  <td>{nameOf(r.storeId)}</td>
                  <td className="num" style={{ fontWeight: 600 }}>{fmtN(r.pos)}</td>
                  <td className="num">{r.coop ? fmtN(r.coop) : "—"}</td>
                  <td className="num">{r.card ? fmtN(r.card) : "—"}</td>
                  <td className="num">{r.twpay ? fmtN(r.twpay) : "—"}</td>
                  <td className="num">{r.linepay ? fmtN(r.linepay) : "—"}</td>
                  <td className="num">{r.online ? fmtN(r.online) : "—"}</td>
                  <td className="num">{r.transfer ? fmtN(r.transfer) : "—"}</td>
                  <td className="num">
                    {c.cash >= 0 ? fmtN(c.cash) : <Badge text={fmtN(c.cash)} tone="red" />}
                  </td>
                  <td><Badge text={r.status} /></td>
                  <td style={{ fontSize: 12, color: T.sub, whiteSpace: "nowrap" }}>
                    {userName(r.createdBy)}{r.reviewedBy ? ` ／ ${userName(r.reviewedBy)}` : ""}
                  </td>
                  <td style={{ whiteSpace: "nowrap" }}>
                    {perm.canEdit(user, r) && <button className="pl-btn small" onClick={() => setEditing({ ...r })}>檢視／編輯</button>}
                    {r.status === "待審核" && perm.canApprove(user, r) && (
                      <>
                        {" "}<button className="pl-btn small" style={{ color: T.green }} onClick={() => review(r, true)}>通過</button>
                        {" "}<button className="pl-btn small danger" onClick={() => review(r, false)}>退回</button>
                      </>
                    )}
                    {perm.canEdit(user, r) && <>{" "}<button className="pl-btn small danger" onClick={() => remove(r)}>刪除</button></>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {editing && (
        <SalesForm form={editing} setForm={setEditing} stores={stores} onSave={save}
          locked={editing.status === "已審核" && !perm.isAdmin(user)}
          adminEditLocked={editing.status === "已審核" && perm.isAdmin(user)}
          onClose={() => setEditing(null)} />
      )}
    </div>
  );
}

function SalesForm({ form, setForm, stores, onSave, onClose, locked, adminEditLocked }) {
  const c = calcSales(form);
  const set = (k) => (e) => setForm({ ...form, [k]: e.target.value });
  const numIn = (k) => (
    <input className="pl-input" inputMode="decimal" value={form[k]} onChange={set(k)} disabled={locked} placeholder="0" />
  );
  return (
    <Modal title={form.id ? "日結明細" : "新增日結"} onClose={onClose} width={780}>
      {adminEditLocked && (
        <div style={{ background: T.yellowBg, color: T.yellow, borderRadius: 8, padding: "8px 12px", marginBottom: 14, fontSize: 13 }}>
          此筆已審核。管理者修改後，原始與修改後資料將完整寫入修改紀錄。
        </div>
      )}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(150px,1fr))", gap: 12 }}>
        <Field label="營業日期" required><input className="pl-input" value={form.date} onChange={set("date")} placeholder="YYYY/MM/DD" disabled={locked} /></Field>
        <Field label="門店" required>
          <select className="pl-input" value={form.storeId} onChange={set("storeId")} disabled={locked}>
            <option value="">選擇門店</option>
            {stores.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
        </Field>
        <Field label="每日營業額" required>{numIn("pos")}</Field>
        <Field label="店家配合">{numIn("coop")}</Field>
        <Field label="信用卡">{numIn("card")}</Field>
        <Field label="台灣Pay">{numIn("twpay")}</Field>
        <Field label="LINE Pay">{numIn("linepay")}</Field>
        <Field label="線上商城">{numIn("online")}</Field>
        <Field label="轉帳">{numIn("transfer")}</Field>
        <Field label="備註" span={2}><input className="pl-input" value={form.note} onChange={set("note")} disabled={locked} /></Field>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(150px,1fr))", gap: 10, marginTop: 16, background: "#FCFAF6", border: `1px solid ${T.line}`, borderRadius: 8, padding: 12 }}>
        <MiniStat label="每日營業額" value={fmt(c.net)} />
        <MiniStat label="非現金合計" value={fmt(c.paySum)} />
        <MiniStat label="現金（推算）" value={fmt(c.cash)} tone={c.cash >= 0 ? "green" : "red"} />
      </div>

      {c.cash < 0 && (
        <div style={{ marginTop: 12, background: T.redBg, borderRadius: 8, padding: 12 }}>
          <div style={{ color: T.red, fontSize: 13, marginBottom: 6 }}>
            非現金合計超過每日營業額（超出 {fmt(-c.cash)}），請填寫差異原因。
          </div>
          <input className="pl-input" value={form.diffReason} onChange={set("diffReason")} placeholder="差異原因（例：現金短溢、找零誤差）" disabled={locked} />
        </div>
      )}

      {!locked && (
        <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 18 }}>
          <button className="pl-btn" onClick={onClose}>取消</button>
          {["草稿", "退回修改", undefined].includes(form.status) && <button className="pl-btn" onClick={() => onSave(form, false)}>儲存草稿</button>}
          <button className="pl-btn primary" onClick={() => onSave(form, form.status !== "已審核")}>
            {form.status === "已審核" ? "儲存修改" : "送出審核"}
          </button>
        </div>
      )}
    </Modal>
  );
}

function MiniStat({ label, value, tone }) {
  return (
    <div>
      <div style={{ fontSize: 12, color: T.sub }}>{label}</div>
      <div className="pl-serif" style={{ fontSize: 16.5, fontWeight: 600, color: tone === "red" ? T.red : tone === "green" ? T.green : T.ink }}>{value}</div>
    </div>
  );
}

/* ────────────────────────────────────────────
   每日支出
──────────────────────────────────────────────*/
const EXP_EMPTY = {
  date: "", storeId: "", categoryId: "", item: "", vendorId: "", amount: "",
  payMethod: "現金", payer: "", isAdvance: false, isReimbursed: false, reimburseDate: "",
  invoiceNo: "", attachment: null, note: "",
};

/* ────────────────────────────────────────────
   批次明細輸入：一次進入、連續多筆、一次儲存
──────────────────────────────────────────────*/
function BatchExpenseModal({ data, user, curStore, nameOf, onClose, onCommit }) {
  const blank = () => ({ key: uid("row"), categoryName: "", item: "", vendorId: "", amount: "", payMethod: "現金", payer: user.name, invoiceNo: "", note: "" });
  const [date, setDate] = useState(todayStr());
  const [rows, setRows] = useState([blank(), blank(), blank()]);
  const cats = data.categories.filter((c) => c.active && c.id !== ORDER_CAT_ID);
  const vens = data.vendors.filter((v) => v.active !== false);

  const setRow = (key, k, v) => setRows(rows.map((r) => r.key === key ? { ...r, [k]: v } : r));
  const addRow = () => setRows([...rows, blank()]);
  const delRow = (key) => setRows(rows.length > 1 ? rows.filter((r) => r.key !== key) : rows);
  const filled = rows.filter((r) => r.categoryName.trim() || r.item.trim() || num(r.amount) > 0);
  const total = filled.reduce((a, r) => a + num(r.amount), 0);

  const validate = () => {
    if (!validDate(date)) { alert("請填寫正確日期（YYYY/MM/DD）"); return null; }
    if (filled.length === 0) { alert("尚未輸入任何明細。"); return null; }
    for (let i = 0; i < filled.length; i++) {
      const r = filled[i];
      const n = rows.indexOf(r) + 1;
      if (!r.categoryName.trim()) { alert(`第 ${n} 列：請選擇或輸入支出類別`); return null; }
      if (r.categoryName.trim() === "廠商原料叫貨") { alert(`第 ${n} 列：「廠商原料叫貨」為系統保留類別（用於廠商叫貨自動歸類），一般支出請選擇其他類別。`); return null; }
      if (!r.item.trim()) { alert(`第 ${n} 列：請填寫支出品項`); return null; }
      if (num(r.amount) <= 0) { alert(`第 ${n} 列：金額需大於 0`); return null; }
    }
    return filled;
  };

  const save = (submit) => {
    const valid = validate(); if (!valid) return;
    /* 類別名稱解析：既有類別直接對應，新名稱自動建立 */
    const newCats = [];
    const resolveCat = (name) => {
      const n = name.trim();
      const hit = data.categories.find((c) => c.name === n) || newCats.find((c) => c.name === n);
      if (hit) return hit.id;
      const c = { id: uid("cat"), name: n, fixed: false, active: true };
      newCats.push(c);
      return c.id;
    };
    const recs = valid.map((r) => ({
      ...EXP_EMPTY, id: uid("ex"), date, storeId: curStore,
      categoryId: resolveCat(r.categoryName), item: r.item.trim(), vendorId: r.vendorId, amount: num(r.amount),
      payMethod: r.payMethod, payer: r.payer || user.name, invoiceNo: r.invoiceNo.trim(), note: r.note.trim(),
      status: submit ? "待審核" : "草稿", createdBy: user.id, createdAt: nowStamp(), reviewedBy: null, reviewedAt: null,
    }));
    if (newCats.length && !confirm(`將自動新增支出類別：${newCats.map((c) => c.name).join("、")}。確定？`)) return;

  return (

        <div style={{ marginLeft: "auto", fontSize: 13.5, color: T.sub, paddingBottom: 8 }}>
          已輸入 <b style={{ color: T.ink }}>{filled.length}</b> 筆・合計 <b style={{ color: T.ink }}>{fmt(total)}</b>

      <div className="pl-scroll-x" style={{ maxHeight: "48vh", overflowY: "auto" }}>
        <table className="pl-table">
          <thead><tr>
            <th style={{ width: 30 }}>#</th><th>類別 *</th><th>品項 *</th><th>廠商</th>
            <th className="num">金額 *</th><th>付款方式</th><th>付款人</th><th>發票號碼</th><th>備註</th><th></th>
          </tr></thead>
          <tbody>
            {rows.map((r, i) => (
              <tr key={r.key}>
                <td style={{ color: T.sub }}>{i + 1}</td>
                <td style={{ minWidth: 120 }}>
                  <input className="pl-input" list="dl-batch-expcat" value={r.categoryName}
                    onChange={(e) => setRow(r.key, "categoryName", e.target.value)} placeholder="選擇或輸入" />
                </td>
                <td style={{ minWidth: 140 }}><input className="pl-input" value={r.item} onChange={(e) => setRow(r.key, "item", e.target.value)} placeholder="支出品項" /></td>
                <td style={{ minWidth: 110 }}>
                  <select className="pl-input" value={r.vendorId} onChange={(e) => setRow(r.key, "vendorId", e.target.value)}>
                    <option value="">—</option>{vens.map((v) => <option key={v.id} value={v.id}>{v.name}</option>)}
                  </select>
                </td>
                <td style={{ minWidth: 90 }}><input className="pl-input" style={{ textAlign: "right" }} inputMode="decimal" value={r.amount} onChange={(e) => setRow(r.key, "amount", e.target.value)} placeholder="0" /></td>
                <td style={{ minWidth: 110 }}>
                  <select className="pl-input" value={r.payMethod} onChange={(e) => setRow(r.key, "payMethod", e.target.value)}>
                    {PAY_METHODS.map((p) => <option key={p}>{p}</option>)}
                  </select>
                </td>
                <td style={{ minWidth: 80 }}><input className="pl-input" value={r.payer} onChange={(e) => setRow(r.key, "payer", e.target.value)} /></td>
                <td style={{ minWidth: 100 }}><input className="pl-input" value={r.invoiceNo} onChange={(e) => setRow(r.key, "invoiceNo", e.target.value)} /></td>
                <td style={{ minWidth: 100 }}><input className="pl-input" value={r.note} onChange={(e) => setRow(r.key, "note", e.target.value)} /></td>
                <td><button className="pl-btn small danger" onClick={() => delRow(r.key)}>✕</button></td>
              </tr>
            ))}
          </tbody>

      </div>

      <datalist id="dl-batch-expcat">{cats.map((c) => <option key={c.id} value={c.name} />)}</datalist>

      <div style={{ display: "flex", alignItems: "center", marginTop: 12 }}>
        <button className="pl-btn" onClick={addRow}>＋ 新增一列</button>
        <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
          <button className="pl-btn" onClick={onClose}>取消</button>
          <button className="pl-btn" onClick={() => save(false)}>全部儲存為草稿</button>
          <button className="pl-btn primary" onClick={() => save(true)}>全部送出審核</button>
        </div>
      </div>
    </Modal>
  );
}

function BatchOrderModal({ data, user, curStore, nameOf, onClose, onCommit }) {
  const blank = () => ({ key: uid("row"), vendorId: "", items: "", amount: "", billing: "現結", dueDate: "", note: "" });
  const [date, setDate] = useState(todayStr());
  const [rows, setRows] = useState([blank(), blank(), blank()]);
  const vens = data.vendors.filter((v) => v.active !== false);

  const setRow = (key, k, v) => setRows(rows.map((r) => r.key === key ? { ...r, [k]: v } : r));
  const addRow = () => setRows([...rows, blank()]);
  const delRow = (key) => setRows(rows.length > 1 ? rows.filter((r) => r.key !== key) : rows);
  const filled = rows.filter((r) => r.vendorId || r.items.trim() || num(r.amount) > 0);
  const total = filled.reduce((a, r) => a + num(r.amount), 0);

  const save = () => {
    if (!validDate(date)) return alert("請填寫正確日期（YYYY/MM/DD）");
    if (filled.length === 0) return alert("尚未輸入任何明細。");
    for (const r of filled) {
      const n = rows.indexOf(r) + 1;
      if (!r.vendorId) return alert(`第 ${n} 列：請選擇廠商`);
      if (num(r.amount) <= 0) return alert(`第 ${n} 列：金額需大於 0`);
      if (r.billing === "月結" && !validDate(r.dueDate)) return alert(`第 ${n} 列：月結請填寫預計付款日（YYYY/MM/DD）`);
    }
    const recs = filled.map((r) => ({
      id: uid("po"), date, storeId: curStore, vendorId: r.vendorId, items: r.items.trim(),
      amount: num(r.amount), billing: r.billing,
      dueDate: r.billing === "月結" ? r.dueDate : "", paidDate: r.billing === "現結" ? date : "",
      payStatus: r.billing === "現結" ? "已付款" : "未付款", invoiceStatus: "未收到",
      invoiceNo: "", attachment: null, note: r.note.trim(), createdBy: user.id,
    }));
    onCommit(recs);
  };

  return (
    <Modal title="批次新增叫貨" onClose={onClose} width={900}>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 14, alignItems: "flex-end", marginBottom: 14 }}>
        <Field label="叫貨日期（本批共用）" required>
          <input className="pl-input" style={{ width: 130 }} value={date} onChange={(e) => setDate(e.target.value)} placeholder="YYYY/MM/DD" />
        </Field>
        <Field label="門店"><input className="pl-input" style={{ width: 110 }} value={nameOf(curStore)} disabled /></Field>
        <div style={{ marginLeft: "auto", fontSize: 13.5, color: T.sub, paddingBottom: 8 }}>
          已輸入 <b style={{ color: T.ink }}>{filled.length}</b> 筆・合計 <b style={{ color: T.ink }}>{fmt(total)}</b>
        </div>
      </div>

      <div className="pl-scroll-x" style={{ maxHeight: "48vh", overflowY: "auto" }}>
        <table className="pl-table">
          <thead><tr>
            <th style={{ width: 30 }}>#</th><th>廠商 *</th><th>品項說明</th>
            <th className="num">金額 *</th><th>結帳</th><th>預計付款日</th><th>備註</th><th></th>
          </tr></thead>
          <tbody>
            {rows.map((r, i) => (
              <tr key={r.key}>
                <td style={{ color: T.sub }}>{i + 1}</td>
                <td style={{ minWidth: 120 }}>
                  <select className="pl-input" value={r.vendorId} onChange={(e) => setRow(r.key, "vendorId", e.target.value)}>
                    <option value="">選擇</option>{vens.map((v) => <option key={v.id} value={v.id}>{v.name}</option>)}
                  </select>
                </td>
                <td style={{ minWidth: 150 }}><input className="pl-input" value={r.items} onChange={(e) => setRow(r.key, "items", e.target.value)} placeholder="品項說明" /></td>
                <td style={{ minWidth: 90 }}><input className="pl-input" style={{ textAlign: "right" }} inputMode="decimal" value={r.amount} onChange={(e) => setRow(r.key, "amount", e.target.value)} placeholder="0" /></td>
                <td style={{ minWidth: 85 }}>
                  <select className="pl-input" value={r.billing} onChange={(e) => setRow(r.key, "billing", e.target.value)}>
                    {ORDER_BILLING.map((b) => <option key={b}>{b}</option>)}
                  </select>
                </td>
                <td style={{ minWidth: 115 }}>
                  {r.billing === "月結"
                    ? <input className="pl-input" value={r.dueDate} onChange={(e) => setRow(r.key, "dueDate", e.target.value)} placeholder="YYYY/MM/DD" />
                    : <span style={{ color: T.sub, fontSize: 12.5 }}>現結・當日付清</span>}
                </td>
                <td style={{ minWidth: 100 }}><input className="pl-input" value={r.note} onChange={(e) => setRow(r.key, "note", e.target.value)} /></td>
                <td><button className="pl-btn small danger" onClick={() => delRow(r.key)}>✕</button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div style={{ display: "flex", alignItems: "center", marginTop: 12 }}>
        <button className="pl-btn" onClick={addRow}>＋ 新增一列</button>
        <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
          <button className="pl-btn" onClick={onClose}>取消</button>
          <button className="pl-btn primary" onClick={save}>儲存全部明細</button>
        </div>
      </div>
    </Modal>
  );
}

function ExpenseModule({ data, update, user, users, logAudit, logApproval }) {
  const [editing, setEditing] = useState(null);
  const [batchOpen, setBatchOpen] = useState(false);
  const [kind, setKind] = useState("expense");
  const [flt, setFlt] = useState({ month: monthOf(todayStr()), storeId: "", categoryId: "", vendorId: "", payer: "", status: "", min: "", max: "" });
  const scope = perm.storeScope(user);
  const stores = data.stores.filter((s) => s.active && (!scope || scope.includes(s.id)));
  const [storeTab, setStoreTab] = useState("");
  const curStore = stores.some((s) => s.id === storeTab) ? storeTab : (stores[0]?.id || "");
  const nameOf = (id) => data.stores.find((s) => s.id === id)?.name || "—";
  const catOf = (id) => data.categories.find((c) => c.id === id)?.name || "—";
  const venOf = (id) => data.vendors.find((v) => v.id === id)?.name || "";
  const userName = (id) => users.find((u) => u.id === id)?.name || "—";

  const rows = data.expenses.filter((r) => {
    if (monthOf(r.date) !== flt.month) return false;
    if (!perm.canSeeRecord(user, r)) return false;
    if (r.storeId !== curStore) return false;
    if (flt.categoryId && r.categoryId !== flt.categoryId) return false;
    if (flt.vendorId && r.vendorId !== flt.vendorId) return false;
    if (flt.payer && !(r.payer || "").includes(flt.payer)) return false;
    if (flt.status && r.status !== flt.status) return false;
    if (flt.min !== "" && num(r.amount) < num(flt.min)) return false;
    if (flt.max !== "" && num(r.amount) > num(flt.max)) return false;
    return true;
  }).sort((a, b) => cmpDate(b.date, a.date));

  const total = rows.reduce((a, r) => a + num(r.amount), 0);

  const save = (form, submit) => {
    if (!form.date || !validDate(form.date)) return alert("請填寫正確支出日期（YYYY/MM/DD）");
    if (!form.storeId) return alert("請選擇門店或部門");
    if (!form.categoryId) return alert("請選擇支出類別");
    if (form.categoryId === ORDER_CAT_ID) return alert("「廠商原料叫貨」為系統保留類別（用於廠商叫貨自動歸類），一般支出請選擇其他類別。");
    if (!form.item.trim()) return alert("請填寫支出品項");
    if (num(form.amount) <= 0) return alert("金額需大於 0");
    const rec = { ...form, amount: num(form.amount), status: submit ? "待審核" : form.status || "草稿" };
    if (rec.status === "已退回" && submit) rec.status = "待審核";
    if (!rec.id) {
      rec.id = uid("ex");
      rec.createdBy = user.id; rec.createdAt = nowStamp(); rec.reviewedBy = null; rec.reviewedAt = null;
      update((d) => ({ ...d, expenses: [...d.expenses, rec] }));
    } else {
      const old = data.expenses.find((r) => r.id === rec.id);
      if (old.status === "已通過") {
        if (!perm.isAdmin(user)) return alert("已通過的支出僅系統管理者可修改。");
        logAudit("每日支出", rec.id, old, rec);
      }
      update((d) => ({ ...d, expenses: d.expenses.map((r) => (r.id === rec.id ? rec : r)) }));
    }
    setEditing(null);
  };

  const review = (rec, pass) => {
    const status = pass ? "已通過" : "已退回";
    logApproval("每日支出", rec.id, status, `${rec.date}｜${rec.item}`);
    update((d) => ({ ...d, expenses: d.expenses.map((r) => r.id === rec.id ? { ...r, status, reviewedBy: user.id, reviewedAt: nowStamp() } : r) }));
  };

  const remove = (rec) => {
    if (rec.status === "已通過" && !perm.isAdmin(user)) return alert("已通過的支出無法刪除。");
    if (!confirm(`確定刪除支出「${rec.item}」（${rec.date}）？`)) return;
    logAudit("每日支出", rec.id, rec, { ...rec, deleted: true });
    update((d) => ({ ...d, expenses: d.expenses.filter((r) => r.id !== rec.id) }));
  };

  const fset = (k) => (e) => setFlt({ ...flt, [k]: e.target.value });

  /* 本月固定支出帶入 */
  const fixedForStore = (data.fixedItems || []).filter((f) => f.active && f.storeId === curStore);
  const fixedDone = fixedForStore.filter((f) =>
    data.expenses.some((e) => e.fixedItemId === f.id && monthOf(e.date) === flt.month)
  );
  const fixedTodo = fixedForStore.filter((f) => !fixedDone.includes(f));

  const genFixed = () => {
    if (fixedTodo.length === 0) return;
    if (!confirm(`將帶入 ${nameOf(curStore)} ${monthLabel(flt.month)}共 ${fixedTodo.length} 筆固定支出（草稿），金額可再逐筆修改。確定？`)) return;
    const date = flt.month + "/01";
    const recs = fixedTodo.map((f) => ({
      ...EXP_EMPTY, id: uid("ex"),
      date, storeId: curStore, categoryId: f.categoryId, item: f.item,
      amount: num(f.amount), payMethod: f.payMethod || "銀行轉帳",
      payer: user.name, status: "草稿", fixedItemId: f.id,
      note: "固定支出帶入", createdBy: user.id, createdAt: nowStamp(),
      reviewedBy: null, reviewedAt: null,
    }));
    update((d) => ({ ...d, expenses: [...d.expenses, ...recs] }));
  };

  return (
    <div>
      <SectionTitle right={
        kind === "expense" ? (
          <>
            {fixedForStore.length > 0 && (
              <button className="pl-btn" disabled={fixedTodo.length === 0} onClick={genFixed}
                title={fixedTodo.length === 0 ? "本月固定支出已全部帶入" : ""}>
                {fixedTodo.length === 0 ? "✓ 本月固定支出已帶入" : `帶入本月固定支出（${fixedTodo.length}）`}
              </button>
            )}
            <button className="pl-btn primary" onClick={() => setBatchOpen(true)}>＋ 新增支出</button>
          </>
        ) : null
      }>
        每日收支
      </SectionTitle>

      <StoreTabs stores={stores} value={curStore} onChange={setStoreTab} />

      {/* 支出／收入 分頁（明確區分） */}
      <div className="no-print" style={{ display: "inline-flex", border: `1px solid ${T.line}`, borderRadius: 10, overflow: "hidden", marginBottom: 14 }}>
        {[["expense", "支出"], ["income", "收入"]].map(([k, label]) => (
          <button key={k} onClick={() => setKind(k)} style={{
            padding: "7px 22px", border: "none", cursor: "pointer", fontSize: 13.5,
            background: kind === k ? (k === "income" ? T.green : T.brown) : "#fff",
            color: kind === k ? "#fff" : T.sub, fontWeight: kind === k ? 700 : 400,
          }}>{label}</button>
        ))}
      </div>

      {kind === "income" && <IncomeSection data={data} update={update} user={user} curStore={curStore} nameOf={nameOf} logAudit={logAudit} logApproval={logApproval} />}

      {kind === "expense" && <>
      <div className="pl-card no-print" style={{ padding: 12, marginBottom: 12, display: "flex", flexWrap: "wrap", gap: 8, alignItems: "center" }}>
        <MonthPicker value={flt.month} onChange={(m) => setFlt({ ...flt, month: m })} />
        <select className="pl-input" style={{ width: 130 }} value={flt.categoryId} onChange={fset("categoryId")}>
          <option value="">全部類別</option>{data.categories.filter(c=>c.active).map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <select className="pl-input" style={{ width: 130 }} value={flt.vendorId} onChange={fset("vendorId")}>
          <option value="">全部廠商</option>{data.vendors.map((v) => <option key={v.id} value={v.id}>{v.name}</option>)}
        </select>
        <input className="pl-input" style={{ width: 100 }} placeholder="付款人" value={flt.payer} onChange={fset("payer")} />
        <select className="pl-input" style={{ width: 110 }} value={flt.status} onChange={fset("status")}>
          <option value="">全部狀態</option>{EXP_STATUS.map((s) => <option key={s}>{s}</option>)}
        </select>
        <input className="pl-input" style={{ width: 90 }} placeholder="金額下限" inputMode="decimal" value={flt.min} onChange={fset("min")} />
        <span style={{ color: T.sub }}>—</span>
        <input className="pl-input" style={{ width: 90 }} placeholder="金額上限" inputMode="decimal" value={flt.max} onChange={fset("max")} />
        <div style={{ marginLeft: "auto", color: T.sub, fontSize: 13 }}>共 {rows.length} 筆・合計 <b style={{ color: T.ink }}>{fmt(total)}</b></div>
      </div>

      <div className="pl-card pl-scroll-x">
        <table className="pl-table">
          <thead><tr>
            <th>日期</th><th>門店／部門</th><th>類別</th><th>品項</th><th>廠商</th>
            <th className="num">金額</th><th>付款方式</th><th>付款人</th><th>代墊</th><th>發票</th><th>附件</th><th>狀態</th><th></th>
          </tr></thead>
          <tbody>
            {rows.length === 0 && <tr><td colSpan={13}><Empty text="查無符合條件的支出" /></td></tr>}
            {rows.map((r) => (
              <tr key={r.id}>
                <td style={{ whiteSpace: "nowrap" }}>{r.date}</td>
                <td>{nameOf(r.storeId)}</td>
                <td>{catOf(r.categoryId)}</td>
                <td>{r.item}</td>
                <td>{venOf(r.vendorId) || "—"}</td>
                <td className="num" style={{ fontWeight: 600 }}>{fmtN(r.amount)}</td>
                <td>{r.payMethod}</td>
                <td>{r.payer}</td>
                <td>{r.isAdvance ? <Badge text={r.isReimbursed ? "已核銷" : "未核銷"} tone={r.isReimbursed ? "green" : "yellow"} /> : "—"}</td>
                <td style={{ fontSize: 12.5 }}>{r.invoiceNo || "—"}</td>
                <td><AttachmentView value={r.attachment} /></td>
                <td><Badge text={r.status} /></td>
                <td style={{ whiteSpace: "nowrap" }}>
                  {perm.canEdit(user, r) &&
                    <button className="pl-btn small" onClick={() => setEditing({ ...r })}>編輯</button>}
                  {r.status === "待審核" && perm.canApprove(user, r) && (
                    <>
                      {" "}<button className="pl-btn small" style={{ color: T.green }} onClick={() => review(r, true)}>通過</button>
                      {" "}<button className="pl-btn small danger" onClick={() => review(r, false)}>退回</button>
                    </>
                  )}
                  {" "}<button className="pl-btn small danger" onClick={() => remove(r)}>刪除</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      </>}

      {batchOpen && (
        <BatchExpenseModal data={data} user={user} curStore={curStore} nameOf={nameOf}
          onClose={() => setBatchOpen(false)}
          onCommit={(recs, newCats) => { update((d) => ({ ...d, categories: [...d.categories, ...(newCats || [])], expenses: [...d.expenses, ...recs] })); setBatchOpen(false); }} />
      )}
      {editing && <ExpenseForm form={editing} setForm={setEditing} data={data} stores={stores} onSave={save} onClose={() => setEditing(null)} user={user} />}
    </div>
  );
}

const INC_EMPTY = {
  date: "", storeId: "", categoryId: "", item: "", amount: "",
  payMethod: "現金", payer: "", invoiceNo: "", attachment: null, note: "",
};

function IncomeSection({ data, update, user, curStore, nameOf, logAudit, logApproval }) {
  const [editing, setEditing] = useState(null);
  const [month, setMonth] = useState(monthOf(todayStr()));
  const cats = data.incomeCategories.filter((c) => c.active);
  const catOf = (id) => data.incomeCategories.find((c) => c.id === id)?.name || "—";

  const rows = (data.incomes || []).filter((r) =>
    monthOf(r.date) === month && r.storeId === curStore &&
    perm.canSeeRecord(user, r)
  ).sort((a, b) => cmpDate(b.date, a.date));
  const total = rows.reduce((a, r) => a + num(r.amount), 0);

  const save = (form, submit) => {
    if (!form.date || !validDate(form.date)) return alert("請填寫正確收入日期（YYYY/MM/DD）");
    if (!form.categoryId) return alert("請選擇收入類別");
    if (!form.item.trim()) return alert("請填寫收入項目");
    if (num(form.amount) <= 0) return alert("金額需大於 0");
    const rec = { ...form, amount: num(form.amount), status: submit ? "待審核" : form.status || "草稿" };
    if (rec.status === "已退回" && submit) rec.status = "待審核";
    if (!rec.id) {
      rec.id = uid("in"); rec.storeId = curStore;
      rec.createdBy = user.id; rec.createdAt = nowStamp(); rec.reviewedBy = null; rec.reviewedAt = null;
      update((d) => ({ ...d, incomes: [...(d.incomes || []), rec] }));
    } else {
      const old = data.incomes.find((r) => r.id === rec.id);
      if (old.status === "已通過") {
        if (!perm.isAdmin(user)) return alert("已通過的收入僅系統管理者可修改。");
        logAudit("門店收入", rec.id, old, rec);
      }
      update((d) => ({ ...d, incomes: d.incomes.map((r) => (r.id === rec.id ? rec : r)) }));
    }
    setEditing(null);
  };

  const review = (rec, pass) => {
    const status = pass ? "已通過" : "已退回";
    logApproval("門店收入", rec.id, status, `${rec.date}｜${rec.item}`);
    update((d) => ({ ...d, incomes: d.incomes.map((r) => r.id === rec.id ? { ...r, status, reviewedBy: user.id, reviewedAt: nowStamp() } : r) }));
  };

  const remove = (rec) => {
    if (rec.status === "已通過" && !perm.isAdmin(user)) return alert("已通過的收入無法刪除。");
    if (!confirm(`確定刪除收入「${rec.item}」（${rec.date}）？`)) return;
    logAudit("門店收入", rec.id, rec, { ...rec, deleted: true });
    update((d) => ({ ...d, incomes: d.incomes.filter((r) => r.id !== rec.id) }));
  };

  return (
    <div>
      <div className="pl-card no-print" style={{ padding: 12, marginBottom: 12, display: "flex", flexWrap: "wrap", gap: 8, alignItems: "center" }}>
        <MonthPicker value={month} onChange={setMonth} />
        <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 12 }}>
          <span style={{ color: T.sub, fontSize: 13 }}>共 {rows.length} 筆・合計 <b style={{ color: T.green }}>{fmt(total)}</b></span>
          <button className="pl-btn primary" style={{ background: T.green, borderColor: T.green }}
            onClick={() => setEditing({ ...INC_EMPTY, id: null, date: todayStr(), storeId: curStore, payer: user.name, status: "草稿" })}>
            ＋ 新增收入
          </button>
        </div>
      </div>

      <div className="pl-card pl-scroll-x">
        <table className="pl-table">
          <thead><tr>
            <th>日期</th><th>類別</th><th>項目</th>
            <th className="num">金額</th><th>收款方式</th><th>經手人</th><th>發票</th><th>附件</th><th>狀態</th><th></th>
          </tr></thead>
          <tbody>
            {rows.length === 0 && <tr><td colSpan={10}><Empty text="本月尚無收入紀錄" /></td></tr>}
            {rows.map((r) => (
              <tr key={r.id}>
                <td style={{ whiteSpace: "nowrap" }}>{r.date}</td>
                <td>{catOf(r.categoryId)}</td>
                <td>{r.item}</td>
                <td className="num" style={{ fontWeight: 600, color: T.green }}>{fmtN(r.amount)}</td>
                <td>{r.payMethod}</td>
                <td>{r.payer}</td>
                <td style={{ fontSize: 12.5 }}>{r.invoiceNo || "—"}</td>
                <td><AttachmentView value={r.attachment} /></td>
                <td><Badge text={r.status} /></td>
                <td style={{ whiteSpace: "nowrap" }}>
                  {perm.canEdit(user, r) &&
                    <button className="pl-btn small" onClick={() => setEditing({ ...r })}>編輯</button>}
                  {r.status === "待審核" && perm.canApprove(user, r) && (
                    <>
                      {" "}<button className="pl-btn small" style={{ color: T.green }} onClick={() => review(r, true)}>通過</button>
                      {" "}<button className="pl-btn small danger" onClick={() => review(r, false)}>退回</button>
                    </>
                  )}
                  {" "}<button className="pl-btn small danger" onClick={() => remove(r)}>刪除</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {editing && (
        <Modal title={editing.id ? "收入明細" : "新增收入"} onClose={() => setEditing(null)} width={680}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(160px,1fr))", gap: 12 }}>
            <Field label="收入日期" required><input className="pl-input" value={editing.date} onChange={(e) => setEditing({ ...editing, date: e.target.value })} placeholder="YYYY/MM/DD" /></Field>
            <Field label="門店"><input className="pl-input" value={nameOf(curStore)} disabled /></Field>
            <Field label="收入類別" required>
              <select className="pl-input" value={editing.categoryId} onChange={(e) => setEditing({ ...editing, categoryId: e.target.value })}>
                <option value="">選擇類別</option>{cats.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </Field>
            <Field label="收入項目" required span={2}><input className="pl-input" value={editing.item} onChange={(e) => setEditing({ ...editing, item: e.target.value })} placeholder="例：場地租借、課程收入" /></Field>
            <Field label="金額" required><input className="pl-input" inputMode="decimal" value={editing.amount} onChange={(e) => setEditing({ ...editing, amount: e.target.value })} /></Field>
            <Field label="收款方式">
              <select className="pl-input" value={editing.payMethod} onChange={(e) => setEditing({ ...editing, payMethod: e.target.value })}>
                {PAY_METHODS.map((p) => <option key={p}>{p}</option>)}
              </select>
            </Field>
            <Field label="經手人"><input className="pl-input" value={editing.payer} onChange={(e) => setEditing({ ...editing, payer: e.target.value })} /></Field>
            <Field label="發票號碼"><input className="pl-input" value={editing.invoiceNo} onChange={(e) => setEditing({ ...editing, invoiceNo: e.target.value })} /></Field>
            <Field label="單據附件" span={2}><AttachmentInput value={editing.attachment} onChange={(v) => setEditing({ ...editing, attachment: v })} /></Field>
            <Field label="備註" span={3}><input className="pl-input" value={editing.note} onChange={(e) => setEditing({ ...editing, note: e.target.value })} /></Field>
          </div>
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 18 }}>
            <button className="pl-btn" onClick={() => setEditing(null)}>取消</button>
            <button className="pl-btn" onClick={() => save(editing, false)}>儲存草稿</button>
            <button className="pl-btn primary" style={{ background: T.green, borderColor: T.green }} onClick={() => save(editing, true)}>送出審核</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function ExpenseForm({ form, setForm, data, stores, onSave, onClose, user }) {
  const locked = form.status === "已通過" && !perm.isAdmin(user);
  const set = (k) => (e) => setForm({ ...form, [k]: e.target.type === "checkbox" ? e.target.checked : e.target.value });
  /* 類別選單：一般可選項排除系統保留類別（廠商原料叫貨）；
     若這筆紀錄目前的類別已停用（或不在可選清單中），仍把該類別加回選項，避免編輯舊紀錄時選不到原值 */
  const catOptions = data.categories.filter((c) => c.active && c.id !== ORDER_CAT_ID);
  if (form.categoryId && !catOptions.some((c) => c.id === form.categoryId)) {
    const cur = data.categories.find((c) => c.id === form.categoryId);
    if (cur) catOptions.push(cur);
  }
  return (
    <Modal title={form.id ? "支出明細" : "新增支出"} onClose={onClose} width={760}>
      {form.status === "已通過" && perm.isAdmin(user) && (
        <div style={{ background: T.yellowBg, color: T.yellow, borderRadius: 8, padding: "8px 12px", marginBottom: 14, fontSize: 13 }}>
          此筆已通過審核。修改將完整寫入修改紀錄。
        </div>
      )}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(160px,1fr))", gap: 12 }}>
        <Field label="支出日期" required><input className="pl-input" value={form.date} onChange={set("date")} placeholder="YYYY/MM/DD" disabled={locked} /></Field>
        <Field label="門店／部門" required>
          <select className="pl-input" value={form.storeId} onChange={set("storeId")} disabled={locked}>
            <option value="">選擇</option>{stores.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
        </Field>
        <Field label="支出類別" required>
          <select className="pl-input" value={form.categoryId} onChange={set("categoryId")} disabled={locked}>
            <option value="">選擇類別</option>{catOptions.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </Field>
        <Field label="支出品項" required span={2}><input className="pl-input" value={form.item} onChange={set("item")} placeholder="例：鮮乳補貨、吧台清潔耗材" disabled={locked} /></Field>
        <Field label="廠商">
          <select className="pl-input" value={form.vendorId || ""} onChange={set("vendorId")} disabled={locked}>
            <option value="">無</option>{data.vendors.filter(v=>v.active).map((v) => <option key={v.id} value={v.id}>{v.name}</option>)}
          </select>
        </Field>
        <Field label="金額" required><input className="pl-input" inputMode="decimal" value={form.amount} onChange={set("amount")} placeholder="0" disabled={locked} /></Field>
        <Field label="付款方式">
          <select className="pl-input" value={form.payMethod} onChange={set("payMethod")} disabled={locked}>
            {PAY_METHODS.map((p) => <option key={p}>{p}</option>)}
          </select>
        </Field>
        <Field label="付款人"><input className="pl-input" value={form.payer} onChange={set("payer")} disabled={locked} /></Field>
        <Field label="發票號碼"><input className="pl-input" value={form.invoiceNo} onChange={set("invoiceNo")} placeholder="AB-12345678" disabled={locked} /></Field>
        <Field label="員工代墊">
          <label style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 0" }}>
            <input type="checkbox" checked={form.isAdvance} onChange={set("isAdvance")} disabled={locked} /> 是
          </label>
        </Field>
        {form.isAdvance && (
          <>
            <Field label="已核銷">
              <label style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 0" }}>
                <input type="checkbox" checked={form.isReimbursed} onChange={set("isReimbursed")} disabled={locked} /> 是
              </label>
            </Field>
            {form.isReimbursed && <Field label="核銷日期"><input className="pl-input" value={form.reimburseDate} onChange={set("reimburseDate")} placeholder="YYYY/MM/DD" disabled={locked} /></Field>}
          </>
        )}
        <Field label="發票或收據附件" span={2}><AttachmentInput value={form.attachment} onChange={(a) => setForm({ ...form, attachment: a })} /></Field>
        <Field label="備註" span={2}><input className="pl-input" value={form.note} onChange={set("note")} disabled={locked} /></Field>
      </div>
      {!locked && (
        <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 18 }}>
          <button className="pl-btn" onClick={onClose}>取消</button>
          {["草稿", "已退回", undefined].includes(form.status) && <button className="pl-btn" onClick={() => onSave(form, false)}>儲存草稿</button>}
          <button className="pl-btn primary" onClick={() => onSave(form, form.status !== "已通過")}>

          </button>
        </div>
      )}
    </Modal>
  );
}

/* ────────────────────────────────────────────
   廠商叫貨
──────────────────────────────────────────────*/
const ORD_EMPTY = {
  date: "", storeId: "", vendorId: "", items: "", amount: "", billing: "現結",
  dueDate: "", paidDate: "", payStatus: "未付款", invoiceStatus: "未收到",
  invoiceNo: "", attachment: null, note: "",
};

function OrderModule({ data, update, user, users, logAudit }) {
  const [month, setMonth] = useState(monthOf(todayStr()));
  const [editing, setEditing] = useState(null);
  const [vFlt, setVFlt] = useState("");
  const [view, setView] = useState("orders"); // orders | settle
  const [openVendor, setOpenVendor] = useState(null);
  const [batchOpen, setBatchOpen] = useState(false);
  const scope = perm.storeScope(user);
  const stores = data.stores.filter((s) => s.active && (!scope || scope.includes(s.id)));
  const [storeTab, setStoreTab] = useState("");
  const curStore = stores.some((s) => s.id === storeTab) ? storeTab : (stores[0]?.id || "");
  const nameOf = (id) => data.stores.find((s) => s.id === id)?.name || "—";
  const venOf = (id) => data.vendors.find((v) => v.id === id)?.name || "—";
  const today = todayStr();

  const visibleAll = data.orders.filter((r) => !scope || scope.includes(r.storeId));
  const visible = visibleAll.filter((r) => r.storeId === curStore);
  const rows = visible.filter((r) => monthOf(r.date) === month && (!vFlt || r.vendorId === vFlt))
    .sort((a, b) => cmpDate(b.date, a.date));

  /* 統計 */
  const monthSum = rows.reduce((a, o) => a + num(o.amount), 0);
  const todaySum = visible.filter((o) => o.date === today).reduce((a, o) => a + num(o.amount), 0);
  const byVendor = {}; rows.forEach((o) => { byVendor[o.vendorId] = (byVendor[o.vendorId] || 0) + num(o.amount); });
  const monthlyUnpaid = visible.filter((o) => o.billing === "月結" && o.payStatus !== "已付款").reduce((a, o) => a + num(o.amount), 0);
  const overdue = visible.filter((o) => o.payStatus !== "已付款" && o.dueDate && cmpDate(o.dueDate, today) < 0);
  const overdueSum = overdue.reduce((a, o) => a + num(o.amount), 0);

  const save = (form) => {
    if (!form.date || !validDate(form.date)) return alert("請填寫正確叫貨日期（YYYY/MM/DD）");
    if (!form.storeId) return alert("請選擇使用門店");
    if (!form.vendorId) return alert("請選擇廠商");
    if (num(form.amount) <= 0) return alert("金額需大於 0");
    if (form.billing === "月結" && !form.dueDate) return alert("月結叫貨請填寫預計付款日");
    if (form.dueDate && !validDate(form.dueDate)) return alert("預計付款日格式錯誤（需 YYYY/MM/DD）");
    const rec = { ...form, amount: num(form.amount) };
    if (!rec.id) {
      rec.id = uid("po"); rec.createdBy = user.id;
      update((d) => ({ ...d, orders: [...d.orders, rec] }));
    } else {
      const old = data.orders.find((o) => o.id === rec.id);
      logAudit("廠商叫貨", rec.id, old, rec, true);
      update((d) => ({ ...d, orders: d.orders.map((o) => (o.id === rec.id ? rec : o)) }));
    }
    setEditing(null);
  };

  const remove = (rec) => {
    if (!confirm(`確定刪除 ${rec.date} ${venOf(rec.vendorId)} 的叫貨？`)) return;
    logAudit("廠商叫貨", rec.id, rec, { ...rec, deleted: true });
    update((d) => ({ ...d, orders: d.orders.filter((o) => o.id !== rec.id) }));
  };

  return (
    <div>
      <SectionTitle right={
        <>
          <MonthPicker value={month} onChange={setMonth} />
          <select className="pl-input" style={{ width: 140 }} value={vFlt} onChange={(e) => setVFlt(e.target.value)}>
            <option value="">全部廠商</option>{data.vendors.map((v) => <option key={v.id} value={v.id}>{v.name}</option>)}
          </select>
          <button className="pl-btn primary" onClick={() => setBatchOpen(true)}>＋ 新增叫貨</button>
        </>
      }>廠商</SectionTitle>

      {/* 叫貨紀錄／月結對帳 切換（月結對帳僅會計與管理者） */}
      {perm.isAcct(user) && (
        <div className="no-print" style={{ display: "inline-flex", border: `1px solid ${T.line}`, borderRadius: 10, overflow: "hidden", marginBottom: 14 }}>
          {[["orders", "叫貨紀錄"], ["settle", "月結對帳・匯款"]].map(([k, label]) => (
            <button key={k} onClick={() => setView(k)} style={{
              padding: "7px 20px", border: "none", cursor: "pointer", fontSize: 13.5,
              background: view === k ? T.brown : "#fff",
              color: view === k ? "#fff" : T.sub, fontWeight: view === k ? 700 : 400,
            }}>{label}</button>
          ))}
        </div>
      )}

      {view === "settle" && perm.isAcct(user) && (
        <SettleSection data={data} update={update} user={user} logAudit={logAudit} scope={scope} nameOf={nameOf} venOf={venOf} />
      )}

      {view === "orders" && <>
      <StoreTabs stores={stores} value={curStore} onChange={setStoreTab} />

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(160px,1fr))", gap: 12, marginBottom: 14 }}>
        <KPI label="今日叫貨總額" value={fmt(todaySum)} />
        <KPI label="本月叫貨總額" value={fmt(monthSum)} />
        <KPI label="月結待付款總額" value={fmt(monthlyUnpaid)} />
        <KPI label="已逾期未付款" value={fmt(overdueSum)} tone={overdueSum > 0 ? "red" : "green"} sub={overdue.length ? `${overdue.length} 筆逾期` : "無逾期款項"} />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(260px,1fr))", gap: 12, marginBottom: 14 }}>
        <div className="pl-card" style={{ padding: 14 }}>
          <div className="pl-serif" style={{ fontWeight: 600, marginBottom: 8 }}>本月各廠商叫貨</div>
          {Object.keys(byVendor).length === 0 ? <Empty /> : Object.entries(byVendor).sort((a, b) => b[1] - a[1]).map(([vid, amt]) => {
            const opened = openVendor === vid;
            const detail = rows.filter((o) => o.vendorId === vid).sort((a, b) => cmpDate(a.date, b.date));
            return (
              <div key={vid} style={{ borderBottom: `1px dashed ${T.line}` }}>
                <div onClick={() => setOpenVendor(opened ? null : vid)}
                  style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", fontSize: 13.5, cursor: "pointer" }}>
                  <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={{ color: T.sub, fontSize: 10 }}>{opened ? "▼" : "▶"}</span>
                    {venOf(vid)}
                    <span style={{ color: T.sub, fontSize: 12 }}>{detail.length} 筆</span>
                  </span>
                  <b>{fmt(amt)}</b>
                </div>
                {opened && (
                  <div style={{ padding: "2px 0 8px 22px" }}>
                    {detail.map((o) => (
                      <div key={o.id} style={{ display: "flex", justifyContent: "space-between", padding: "3px 0", fontSize: 13, color: T.ink }}>
                        <span style={{ fontVariantNumeric: "tabular-nums", color: T.sub }}>{o.date}</span>
                        <span style={{ fontVariantNumeric: "tabular-nums" }}>{fmt(num(o.amount))}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      <div className="pl-card pl-scroll-x">
        <table className="pl-table">
          <thead><tr>
            <th>日期</th><th>使用門店</th><th>廠商</th><th>品項說明</th>
            <th className="num">金額</th><th>結帳方式</th><th>預計付款日</th><th>付款狀態</th><th>發票狀態</th><th>附件</th><th></th>
          </tr></thead>
          <tbody>
            {rows.length === 0 && <tr><td colSpan={11}><Empty text="本月尚無叫貨紀錄" /></td></tr>}
            {rows.map((r) => {
              const isOverdue = r.payStatus !== "已付款" && r.dueDate && cmpDate(r.dueDate, today) < 0;
              return (
                <tr key={r.id}>
                  <td style={{ whiteSpace: "nowrap" }}>{r.date}</td>
                  <td>{nameOf(r.storeId)}</td>
                  <td>{venOf(r.vendorId)}</td>
                  <td style={{ maxWidth: 240 }}>{r.items}</td>
                  <td className="num" style={{ fontWeight: 600 }}>{fmtN(r.amount)}</td>
                  <td>{r.billing}</td>
                  <td style={{ whiteSpace: "nowrap", color: isOverdue ? T.red : undefined }}>
                    {r.dueDate || "—"}{isOverdue && <Badge text="逾期" tone="red" />}
                  </td>
                  <td><Badge text={r.payStatus} /></td>
                  <td><Badge text={r.invoiceStatus} /></td>
                  <td><AttachmentView value={r.attachment} /></td>
                  <td style={{ whiteSpace: "nowrap" }}>
                    <button className="pl-btn small" onClick={() => setEditing({ ...r })}>編輯</button>
                    {" "}<button className="pl-btn small danger" onClick={() => remove(r)}>刪除</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      </>}

      {batchOpen && (
        <BatchOrderModal data={data} user={user} curStore={curStore} nameOf={nameOf}
          onClose={() => setBatchOpen(false)}
          onCommit={(recs) => { update((d) => ({ ...d, orders: [...d.orders, ...recs] })); setBatchOpen(false); }} />
      )}
      {editing && <OrderForm form={editing} setForm={setEditing} data={data} stores={stores} onSave={save} onClose={() => setEditing(null)} />}
    </div>
  );
}

/* ── 月結對帳・匯款區：當月月結叫貨，次月憑廠商發票匯款 ── */
function SettleSection({ data, update, user, logAudit, scope, nameOf, venOf }) {
  const [settleMonth, setSettleMonth] = useState(prevMonth(monthOf(todayStr())));
  const [open, setOpen] = useState(null);
  const today = todayStr();

  const monthly = data.orders.filter((o) =>
    o.billing === "月結" && monthOf(o.date) === settleMonth && (!scope || scope.includes(o.storeId))
  );

  /* 依廠商彙整 */
  const byVendor = {};
  monthly.forEach((o) => { (byVendor[o.vendorId] = byVendor[o.vendorId] || []).push(o); });
  const groups = Object.entries(byVendor).map(([vid, list]) => {
    const total = list.reduce((a, o) => a + num(o.amount), 0);
    const invIn = list.filter((o) => o.invoiceStatus === "已收到").length;
    const unpaid = list.filter((o) => o.payStatus !== "已付款");
    const dueDates = list.map((o) => o.dueDate).filter(Boolean).sort(cmpDate);
    const overdue = unpaid.some((o) => o.dueDate && cmpDate(o.dueDate, today) < 0);
    return { vid, list, total, invIn, invAll: list.length, unpaid, due: dueDates[0] || "—", overdue };
  }).sort((a, b) => b.total - a.total);

  const totalAll = groups.reduce((a, g) => a + g.total, 0);
  const totalUnpaid = groups.reduce((a, g) => a + g.unpaid.reduce((x, o) => x + num(o.amount), 0), 0);

  const settle = (g) => {
    if (g.unpaid.length === 0) return;
    if (g.invIn < g.invAll) {
      if (!confirm(`${venOf(g.vid)} 尚有 ${g.invAll - g.invIn} 筆發票未收到。月結應憑發票匯款，仍要確認匯款？`)) return;
    } else {
      if (!confirm(`確認已匯款給 ${venOf(g.vid)}？將把 ${g.unpaid.length} 筆月結叫貨標記為已付款（付款日 ${today}）。`)) return;
    }
    const ids = g.unpaid.map((o) => o.id);
    g.unpaid.forEach((o) => logAudit("廠商叫貨", o.id, o, { ...o, payStatus: "已付款", paidDate: today }, true));
    update((d) => ({
      ...d,
      orders: d.orders.map((o) => ids.includes(o.id) ? { ...o, payStatus: "已付款", paidDate: today } : o),
    }));
  };

  const markInvoice = (o) => {
    update((d) => ({ ...d, orders: d.orders.map((x) => x.id === o.id ? { ...x, invoiceStatus: "已收到" } : x) }));
  };

  return (
    <div>
      <div className="pl-card no-print" style={{ padding: 12, marginBottom: 12, display: "flex", flexWrap: "wrap", gap: 12, alignItems: "center" }}>
        <span style={{ fontSize: 13, color: T.sub }}>結帳月份（貨款月）</span>
        <MonthPicker value={settleMonth} onChange={setSettleMonth} />
        <div style={{ marginLeft: "auto", display: "flex", gap: 18, fontSize: 13 }}>
          <span style={{ color: T.sub }}>月結總額 <b style={{ color: T.ink }}>{fmt(totalAll)}</b></span>
          <span style={{ color: T.sub }}>待匯款 <b style={{ color: totalUnpaid > 0 ? T.red : T.green }}>{fmt(totalUnpaid)}</b></span>
        </div>
      </div>

      <div style={{ fontSize: 12.5, color: T.sub, marginBottom: 10 }}>
        彙整 {monthLabel(settleMonth)}各廠商月結叫貨，於次月憑廠商發票進行匯款；發票未齊時匯款前會提醒確認。
      </div>

      {groups.length === 0 && <div className="pl-card" style={{ padding: 24 }}><Empty text="此月份沒有月結叫貨紀錄" /></div>}

      {groups.map((g) => (
        <div key={g.vid} className="pl-card" style={{ marginBottom: 12, overflow: "hidden" }}>
          <div style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: 14, padding: "13px 16px", cursor: "pointer" }}
            onClick={() => setOpen(open === g.vid ? null : g.vid)}>
            <div className="pl-serif" style={{ fontWeight: 700, fontSize: 15, minWidth: 120 }}>{venOf(g.vid)}</div>
            <div style={{ fontSize: 13, color: T.sub }}>{g.list.length} 筆</div>
            <div style={{ fontSize: 15, fontWeight: 700, fontVariantNumeric: "tabular-nums" }}>{fmt(g.total)}</div>
            <Badge text={`發票 ${g.invIn}/${g.invAll}`} tone={g.invIn === g.invAll ? "green" : "yellow"} />
            {g.unpaid.length === 0
              ? <Badge text="已匯款" tone="green" />
              : <Badge text={g.overdue ? "已逾期未匯" : "待匯款"} tone={g.overdue ? "red" : "yellow"} />}
            <div style={{ fontSize: 12.5, color: T.sub }}>預計付款日 {g.due}</div>
            <div style={{ marginLeft: "auto", display: "flex", gap: 8, alignItems: "center" }}>
              {g.unpaid.length > 0 && (
                <button className="pl-btn primary" onClick={(e) => { e.stopPropagation(); settle(g); }}>
                  確認匯款 {fmt(g.unpaid.reduce((a, o) => a + num(o.amount), 0))}
                </button>
              )}
              <span style={{ color: T.sub, fontSize: 12 }}>{open === g.vid ? "▲" : "▼"}</span>
            </div>
          </div>

          {open === g.vid && (
            <div className="pl-scroll-x" style={{ borderTop: `1px solid ${T.line}` }}>
              <table className="pl-table">
                <thead><tr>
                  <th>日期</th><th>門店</th><th>品項</th>
                  <th className="num">金額</th><th>發票</th><th>預計付款日</th><th>付款狀態</th><th></th>
                </tr></thead>
                <tbody>
                  {g.list.sort((a, b) => cmpDate(a.date, b.date)).map((o) => (
                    <tr key={o.id}>
                      <td style={{ whiteSpace: "nowrap" }}>{o.date}</td>
                      <td>{nameOf(o.storeId)}</td>
                      <td>{o.items}</td>
                      <td className="num" style={{ fontWeight: 600 }}>{fmtN(o.amount)}</td>
                      <td>
                        <Badge text={o.invoiceStatus} tone={o.invoiceStatus === "已收到" ? "green" : "yellow"} />
                        {o.invoiceStatus !== "已收到" && (
                          <>{" "}<button className="pl-btn small" onClick={() => markInvoice(o)}>收到發票</button></>
                        )}
                      </td>
                      <td style={{ whiteSpace: "nowrap", color: o.payStatus !== "已付款" && o.dueDate && cmpDate(o.dueDate, today) < 0 ? T.red : T.ink }}>{o.dueDate || "—"}</td>
                      <td>
                        <Badge text={o.payStatus} tone={o.payStatus === "已付款" ? "green" : "yellow"} />
                        {o.paidDate ? <span style={{ fontSize: 12, color: T.sub }}> {o.paidDate}</span> : null}
                      </td>
                      <td></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

──────────────────────────────────────────────*/
const AR_EMPTY = {
  date: "", customer: "", invoiceNo: "", amount: "", requester: "", requestDate: "",
  dueDate: "", received: "", receivedDate: "", status: "未請款", note: "", attachment: null,
};

function ARModule({ data, update, user, logAudit }) {
  const [editing, setEditing] = useState(null);
  const [showAll, setShowAll] = useState(true);
  const today = todayStr();
  if (!perm.canAR(user)) return <Empty text="應收帳款僅開放會計與系統管理者查看。" />;

  const rows = data.receivables
    .filter((r) => showAll || num(r.amount) - num(r.received) > 0)
    .sort((a, b) => cmpDate(b.date, a.date));
  const totalUnpaid = data.receivables.filter((r) => r.status !== "呆帳").reduce((a, r) => a + Math.max(0, num(r.amount) - num(r.received)), 0);

  const nextNo = (date) => {
    const prefix = "AR-" + date.slice(2, 7).replace("/", "") + "-";
    const n = data.receivables.filter((r) => r.no && r.no.startsWith(prefix)).length + 1;
    return prefix + pad2(n);
  };

  const save = (form) => {
    if (!form.date || !validDate(form.date)) return alert("請填寫正確建立日期");
    if (!form.customer.trim()) return alert("請填寫客戶或公司名稱");
    if (num(form.amount) <= 0) return alert("請款金額需大於 0");
    if (num(form.received) > num(form.amount)) return alert("已收金額不可大於請款金額");
    const rec = { ...form, amount: num(form.amount), received: num(form.received) };
    if (!rec.id) {
      rec.id = uid("ar"); rec.no = nextNo(rec.date); rec.createdBy = user.id; rec.createdAt = nowStamp();
      update((d) => ({ ...d, receivables: [...d.receivables, rec] }));
    } else {
      const old = data.receivables.find((r) => r.id === rec.id);
      logAudit("應收帳款", rec.id, old, rec, true);
      update((d) => ({ ...d, receivables: d.receivables.map((r) => (r.id === rec.id ? rec : r)) }));
    }
    setEditing(null);
  };

  const remove = (rec) => {
    if (!confirm(`確定刪除應收帳款 ${rec.no}（${rec.customer}）？`)) return;
    logAudit("應收帳款", rec.id, rec, { ...rec, deleted: true });
    update((d) => ({ ...d, receivables: d.receivables.filter((r) => r.id !== rec.id) }));
  };

  return (
    <div>
      <SectionTitle right={
        <>
          <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 13.5, color: T.sub }}>
            <input type="checkbox" checked={!showAll} onChange={(e) => setShowAll(!e.target.checked)} /> 僅顯示未收清
          </label>
          <button className="pl-btn primary" onClick={() => setEditing({ ...AR_EMPTY, id: null, date: todayStr(), requester: user.name })}>＋ 新增應收</button>
        </>
      }>應收帳款</SectionTitle>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(180px,1fr))", gap: 12, marginBottom: 14 }}>
        <KPI label="應收未收合計" value={fmt(totalUnpaid)} tone={totalUnpaid > 0 ? undefined : "green"} />
      </div>

      <div className="pl-card pl-scroll-x">
        <table className="pl-table">
          <thead><tr>
            <th>編號</th><th>建立日期</th><th>客戶／公司</th><th>發票號碼</th>
            <th className="num">請款金額</th><th className="num">已收金額</th><th className="num">未收金額</th>
            <th>到期日</th><th>收款狀態</th><th>對帳單</th><th></th>
          </tr></thead>
          <tbody>
            {rows.length === 0 && <tr><td colSpan={11}><Empty text="尚無應收帳款" /></td></tr>}
            {rows.map((r) => {
              const unpaid = num(r.amount) - num(r.received);
              const isOverdue = r.dueDate && cmpDate(r.dueDate, today) < 0 && unpaid > 0 && r.status !== "呆帳";
              return (
                <tr key={r.id}>
                  <td style={{ whiteSpace: "nowrap" }}>{r.no}</td>
                  <td style={{ whiteSpace: "nowrap" }}>{r.date}</td>
                  <td>{r.customer}</td>
                  <td style={{ fontSize: 12.5 }}>{r.invoiceNo || "—"}</td>
                  <td className="num">{fmtN(r.amount)}</td>
                  <td className="num">{fmtN(r.received)}</td>
                  <td className="num" style={{ fontWeight: 600, color: unpaid > 0 ? T.red : T.green }}>{fmtN(unpaid)}</td>
                  <td style={{ whiteSpace: "nowrap", color: isOverdue ? T.red : undefined }}>
                    {r.dueDate || "—"}{isOverdue && <Badge text="逾期" tone="red" />}
                  </td>
                  <td><Badge text={r.status} /></td>
                  <td><AttachmentView value={r.attachment} /></td>
                  <td style={{ whiteSpace: "nowrap" }}>
                    <button className="pl-btn small" onClick={() => setEditing({ ...r })}>編輯</button>
                    {" "}<button className="pl-btn small danger" onClick={() => remove(r)}>刪除</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {editing && <ARForm form={editing} setForm={setEditing} onSave={save} onClose={() => setEditing(null)} />}
    </div>
  );
}
