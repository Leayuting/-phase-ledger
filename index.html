};

const RESTORE_PARSERS = {
  dailySales: parseSales, expenses: parseExpense, incomes: parseIncome, orders: parseOrder,
  receivables: parseAR, vendors: parseVendor, approvalLogs: parseApproval, auditLogs: parseAudit,
};

/* 從 expenses/incomes/orders/receivables 收集「有實際二進位內容」的附件（僅圖片附件會存 base64，
   一般檔案附件本來就只存檔名、data 為 null，因此不會出現在這裡） */
function collectAttachments(data, inScope) {
  const list = [];
  const push = (records, dateField, label, hasStore) => {
    (records || []).forEach((r) => {
      if (!r.attachment || !r.attachment.data) return;
      if (!inScope(r[dateField], r.storeId, hasStore)) return;
      list.push({ record: r, dateField, label, hasStore });
    });
  };
  push(data.expenses, "date", "每日支出", true);
  push(data.incomes, "date", "門店收入", true);
  push(data.orders, "date", "廠商叫貨", true);
  push(data.receivables, "date", "應收帳款", false);
  return list;
}

/* 把附件塞進 zip：附件/月份/門店/日期_門店_類型_金額_原檔名，回傳附件清單列與估計位元組數 */
async function packAttachmentsIntoZip(zip, attachItems, ctx) {
  const usedPaths = new Set();
  const listRows = [];
  let bytes = 0;
  for (const item of attachItems) {
    const r = item.record, label = item.label, hasStore = item.hasStore;
    const monthFolder = (monthOf(r.date) || "未知月份").replace("/", "-");
    const storeFolder = hasStore ? sanitizeFilename(ctx.nameOf(r.storeId) || "未分類門店") : "應收帳款";
    const dateSlug = (r.date || "未知日期").replace(/\//g, "-");
    const storeSlug = hasStore ? sanitizeFilename(ctx.nameOf(r.storeId) || "未分類") : "";
    const amt = Math.round(num(r.amount)) || 0;
    const orig = r.attachment.name || "附件";
    const baseName = sanitizeFilename(`${dateSlug}${storeSlug ? "_" + storeSlug : ""}_${label}_${amt}_${orig}`);
    const folder = `附件/${monthFolder}/${storeFolder}/`;
    let finalName = baseName, n = 1;
    while (usedPaths.has(folder + finalName)) {
      const dot = baseName.lastIndexOf(".");
      finalName = dot > 0 ? `${baseName.slice(0, dot)}_${n}${baseName.slice(dot)}` : `${baseName}_${n}`;
      n++;
    }
    usedPaths.add(folder + finalName);
    const b64 = r.attachment.data.replace(/^data:[^;]+;base64,/, "");
    zip.file(folder + finalName, b64, { base64: true });
    bytes += Math.floor((b64.length * 3) / 4);
    listRows.push({
      紀錄ID: r.id, 資料類型: label, 門店: hasStore ? ctx.nameOf(r.storeId) : "", 日期: r.date,
      金額: amt, 檔名: orig, 儲存路徑: folder + finalName,
    });
  }
  return { listRows, bytes };
}

/* ── 建立一份完整備份（手動即時備份／月結封存／還原前自動備份共用同一套流程） ──
   流程：insert 建立中 → 在瀏覽器端組 zip → 上傳 Storage → 重新下載驗證 → 依驗證結果更新狀態。
   任何一步失敗都會 catch 住，把該筆備份標記為「驗證失敗」並記一筆失敗稽核，絕不留在「建立中」。 */
async function createBackup(data, profiles, user, backupType, opts = {}) {
  const ctx = makeExportCtx(data, profiles);
  let insertedId = null;
  try {
    const isMonthly = backupType === "monthly_archive";
    const scopeMonth = isMonthly ? prevMonth(monthOf(todayStr())) : null;
    const inScope = (dateStr) => (isMonthly ? monthOf(dateStr) === scopeMonth : true);
    const dateRangeLabel = isMonthly ? monthLabel(scopeMonth) : "全部";
    const storeScopeLabel = "全部門店";

    const { data: inserted, error: insErr } = await sb.from("backups").insert({
      backup_type: backupType, created_by: user.id, created_by_name: user.name,
      date_range: dateRangeLabel, store_scope: storeScopeLabel,
      backup_status: "建立中", note: opts.note || null,
    }).select().single();
    if (insErr) throw insErr;
    insertedId = inserted.id;

    const rowsByTable = {
      dailySales: data.dailySales.filter((r) => inScope(r.date)).map((r) => rowSales(r, ctx)),
      expenses: data.expenses.filter((r) => inScope(r.date)).map((r) => rowExpense(r, ctx)),
      incomes: (data.incomes || []).filter((r) => inScope(r.date)).map((r) => rowIncome(r, ctx)),
      orders: data.orders.filter((r) => inScope(r.date)).map((r) => rowOrder(r, ctx)),
      receivables: data.receivables.filter((r) => inScope(r.date)).map((r) => rowAR(r, ctx)),
      vendors: data.vendors.map((v) => rowVendor(v)),
      approvalLogs: (data.approvalLogs || []).filter((l) => inScope((l.time || "").slice(0, 10))).map((l) => rowApproval(l, ctx)),
      auditLogs: (data.auditLogs || []).filter((l) => inScope((l.time || "").slice(0, 10))).map((l) => rowAudit(l, ctx)),
    };

    const zip = new JSZip();
    const fileHashes = {};
    let manifestFileSize = 0;
    let totalRecords = 0;
    const tableRecordCounts = {};
    for (const key of BACKUP_TABLE_KEYS) {
      const rows = rowsByTable[key];
      tableRecordCounts[EXPORT_TYPE_LABELS[key]] = rows.length;
      totalRecords += rows.length;
      const csv = "﻿" + XLSX.utils.sheet_to_csv(XLSX.utils.json_to_sheet(rows));
      zip.file(`${EXPORT_TYPE_LABELS[key]}.csv`, csv);
      fileHashes[`${EXPORT_TYPE_LABELS[key]}.csv`] = await sha256Hex(csv);
      manifestFileSize += new Blob([csv]).size;
    }

    const attachItems = collectAttachments(data, (dateStr) => inScope(dateStr));
    const packed = await packAttachmentsIntoZip(zip, attachItems, ctx);
    const attachmentListRows = packed.listRows;
    manifestFileSize += packed.bytes;
    const attachCsv = "﻿" + XLSX.utils.sheet_to_csv(XLSX.utils.json_to_sheet(attachmentListRows));
    zip.file("附件清單.csv", attachCsv);
    fileHashes["附件清單.csv"] = await sha256Hex(attachCsv);
    manifestFileSize += new Blob([attachCsv]).size;

    const manifest = {
      backup_id: insertedId, backup_type: backupType, created_at: new Date().toISOString(),
      created_by: user.name, system_version: APP_VERSION, date_range: dateRangeLabel,
      store_scope: storeScopeLabel, total_records: totalRecords, table_record_counts: tableRecordCounts,
      attachment_count: attachmentListRows.length, total_file_size: manifestFileSize,
      file_hashes: fileHashes, backup_status: "建立中",
    };
    zip.file("manifest.json", JSON.stringify(manifest, null, 2));

    const summaryLines = [
      "PHASE 帳務備份摘要", "",
      `備份類型：${backupType === "manual" ? "手動即時備份" : backupType === "monthly_archive" ? "月結封存" : "還原前自動備份"}`,
      `門店範圍：${storeScopeLabel}`, `資料期間：${dateRangeLabel}`,
      "", "各表筆數：",
      ...BACKUP_TABLE_KEYS.map((k) => `　${EXPORT_TYPE_LABELS[k]}：${tableRecordCounts[EXPORT_TYPE_LABELS[k]]} 筆`),
      `附件數量：${attachmentListRows.length} 筆`,
      "", `建立人：${user.name}`, `建立時間：${nowStamp()}`, `系統版本：${APP_VERSION}`,
    ];
    zip.file("備份摘要.txt", summaryLines.join("\n"));

    const blob = await zip.generateAsync({ type: "blob" });
    const storagePath = `${insertedId}.zip`;
    const { error: upErr } = await sb.storage.from("ledger-backups").upload(storagePath, blob, { contentType: "application/zip", upsert: true });
    if (upErr) throw upErr;

    /* 驗證：重新下載、確認大小、確認可解壓、確認 manifest 可解析、比對各檔案雜湊、比對附件數量 */
    const verification = {};
    const { data: dlBlob, error: dlErr } = await sb.storage.from("ledger-backups").download(storagePath);
    verification["檔案可下載"] = !dlErr && !!dlBlob;
    verification["檔案大小一致"] = !dlErr && !!dlBlob && dlBlob.size === blob.size;
    let verifyZip = null;
    if (!dlErr && dlBlob) {
      try { verifyZip = await JSZip.loadAsync(dlBlob); verification["ZIP可解壓"] = true; }
      catch (e) { verification["ZIP可解壓"] = false; }
    } else {
      verification["ZIP可解壓"] = false;
    }
    let manifestOk = false;
    if (verifyZip) {
      const mf = verifyZip.file("manifest.json");
      if (mf) { try { JSON.parse(await mf.async("string")); manifestOk = true; } catch (e) { manifestOk = false; } }
    }
    verification["manifest完整"] = manifestOk;
    let hashOk = !!verifyZip;
    if (verifyZip) {
      for (const [fname, hash] of Object.entries(fileHashes)) {
        const f = verifyZip.file(fname);
        if (!f) { hashOk = false; break; }
        const content = await f.async("string");
        if ((await sha256Hex(content)) !== hash) { hashOk = false; break; }
      }
    }
    verification["雜湊值正確"] = hashOk;
    let attachOk = false;
    if (verifyZip) {
      const files = Object.keys(verifyZip.files).filter((p) => p.startsWith("附件/") && !verifyZip.files[p].dir);
      attachOk = files.length === attachmentListRows.length;
    }
    verification["附件無缺漏"] = attachOk;

    const allOk = Object.values(verification).every(Boolean);

    const { error: updErr } = await sb.from("backups").update({
      total_records: totalRecords, table_record_counts: tableRecordCounts,
      attachment_count: attachmentListRows.length, total_file_size: blob.size,
      file_hashes: fileHashes, storage_path: storagePath,
      backup_status: allOk ? "驗證成功" : "驗證失敗",
      verification_detail: verification, note: opts.note || null,
    }).eq("id", insertedId);
    if (updErr) throw updErr;

    await logExportAudit(user, {
      actionType: "backup", scope: `${backupType}・${dateRangeLabel}・${storeScopeLabel}`,
      dataTypes: BACKUP_TABLE_KEYS.map((k) => EXPORT_TYPE_LABELS[k]),
      fileName: storagePath, fileSize: blob.size, recordCount: totalRecords,
      hasPii: true, hasAttachments: attachmentListRows.length > 0,
      result: allOk ? "success" : "failed",
      failReason: allOk ? null : "備份驗證未通過：" + Object.entries(verification).filter(([, v]) => !v).map(([k]) => k).join("、"),
    });

    return {
      ok: allOk, backupId: insertedId, storagePath, verification, tableRecordCounts, totalRecords,
      attachmentCount: attachmentListRows.length, totalFileSize: blob.size, manifest, dateRangeLabel, storeScopeLabel,
    };
  } catch (e) {
    const failReason = String((e && e.message) || e);
    if (insertedId) {
      await sb.from("backups").update({ backup_status: "驗證失敗", note: `建立失敗：${failReason}` }).eq("id", insertedId).catch(() => {});
    }
    await logExportAudit(user, {
      actionType: "backup", scope: backupType, dataTypes: [], fileName: null, fileSize: null, recordCount: null,
      hasPii: false, hasAttachments: false, result: "failed", failReason,
    });
    return { ok: false, error: failReason, backupId: insertedId };
  }
}

/* ── 還原範圍判斷：batch／full 以備份檔案本身內容為準；month／store 再額外narrow ── */
function makeScopedPredicate(scopeType, scopeMonth, scopeStoreId, stores) {
  return (r, hasStoreField) => {
    if (scopeType === "month") return monthOf(r.date) === scopeMonth;
    if (scopeType === "store") return hasStoreField && acctStoreId(stores, r.storeId) === scopeStoreId;
    return true; // batch（單一批次）／full（完整系統還原）
  };
}

/* 把「現有 data」與「備份裡篩選範圍內的資料」合併成新的完整 data 物件：
   範圍內的 id 用備份版本覆蓋／新增，範圍外或範圍內但備份沒有的既有資料完全不動（不刪除）。 */
function computeMergedData(d, backupTables, scopeType, scopeMonth, scopeStoreId) {
  const scoped = makeScopedPredicate(scopeType, scopeMonth, scopeStoreId, d.stores);
  const mergeTable = (key) => {
    const hasStoreField = RESTORE_TABLE_HAS_STORE[key];
    const backupRows = (backupTables[key] || []).filter((r) => scoped(r, hasStoreField));
    const backupById = Object.fromEntries(backupRows.map((r) => [r.id, r]));
    const current = d[key] || [];
    const currentIds = new Set(current.map((r) => r.id));
    const merged = current.map((r) => (backupById[r.id] ? backupById[r.id] : r));
    const toAdd = backupRows.filter((r) => !currentIds.has(r.id));
    return [...merged, ...toAdd];
  };
  const next = { ...d };
  RESTORE_TABLE_KEYS.forEach((key) => { next[key] = mergeTable(key); });
  return next;
}

/* 還原預覽：依範圍分別列出每種資料類型「新增／更新覆蓋／不變」筆數，不給模糊的總數 */
function computeRestorePreview(d, backupTables, scopeType, scopeMonth, scopeStoreId) {
  const scoped = makeScopedPredicate(scopeType, scopeMonth, scopeStoreId, d.stores);
  const result = {};
  RESTORE_TABLE_KEYS.forEach((key) => {
    const hasStoreField = RESTORE_TABLE_HAS_STORE[key];
    const backupRows = (backupTables[key] || []).filter((r) => scoped(r, hasStoreField));
    const current = d[key] || [];
    const curById = Object.fromEntries(current.map((r) => [r.id, r]));
    let added = 0, updated = 0, unchanged = 0;
    backupRows.forEach((r) => {
      if (!(r.id in curById)) added++;
      else if (stableStringify(curById[r.id]) !== stableStringify(r)) updated++;
      else unchanged++;
    });
    result[key] = { added, updated, unchanged, total: backupRows.length };
  });
  return result;
}

/* 驗證備份完整性：manifest 是否可解析、各檔案是否存在、雜湊是否相符、附件數量是否吻合。
   任何一項沒過就整體 ok=false，呼叫端必須擋下不准繼續下一步。 */
async function verifyBackupIntegrity(zip, manifest) {
  const details = {};
  if (!manifest) { details["manifest.json 存在且可解析"] = false; return { ok: false, details }; }
  details["manifest.json 存在且可解析"] = true;
  const hashes = manifest.file_hashes || {};
  const missing = [], mismatched = [];
  for (const [fname, expected] of Object.entries(hashes)) {
    const f = zip.file(fname);
    if (!f) { missing.push(fname); continue; }
    const content = await f.async("string");
    const h = await sha256Hex(content);
    if (h !== expected) mismatched.push(fname);
  }
  details["各檔案存在"] = missing.length === 0;
  details["雜湊值相符"] = mismatched.length === 0;
  const attachFiles = Object.keys(zip.files).filter((p) => p.startsWith("附件/") && !zip.files[p].dir);
  details["附件數量相符"] = (manifest.attachment_count || 0) === attachFiles.length;
  const ok = Object.values(details).every(Boolean);
  return { ok, details, missing, mismatched, attachFilesCount: attachFiles.length };
}

/* 解析整份備份 zip 回內部資料結構（含把附件二進位重新接回對應紀錄的 attachment 欄位） */
async function parseBackupZip(zip) {
  const mf = zip.file("manifest.json");
  const manifest = mf ? JSON.parse(await mf.async("string")) : null;
  const attachMap = {};
  const listFile = zip.file("附件清單.csv");
  if (listFile) {
    const rows = csvToRows(await listFile.async("string"));
    rows.forEach((row) => {
      const id = row["紀錄ID"];
      if (id) attachMap[id] = { path: row["儲存路徑"], name: row["檔名"] };
    });
  }
  const tables = {};
  for (const key of BACKUP_TABLE_KEYS) {
    const f = zip.file(`${EXPORT_TYPE_LABELS[key]}.csv`);
    const rows = f ? csvToRows(await f.async("string")) : [];
    let parsed = rows.map(RESTORE_PARSERS[key]);
    if (["expenses", "incomes", "orders", "receivables"].includes(key)) {
      const withAttach = [];
      for (const r of parsed) {
        const info = attachMap[r.id];
        let attachment = null;
        if (info && info.path) {
          const f2 = zip.file(info.path);
          if (f2) {
            const b64 = await f2.async("base64");
            attachment = { name: info.name || "附件", type: "image", data: `data:image/jpeg;base64,${b64}` };
          }
        }
        withAttach.push({ ...r, attachment });
      }
      parsed = withAttach;
    }
    tables[key] = parsed;
  }
  return { manifest, tables };
}

/* ── 分頁一：資料匯出 ── */
function ExportTab({ data, user, profiles }) {
  const isAcctFull = perm.isAcct(user); // 系統管理者／會計：不限門店範圍
  const scope = perm.storeScope(user); // 店長：僅限自己門店範圍（storeScope 已處理烘豆場併入中山店的邏輯）
  const storeOptions = data.stores.filter((s) => s.active && (isAcctFull || (scope && scope.includes(s.id))));
  const defaultStoreId = isAcctFull ? "" : ((storeOptions[0] && storeOptions[0].id) || "");

  const [rangeMode, setRangeMode] = useState("range");
  const [dateFrom, setDateFrom] = useState("");
  const [dateTo, setDateTo] = useState("");
  const [month, setMonth] = useState(monthOf(todayStr()));
  const [storeId, setStoreId] = useState(defaultStoreId);
  const [types, setTypes] = useState({
    dailySales: true, expenses: true, incomes: false, orders: false, receivables: false,
    vendors: false, approvalLogs: false, auditLogs: false, attachments: false,
  });
  const [salesStatusFilter, setSalesStatusFilter] = useState(new Set());
  const [expIncStatusFilter, setExpIncStatusFilter] = useState(new Set());
  const [payStatusFilter, setPayStatusFilter] = useState(new Set());
  const [apOnly, setApOnly] = useState(false);
  const [advanceOnly, setAdvanceOnly] = useState(false);
  const [format, setFormat] = useState("xlsx");
  const [busy, setBusy] = useState(false);

  const ctx = makeExportCtx(data, profiles);
  const nameOf = ctx.nameOf;

  const toggleType = (k) => setTypes((t) => ({ ...t, [k]: !t[k] }));
  const toggleSet = (setFn, v) => setFn((s) => { const n = new Set(s); if (n.has(v)) n.delete(v); else n.add(v); return n; });

  const inRange = (dateStr) => {
    if (!dateStr) return false;
    if (rangeMode === "month") return monthOf(dateStr) === month;
    if (dateFrom && cmpDate(dateStr, dateFrom) < 0) return false;
    if (dateTo && cmpDate(dateStr, dateTo) > 0) return false;
    return true;
  };
  /* 選到子單位（如烘豆場）時直接比對；選到母門店時把子單位資料一併併入 */
  const storeOk = (sid) => {
    if (!storeId) return true;
    if (!sid) return false;
    if (sid === storeId) return true;
    return acctStoreId(data.stores, sid) === storeId;
  };

  const buildRows = (type) => {
    switch (type) {
      case "dailySales":
        return data.dailySales
          .filter((r) => inRange(r.date) && storeOk(r.storeId) && (salesStatusFilter.size === 0 || salesStatusFilter.has(r.status)))
          .map((r) => rowSales(r, ctx));
      case "expenses":
        return data.expenses
          .filter((r) => inRange(r.date) && storeOk(r.storeId) && (expIncStatusFilter.size === 0 || expIncStatusFilter.has(r.status)) && (!advanceOnly || r.isAdvance === true))
          .map((r) => rowExpense(r, ctx));
      case "incomes":
        return (data.incomes || [])
          .filter((r) => inRange(r.date) && storeOk(r.storeId) && (expIncStatusFilter.size === 0 || expIncStatusFilter.has(r.status)))
          .map((r) => rowIncome(r, ctx));
      case "orders":
        return data.orders
          .filter((r) => inRange(r.date) && storeOk(r.storeId) && (payStatusFilter.size === 0 || payStatusFilter.has(r.payStatus)) && (!apOnly || (r.billing === "月結" && r.payStatus !== "已付款")))
          .map((r) => rowOrder(r, ctx));
      case "receivables":
        return data.receivables.filter((r) => inRange(r.date)).map((r) => rowAR(r, ctx));
      case "vendors":
        return data.vendors.map((v) => rowVendor(v));
      case "approvalLogs":
        return (data.approvalLogs || []).filter((l) => inRange((l.time || "").slice(0, 10))).map((l) => rowApproval(l, ctx));
      case "auditLogs":
        return (data.auditLogs || []).filter((l) => inRange((l.time || "").slice(0, 10))).map((l) => rowAudit(l, ctx));
      case "attachments":
        return collectAttachments(data, (dateStr, sid, hasStore) => inRange(dateStr) && (!hasStore || storeOk(sid)))
          .map((item) => ({
            紀錄ID: item.record.id, 資料類型: item.label, 門店名稱: item.hasStore ? nameOf(item.record.storeId) : "",
            日期: item.record.date, 金額: num(item.record.amount), 檔名: item.record.attachment.name, 附件類型: item.record.attachment.type,
          }));
      default:
        return [];
    }
  };

  const scopeDesc = (selectedTypes) => {
    const rangePart = rangeMode === "month" ? monthLabel(month) : `${dateFrom || "不限起日"}～${dateTo || "不限迄日"}`;
    const storePart = storeId ? nameOf(storeId) : "全部門店";
    return `${rangePart}・${storePart}・${selectedTypes.map((t) => EXPORT_TYPE_LABELS[t]).join("、")}`;
  };
  const filterDesc = () => {
    const parts = [];
    if (salesStatusFilter.size) parts.push(`日結狀態：${[...salesStatusFilter].join("、")}`);
    if (expIncStatusFilter.size) parts.push(`支出／收入狀態：${[...expIncStatusFilter].join("、")}`);
    if (payStatusFilter.size) parts.push(`叫貨付款狀態：${[...payStatusFilter].join("、")}`);
    if (apOnly) parts.push("僅應付帳款（月結且未付清）");
    if (advanceOnly) parts.push("僅員工代墊");
    return parts.length ? parts.join("；") : "無額外篩選";
  };
  const fileDateLabel = () => { const parts = todayStr().split("/"); return `${parts[0]}年${parts[1]}月${parts[2]}日`; };

  const doExport = async () => {
    const selectedTypes = Object.keys(types).filter((t) => types[t]);
    if (selectedTypes.length === 0) { alert("請至少勾選一種資料類型"); return; }
    if (rangeMode === "range") {
      if (dateFrom && !validDate(dateFrom)) { alert("起始日期格式錯誤，需 YYYY/MM/DD"); return; }
      if (dateTo && !validDate(dateTo)) { alert("結束日期格式錯誤，需 YYYY/MM/DD"); return; }
    }
    if (!isAcctFull && !storeId) { alert("請選擇門店（店長僅能匯出自己所屬門店的資料）"); return; }

    setBusy(true);
    let fileName = null, fileSize = null, totalRecords = 0;
    const rowsByType = {};
    try {
      selectedTypes.forEach((t) => { rowsByType[t] = buildRows(t); });
      totalRecords = selectedTypes.reduce((a, t) => a + rowsByType[t].length, 0);
      const sd = scopeDesc(selectedTypes), fd = filterDesc();
      const hasPii = selectedTypes.some((t) => ["expenses", "incomes", "orders", "receivables", "vendors"].includes(t));
      const hasAttachments = selectedTypes.includes("attachments");
      const baseFileName = `PHASE帳務匯出_${fileDateLabel()}`;

      if (format === "xlsx") {
        const wb = XLSX.utils.book_new();
        const infoRows = [
          ["PHASE 帳務匯出說明"], [],
          ["匯出時間", nowStamp()], ["匯出人", user.name],
          ["資料範圍", sd], ["篩選條件", fd], [],
          ["各表筆數"],
          ...selectedTypes.map((t) => [EXPORT_TYPE_LABELS[t], rowsByType[t].length]),
          [], ["系統版本", APP_VERSION],
        ];
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(infoRows), "匯出說明");
        selectedTypes.forEach((t) => XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rowsByType[t]), EXPORT_TYPE_LABELS[t].slice(0, 31)));
        const wbout = XLSX.write(wb, { bookType: "xlsx", type: "array" });
        const blob = new Blob([wbout], { type: "application/octet-stream" });
        fileName = `${baseFileName}.xlsx`; fileSize = blob.size;
        downloadBlobFile(blob, fileName);
      } else if (selectedTypes.length === 1) {
        const t = selectedTypes[0];
        const csv = XLSX.utils.sheet_to_csv(XLSX.utils.json_to_sheet(rowsByType[t]));
        const blob = new Blob(["﻿" + csv], { type: "text/csv;charset=utf-8;" });
        fileName = `${EXPORT_TYPE_LABELS[t]}_${fileDateLabel()}.csv`; fileSize = blob.size;
        downloadBlobFile(blob, fileName);
      } else {
        const zip = new JSZip();
        selectedTypes.forEach((t) => {
          const csv = XLSX.utils.sheet_to_csv(XLSX.utils.json_to_sheet(rowsByType[t]));
          zip.file(`${EXPORT_TYPE_LABELS[t]}.csv`, "﻿" + csv);
        });
        const infoText = [
          "PHASE 帳務匯出說明", "", `匯出時間：${nowStamp()}`, `匯出人：${user.name}`,
          `資料範圍：${sd}`, `篩選條件：${fd}`, "", "各表筆數：",
          ...selectedTypes.map((t) => `　${EXPORT_TYPE_LABELS[t]}：${rowsByType[t].length} 筆`),
          "", `系統版本：${APP_VERSION}`,
        ].join("\n");
        zip.file("匯出說明.txt", infoText);
        const blob = await zip.generateAsync({ type: "blob" });
        fileName = `${baseFileName}.zip`; fileSize = blob.size;
        downloadBlobFile(blob, fileName);
      }

      await logExportAudit(user, {
        actionType: "export", scope: sd, dataTypes: selectedTypes.map((t) => EXPORT_TYPE_LABELS[t]),
        fileName, fileSize, recordCount: totalRecords, hasPii, hasAttachments, result: "success",
      });
    } catch (e) {
      await logExportAudit(user, {
        actionType: "export", scope: "—", dataTypes: selectedTypes.map((t) => EXPORT_TYPE_LABELS[t]),
        fileName, fileSize, recordCount: totalRecords, hasPii: false, hasAttachments: false,
        result: "failed", failReason: String((e && e.message) || e),
      });
      alert("匯出失敗：" + ((e && e.message) || e));
    } finally {
      setBusy(false);
    }
  };

  const typeList = [
    ["dailySales", "每日營收"], ["expenses", "每日支出"], ["incomes", "門店收入"], ["orders", "廠商叫貨"],
    ["receivables", "應收帳款"], ["vendors", "廠商主檔"], ["approvalLogs", "審核紀錄"], ["auditLogs", "操作紀錄"],
    ["attachments", "附件清單"],
  ];

  return (
    <div className="pl-card" style={{ padding: 18, display: "grid", gap: 16 }}>
      <div>
        <div style={{ fontWeight: 700, marginBottom: 6 }}>時間範圍</div>
        <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
          {[["range", "按區間"], ["month", "按月份"]].map(([k, l]) => (
            <button key={k} className={"pl-btn small" + (rangeMode === k ? " primary" : "")} onClick={() => setRangeMode(k)}>{l}</button>
          ))}
        </div>
        {rangeMode === "range" ? (
          <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
            <DateInput style={{ width: 150 }} value={dateFrom} onChange={(e) => setDateFrom(e.target.value)} />
            <span style={{ color: T.sub }}>～</span>
            <DateInput style={{ width: 150 }} value={dateTo} onChange={(e) => setDateTo(e.target.value)} />
            <span style={{ fontSize: 12, color: T.sub }}>留空代表不限起／迄日</span>
          </div>
        ) : (
          <MonthPicker value={month} onChange={setMonth} />
        )}
      </div>

      <div>
        <div style={{ fontWeight: 700, marginBottom: 6 }}>門店</div>
        {isAcctFull ? (
          <select className="pl-input" style={{ width: 160 }} value={storeId} onChange={(e) => setStoreId(e.target.value)}>
            <option value="">全部門店</option>
            {data.stores.filter((s) => s.active).map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
        ) : (
          <select className="pl-input" style={{ width: 160 }} value={storeId} onChange={(e) => setStoreId(e.target.value)}>
            {storeOptions.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
        )}
        {!isAcctFull && <div style={{ fontSize: 12, color: T.sub, marginTop: 4 }}>店長僅能匯出自己所屬門店的資料（含所屬烘豆場等附屬單位），不能選「全部門店」。</div>}
      </div>

      <div>
        <div style={{ fontWeight: 700, marginBottom: 6 }}>資料類型</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(140px,1fr))", gap: 8 }}>
          {typeList.map(([k, l]) => (
            <label key={k} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 13.5 }}>
              <input type="checkbox" checked={types[k]} onChange={() => toggleType(k)} /> {l}
            </label>
          ))}
        </div>
      </div>

      {types.dailySales && (
        <div>
          <div style={{ fontSize: 12.5, color: T.sub, marginBottom: 4 }}>日結狀態篩選（不勾選代表不篩選）</div>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
            {SALES_STATUS.map((s) => (
              <label key={s} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 13 }}>
                <input type="checkbox" checked={salesStatusFilter.has(s)} onChange={() => toggleSet(setSalesStatusFilter, s)} /> {s}
              </label>
            ))}
          </div>
        </div>
      )}
      {(types.expenses || types.incomes) && (
        <div>
          <div style={{ fontSize: 12.5, color: T.sub, marginBottom: 4 }}>支出／收入審核狀態篩選（不勾選代表不篩選）</div>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
            {EXP_STATUS.map((s) => (
              <label key={s} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 13 }}>
                <input type="checkbox" checked={expIncStatusFilter.has(s)} onChange={() => toggleSet(setExpIncStatusFilter, s)} /> {s}
              </label>
            ))}
          </div>
        </div>
      )}
      {types.orders && (
        <div>
          <div style={{ fontSize: 12.5, color: T.sub, marginBottom: 4 }}>叫貨付款狀態篩選（不勾選代表不篩選）</div>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
            {ORDER_PAY_STATUS.map((s) => (
              <label key={s} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 13 }}>
                <input type="checkbox" checked={payStatusFilter.has(s)} onChange={() => toggleSet(setPayStatusFilter, s)} /> {s}
              </label>
            ))}
          </div>
        </div>
      )}

      <div style={{ display: "flex", gap: 18, flexWrap: "wrap" }}>
        {types.orders && (
          <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 13.5 }}>
            <input type="checkbox" checked={apOnly} onChange={(e) => setApOnly(e.target.checked)} /> 僅應付帳款（月結且未付清）
          </label>
        )}
        {types.expenses && (
          <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 13.5 }}>
            <input type="checkbox" checked={advanceOnly} onChange={(e) => setAdvanceOnly(e.target.checked)} /> 僅員工代墊
          </label>
        )}
      </div>

      <div>
        <div style={{ fontWeight: 700, marginBottom: 6 }}>匯出格式</div>
        <div style={{ display: "flex", gap: 14 }}>
          {[["xlsx", "Excel（.xlsx）"], ["csv", "CSV"]].map(([k, l]) => (
            <label key={k} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 13.5 }}>
              <input type="radio" name="exportFormat" checked={format === k} onChange={() => setFormat(k)} /> {l}
            </label>
          ))}
        </div>
        <div style={{ fontSize: 12, color: T.sub, marginTop: 4 }}>勾選多種資料類型時，CSV 格式會打包成一個 zip 檔一次下載，避免瀏覽器擋下多個下載請求。</div>
      </div>

      <div>
        <button className="pl-btn primary" disabled={busy} onClick={doExport}>{busy ? "匯出中…" : "產生並下載"}</button>
      </div>
    </div>
  );
}

/* ── 分頁二：備份管理 ── */
function BackupTab({ data, user, profiles, onGotoRestore }) {
  const [backups, setBackups] = useState([]);
  const [loading, setLoading] = useState(true);
  const [creating, setCreating] = useState(false);

  const fetchBackups = useCallback(async () => {
    const { data: rows, error } = await sb.from("backups").select("*").order("created_at", { ascending: false });
    if (!error) setBackups(rows || []);
    setLoading(false);
  }, []);

  useEffect(() => {
    fetchBackups();
    const channel = sb.channel("backups_sync")
      .on("postgres_changes", { event: "*", schema: "public", table: "backups" }, fetchBackups)
      .subscribe();
    return () => sb.removeChannel(channel);
  }, [fetchBackups]);

  const runCreate = async (backupType) => {
    setCreating(true);
    const r = await createBackup(data, profiles, user, backupType);
    setCreating(false);
    if (!r.ok) alert("備份建立失敗：" + (r.error || "驗證未通過，請見備份列表狀態與驗證結果欄位"));
    else alert(backupType === "monthly_archive" ? "月結封存已建立並驗證成功。" : "備份已建立並驗證成功。");
    fetchBackups();
  };

  const downloadBackup = async (b) => {
    try {
      if (!b.storage_path) throw new Error("此備份沒有可下載的檔案路徑");
      const { data: blob, error } = await sb.storage.from("ledger-backups").download(b.storage_path);
      if (error) throw error;
      downloadBlobFile(blob, b.storage_path);
      await logExportAudit(user, {
        actionType: "download", scope: `${b.backup_type}・${b.date_range}・${b.store_scope}`,
        dataTypes: [], fileName: b.storage_path, fileSize: blob.size, recordCount: b.total_records,
        hasPii: true, hasAttachments: (b.attachment_count || 0) > 0, result: "success",
      });
    } catch (e) {
      await logExportAudit(user, {
        actionType: "download", scope: `${b.backup_type}`, dataTypes: [], fileName: b.storage_path || null,
        fileSize: null, recordCount: null, hasPii: false, hasAttachments: false,
        result: "failed", failReason: String((e && e.message) || e),
      });
      alert("下載失敗：" + ((e && e.message) || e));
    }
  };

  const deleteBackup = async (b) => {
    if (!confirm(`確定刪除備份「${b.date_range}・${b.store_scope}」（建立於 ${b.created_at ? new Date(b.created_at).toLocaleString("zh-TW") : ""}）？此動作無法復原。`)) return;
    try {
      if (b.storage_path) await sb.storage.from("ledger-backups").remove([b.storage_path]);
      const { error } = await sb.from("backups").delete().eq("id", b.id);
      if (error) throw error;
      fetchBackups();
    } catch (e) {
      alert("刪除失敗：" + ((e && e.message) || e));
    }
  };

  const sizeLabel = (n) => (n === null || n === undefined ? "—" : (n / 1024 / 1024).toFixed(2) + " MB");
  const verifySummary = (b) => {
    const v = b.verification_detail;
    if (!v) return "—";
    const bad = Object.entries(v).filter(([, ok]) => !ok).map(([k]) => k);
    return bad.length === 0 ? "全部通過" : `未通過：${bad.join("、")}`;
  };
  const canDownload = perm.isAcct(user); // 備份內容涵蓋全店範圍，超出店長權限，店長不能下載

  return (
    <div>
      <div className="pl-card" style={{ padding: "12px 16px", marginBottom: 14, background: T.brownSoft, fontSize: 12.5, color: T.ink }}>
        目前備份為手動觸發，尚未啟用每日／每週自動排程與異地雲端同步，需要另外設定伺服器端排程（Supabase Edge Functions）才能做到全自動，這部分待之後評估。
      </div>

      {perm.isAcct(user) && (
        <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
          <button className="pl-btn primary" disabled={creating} onClick={() => runCreate("manual")}>{creating ? "備份建立中…" : "立即備份"}</button>
          <button className="pl-btn" disabled={creating} onClick={() => runCreate("monthly_archive")}>{creating ? "備份建立中…" : "建立月結封存（上個月）"}</button>
        </div>
      )}

      <div className="pl-card pl-scroll-x">
        <table className="pl-table">
          <thead><tr>
            <th>日期</th><th>類型</th><th>範圍</th><th className="num">大小</th><th className="num">資料筆數</th>
            <th className="num">附件數</th><th>狀態</th><th>驗證結果</th><th>建立人</th><th></th>
          </tr></thead>
          <tbody>
            {loading && <tr><td colSpan={10}><Empty text="載入中…" /></td></tr>}
            {!loading && backups.length === 0 && <tr><td colSpan={10}><Empty text="尚無備份紀錄。" /></td></tr>}
            {backups.map((b) => (
              <tr key={b.id}>
                <td style={{ whiteSpace: "nowrap" }}>{b.created_at ? new Date(b.created_at).toLocaleString("zh-TW") : "—"}</td>
                <td>{b.backup_type === "manual" ? "手動備份" : b.backup_type === "monthly_archive" ? "月結封存" : "還原前備份"}</td>
                <td>{b.date_range}・{b.store_scope}</td>
                <td className="num">{sizeLabel(b.total_file_size)}</td>
                <td className="num">{b.total_records ?? "—"}</td>
                <td className="num">{b.attachment_count ?? "—"}</td>
                <td><Badge text={b.backup_status} tone={b.backup_status === "驗證成功" ? "green" : b.backup_status === "驗證失敗" ? "red" : b.backup_status === "已還原" ? "brown" : "yellow"} /></td>
                <td style={{ fontSize: 12, maxWidth: 220 }}>{verifySummary(b)}</td>
                <td>{b.created_by_name}</td>
                <td style={{ whiteSpace: "nowrap" }}>
                  {canDownload
                    ? <button className="pl-btn small" disabled={!b.storage_path} onClick={() => downloadBackup(b)}>下載</button>
                    : <button className="pl-btn small" disabled title="備份內容涵蓋全店範圍，超出店長權限">下載</button>}
                  {" "}<button className="pl-btn small" onClick={() => onGotoRestore(b)}>還原</button>
                  {perm.isAdmin(user) && <> <button className="pl-btn small danger" onClick={() => deleteBackup(b)}>刪除</button></>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ── 分頁三：還原（僅系統管理者可見內容） ── */
function RestoreTab({ data, update, user, profiles, presetBackup }) {
  const [sourceMode, setSourceMode] = useState("system"); // system | upload
  const [backups, setBackups] = useState([]);
  const [selectedBackupId, setSelectedBackupId] = useState(presetBackup ? presetBackup.id : "");
  const [uploadedFile, setUploadedFile] = useState(null);
  const [scopeType, setScopeType] = useState("batch"); // batch | month | store | full
  const [scopeMonth, setScopeMonth] = useState(monthOf(todayStr()));
  const retailStores = data.stores.filter((s) => s.retail && s.active);
  const [scopeStoreId, setScopeStoreId] = useState((retailStores[0] && retailStores[0].id) || "");
  const [loadedZip, setLoadedZip] = useState(null);
  const [manifest, setManifest] = useState(null);
  const [verifyResult, setVerifyResult] = useState(null);
  const [parsedTables, setParsedTables] = useState(null);
  const [preview, setPreview] = useState(null);
  const [reason, setReason] = useState("");
  const [busy, setBusy] = useState(false);
  const [step, setStep] = useState(1);
  const fileRef = useRef();

  useEffect(() => {
    sb.from("backups").select("*").order("created_at", { ascending: false })
      .then(({ data: rows, error }) => { if (!error) setBackups(rows || []); });
  }, []);

  /* 權限檢查放在所有 hooks 呼叫之後，避免角色變動時違反 React hooks 呼叫順序規則
     （跟 ARModule／MasterModule 等既有頁面的寫法一致） */
  if (!perm.isAdmin(user)) return <Empty text="還原僅開放系統管理者操作。" />;

  const resetFromStep2 = () => {
    setLoadedZip(null); setManifest(null); setVerifyResult(null); setParsedTables(null); setPreview(null); setStep(1);
  };

  const loadZip = async () => {
    if (sourceMode === "system") {
      if (!selectedBackupId) { alert("請選擇一份備份"); return null; }
      const b = backups.find((x) => x.id === selectedBackupId);
      if (!b || !b.storage_path) { alert("此備份缺少檔案路徑，無法還原"); return null; }
      const { data: blob, error } = await sb.storage.from("ledger-backups").download(b.storage_path);
      if (error) { alert("下載備份檔失敗：" + error.message); return null; }
      return await JSZip.loadAsync(blob);
    }
    if (!uploadedFile) { alert("請先選擇要上傳的 ZIP 檔"); return null; }
    const buf = await uploadedFile.arrayBuffer();
    return await JSZip.loadAsync(buf);
  };

  const handleVerify = async () => {
    setBusy(true);
    try {
      const zip = await loadZip();
      if (!zip) { setBusy(false); return; }
      const mf = zip.file("manifest.json");
      const mani = mf ? JSON.parse(await mf.async("string")) : null;
      const vr = await verifyBackupIntegrity(zip, mani);
      setLoadedZip(zip); setManifest(mani); setVerifyResult(vr);
      if (!vr.ok) {
        alert("備份完整性驗證未通過，請見下方明細，無法繼續下一步。");
      } else {
        setStep(2);
      }
    } catch (e) {
      setVerifyResult({ ok: false, details: {}, error: String((e && e.message) || e) });
      alert("驗證失敗：" + ((e && e.message) || e));
    } finally {
      setBusy(false);
    }
  };

  const handlePreview = async () => {
    setBusy(true);
    try {
      const parsed = await parseBackupZip(loadedZip);
      setParsedTables(parsed.tables);
      const prev = computeRestorePreview(data, parsed.tables, scopeType, scopeMonth, scopeStoreId);
      setPreview(prev);
      setStep(3);
    } catch (e) {
      alert("預覽產生失敗：" + ((e && e.message) || e));
    } finally {
      setBusy(false);
    }
  };

  const scopeDesc = () => {
    if (scopeType === "month") return `單一月份・${monthLabel(scopeMonth)}`;
    if (scopeType === "store") return `單一門店・${(data.stores.find((s) => s.id === scopeStoreId) || {}).name || scopeStoreId}`;
    if (scopeType === "batch") return "單一批次（完整還原所選備份）";
    return "完整系統還原";
  };

  const runRestore = async () => {
    if (!reason.trim()) { alert("請填寫還原原因"); return; }
    if (!verifyResult || !verifyResult.ok) { alert("請先通過備份完整性驗證"); return; }
    if (!preview || !parsedTables) { alert("請先產生還原預覽"); return; }
    const summaryText = RESTORE_TABLE_KEYS.map((k) => `${EXPORT_TYPE_LABELS[k]}：新增 ${preview[k].added}・更新覆蓋 ${preview[k].updated}・不變 ${preview[k].unchanged}`).join("\n");
    if (!confirm(`即將執行還原（範圍：${scopeDesc()}），以下資料將被變動：\n\n${summaryText}\n\n還原原因：${reason}\n\n此操作會先自動建立一份還原前備份，確定執行？`)) return;

    setBusy(true);
    try {
      const preBackup = await createBackup(data, profiles, user, "pre_restore", { note: "還原前自動備份" });
      if (!preBackup.ok) {
        alert("還原前自動備份失敗，還原已中止，資料未變動。原因：" + (preBackup.error || "備份驗證未通過"));
        await logExportAudit(user, {
          actionType: "restore", scope: `${scopeDesc()}・原因：${reason}`, dataTypes: RESTORE_TABLE_KEYS.map((k) => EXPORT_TYPE_LABELS[k]),
          fileName: null, fileSize: null, recordCount: null, hasPii: true, hasAttachments: false,
          result: "failed", failReason: "還原前自動備份失敗：" + (preBackup.error || "驗證未通過"),
        });
        setBusy(false);
        return;
      }

      /* 唯一一次 update() 呼叫：在回呼內用最新的 d 計算合併結果，符合單一原子性寫入 */
      update((d) => computeMergedData(d, parsedTables, scopeType, scopeMonth, scopeStoreId));

      if (sourceMode === "system" && selectedBackupId) {
        await sb.from("backups").update({ backup_status: "已還原", restored_at: new Date().toISOString(), restored_by: user.id }).eq("id", selectedBackupId);
      }

      const changedCount = RESTORE_TABLE_KEYS.reduce((a, k) => a + preview[k].added + preview[k].updated, 0);
      const sourceBackup = backups.find((b) => b.id === selectedBackupId);
      await logExportAudit(user, {
        actionType: "restore", scope: `${scopeDesc()}・原因：${reason}`, dataTypes: RESTORE_TABLE_KEYS.map((k) => EXPORT_TYPE_LABELS[k]),
        fileName: sourceMode === "system" ? (sourceBackup && sourceBackup.storage_path) : (uploadedFile ? uploadedFile.name : null),
        fileSize: null, recordCount: changedCount, hasPii: true, hasAttachments: true, result: "success",
      });
      alert("還原完成。");
      resetFromStep2(); setReason("");
    } catch (e) {
      await logExportAudit(user, {
        actionType: "restore", scope: `${scopeDesc()}・原因：${reason}`, dataTypes: [], fileName: null, fileSize: null,
        recordCount: null, hasPii: false, hasAttachments: false, result: "failed", failReason: String((e && e.message) || e),
      });
      alert("還原失敗：" + ((e && e.message) || e));
    } finally {
      setBusy(false);
    }
  };

  return (
    <div style={{ display: "grid", gap: 16 }}>
      <div className="pl-card" style={{ padding: "12px 16px", background: T.redBg, fontSize: 12.5, color: T.red }}>
        還原會直接覆蓋／新增所選範圍內的正式資料，執行前系統會自動建立一份還原前備份，但仍請謹慎操作。
      </div>

      <div className="pl-card" style={{ padding: 18, display: "grid", gap: 14 }}>
        <div style={{ fontWeight: 700 }}>① 選擇還原範圍與來源</div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {[["batch", "單一批次"], ["month", "單一月份"], ["store", "單一門店"], ["full", "完整系統還原"]].map(([k, l]) => (
            <button key={k} className={"pl-btn small" + (scopeType === k ? " primary" : "")} disabled={step > 1} onClick={() => setScopeType(k)}>{l}</button>
          ))}
        </div>
        {scopeType === "month" && <MonthPicker value={scopeMonth} onChange={setScopeMonth} />}
        {scopeType === "store" && (
          <select className="pl-input" style={{ width: 160 }} disabled={step > 1} value={scopeStoreId} onChange={(e) => setScopeStoreId(e.target.value)}>
            {retailStores.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
        )}

        <div style={{ display: "flex", gap: 6 }}>
          {[["system", "從系統內備份還原"], ["upload", "上傳 ZIP 檔還原"]].map(([k, l]) => (
            <button key={k} className={"pl-btn small" + (sourceMode === k ? " primary" : "")} disabled={step > 1} onClick={() => { setSourceMode(k); resetFromStep2(); }}>{l}</button>
          ))}
        </div>
        {sourceMode === "system" ? (
          <select className="pl-input" style={{ maxWidth: 420 }} disabled={step > 1} value={selectedBackupId} onChange={(e) => setSelectedBackupId(e.target.value)}>
            <option value="">請選擇備份</option>
            {backups.filter((b) => b.backup_status === "驗證成功" || b.backup_status === "已還原").map((b) => (
              <option key={b.id} value={b.id}>{b.created_at ? new Date(b.created_at).toLocaleString("zh-TW") : b.id}・{b.backup_type}・{b.date_range}</option>
            ))}
          </select>
        ) : (
          <div>
            <input ref={fileRef} type="file" accept=".zip" disabled={step > 1} onChange={(e) => setUploadedFile(e.target.files[0] || null)} />
            {uploadedFile && <span style={{ fontSize: 12.5, color: T.sub, marginLeft: 8 }}>{uploadedFile.name}</span>}
          </div>
        )}

        {step === 1 && <div><button className="pl-btn primary" disabled={busy} onClick={handleVerify}>{busy ? "驗證中…" : "驗證備份完整性"}</button></div>}
        {step > 1 && <div><button className="pl-btn small" onClick={resetFromStep2}>重新選擇範圍／來源</button></div>}
      </div>

      {verifyResult && (
        <div className="pl-card" style={{ padding: 18 }}>
          <div style={{ fontWeight: 700, marginBottom: 8 }}>② 完整性驗證結果</div>
          <div style={{ display: "grid", gap: 4, fontSize: 13.5 }}>
            {Object.entries(verifyResult.details || {}).map(([k, v]) => (
              <div key={k} style={{ color: v ? T.green : T.red }}>{v ? "✓" : "✕"} {k}</div>
            ))}
            {verifyResult.error && <div style={{ color: T.red }}>錯誤：{verifyResult.error}</div>}
          </div>
          {verifyResult.ok && step === 2 && (
            <div style={{ marginTop: 10 }}>
              <button className="pl-btn primary" disabled={busy} onClick={handlePreview}>{busy ? "產生預覽中…" : "產生還原預覽"}</button>
            </div>
          )}
        </div>
      )}

      {preview && step >= 3 && (
        <div className="pl-card" style={{ padding: 18 }}>
          <div style={{ fontWeight: 700, marginBottom: 8 }}>③ 還原預覽（範圍：{scopeDesc()}）</div>
          <div className="pl-scroll-x">
            <table className="pl-table">
              <thead><tr><th>資料類型</th><th className="num">新增</th><th className="num">更新覆蓋</th><th className="num">不變</th><th className="num">備份內筆數</th></tr></thead>
              <tbody>
                {RESTORE_TABLE_KEYS.map((k) => (
                  <tr key={k}>
                    <td>{EXPORT_TYPE_LABELS[k]}</td>
                    <td className="num">{preview[k].added}</td>
                    <td className="num">{preview[k].updated}</td>
                    <td className="num">{preview[k].unchanged}</td>
                    <td className="num">{preview[k].total}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {scopeType === "store" && <div style={{ fontSize: 12, color: T.sub, marginTop: 6 }}>應收帳款無門店欄位，選擇「單一門店」範圍時不會還原應收帳款資料。</div>}

          <div style={{ marginTop: 14 }}>
            <Field label="還原原因" required>
              <input className="pl-input" value={reason} onChange={(e) => setReason(e.target.value)} placeholder="請說明本次還原的原因" />
            </Field>
          </div>
          <div style={{ marginTop: 12 }}>
            <button className="pl-btn danger" disabled={busy || !reason.trim()} onClick={runRestore}>{busy ? "還原執行中…" : "確認執行還原"}</button>
          </div>
        </div>
      )}
    </div>
  );
}

const dayShift = (dateStr, n) => {
  const [y, m, d] = dateStr.split("/").map(Number);
  const dt = new Date(y, m - 1, d + n);
  return `${dt.getFullYear()}/${pad2(dt.getMonth() + 1)}/${pad2(dt.getDate())}`;
};

/* ── 登入畫面：Supabase Auth 真登入，帳號一律由系統管理者於後台建立，不開放自行註冊 ── */
function Login() {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const [resetSent, setResetSent] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    if (!email.trim() || !password) return;
    setErr(""); setResetSent(false); setLoading(true);
    const { error } = await sb.auth.signInWithPassword({ email: email.trim(), password });
    setLoading(false);
    if (error) setErr(error.message === "Invalid login credentials" ? "帳號或密碼錯誤，請確認後再試一次。" : error.message);
  };

  const forgot = async () => {
    if (!email.trim()) { setErr("請先在上方輸入 email，再點擊忘記密碼。"); return; }
    setErr(""); setLoading(true);
    const { error } = await sb.auth.resetPasswordForEmail(email.trim());
    setLoading(false);
    if (error) setErr(error.message);
    else setResetSent(true);
  };

  return (
    <div className="pl-root" style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", padding: 16 }}>
      <style>{css}</style>
      <div className="pl-card" style={{ width: "100%", maxWidth: 360, padding: 28 }}>
        <div className="pl-serif" style={{ fontSize: 22, fontWeight: 700, letterSpacing: ".12em", textAlign: "center" }}>PHASE</div>
        <div style={{ textAlign: "center", color: T.sub, fontSize: 12, letterSpacing: ".06em", marginBottom: 24 }}>門店帳務管理系統・登入</div>
        <form onSubmit={submit} style={{ display: "grid", gap: 14 }}>
          <Field label="Email" required>
            <input className="pl-input" type="email" autoComplete="username" value={email} onChange={(e) => setEmail(e.target.value)} required />
          </Field>
          <Field label="密碼" required>
            <input className="pl-input" type="password" autoComplete="current-password" value={password} onChange={(e) => setPassword(e.target.value)} required />
          </Field>
          {err && <div style={{ color: T.red, fontSize: 13 }}>{err}</div>}
          {resetSent && <div style={{ color: T.green, fontSize: 13 }}>重設密碼信件已寄出，請至信箱查收。</div>}
          <button className="pl-btn primary" type="submit" disabled={loading}>{loading ? "登入中…" : "登入"}</button>
        </form>
        <button type="button" onClick={forgot} style={{ display: "block", margin: "14px auto 0", background: "none", border: "none", color: T.sub, fontSize: 12.5, textDecoration: "underline", cursor: "pointer" }}>
          忘記密碼？
        </button>
      </div>
    </div>
  );
}

function App() {
  /* undefined = 確認登入狀態中；null = 確定未登入；物件 = 已登入 */
  const [session, setSession] = useState(undefined);
  const [profiles, setProfiles] = useState([]);
  const [data, setData] = useState(null);
  const [page, setPage] = useState(() => {
    const h = window.location.hash.replace("#", "");
    return NAV.some(([k]) => k === h) ? h : "dashboard";
  });
  const [month, setMonth] = usePersisted("pl_dash_month", monthOf(todayStr()));
  const [storeFilter, setStoreFilter] = usePersisted("pl_dash_storeFilter", null);
  const [saveState, setSaveState] = useState("idle"); // idle | saving | saved | error
  const saveTimer = useRef(null);
  const firstLoad = useRef(true);
  const applyingRemote = useRef(false); // 遠端 Realtime 同步進來的變動，避免又存回去造成迴圈

  /* 瀏覽器上一頁／下一頁（或重新整理後網址列仍帶著 #頁面 hash）時同步目前頁面 */
  useEffect(() => {
    const onHash = () => {
      const h = window.location.hash.replace("#", "");
      if (NAV.some(([k]) => k === h)) setPage(h);
    };
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  /* 登入狀態：初始確認 + 監聽變化 */
  useEffect(() => {
    sb.auth.getSession().then(({ data: d }) => setSession(d.session));
    const { data: sub } = sb.auth.onAuthStateChange((_event, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);

  /* 使用者清單：登入後從 profiles 表抓取，並訂閱異動即時更新 */
  useEffect(() => {
    if (!session) return;
    let cancelled = false;
    const fetchProfiles = async () => {
      const { data: rows, error } = await sb.from("profiles").select("*");
      if (!error && rows && !cancelled) {
        setProfiles(rows.map((r) => ({ id: r.id, name: r.name, role: r.role, storeId: r.store_id, active: r.active })));
      }
    };
    fetchProfiles();
    const channel = sb.channel("profiles_sync")
      .on("postgres_changes", { event: "*", schema: "public", table: "profiles" }, fetchProfiles)
      .subscribe();
    return () => { cancelled = true; sb.removeChannel(channel); };
  }, [session]);

  /* 登入後載入帳務資料，無資料時建立示範資料並立即寫回資料庫 */
  useEffect(() => {
    if (!session) return;
    (async () => {
      const stored = await loadData();
      if (stored) {
        if (!stored.fixedItems) stored.fixedItems = FIXED_SEED;
        if (!stored.fixedIncomeItems) stored.fixedIncomeItems = [];
        if (!stored.incomes) stored.incomes = [];
        if (!stored.incomeCategories) stored.incomeCategories = INCOME_CAT_SEED;
        /* 營運總覽（Dashboard）重構新增的固定收支類別：若主檔尚未有這些類別（用名稱比對，
           避免跟使用者已手動建立的同名類別重複），自動補上，不影響既有帳務資料 */
        const ensureCategory = (list, name, extra = {}) =>
          list.some((c) => c.name === name) ? list : [...list, { id: uid("cat"), name, active: true, ...extra }];
        ["租金-119號", "租金-121號", "租金-烘豆場"].forEach((name) => {
          stored.categories = ensureCategory(stored.categories, name, { fixed: true });
        });
        /* 「營業稅」是獨立的固定支出類別，跟「稅金」是兩個不同類別（稅金一律算在每日支出殘值桶）；
           若主檔還沒有「營業稅」這個類別，先補上並標記為固定；金額由使用者之後自行到固定支出項目補上 */
        stored.categories = ensureCategory(stored.categories, "營業稅", { fixed: true });
        /* 更正：先前一次改版誤把「稅金」也標記為固定支出，這裡改回原本的一般支出（非固定），
           跟「營業稅」分開處理，不影響「稅金」底下已記錄的支出資料本身 */
        stored.categories = stored.categories.map((c) =>
          c.name === "稅金" ? { ...c, fixed: false } : c
        );
        /* 用詞修正：先前誤用「勤美設備出借收入」，正確用詞是「勤美設備出租收入」，直接改既有
           類別的名稱（不是刪掉重建），這樣已經記錄在這個類別底下的收入資料會自動跟著改叫「出租」，不會斷連 */
        stored.incomeCategories = (stored.incomeCategories || []).map((c) =>
          c.name === "勤美設備出借收入" ? { ...c, name: "勤美設備出租收入" } : c
        );
        ["官網收入", "勤美設備出租收入"].forEach((name) => {
          stored.incomeCategories = ensureCategory(stored.incomeCategories, name);
        });
        /* 月結對帳改成依「廠商＋門店」分別建立應付帳款／統一發票（原本是整個廠商合併一張，
           不分門店）。既有的舊資料沒有 storeId，這裡幫忙補上：找出該廠商當月實際叫貨金額
           最大的門店，指派過去（多數情況下廠商當月其實只服務單一門店，這樣補的結果就會是
           對的；真的橫跨多門店的少數情況，補完之後使用者仍可自行到月結對帳頁面編輯調整）。 */
        if (!stored.payables) stored.payables = [];
        stored.payables = stored.payables.map((p) => {
          if (p.storeId) return p;
          const relatedOrders = (stored.orders || []).filter((o) => o.billing === "月結" && o.vendorId === p.vendorId && monthOf(o.date) === p.period);
          const byStore = {};
          relatedOrders.forEach((o) => {
            const sid = acctStoreId(stored.stores, o.storeId);
            byStore[sid] = (byStore[sid] || 0) + num(o.amount);
          });
          const dominant = Object.entries(byStore).sort((a, b) => b[1] - a[1])[0];
          return { ...p, storeId: dominant ? dominant[0] : (stored.stores.find((s) => !s.parentId)?.id || "") };
        });
        /* 保險機制：如果先前曾經因為登入當下沒有立刻存回資料庫，導致不同時間點各自新增出
           「名稱相同、id 不同」的重複類別，這裡做一次性去重──同名只留最早那個，其餘類別
           原本引用到的紀錄（支出／收入／固定支出／固定收入項目）全部改指到保留下來的 id，
           再把多餘的類別本身移除，避免同一個類別名稱底下的金額被拆到兩個不同 id 而對不起來 */
        const dedupeCategories = (list, remapTargets) => {
          const byName = new Map();
          const remap = new Map();
          const kept = [];
          (list || []).forEach((c) => {
            if (byName.has(c.name)) remap.set(c.id, byName.get(c.name));
            else { byName.set(c.name, c.id); kept.push(c); }
          });
          if (remap.size > 0) {
            remapTargets.forEach(({ arr, key }) => {
              stored[arr] = (stored[arr] || []).map((r) =>
                remap.has(r[key]) ? { ...r, [key]: remap.get(r[key]) } : r
              );
            });
          }
          return kept;
        };
        stored.categories = dedupeCategories(stored.categories, [
          { arr: "expenses", key: "categoryId" }, { arr: "fixedItems", key: "categoryId" },
        ]);
        stored.incomeCategories = dedupeCategories(stored.incomeCategories, [
          { arr: "incomes", key: "categoryId" }, { arr: "fixedIncomeItems", key: "categoryId" },
        ]);
        /* 公司共用併入中山店；烘豆場為獨立單位（帳務歸屬中山店） */
        const gone = ["st5"];
        stored.stores = stored.stores.filter((s) => !gone.includes(s.id));
        if (!stored.stores.some((s) => s.id === "st4")) {
          stored.stores.push({ id: "st4", name: "烘豆場", retail: false, active: true, parentId: "st1" });
        } else {
          stored.stores = stored.stores.map((s) => s.id === "st4" ? { ...s, parentId: "st1", retail: false } : s);
        }
        ["expenses", "orders", "dailySales", "incomes"].forEach((k) => {
          stored[k] = (stored[k] || []).map((r) => gone.includes(r.storeId) ? { ...r, storeId: "st1" } : r);
        });
        stored.fixedItems = stored.fixedItems.filter((f) => !gone.includes(f.storeId));
        if (!stored.fixedItems.some((f) => f.storeId === "st4")) {
          stored.fixedItems = [...stored.fixedItems, ...FIXED_SEED.filter((f) => f.storeId === "st4")];
        }
        stored.fixedIncomeItems = stored.fixedIncomeItems.filter((f) => !gone.includes(f.storeId));
        stored.orders = (stored.orders || []).map((o) => ORDER_BILLING.includes(o.billing) ? o : { ...o, billing: "現結" });
        /* 日結欄位改版：舊格式（含 cash 欄）轉為 每日營業額＋店家配合／信用卡／台灣Pay／LINE Pay */
        stored.dailySales = (stored.dailySales || []).map((r) => {
          if (!("cash" in r)) return r;
          const { cash, jko, delivery, otherPay, refund, otherIncome, ...rest } = r;
          return { ...rest, pos: num(r.pos) - num(refund), coop: num(jko) + num(delivery) + num(otherPay), twpay: 0 };
        });
        /* 日結營收「非現金收款方式」細項改為各門店可自訂項目：若門店尚未有 salesPayItems，
           依舊固定欄位（店家配合／信用卡／台灣Pay／LINE Pay／線上商城／轉帳）幫該門店建立對應項目，
           並把該門店既有日結資料的舊欄位金額搬進新的 pay 動態欄位；之後管理者可在主檔管理自行
           新增／修改／刪除／排序各門店的收款方式項目 */
        if (!stored.salesPayItems) stored.salesPayItems = [];
        stored.stores.forEach((store) => {
          if (stored.salesPayItems.some((p) => p.storeId === store.id)) return;
          const items = SALES_PAY_FIELD_SEED.map(([field, name]) => ({ id: uid("spi"), storeId: store.id, name, field }));
          stored.salesPayItems = [...stored.salesPayItems, ...items.map(({ field, ...rest }) => ({ ...rest, active: true }))];
          stored.dailySales = (stored.dailySales || []).map((r) => {
            if (r.storeId !== store.id || r.pay) return r;
            const pay = {};
            items.forEach(({ field, id }) => { const v = num(r[field]); if (v) pay[id] = v; });
            const { coop, card, twpay, linepay, online, transfer, ...rest } = r;
            return { ...rest, pay };
          });
        });
        /* 現金推算改為日結完成時鎖定：既有已完成（非草稿）的日結資料尚無鎖定快照，用目前
           資料庫裡的當日支出／收入金額當作最佳估算基準補上鎖定值，往後才不會被後續新增
           的補登資料影響；之後如需重新計算，可用「重新開啟日結／重新結帳」功能處理 */
        stored.dailySales = (stored.dailySales || []).map((r) => {
          if (r.status === "草稿" || r.cashLockedAt) return r;
          const expSum = (stored.expenses || []).filter((e) => e.date === r.date && e.storeId === r.storeId).reduce((a, e) => a + num(e.amount), 0);
          const incSum = (stored.incomes || []).filter((e) => e.date === r.date && e.storeId === r.storeId).reduce((a, e) => a + num(e.amount), 0);
          const cs = calcSales(r);
          return {
            ...r, lockedExpSum: expSum, lockedIncSum: incSum,
            cashCalc: cs.net - cs.paySum - expSum + incSum,
            cashLockedAt: r.reviewedAt || r.createdAt || nowStamp(), cashLockedBy: null, reopenLogs: [],
          };
        });
        /* 2026/06 匯入時已是完整帳表，計算口徑跟系統的「現金收入（推算）」不同，
           人工核對後金額應為 861823，「全部門店」與「中山店」皆設為手動調整值（一次性
           設定，之後可於營運總覽點擊該卡片自行修改或還原） */
        if (!stored.cashIncomeOverrides) stored.cashIncomeOverrides = {};
        if (!stored.cashIncomeOverrides["2026/06"]) stored.cashIncomeOverrides["2026/06"] = {};
        if (stored.cashIncomeOverrides["2026/06"].all === undefined) stored.cashIncomeOverrides["2026/06"].all = 861823;
        if (stored.cashIncomeOverrides["2026/06"].st1 === undefined) stored.cashIncomeOverrides["2026/06"].st1 = 861823;
        delete stored.users; delete stored.currentUserId; // 舊資料殘留欄位，使用者現改由 profiles 提供
        setData(stored);
        /* 上面這些都是登入當下對資料做的搬遷／補值（新類別、改名、去重……），一定要立刻存回
           資料庫，不能只留在這次畫面的記憶體裡；否則使用者還沒做任何其他操作前重新整理，
           或者從另一台裝置登入，抓到的又是資料庫裡沒搬遷過的舊資料，migration 等於白做 */
        await saveData(stored);
      } else {
        /* 全新資料庫：建立示範資料並立即寫回，避免不同裝置各自生成對不上的示範資料 */
        const seed = buildSeedData();
        setData(seed);
        await saveData(seed);
      }
    })();
  }, [session]);

  /* 訂閱 ledger_state 的 Realtime 異動，做多裝置即時同步 */
  useEffect(() => {
    if (!session) return;
    const channel = sb.channel("ledger_state_sync")
      .on("postgres_changes", { event: "UPDATE", schema: "public", table: "ledger_state", filter: `id=eq.${LEDGER_ROW_ID}` }, (payload) => {
        applyingRemote.current = true;
        setData(payload.new.data);
      })
      .subscribe();
    return () => sb.removeChannel(channel);
  }, [session]);

  /* 資料變動時延遲寫入儲存（遠端同步進來的變動不需要再存回去） */
  useEffect(() => {
    if (!data) return;
    if (applyingRemote.current) { applyingRemote.current = false; return; }
    if (firstLoad.current) { firstLoad.current = false; return; }
    setSaveState("saving");
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      const ok = await saveData(data);
      setSaveState(ok ? "saved" : "error");
    }, 600);
    return () => clearTimeout(saveTimer.current);
  }, [data]);

  const update = useCallback((fn) => setData((d) => fn(d)), []);

  if (session === undefined) {
    return (
      <div className="pl-root" style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", color: T.sub }}>
        <style>{css}</style>
        載入中…
      </div>
    );
  }

  if (session === null) {
    return <Login />;
  }

  const user = profiles.find((p) => p.id === session.user.id);

  if (!user) {
    return (
      <div className="pl-root" style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", color: T.sub }}>
        <style>{css}</style>
        帳號設定中，請稍候…
      </div>
    );
  }

  if (!data) {
    return (
      <div className="pl-root" style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", color: T.sub }}>
        <style>{css}</style>
        載入中…
      </div>
    );
  }

  /* 紀錄：資料修改 */
  const logAudit = (table, recordId, before, after, silent) => {
    update((d) => ({
      ...d,
      auditLogs: [...d.auditLogs, {
        id: uid("al"), time: nowStamp(), userId: user.id, table, recordId,
        before: silent ? null : before, after: silent ? null : after,
        summary: silent ? "資料更新" : "資料修改（含前後對照）",
      }],
    }));
  };

  /* 紀錄：審核動作 */
  const logApproval = (table, recordId, result, summary) => {
    update((d) => ({
      ...d,
      approvalLogs: [...d.approvalLogs, {
        id: uid("ap"), time: nowStamp(), userId: user.id, table, recordId, result, summary,
      }],
    }));
  };

  const goto = (p) => { setPage(p); window.location.hash = p; window.scrollTo(0, 0); };

  const logout = () => sb.auth.signOut();

  /* 依權限過濾導航項目 */
  const navItems = NAV.filter(([k]) => {
    if (k === "ar" || k === "import") return perm.isAcct(user);
    if (k === "master" || k === "settings") return perm.isAdmin(user);
    if (k === "logs") return perm.isAcct(user);
    if (k === "report") return perm.isAcct(user) || user.role === "店長";
    if (k === "exportbackup") return perm.isAcct(user) || perm.isMgr(user); // 門店人員完全看不到，其餘角色可見（實際可操作範圍在模組內再依角色細分）
    return true;
  });

  const modProps = { data, update, user, users: profiles, logAudit, logApproval };

  const body = (() => {
    switch (page) {
      case "dashboard": return <Dashboard data={data} update={update} user={user} month={month} setMonth={setMonth} storeFilter={storeFilter} setStoreFilter={setStoreFilter} users={profiles} goto={goto} />;
      case "daily": return <DailyKeyModule {...modProps} goto={goto} />;
      case "sales": return <SalesModule {...modProps} />;
      case "expenses": return <ExpenseModule {...modProps} />;
      case "orders": return <OrderModule {...modProps} />;
      case "ar": return perm.canAR(user) ? <ARModule {...modProps} /> : <Empty text="應收帳款僅開放會計與系統管理者。" />;
      case "report": return <ReportModule data={data} update={update} user={user} users={profiles} />;
      case "import": return <ImportModule data={data} update={update} user={user} />;
      case "master": return <MasterModule data={data} update={update} user={user} profiles={profiles} />;
      case "logs": return <LogsModule data={data} users={profiles} />;
      case "exportbackup": return <ExportBackupModule data={data} update={update} user={user} profiles={profiles} />;
      case "settings": return <SettingsModule data={data} update={update} user={user} setData={setData} users={profiles} />;
      default: return null;
    }
  })();

  const saveLabel = saveState === "saving" ? "儲存中…" : saveState === "error" ? "儲存失敗" : "已儲存";

  return (
    <div className="pl-root">
      <style>{css}</style>

      {/* 桌機側邊欄 */}
      <div style={{ display: "flex", minHeight: "100vh" }}>
        <aside className="pl-sidebar no-print" style={{
          width: 210, flexShrink: 0, borderRight: `1px solid ${T.line}`,
          background: "#F5F0E7", padding: "20px 12px", position: "sticky", top: 0,
          height: "100vh", overflowY: "auto", display: "block",
        }}>
          <div className="pl-serif" style={{ padding: "0 10px 18px", borderBottom: `1px solid ${T.line}`, marginBottom: 14 }}>
            <div style={{ fontSize: 19, fontWeight: 700, letterSpacing: ".12em" }}>PHASE</div>
            <div style={{ fontSize: 11.5, color: T.sub, letterSpacing: ".06em", marginTop: 3 }}>門店帳務管理系統</div>
          </div>
          <nav>
            {navItems.map(([k, label, icon]) => (
              <button key={k} className={"pl-nav-item" + (page === k ? " active" : "")} onClick={() => goto(k)}>
                <span style={{ width: 18, textAlign: "center", opacity: .8 }}>{icon}</span>{label}
              </button>
            ))}
          </nav>
          <div style={{ marginTop: 18, padding: "12px 10px", borderTop: `1px solid ${T.line}`, fontSize: 12.5 }}>
            <div style={{ color: T.sub, marginBottom: 6 }}>目前身分</div>
            <div style={{ fontWeight: 600 }}>{user.name}｜{user.role}{user.storeId ? "・" + (data.stores.find((s) => s.id === user.storeId)?.name || "") : ""}</div>
            <button className="pl-btn small" style={{ marginTop: 8, width: "100%" }} onClick={logout}>登出</button>
            <div style={{ marginTop: 10, color: saveState === "error" ? T.red : T.sub, fontSize: 11.5 }}>{saveLabel}</div>
          </div>
        </aside>

        {/* 主內容 */}
        <main style={{ flex: 1, minWidth: 0, padding: "22px 22px 90px" }}>
          {/* 手機頂欄 */}
          <div className="pl-mobile-top no-print" style={{ display: "none", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
            <div className="pl-serif" style={{ fontSize: 17, fontWeight: 700, letterSpacing: ".1em" }}>PHASE</div>
            <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12.5 }}>
              <span>{user.name}｜{user.role}</span>
              <button className="pl-btn small" onClick={logout}>登出</button>
            </div>
          </div>
          {body}
        </main>
      </div>

      {/* 手機底部導航 */}
      <nav className="pl-mobile-nav no-print" style={{
        display: "none", position: "fixed", bottom: 0, left: 0, right: 0,
        background: "#fff", borderTop: `1px solid ${T.line}`, zIndex: 40,
      }}>
        {[["dashboard", "總覽"], ["daily", "Key 帳"], ["expenses", "收支"], ["orders", "廠商"],
          ...(perm.isAcct(user) ? [["report", "月報"]] : [])].map(([k, label]) => (
          <button key={k} onClick={() => goto(k)} style={{
            flex: 1, padding: "10px 0 12px", border: "none", background: "none", cursor: "pointer",
            color: page === k ? T.brown : T.sub, fontWeight: page === k ? 700 : 400, fontSize: 12.5,
            borderTop: page === k ? `2px solid ${T.brown}` : "2px solid transparent",
          }}>{label}</button>
        ))}
      </nav>
    </div>
  );
}

/* ── 系統設定 ── */
/* 建立示範資料時固定用假的使用者 id（u1～u4，見 buildSeedData），這些 id 不會出現在真實
   Supabase Auth 帳號裡（真實帳號的 id 是 UUID），可以用來精準辨識「哪些是系統當初自己
   產生的示範交易紀錄」，而不會誤刪任何使用者自己實際輸入的資料 */
const DEMO_CREATOR_IDS = new Set(["u1", "u2", "u3", "u4"]);
const isDemoRecord = (r) => DEMO_CREATOR_IDS.has(r.createdBy);

function SettingsModule({ data, update, user, setData, users }) {
  if (!perm.isAdmin(user)) return <Empty text="系統設定僅開放系統管理者。" />;

  const demoCounts = {
    dailySales: (data.dailySales || []).filter(isDemoRecord).length,
    expenses: (data.expenses || []).filter(isDemoRecord).length,
    incomes: (data.incomes || []).filter(isDemoRecord).length,
    orders: (data.orders || []).filter(isDemoRecord).length,
    receivables: (data.receivables || []).filter(isDemoRecord).length,
  };
  const demoTotal = Object.values(demoCounts).reduce((a, b) => a + b, 0);
  const demoLabels = { dailySales: "每日營收", expenses: "每日支出", incomes: "門店收入", orders: "廠商叫貨", receivables: "應收帳款" };

  const clearLeftoverDemo = () => {
    if (demoTotal === 0) return alert("沒有偵測到殘留的示範資料，不需要清除。");
    const detail = Object.entries(demoCounts).filter(([, n]) => n > 0).map(([k, n]) => `${demoLabels[k]} ${n} 筆`).join("、");
    if (!confirm(`偵測到 ${demoTotal} 筆殘留示範資料（${detail}）。這些是系統剛建置時自動產生的假資料，跟你實際輸入的紀錄是分開判斷的，只會清掉這些假資料，不會動到任何真實資料。確定清除？`)) return;
    update((d) => ({
      ...d,
      dailySales: (d.dailySales || []).filter((r) => !isDemoRecord(r)),
      expenses: (d.expenses || []).filter((r) => !isDemoRecord(r)),
      incomes: (d.incomes || []).filter((r) => !isDemoRecord(r)),
      orders: (d.orders || []).filter((r) => !isDemoRecord(r)),
      receivables: (d.receivables || []).filter((r) => !isDemoRecord(r)),
    }));
    alert(`已清除 ${demoTotal} 筆殘留示範資料。`);
  };

  const clearDemo = () => {
    if (!confirm("將清除所有交易資料（日結、支出、叫貨、應收與紀錄），主檔保留。確定執行？")) return;
    update((d) => ({ ...d, dailySales: [], expenses: [], incomes: [], orders: [], receivables: [], auditLogs: [], approvalLogs: [] }));
  };
  const resetAll = () => {
    if (!confirm("將重設整個系統為初始示範狀態，所有資料將被覆蓋。確定執行？")) return;
    setData(buildSeedData());
  };

  return (
    <div>
      <SectionTitle>系統設定</SectionTitle>
      <div className="pl-card" style={{ padding: 18, maxWidth: 560, display: "grid", gap: 14 }}>
        <div>
          <div style={{ fontWeight: 700, marginBottom: 4 }}>匯出全部帳務 Excel</div>
          <div style={{ fontSize: 12.5, color: T.sub, marginBottom: 8 }}>四個工作表：每日營收、每日支出、廠商叫貨、應收帳款。</div>
          <button className="pl-btn primary" onClick={() => exportAllExcel(data, users)}>匯出 Excel</button>
        </div>
        <div style={{ borderTop: `1px solid ${T.line}`, paddingTop: 14 }}>
          <div style={{ fontWeight: 700, marginBottom: 4 }}>清除殘留示範資料</div>
          <div style={{ fontSize: 12.5, color: T.sub, marginBottom: 8 }}>
            精準辨識並只清掉系統當初建置時自動產生的假交易紀錄（用建立者不是真實帳號來判斷），
            不會動到任何你自己實際輸入的真實資料。目前偵測到 <b style={{ color: demoTotal > 0 ? T.red : T.green }}>{demoTotal}</b> 筆殘留示範資料。
          </div>
          <button className="pl-btn danger" disabled={demoTotal === 0} onClick={clearLeftoverDemo}>
            {demoTotal === 0 ? "沒有殘留示範資料" : `清除殘留示範資料（${demoTotal}）`}
          </button>
        </div>
        <div style={{ borderTop: `1px solid ${T.line}`, paddingTop: 14 }}>
          <div style={{ fontWeight: 700, marginBottom: 4 }}>清除全部交易資料</div>
          <div style={{ fontSize: 12.5, color: T.sub, marginBottom: 8 }}>清空「所有」交易資料（含真實資料），保留門店、廠商、類別與使用者主檔。僅在要整個重新開始記帳時使用。</div>
          <button className="pl-btn danger" onClick={clearDemo}>清除全部交易資料</button>
        </div>
        <div style={{ borderTop: `1px solid ${T.line}`, paddingTop: 14 }}>
          <div style={{ fontWeight: 700, marginBottom: 4 }}>重設為示範狀態</div>
          <div style={{ fontSize: 12.5, color: T.sub, marginBottom: 8 }}>還原初始主檔與示範資料。</div>
          <button className="pl-btn danger" onClick={resetAll}>重設系統</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
