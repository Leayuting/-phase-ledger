function usePersisted(key, initial) {
  const [state, setState] = useState(() => {
    try {
      const v = localStorage.getItem(key);
      return v !== null ? JSON.parse(v) : initial;
    } catch (e) { return initial; }
  });
  useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(state)); } catch (e) { /* 忽略儲存失敗 */ }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [state]);
  return [state, setState];
}

   日期不會報錯，而是自動往後推成「7/1」，導致像「2026/06/31」這種其實不存在的日期被誤判為合法，
   混進當月的統計裡（實際發生過：一筆打錯的支出日期讓當月「每日支出」金額多算了）。
   這裡額外檢查組出來的年/月/日跟輸入的是否完全一致，才能真的擋掉超出當月天數的日期。 */
const validDate = (s) => {
  if (!/^\d{4}\/\d{2}\/\d{2}$/.test(s)) return false;
  const [y, mo, d] = s.split("/").map(Number);
  const dt = new Date(y, mo - 1, d);
  return dt.getFullYear() === y && dt.getMonth() === mo - 1 && dt.getDate() === d;
};
const cmpDate = (a, b) => a.localeCompare(b);

const dateLabel = (d) => { const [y, m, day] = (d || "").split("/"); return y && m && day ? `${y} 年 ${m} 月 ${day} 日` : ""; };
const prevMonth = (m) => {
  const [y, mo] = m.split("/").map(Number);
  const d = new Date(y, mo - 2, 1);
  return `${d.getFullYear()}/${pad2(d.getMonth() + 1)}`;
};
const monthShift = (m, k) => {
  const [y, mo] = m.split("/").map(Number);

};

/* 營收自動計算（非現金收款方式細項為各門店可自訂的動態欄位，存於 s.pay，key 為 salesPayItems 的 id） */
const calcSales = (s) => {
  const net = num(s.pos);                                             // 每日營業額
  const paySum = Object.values(s.pay || {}).reduce((a, v) => a + num(v), 0); // 非現金合計
  const cash = net - paySum;                                          // 現金（推算）
  const diff = cash < 0 ? cash : 0;                                   // 非現金超過營業額 → 異常
  return { net, total: net, paySum, cash, diff };
};

function buildSeedData() {
  let seedRand = 20260701;
  const rnd = () => { seedRand = (seedRand * 9301 + 49297) % 233280; return seedRand / 233280; };
  const dailySales = [];
  const base = { st1: 18000, st2: 24000, st3: 15000 };
  ["2026/06", "2026/07"].forEach((m) => {
    const [y, mo] = m.split("/").map(Number);
    const days = m === "2026/07" ? 15 : new Date(y, mo, 0).getDate();
    for (let d = 1; d <= days; d++) {
      const date = `${y}/${pad2(mo)}/${pad2(d)}`;
      const dow = new Date(y, mo - 1, d).getDay();
      const wk = dow === 0 || dow === 6 ? 1.35 : 1;
      ["st1", "st2", "st3"].forEach((st) => {
        const pos = Math.round((base[st] * wk * (0.85 + rnd() * 0.3)) / 10) * 10;
        const card = Math.round(pos * (0.30 + rnd() * 0.08));
        const lp = Math.round(pos * (0.15 + rnd() * 0.05));
        const tw = Math.round(pos * (0.04 + rnd() * 0.03));
        const co = st === "st2" ? Math.round(pos * (0.06 + rnd() * 0.04)) : 0;
        const hasDiff = m === "2026/07" && d === 12 && st === "st1";
        const payIdOf = (field) => SALES_PAY_SEED.find((p) => p.storeId === st && p.name === SALES_PAY_FIELD_SEED.find(([f]) => f === field)[1]).id;
        const pay = {};
        const coopAmt = co + (hasDiff ? Math.round(pos * 0.55) : 0);
        if (coopAmt) pay[payIdOf("coop")] = coopAmt;
        if (card) pay[payIdOf("card")] = card;
        if (tw) pay[payIdOf("twpay")] = tw;
        if (lp) pay[payIdOf("linepay")] = lp;
        dailySales.push({
          id: uid("ds"), date, storeId: st,
          pos, pay,
          note: "", diffReason: "",
          status: m === "2026/06" || d <= 12 ? "已審核" : d <= 14 ? "待審核" : "草稿",
          createdBy: "u4", createdAt: date + " 21:30",
          reviewedBy: m === "2026/06" || d <= 12 ? "u3" : null,
          reviewedAt: m === "2026/06" || d <= 12 ? date + " 22:00" : null,
        });
      });
    }
  });
  const expenses = [];
  const mkExp = (date, storeId, catName, item, vendorId, amount, payMethod, opts = {}) => {
    const cat = CATEGORY_SEED.find((c) => c.name === catName);
    expenses.push({
      id: uid("ex"),
      date, storeId, categoryId: cat.id, item, vendorId: vendorId || null,
      amount, payMethod, payer: opts.payer || "Lea",
      isAdvance: !!opts.isAdvance, isReimbursed: !!opts.isReimbursed, reimburseDate: opts.reimburseDate || "",
      invoiceNo: opts.invoiceNo || "", attachment: null, note: opts.note || "",
      createdBy: "u1", createdAt: date + " 12:00",
      status: opts.status || "過審", reviewedBy: opts.status === "待審核" ? null : "u2",
      reviewedAt: opts.status === "待審核" ? null : date + " 18:00",
    });
  };

/* 主標題固定在頁面頂端；表格欄位標題（.pl-table th）固定在標題正下方，
   高度用 ResizeObserver 量測寫入 CSS variable，讓兩層 sticky 不互相重疊 */
function SectionTitle({ children, right }) {
  const ref = useRef();
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const update = () => document.documentElement.style.setProperty("--pl-title-h", el.offsetHeight + "px");
    update();
    const ro = new ResizeObserver(update);
    ro.observe(el);
    return () => ro.disconnect();
  }, []);
  return (
    <div ref={ref} style={{
      position: "sticky", top: 0, zIndex: 30, background: T.bg,
      display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10,
      paddingTop: 4, paddingBottom: 10, marginBottom: 4,
    }}>
      <h2 className="pl-serif" style={{ fontSize: 20, fontWeight: 600, margin: 0 }}>{children}</h2>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>{right}</div>
    </div>
  );
}

/* 附件上傳（圖片自動縮圖壓縮，避免超出儲存上限） */
function AttachmentInput({ value, onChange }) {
  const ref = useRef();
  const handle = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    if (f.type.startsWith("image/")) {
      const img = new Image();
      img.onload = () => {
        const max = 1100;
        const scale = Math.min(1, max / Math.max(img.width, img.height));
        const c = document.createElement("canvas");
        c.width = Math.round(img.width * scale); c.height = Math.round(img.height * scale);
        c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
        onChange({ name: f.name, type: "image", data: c.toDataURL("image/jpeg", 0.72) });
      };
      img.src = URL.createObjectURL(f);
    } else {
      onChange({ name: f.name, type: "file", data: null });
    }
    e.target.value = "";
  };
  return (
    <div>
      <input ref={ref} type="file" accept="image/*,.pdf" style={{ display: "none" }} onChange={handle} />
      {value ? (
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          {value.type === "image" && value.data
            ? <img src={value.data} alt={value.name} style={{ width: 54, height: 54, objectFit: "cover", borderRadius: 6, border: `1px solid ${T.line}` }} />
            : <Badge text="📎 已附檔" tone="brown" />}
          <span style={{ fontSize: 12.5, color: T.sub, overflow: "hidden", textOverflow: "ellipsis", maxWidth: 160 }}>{value.name}</span>
          <button className="pl-btn small danger" onClick={() => onChange(null)}>移除</button>
        </div>
      ) : (
        <button className="pl-btn small" onClick={() => ref.current.click()}>＋ 拍照／上傳單據</button>
      )}
    </div>
  );
}

function AttachmentView({ value }) {
  const [open, setOpen] = useState(false);
  if (!value) return <span style={{ color: T.sub }}>—</span>;
  return (
    <>
      <button className="pl-btn small" onClick={() => value.data && setOpen(true)}>📎 附件</button>
      {open && (
        <Modal title={value.name} onClose={() => setOpen(false)} width={860}>
          <img src={value.data} alt={value.name} style={{ maxWidth: "100%", borderRadius: 8 }} />
        </Modal>
      )}
    </>
  );
}

};

/* 廠商叫貨支出統計：原始金額仍由每日叫貨紀錄自動加總；若該廠商當月已有「未取消」的月結
   對帳發票／請款金額，改採發票金額（讓 Dashboard／月報／年報跟實際應付金額一致）。
   發票是廠商對「整個公司」開立的單一憑證，沒有拆分門店的資訊，所以只有在檢視「全部門店」
   時才套用發票調整；篩選到單一門店時，無法正確拆分，一律仍用該門店的原始叫貨加總，
   避免把整張發票金額誤植到單一門店。回傳 total（供 KPI／報表加總用）與 adjustments
   （每個月結廠商的原始加總／發票金額／使用中的 payable，供明細下鑽或報表引用）。 */
function adjustedOrderSum(data, month, storeFilter) {
  const acctOf = (sid) => acctStoreId(data.stores, sid);
  const ordM = data.orders.filter((o) => monthOf(o.date) === month && (!storeFilter || acctOf(o.storeId) === storeFilter));
  const cashOrdM = ordM.filter((o) => o.billing !== "月結");
  const monthlyOrdM = ordM.filter((o) => o.billing === "月結");
  /* 月結對帳是依「廠商＋門店」分別建立應付帳款／統一發票（不是整個廠商合併一張），
     所以這裡也依廠商＋門店分組，找對應的那一筆發票；不用再另外判斷這個廠商當月
     是否也叫貨給篩選範圍外的其他門店，因為每個門店本來就各自獨立對帳 */
  const groups = {};
  monthlyOrdM.forEach((o) => {
    const sid = acctOf(o.storeId);
    const key = o.vendorId + "__" + sid;
    (groups[key] = groups[key] || { vendorId: o.vendorId, storeId: sid, list: [] }).list.push(o);
  });
  let total = cashOrdM.reduce((a, o) => a + num(o.amount), 0);
  const adjustments = [];
  Object.values(groups).forEach((g) => {
    const rawSum = g.list.reduce((a, o) => a + num(o.amount), 0);
    const payable = (data.payables || []).find((p) => p.vendorId === g.vendorId && p.storeId === g.storeId && p.period === month && !p.cancelled);
    if (payable) {
      total += num(payable.invoiceAmount);
      adjustments.push({ vendorId: g.vendorId, storeId: g.storeId, rawSum, invoiceAmount: num(payable.invoiceAmount), payable, list: g.list });
    } else {
      total += rawSum;
      adjustments.push({ vendorId: g.vendorId, storeId: g.storeId, rawSum, invoiceAmount: null, payable: null, list: g.list });
    }
  });
  return { total, cashOrdM, adjustments };
}

const perm = {
  isAdmin: (u) => u.role === "系統管理者",
  isAcct: (u) => u.role === "會計" || u.role === "系統管理者",
  isMgr: (u) => u.role === "店長",
  // 可見門店範圍：null = 全部
  storeScope: (u) => {
    if (u.role !== "門店人員" && u.role !== "店長") return null;
    return u.storeId === "st1" ? ["st1", "st4"] : [u.storeId];
  },
  canSeeRecord: (u, rec) => {
    if (perm.isAcct(u)) return true;
    if (!rec.storeId) return false;
    const inScope = (perm.storeScope(u) || []).includes(rec.storeId);
    if (u.role === "店長") return inScope;
    if (u.role === "門店人員")
      return inScope && !["已審核", "過審"].includes(rec.status);
    return false;
  },
  canApprove: (u, rec) => {
    if (perm.isAcct(u)) return true;
    if (u.role === "店長") return (perm.storeScope(u) || []).includes(rec.storeId);
    return false;
  },
  canEdit: (u, rec) => {
    const locked = ["已審核", "過審"].includes(rec.status);
    if (locked) return perm.isAdmin(u); // 已審核僅管理者可修改（留紀錄）
    if (perm.isAcct(u)) return true;
    if (u.role === "店長") return rec.storeId === u.storeId;
    if (u.role === "門店人員") return rec.storeId === u.storeId;
    return false;
  },
  canMaster: (u) => u.role === "系統管理者",
  canExport: (u) => perm.isAcct(u),
  canAR: (u) => perm.isAcct(u),
};

const CHART_COLORS = ["#7B4326", "#3F7350", "#A8791A", "#5B6E8C", "#AE3B2C", "#8C7B6A", "#C47878", "#4A6B6B", "#9A8C3F", "#6E5B8C"];

function Dashboard({ data, update, user, month, setMonth, storeFilter, setStoreFilter, users, goto }) {
  const stores = data.stores.filter((s) => s.active);
  const retail = stores.filter((s) => s.retail);
  const acctOf = (sid) => acctStoreId(data.stores, sid);
  const inMonth = (r) => monthOf(r.date) === month && (!storeFilter || acctOf(r.storeId) === storeFilter);
  const catById = Object.fromEntries(data.categories.map((c) => [c.id, c]));
  const nameOf = (id) => stores.find((s) => s.id === id)?.name || "—";
  const userName = (id) => users.find((u) => u.id === id)?.name || "—";
  /* 門店篩選只給「會計主體」層級選（中山店會自動含烘豆場，因為烘豆場的 parentId 是中山店），
     不把烘豆場單獨列成一個可篩選門店，避免跟「中山店（含烘豆場）」的口徑對不起來 */
  const topStores = stores.filter((s) => !s.parentId);
  const childStoreNames = (sid) => stores.filter((s) => s.parentId === sid).map((s) => s.name);

  const salesM = data.dailySales.filter(inMonth);
  const expM = data.expenses.filter((r) => inMonth(r) && r.status !== "已退回" && r.categoryId !== ORDER_CAT_ID);
  const ordM = data.orders.filter(inMonth);
  const incM = (data.incomes || []).filter((r) => inMonth(r) && r.status !== "已退回");

  const revenue = salesM.reduce((a, s) => a + calcSales(s).net, 0);
  /* 現金收入（推算）：預設由本月日結資料加總計算；若該月＋該門店篩選（全部門店或個別門店，
     各自獨立）有手動調整值（早期匯入的完整帳表，計算口徑跟系統不同，直接以人工核對後的
     正確金額為準），則優先採用手動調整值，不受後續日結資料異動影響 */
  const cashScopeKey = storeFilter || "all";
  const cashOverride = (data.cashIncomeOverrides || {})[month]?.[cashScopeKey];
  const cashComputed = salesM.reduce((a, s) => a + calcSales(s).cash, 0);
  const cashSum = cashOverride !== undefined ? cashOverride : cashComputed;
  const canEditCashOverride = perm.isAdmin(user) || perm.isAcct(user);
  const [editingCash, setEditingCash] = useState(null); // { value }
  const saveCashOverride = () => {
    const v = editingCash.value.trim();
    update((d) => {
      const next = { ...(d.cashIncomeOverrides || {}) };
      const forMonth = { ...(next[month] || {}) };
      if (v === "") delete forMonth[cashScopeKey]; else forMonth[cashScopeKey] = num(v);
      next[month] = forMonth;
      return { ...d, cashIncomeOverrides: next };
    });
    setEditingCash(null);
  };
  /* 廠商叫貨：月結廠商若有未取消的發票調整，採發票／請款金額；否則沿用原始叫貨累計金額。
     單一門店檢視時，只要該廠商當月的月結叫貨沒有涉及篩選範圍外的其他門店，一樣會套用發票調整
     （詳見 adjustedOrderSum） */
  const { total: ordSum, cashOrdM: ordCashRecs, adjustments: ordAdjustments } = adjustedOrderSum(data, month, storeFilter);
  /* 廠商叫貨明細改以「廠商」彙總（不是逐筆每日叫貨紀錄），每個廠商一行，
     顯示現結／月結各自小計與是否已套用發票調整，依總額排序 */
  const ordVendorRows = (() => {
    const byVendor = {};
    ordCashRecs.forEach((o) => {
      const v = byVendor[o.vendorId] || (byVendor[o.vendorId] = { cash: 0, monthly: 0, adjusted: false });
      v.cash += num(o.amount);
    });
    ordAdjustments.forEach((a) => {
      const v = byVendor[a.vendorId] || (byVendor[a.vendorId] = { cash: 0, monthly: 0, adjusted: false });
      v.monthly += a.payable ? a.invoiceAmount : a.rawSum;
      if (a.payable) v.adjusted = true;
    });
    return Object.entries(byVendor).map(([vid, v]) => {
      const vName = data.vendors.find((x) => x.id === vid)?.name || "—";
      const parts = [];
      if (v.cash > 0) parts.push(`現結 ${fmt(v.cash)}`);
      if (v.monthly > 0) parts.push(`月結 ${fmt(v.monthly)}${v.adjusted ? "（已依發票調整）" : ""}`);
      return { item: `${vName}${parts.length ? "｜" + parts.join("、") : ""}`, amount: v.cash + v.monthly };
    }).sort((a, b) => b.amount - a.amount);
  })();

  /* 收入拆分：官網收入／勤美設備出租收入為獨立類別，其餘收入類別一律歸入「其他收入」 */
  const onlineIncCatId = (data.incomeCategories || []).find((c) => c.name === "官網收入")?.id;
  const equipIncCatId = (data.incomeCategories || []).find((c) => c.name === "勤美設備出租收入")?.id;
  const onlineIncRecs = incM.filter((r) => r.categoryId === onlineIncCatId);
  const equipIncRecs = incM.filter((r) => r.categoryId === equipIncCatId);
  const otherIncRecs = incM.filter((r) => r.categoryId !== onlineIncCatId && r.categoryId !== equipIncCatId);
  const onlineInc = onlineIncRecs.reduce((a, r) => a + num(r.amount), 0);
  const equipInc = equipIncRecs.reduce((a, r) => a + num(r.amount), 0);
  const otherInc = otherIncRecs.reduce((a, r) => a + num(r.amount), 0);
  const totalInc = revenue + onlineInc + otherInc + equipInc;
  /* 實收營業額：目前無獨立退款／折讓紀錄，依需求＝總收入（營業額＋官網收入＋其他收入＋設備出租收入） */
  const actualRevenue = totalInc;
  /* 其他收入來源＝官網收入＋其他收入＋勤美設備出租收入合併，首頁只顯示一張卡片，點擊才展開細項 */
  const otherIncSourceTotal = onlineInc + otherInc + equipInc;

  /* 支出拆分：租金依地址拆三筆、營業稅、電費、水費、勞保、勞退、健保、人事成本各自獨立列出，
     其餘一律歸入「每日支出」（原本統稱一般支出的殘值桶） */
  const rentCatId = {
    n119: data.categories.find((c) => c.name === "租金-119號")?.id,
    n121: data.categories.find((c) => c.name === "租金-121號")?.id,
    roast: data.categories.find((c) => c.name === "租金-烘豆場")?.id,
  };
  /* 「稅金」跟「營業稅」是不同類別：稅金一律算在「每日支出」殘值桶裡，只有「營業稅」才獨立列出 */
  const taxCatIds = [data.categories.find((c) => c.name === "營業稅")?.id].filter(Boolean);
  const namedExpCatId = (name) => data.categories.find((c) => c.name === name)?.id;
  const elecCatId = namedExpCatId("電費");
  const waterCatId = namedExpCatId("水費");
  const laborInsCatId = namedExpCatId("勞保");
  const pensionCatId = namedExpCatId("勞退");
  const healthInsCatId = namedExpCatId("健保");
  const payrollCatId = namedExpCatId("人事成本");
  const expByCat = (id) => expM.filter((e) => e.categoryId === id);
  const rent119Recs = expByCat(rentCatId.n119), rent121Recs = expByCat(rentCatId.n121), rentRoastRecs = expByCat(rentCatId.roast);
  const taxRecs = expM.filter((e) => taxCatIds.includes(e.categoryId));
  const elecRecs = expByCat(elecCatId), waterRecs = expByCat(waterCatId);
  const laborInsRecs = expByCat(laborInsCatId), pensionRecs = expByCat(pensionCatId), healthInsRecs = expByCat(healthInsCatId);
  const payrollRecs = expByCat(payrollCatId);
  const sumAmt = (recs) => recs.reduce((a, e) => a + num(e.amount), 0);
  const rent119 = sumAmt(rent119Recs), rent121 = sumAmt(rent121Recs), rentRoast = sumAmt(rentRoastRecs);
  /* 租金總額＝119號＋121號＋烘豆場加總，跟固定支出資料同步（三個子項目一有異動，這裡自動跟著變）；
     營運總覽預設只顯示這個合併後的「租金」卡片，點擊才展開看三個子項目的明細 */
  const rentTotal = rent119 + rent121 + rentRoast;
  const bizTax = sumAmt(taxRecs), elecFee = sumAmt(elecRecs), waterFee = sumAmt(waterRecs);
  const laborIns = sumAmt(laborInsRecs), pension = sumAmt(pensionRecs), healthIns = sumAmt(healthInsRecs), payroll = sumAmt(payrollRecs);
  const itemizedExpIds = new Set([rentCatId.n119, rentCatId.n121, rentCatId.roast, ...taxCatIds,
    elecCatId, waterCatId, laborInsCatId, pensionCatId, healthInsCatId, payrollCatId].filter(Boolean));
  const dailyExpRecs = expM.filter((e) => !itemizedExpIds.has(e.categoryId));
  const dailyExp = sumAmt(dailyExpRecs);
  /* 固定支出＝租金＋電費＋水費＋勞保＋勞退＋健保＋人事成本＋營業稅加總，跟營運總覽首頁只顯示
     一張合併卡片、點擊才展開看各細項的設計原則一致（首頁摘要、需要再下鑽） */
  const fixedExpTotal = bizTax + rentTotal + elecFee + waterFee + laborIns + pension + healthIns + payroll;
  const totalExp = ordSum + dailyExp + fixedExpTotal;
  const profit = totalInc - totalExp;

  const arUnpaid = data.receivables.filter((r) => r.status !== "呆帳").reduce((a, r) => a + Math.max(0, num(r.amount) - num(r.received)), 0);
  const monthlyUnpaid = data.orders.filter((o) => o.billing === "月結" && o.payStatus !== "已付款").reduce((a, o) => a + num(o.amount), 0);
  const tgt = data.targets[month] || {};
  const tgtSum = storeFilter ? num(tgt[storeFilter]) : retail.reduce((a, s) => a + num(tgt[s.id]), 0);
  /* 營業額達成率＝實收營業額 ÷ 營業額目標（不是只算單純的每日營業額） */
  const achieve = tgtSum > 0 ? (actualRevenue / tgtSum) * 100 : null;

  /* 金額明細下鑽：點擊 KPI 卡片時顯示組成該金額的實際紀錄或子項目 */
  const [detail, setDetail] = useState(null);
  /* 明細一律從 1 號開始（日期由舊到新），跟帳本習慣的排序方式一致 */
  const rowsFromSales = (recs) => recs.map((s) => ({ date: s.date, store: nameOf(s.storeId), item: "每日營業額", amount: calcSales(s).net })).sort((a, b) => cmpDate(a.date, b.date));
  /* 按日期彙總金額（不展開每一筆明細），只顯示「日期」＋「當日總金額」兩欄，
     用在筆數多、只需要快速掌握每日概況、不需要逐筆檢視的明細（例如每日支出） */
  const rowsByDate = (recs) => {
    const byDate = {};
    recs.forEach((r) => { byDate[r.date] = (byDate[r.date] || 0) + num(r.amount); });
    return Object.entries(byDate).sort((a, b) => cmpDate(a[0], b[0])).map(([date, amount]) => ({ date, amount }));
  };
  const openDetail = (title, rows) => setDetail({ title, rows });

  /* 圖表資料 */
  const [y, mo] = month.split("/").map(Number);
  const daysInM = new Date(y, mo, 0).getDate();
  const dailyLine = Array.from({ length: daysInM }, (_, i) => {
    const d = `${month}/${pad2(i + 1)}`;
    const v = salesM.filter((s) => s.date === d).reduce((a, s) => a + calcSales(s).net, 0);
    return { day: i + 1, 營業額: v };
  });
  const storeBar = retail.map((s) => ({
    name: s.name,
    營業額: data.dailySales.filter((r) => monthOf(r.date) === month && r.storeId === s.id).reduce((a, r) => a + calcSales(r).net, 0),
  }));
  const catPieMap = {};
  expM.forEach((e) => { const n = catById[e.categoryId]?.name || "其他"; catPieMap[n] = (catPieMap[n] || 0) + num(e.amount); });
  ordM.forEach((o) => { catPieMap["廠商叫貨"] = (catPieMap["廠商叫貨"] || 0) + num(o.amount); });
  const catPie = Object.entries(catPieMap).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value).slice(0, 8);
  const vendorRank = (() => {
    const m = {};
    ordM.forEach((o) => { const v = data.vendors.find((x) => x.id === o.vendorId); const n = v ? v.name : "—"; m[n] = (m[n] || 0) + num(o.amount); });
    return Object.entries(m).map(([name, 金額]) => ({ name, 金額 })).sort((a, b) => b.金額 - a.金額).slice(0, 6);
  })();
  const sixMonths = Array.from({ length: 6 }, (_, i) => monthShift(month, i - 5)).map((m) => {
    const sm = data.dailySales.filter((r) => monthOf(r.date) === m && (!storeFilter || r.storeId === storeFilter));
    const inc = sm.reduce((a, s) => a + calcSales(s).total, 0);
    const em = data.expenses.filter((r) => monthOf(r.date) === m && r.status !== "已退回" && r.categoryId !== ORDER_CAT_ID && (!storeFilter || r.storeId === storeFilter)).reduce((a, e) => a + num(e.amount), 0);
    const om = data.orders.filter((r) => monthOf(r.date) === m && (!storeFilter || r.storeId === storeFilter)).reduce((a, o) => a + num(o.amount), 0);
    return { name: m.slice(2), 收入: inc, 支出: em + om, 損益: inc - em - om };
  });

  /* 各門店獨立概況（不受門店篩選影響） */
  const today0 = todayStr();
  const storeStats = retail.map((s) => {
    const sm = data.dailySales.filter((r) => monthOf(r.date) === month && r.storeId === s.id);
    const rev = sm.reduce((a, r) => a + calcSales(r).net, 0);
    const oInc = 0;
    const bInc = (data.incomes || []).filter((r) => monthOf(r.date) === month && acctOf(r.storeId) === s.id && r.status !== "已退回").reduce((a, r) => a + num(r.amount), 0);
    const em = data.expenses.filter((r) => monthOf(r.date) === month && acctOf(r.storeId) === s.id && r.status !== "已退回" && r.categoryId !== ORDER_CAT_ID).reduce((a, e) => a + num(e.amount), 0);
    const om = data.orders.filter((r) => monthOf(r.date) === month && acctOf(r.storeId) === s.id).reduce((a, o) => a + num(o.amount), 0);
    const exp = em + om;
    const roastExp = s.id === "st1"
      ? data.expenses.filter((r) => monthOf(r.date) === month && r.storeId === "st4" && r.status !== "已退回" && r.categoryId !== ORDER_CAT_ID).reduce((a, e) => a + num(e.amount), 0)
        + data.orders.filter((r) => monthOf(r.date) === month && r.storeId === "st4").reduce((a, o) => a + num(o.amount), 0)
      : 0;
    const pft = rev + oInc + bInc - exp;
    const t = num((data.targets[month] || {})[s.id]);
    const ach = t > 0 ? (rev / t) * 100 : null;
    const todayDone = data.dailySales.some((r) => r.date === today0 && r.storeId === s.id);
    const diffCnt = sm.filter((r) => calcSales(r).diff !== 0).length;
    return { store: s, rev, exp, pft, ach, todayDone, diffCnt, days: sm.length, roastExp };
  });

  /* 待辦提醒 */
  const today = todayStr();
  const missingToday = retail.filter((s) => !data.dailySales.some((r) => r.date === today && r.storeId === s.id));
  const diffRecs = salesM.filter((s) => calcSales(s).diff !== 0);
  const pendingExp = data.expenses.filter((e) => e.status === "待審核");
  const overdueAR = data.receivables.filter((r) => r.dueDate && cmpDate(r.dueDate, today) < 0 && num(r.amount) - num(r.received) > 0 && r.status !== "呆帳");
  const overdueAP = data.orders.filter((o) => o.billing === "月結" && o.payStatus !== "已付款" && o.dueDate && cmpDate(o.dueDate, today) < 0);

  const tooltipFmt = (v) => fmt(v);
  const gridStyle = { display: "grid", gap: 12 };

  return (
    <div>
      <SectionTitle right={
        <>
          <MonthPicker value={month} onChange={setMonth} />
          <select className="pl-input" style={{ width: 190 }} value={storeFilter || ""} onChange={(e) => setStoreFilter(e.target.value || null)}>
            <option value="">全部門店</option>
            {topStores.map((s) => (
              <option key={s.id} value={s.id}>{s.name}{childStoreNames(s.id).length ? `（含${childStoreNames(s.id).join("、")}）` : ""}</option>
            ))}
          </select>
        </>
      }>營運總覽</SectionTitle>

      <div className="pl-serif" style={{ fontWeight: 700, fontSize: 15.5, margin: "4px 0 10px" }}>收入</div>
      <div style={{ ...gridStyle, gridTemplateColumns: "repeat(auto-fill,minmax(170px,1fr))", marginBottom: 20 }}>

/* 金額明細下鑽視窗：組成該金額的實際紀錄清單，或彙總金額的子項目拆解 */
function KpiDetailModal({ title, rows, onClose }) {
  const total = rows.reduce((a, r) => a + num(r.amount), 0);
  /* 各欄位只有在真的有資料時才顯示，例如按日期彙總的明細只有日期＋金額兩欄，
     不會多出一欄空白的「門店」或「項目」，畫面更簡潔 */
  const hasDate = rows.some((r) => r.date);
  const hasStore = rows.some((r) => r.store);
  const hasItem = rows.some((r) => r.item);
  const colCount = [hasDate, hasStore, hasItem, true].filter(Boolean).length;
  return (
    <Modal title={title} onClose={onClose} width={620}>
      <div className="pl-scroll-x" style={{ maxHeight: 420 }}>
        <table className="pl-table">
          <thead><tr>
            {hasDate && <th>日期</th>}
            {hasStore && <th>門店</th>}
            {hasItem && <th>項目</th>}
            <th className="num">金額</th>
          </tr></thead>
          <tbody>
            {rows.length === 0 && <tr><td colSpan={colCount}><Empty text="此區間尚無明細" /></td></tr>}
            {rows.map((r, i) => (
              <tr key={i}>
                {hasDate && <td style={{ whiteSpace: "nowrap" }}>{r.date || "—"}</td>}
                {hasStore && <td>{r.store || "—"}</td>}
                {hasItem && <td>{r.item}</td>}
                <td className="num" style={{ fontWeight: 600 }}>{fmtN(r.amount)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div style={{ marginTop: 12, textAlign: "right", fontSize: 15, fontWeight: 700 }}>合計 {fmt(total)}</div>
    </Modal>
  );
}

function StoreRow({ label, value, tone, strong }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
      <span style={{ color: T.sub, fontSize: 12.5 }}>{label}</span>
      <span style={{ color: tone || T.ink, fontWeight: strong ? 700 : 500, fontVariantNumeric: "tabular-nums" }}>{value}</span>
    </div>
  );
}

function AlertRow({ tone, text, onClick }) {
  const c = tone === "red" ? [T.redBg, T.red] : [T.yellowBg, T.yellow];
  return (
    <button onClick={onClick} style={{ background: c[0], color: c[1], border: "none", borderRadius: 8, padding: "9px 12px", textAlign: "left", cursor: "pointer", fontSize: 13.5, width: "100%" }}>
      {text} <span style={{ opacity: .6 }}>→</span>
    </button>
  );
}

function ChartCard({ title, children, wide }) {
  return (
    <div className="pl-card" style={{ padding: 16, gridColumn: wide ? "1 / -1" : undefined }}>
      <div className="pl-serif" style={{ fontWeight: 600, marginBottom: 8 }}>{title}</div>
      {children}
    </div>
  );
}

function StoreTabs({ stores, value, onChange }) {
  if (stores.length <= 1) return null;
  return (
    <div className="no-print" style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap" }}>
      {stores.map((s) => (
        <button key={s.id} className={"pl-btn small" + (value === s.id ? " primary" : "")}
          style={value === s.id ? {} : { background: "#fff" }}
          onClick={() => onChange(s.id)}>{s.name}</button>
      ))}
    </div>
  );
}

/* onToday：選填。有精確日期篩選的頁面可傳入，點「今天」時跳到今天這一天；
   沒傳入的頁面「今天」跟「本月」行為相同（都跳回當月）。
   onPickDate：選填。日曆下拉選單選年/月/日時，除了跳到該月，同時把選到的
   那一天當成精確日期篩選傳出去；沒傳入的頁面下拉選單選日期只用來跳月份。 */
function MonthPicker({ value, onChange, onToday, onPickDate, onClearDate, exactDate }) {
  const [open, setOpen] = useState(false);
  /* 只有頁面有支援精確日期篩選（有傳 onPickDate）才顯示「單日檢視／月份檢視」切換；
     切到單日檢視預設帶今天，已經在單日檢視時再按一次不會有動作；月份檢視則是清掉精確日期 */
  const supportsDay = !!onPickDate;
  const goDayMode = () => {
    if (exactDate) return;
    const d = todayStr();
    if (onToday) onToday(d); else onPickDate(d);
  };
  const goMonthMode = () => {
    if (exactDate && onClearDate) onClearDate();
    /* 切到月份檢視的同時直接把選月份的彈窗打開，不用使用者切完模式後還要再點一次日曆按鈕才能選月份 */
    setDraft(value + "/01");
    setOpen(true);
  };
  /* 選好的日期先放在 draft（不會立刻套用），按「前往」才真的套用。
     這樣可以避開 <input type="date"> 的原生行為：如果選到的日期跟目前顯示的值一樣
     （例如預設就帶當月 1 號，使用者又剛好要選 1 號），瀏覽器不會觸發 onChange，
     如果之前是靠 onChange 直接套用＋關閉，就會變成「選 1 號完全沒反應」。
     現在改成按鈕直接讀 draft 目前的值套用，不管 onChange 有沒有被觸發都能正確運作，
     彈窗也只有按「前往」或點外面才會關閉，不會選到一半自己跳掉。
     彈窗是月份選擇還是日期選擇，看目前是不是在單日檢視模式（exactDate 有沒有值）：
     月份檢視時只給選「年／月」，不會因為選了完整日期而被誤判成要切去單日檢視。 */
  const isDayMode = !!exactDate;
  const [draft, setDraft] = useState(value + "/01");
  const openPicker = () => { setDraft(value + "/01"); setOpen((o) => !o); };
  const confirmDraft = () => {
    if (!draft || !validDate(draft)) return;
    onChange(monthOf(draft));
    if (isDayMode && onPickDate) onPickDate(draft);
    setOpen(false);
  };
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 4, position: "relative" }}>
      {supportsDay && (
        <div className="no-print" style={{ display: "inline-flex", border: `1px solid ${T.line}`, borderRadius: 8, overflow: "hidden", marginRight: 2 }}>
          <button type="button" onClick={goMonthMode} style={{
            padding: "5px 10px", border: "none", cursor: "pointer", fontSize: 12.5,
            background: !exactDate ? T.brown : "#fff", color: !exactDate ? "#fff" : T.sub, fontWeight: !exactDate ? 700 : 400,
          }}>月份檢視</button>
          <button type="button" onClick={goDayMode} style={{
            padding: "5px 10px", border: "none", cursor: "pointer", fontSize: 12.5,
            background: exactDate ? T.brown : "#fff", color: exactDate ? "#fff" : T.sub, fontWeight: exactDate ? 700 : 400,
          }}>單日檢視</button>
        </div>
      )}
      {/* 有選精確日期時，左右鍵改成以「天」為單位跳，不要整個跳一個月 */}
      <button className="pl-btn small"
        onClick={() => (exactDate && onPickDate ? onPickDate(dayShift(exactDate, -1)) : onChange(monthShift(value, -1)))}
        aria-label={exactDate ? "前一天" : "上一月"}>‹</button>
      <button type="button" className="pl-btn small" style={{ minWidth: 118 }} onClick={openPicker}>
        📅 {exactDate ? dateLabel(exactDate) : monthLabel(value)} ▾
      </button>
      <button className="pl-btn small"
        onClick={() => (exactDate && onPickDate ? onPickDate(dayShift(exactDate, 1)) : onChange(monthShift(value, 1)))}
        aria-label={exactDate ? "後一天" : "下一月"}>›</button>
      <button className="pl-btn small" onClick={() => onChange(monthOf(todayStr()))}>本月</button>
      <button className="pl-btn small" onClick={() => (onToday ? onToday(todayStr()) : onChange(monthOf(todayStr())))}>今天</button>
      {open && (
        /* 用 onBlur＋relatedTarget 判斷「焦點離開這個區塊」才關閉，不要用整頁隱形背景板攔截點擊——
           <input type="date"> 的原生日曆是瀏覽器自己畫的懸浮層，跟頁面上其他元素的點擊判定方式不一樣，
           背景板很容易把「點原生日曆上的日期」誤判成「點外面」，導致選日期選到一半整個彈窗突然關掉、
           跳來跳去點不到 */
        <div className="pl-card" style={{ position: "absolute", top: "110%", left: 0, zIndex: 40, padding: 10, display: "flex", gap: 6 }}
          onBlur={(e) => { if (!e.currentTarget.contains(e.relatedTarget)) setOpen(false); }}>
          <input type={isDayMode ? "date" : "month"} className="pl-input"
            value={isDayMode ? draft.replace(/\//g, "-") : draft.slice(0, 7).replace("/", "-")}
            onChange={(e) => {
              if (!e.target.value) return;
              setDraft(isDayMode ? e.target.value.replace(/-/g, "/") : e.target.value.replace("-", "/") + "/01");
            }}
            onKeyDown={(e) => { if (e.key === "Enter") confirmDraft(); }} autoFocus />
          <button type="button" className="pl-btn small primary" onClick={confirmDraft}>前往</button>
        </div>
      )}
    </div>
  );
}

/* ────────────────────────────────────────────
   每日營收（日結）
──────────────────────────────────────────────*/
const SALES_EMPTY = {
  date: "", storeId: "", pos: "", pay: {},
  note: "", diffReason: "",
};

function SalesModule({ data, update, user, users, logAudit, logApproval }) {
  const [month, setMonth] = usePersisted("pl_sales_month", monthOf(todayStr()));
  const [editing, setEditing] = useState(null);
  const [selected, setSelected] = useState(new Set());
  const scope = perm.storeScope(user);
  const stores = data.stores.filter((s) => s.active && s.retail && (!scope || scope.includes(s.id)));
  const [storeTab, setStoreTab] = usePersisted("pl_sales_storeTab", "");
  const curStore = stores.some((s) => s.id === storeTab) ? storeTab : (stores[0]?.id || "");
  const nameOf = (id) => data.stores.find((s) => s.id === id)?.name || "—";
  const userName = (id) => users.find((u) => u.id === id)?.name || "—";
  const payItems = (data.salesPayItems || []).filter((p) => p.storeId === curStore && p.active);

  const rows = data.dailySales
    .filter((r) => monthOf(r.date) === month && r.storeId === curStore && perm.canSeeRecord(user, r))
    .sort((a, b) => cmpDate(a.date, b.date));
  const totalRevenue = rows.reduce((a, r) => a + calcSales(r).net, 0);
  const totalCash = rows.reduce((a, r) => a + calcSales(r).cash, 0);

  const openNew = () => setEditing({ ...SALES_EMPTY, id: null, date: todayStr(), storeId: curStore, status: "草稿" });

  const save = (form, submit) => {
    const c = calcSales(form);
    if (!form.date || !validDate(form.date)) return alert("請填寫正確日期（YYYY/MM/DD）");
    if (!form.storeId) return alert("請選擇門店");
    // 同門店同日期唯一（排除自身；不得與已審核重複）
    const dup = data.dailySales.find((r) => r.id !== form.id && r.date === form.date && r.storeId === form.storeId);
    if (dup) return alert(`${form.date} ${nameOf(form.storeId)} 已有日結資料（狀態：${dup.status}），同一門店同一天僅能有一筆。`);
    if (c.cash < 0 && submit && !form.diffReason.trim()) return alert(`非現金合計超過營業額 ${fmt(-c.cash)}，送審前請填寫差異原因。`);

    const old = form.id ? data.dailySales.find((r) => r.id === form.id) : null;
    const wasLocked = !!(old && old.status !== "草稿");
    const rec = {
      ...form,
      pos: num(form.pos),
      pay: Object.fromEntries(Object.entries(form.pay || {}).map(([k, v]) => [k, num(v)])),
      status: submit ? "待審核" : form.status === "退回修改" ? "草稿" : form.status,
    };
    /* 現金推算於首次送出審核時鎖定，之後編輯不再自動重新計算，需走「重新開啟日結／重新結帳」 */
    if (submit && !wasLocked) {
      const expSum = data.expenses.filter((r) => r.date === rec.date && r.storeId === rec.storeId).reduce((a, r) => a + num(r.amount), 0);
      const incSum = (data.incomes || []).filter((r) => r.date === rec.date && r.storeId === rec.storeId).reduce((a, r) => a + num(r.amount), 0);
      const cs = calcSales(rec);
      rec.lockedExpSum = expSum; rec.lockedIncSum = incSum;
      rec.cashCalc = cs.net - cs.paySum - expSum + incSum;
      rec.cashLockedAt = nowStamp(); rec.cashLockedBy = user.id;
      rec.reopenLogs = old?.reopenLogs || [];
    } else if (wasLocked) {
      rec.lockedExpSum = old.lockedExpSum; rec.lockedIncSum = old.lockedIncSum; rec.cashCalc = old.cashCalc;
      rec.cashLockedAt = old.cashLockedAt; rec.cashLockedBy = old.cashLockedBy; rec.reopenLogs = old.reopenLogs || [];
    }
    if (!rec.id) {
      rec.id = uid("ds"); rec.createdBy = user.id; rec.createdAt = nowStamp();
      rec.reviewedBy = null; rec.reviewedAt = null;
      update((d) => ({ ...d, dailySales: [...d.dailySales, rec] }));
    } else {
      if (["已審核"].includes(old.status)) {
        if (!perm.isAdmin(user)) return alert("已審核資料僅系統管理者可修改。");
        logAudit("每日營收", rec.id, old, rec);
      }
      update((d) => ({ ...d, dailySales: d.dailySales.map((r) => (r.id === rec.id ? rec : r)) }));
    }
    setEditing(null);
  };

  const review = (rec, pass) => {
    const status = pass ? "已審核" : "退回修改";
    logApproval("每日營收", rec.id, status, `${rec.date} ${nameOf(rec.storeId)}`);
    update((d) => ({
      ...d,
      dailySales: d.dailySales.map((r) => r.id === rec.id ? { ...r, status, reviewedBy: user.id, reviewedAt: nowStamp() } : r),
    }));
  };

  const remove = (rec) => {
    if (rec.status === "已審核" && !perm.isAdmin(user)) return alert("已審核資料無法刪除。");
    if (!confirm(`確定刪除 ${rec.date} ${nameOf(rec.storeId)} 的日結？`)) return;
    logAudit("每日營收", rec.id, rec, { ...rec, deleted: true });
    update((d) => ({ ...d, dailySales: d.dailySales.filter((r) => r.id !== rec.id) }));
  };

  const selRows = rows.filter((r) => selected.has(r.id));
  const toggleSel = (id) => setSelected((s) => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const toggleSelAll = () => setSelected(rows.length && selRows.length === rows.length ? new Set() : new Set(rows.map((r) => r.id)));
  const batchRemove = () => {
    const locked = selRows.filter((r) => r.status === "已審核" && !perm.isAdmin(user));
    const targets = selRows.filter((r) => !locked.includes(r));
    if (targets.length === 0) return alert("選取的項目都是已審核資料，無法刪除。");
    if (!confirm(`確定刪除選取的 ${targets.length} 筆日結資料？${locked.length ? `（另有 ${locked.length} 筆已審核，不會刪除）` : ""}`)) return;
    targets.forEach((r) => logAudit("每日營收", r.id, r, { ...r, deleted: true }));
    const ids = new Set(targets.map((r) => r.id));
    update((d) => ({ ...d, dailySales: d.dailySales.filter((r) => !ids.has(r.id)) }));
    setSelected(new Set());
  };

  return (
    <div>
      <SectionTitle right={
        <>
          <MonthPicker value={month} onChange={setMonth} />
          <button className="pl-btn primary" onClick={openNew}>＋ 新增日結</button>
        </>
      }>每日營收</SectionTitle>

      <StoreTabs stores={stores} value={curStore} onChange={setStoreTab} />

      <div className="pl-card no-print" style={{ padding: 12, marginBottom: 12, display: "flex", flexWrap: "wrap", gap: 10, alignItems: "center", justifyContent: "flex-end" }}>
        {selRows.length > 0 && (
          <span style={{ marginRight: "auto", display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 13 }}>已選 {selRows.length} 筆</span>
            <button className="pl-btn small danger" onClick={batchRemove}>批次刪除</button>
            <button className="pl-btn small" onClick={() => setSelected(new Set())}>取消選取</button>
          </span>
        )}
        <span style={{ color: T.sub, fontSize: 13 }}>
          共 {rows.length} 筆・營業額合計 <b style={{ color: T.ink }}>{fmt(totalRevenue)}</b>
          {" "}・現金（推算）合計 <b style={{ color: totalCash >= 0 ? T.green : T.red }}>{fmt(totalCash)}</b>
        </span>
      </div>

      <div className="pl-card pl-scroll-x">
        <table className="pl-table">
          <thead><tr>
            <th style={{ width: 30 }}><input type="checkbox" checked={rows.length > 0 && selRows.length === rows.length} onChange={toggleSelAll} /></th>
            <th>營業日期</th><th>門店</th><th className="num">每日營業額</th>
            {payItems.map((p) => <th key={p.id} className="num">{p.name}</th>)}
            <th className="num">現金（推算）</th><th>日結狀態</th><th>建立／審核</th><th></th>
          </tr></thead>
          <tbody>
            {rows.length === 0 && <tr><td colSpan={8 + payItems.length}><Empty text="本月尚無日結資料" action={<button className="pl-btn primary" onClick={openNew}>＋ 新增日結</button>} /></td></tr>}
            {rows.map((r) => {
              const c = calcSales(r);
              return (
                <tr key={r.id}>
                  <td><input type="checkbox" checked={selected.has(r.id)} onChange={() => toggleSel(r.id)} /></td>
                  <td style={{ whiteSpace: "nowrap" }}>{r.date}</td>
                  <td>{nameOf(r.storeId)}</td>
                  <td className="num" style={{ fontWeight: 600 }}>{fmtN(r.pos)}</td>
                  {payItems.map((p) => <td key={p.id} className="num">{(r.pay || {})[p.id] ? fmtN(r.pay[p.id]) : "—"}</td>)}
                  <td className="num">
                    {c.cash >= 0 ? fmtN(c.cash) : <Badge text={fmtN(c.cash)} tone="red" />}
                  </td>
                  <td><Badge text={r.status} /></td>
                  <td style={{ fontSize: 12, color: T.sub, whiteSpace: "nowrap" }}>
                    {userName(r.createdBy)}{r.reviewedBy ? ` ／ ${userName(r.reviewedBy)}` : ""}
                  </td>
                  <td style={{ whiteSpace: "nowrap" }}>
                    {perm.canEdit(user, r) && <button className="pl-btn small" onClick={() => setEditing({ ...r })}>檢視／編輯</button>}
                    {r.status === "待審核" && perm.canApprove(user, r) && (
                      <>
                        {" "}<button className="pl-btn small" style={{ color: T.green }} onClick={() => review(r, true)}>通過</button>
                        {" "}<button className="pl-btn small danger" onClick={() => review(r, false)}>退回</button>
                      </>
                    )}
                    {perm.canEdit(user, r) && <>{" "}<button className="pl-btn small danger" onClick={() => remove(r)}>刪除</button></>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {editing && (
        <SalesForm form={editing} setForm={setEditing} stores={stores} salesPayItems={data.salesPayItems || []} onSave={save}
          locked={editing.status === "已審核" && !perm.isAdmin(user)}
          adminEditLocked={editing.status === "已審核" && perm.isAdmin(user)}
          onClose={() => setEditing(null)} />
      )}
    </div>
  );
}

function SalesForm({ form, setForm, stores, salesPayItems, onSave, onClose, locked, adminEditLocked }) {
  const c = calcSales(form);
  const set = (k) => (e) => setForm({ ...form, [k]: e.target.value });
  const numIn = (k) => (
    <input className="pl-input" inputMode="decimal" value={form[k]} onChange={set(k)} disabled={locked} placeholder="0" />
  );
  const payItems = (salesPayItems || []).filter((p) => p.storeId === form.storeId && p.active);
  const setPay = (itemId) => (e) => setForm({ ...form, pay: { ...(form.pay || {}), [itemId]: e.target.value } });
  return (
    <Modal title={form.id ? "日結明細" : "新增日結"} onClose={onClose} width={780}>
      {adminEditLocked && (
        <div style={{ background: T.yellowBg, color: T.yellow, borderRadius: 8, padding: "8px 12px", marginBottom: 14, fontSize: 13 }}>
          此筆已審核。管理者修改後，原始與修改後資料將完整寫入修改紀錄。
        </div>
      )}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(150px,1fr))", gap: 12 }}>
        <Field label="營業日期" required><DateInput value={form.date} onChange={set("date")} disabled={locked} /></Field>
        <Field label="門店" required>
          <select className="pl-input" value={form.storeId} onChange={set("storeId")} disabled={locked}>
            <option value="">選擇門店</option>
            {stores.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
        </Field>
        <Field label="每日營業額" required>{numIn("pos")}</Field>
        {payItems.map((p) => (
          <Field key={p.id} label={p.name}>
            <input className="pl-input" inputMode="decimal" value={(form.pay || {})[p.id] ?? ""} onChange={setPay(p.id)} disabled={locked} placeholder="0" />
          </Field>
        ))}
        <Field label="備註" span={2}><input className="pl-input" value={form.note} onChange={set("note")} disabled={locked} /></Field>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(150px,1fr))", gap: 10, marginTop: 16, background: "#FCFAF6", border: `1px solid ${T.line}`, borderRadius: 8, padding: 12 }}>
        <MiniStat label="每日營業額" value={fmt(c.net)} />
        <MiniStat label="非現金合計" value={fmt(c.paySum)} />
        <MiniStat label="現金（推算）" value={fmt(c.cash)} tone={c.cash >= 0 ? "green" : "red"} />
      </div>

      {c.cash < 0 && (
        <div style={{ marginTop: 12, background: T.redBg, borderRadius: 8, padding: 12 }}>
          <div style={{ color: T.red, fontSize: 13, marginBottom: 6 }}>
            非現金合計超過每日營業額（超出 {fmt(-c.cash)}），請填寫差異原因。
          </div>
          <input className="pl-input" value={form.diffReason} onChange={set("diffReason")} placeholder="差異原因（例：現金短溢、找零誤差）" disabled={locked} />
        </div>
      )}

      {!locked && (
        <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 18 }}>
          <button className="pl-btn" onClick={onClose}>取消</button>
          {["草稿", "退回修改", undefined].includes(form.status) && <button className="pl-btn" onClick={() => onSave(form, false)}>儲存草稿</button>}
          <button className="pl-btn primary" onClick={() => onSave(form, form.status !== "已審核")}>
            {form.status === "已審核" ? "儲存修改" : "送出審核"}
          </button>
        </div>
      )}
    </Modal>
  );
}

function MiniStat({ label, value, tone }) {
  return (
    <div>
      <div style={{ fontSize: 12, color: T.sub }}>{label}</div>
      <div className="pl-serif" style={{ fontSize: 16.5, fontWeight: 600, color: tone === "red" ? T.red : tone === "green" ? T.green : T.ink }}>{value}</div>
    </div>
  );
}

/* ────────────────────────────────────────────
   每日支出
──────────────────────────────────────────────*/
const EXP_EMPTY = {
  date: "", storeId: "", categoryId: "", item: "", vendorId: "", amount: "",
  payMethod: "現金", payer: "", isAdvance: false, isReimbursed: false, reimburseDate: "",
  invoiceNo: "", attachment: null, docType: "", noDocReason: "", note: "",
};

/* ────────────────────────────────────────────
   批次明細輸入：一次進入、連續多筆、一次儲存
──────────────────────────────────────────────*/
function BatchExpenseModal({ data, user, curStore, nameOf, onClose, onCommit }) {
  const blank = () => ({ key: uid("row"), categoryName: "", item: "", vendorId: "", amount: "", payMethod: "現金", payer: user.name, invoiceNo: "", docType: "", noDocReason: "", note: "" });
  const [date, setDate] = useState(todayStr());
  const [rows, setRows] = useState([blank(), blank(), blank()]);
  const cats = data.categories.filter((c) => c.active && c.id !== ORDER_CAT_ID);
  const vens = data.vendors.filter((v) => v.active !== false);

  const setRow = (key, k, v) => setRows(rows.map((r) => r.key === key ? { ...r, [k]: v } : r));
  const patchRow = (key, patch) => setRows(rows.map((r) => r.key === key ? { ...r, ...patch } : r));
  const addRow = () => setRows([...rows, blank()]);
  const delRow = (key) => setRows(rows.length > 1 ? rows.filter((r) => r.key !== key) : rows);
  const filled = rows.filter((r) => r.categoryName.trim() || r.item.trim() || num(r.amount) > 0);
  const total = filled.reduce((a, r) => a + num(r.amount), 0);

  const validate = () => {
    if (!validDate(date)) { alert("請填寫正確日期（YYYY/MM/DD）"); return null; }
    if (filled.length === 0) { alert("尚未輸入任何明細。"); return null; }
    for (let i = 0; i < filled.length; i++) {
      const r = filled[i];
      const n = rows.indexOf(r) + 1;
      if (!r.categoryName.trim()) { alert(`第 ${n} 列：請選擇或輸入支出類別`); return null; }
      if (r.categoryName.trim() === "廠商原料叫貨") { alert(`第 ${n} 列：「廠商原料叫貨」為系統保留類別（用於廠商叫貨自動歸類），一般支出請選擇其他類別。`); return null; }
      if (!r.item.trim()) { alert(`第 ${n} 列：請填寫支出品項`); return null; }
      if (num(r.amount) <= 0) { alert(`第 ${n} 列：金額需大於 0`); return null; }
      const docErr = validateDoc(r);
      if (docErr) { alert(`第 ${n} 列：${docErr}`); return null; }
    }
    return filled;
  };

  const save = () => {
    const valid = validate(); if (!valid) return;
    /* 類別名稱解析：既有類別直接對應，新名稱自動建立 */
    const newCats = [];
    const resolveCat = (name) => {
      const n = name.trim();
      const hit = data.categories.find((c) => c.name === n) || newCats.find((c) => c.name === n);
      if (hit) return hit.id;
      const c = { id: uid("cat"), name: n, fixed: false, active: true };
      newCats.push(c);
      return c.id;
    };
    const dayClosed = isDayClosed(data, date, curStore);
    const recs = valid.map((r) => ({
      ...EXP_EMPTY, id: uid("ex"), date, storeId: curStore,
      categoryId: resolveCat(r.categoryName), item: r.item.trim(), vendorId: r.vendorId, amount: num(r.amount),
      payMethod: r.payMethod, payer: r.payer || user.name, invoiceNo: r.invoiceNo.trim(),
      docType: r.docType, noDocReason: r.docType === NO_DOC ? r.noDocReason.trim() : "", note: r.note.trim(),
      /* 現金付款免審核直接入帳，其餘一律待審核，不再讓使用者自己選草稿／送審 */
      status: autoStatus(r.payMethod), createdBy: user.id, createdAt: nowStamp(), reviewedBy: null, reviewedAt: null,
      postClose: dayClosed,
    }));
    if (newCats.length && !confirm(`將自動新增支出類別：${newCats.map((c) => c.name).join("、")}。確定？`)) return;
    onCommit(recs, newCats);
  };

  return (
    <Modal title="批次新增支出" onClose={onClose} width={980}>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 14, alignItems: "flex-end", marginBottom: 14 }}>
        <Field label="支出日期（本批共用）" required>
          <DateInput style={{ width: 150 }} value={date} onChange={(e) => setDate(e.target.value)} />
        </Field>
        <Field label="門店"><input className="pl-input" style={{ width: 110 }} value={nameOf(curStore)} disabled /></Field>
        <div style={{ marginLeft: "auto", fontSize: 13.5, color: T.sub, paddingBottom: 8 }}>
          已輸入 <b style={{ color: T.ink }}>{filled.length}</b> 筆・合計 <b style={{ color: T.ink }}>{fmt(total)}</b>
        </div>
      </div>

      <div className="pl-scroll-x" style={{ maxHeight: "48vh", overflowY: "auto" }}>
        <table className="pl-table">
          <thead><tr>
            <th style={{ width: 30 }}>#</th><th>類別 *</th><th>品項 *</th><th>廠商</th>
            <th className="num">金額 *</th><th>付款方式</th><th>付款人</th><th>發票號碼</th><th>單據／憑證 *</th><th>備註</th><th></th>
          </tr></thead>
          <tbody>
            {rows.map((r, i) => (
              <tr key={r.key}>
                <td style={{ color: T.sub }}>{i + 1}</td>
                <td style={{ minWidth: 120 }}>
                  <input className="pl-input" list="dl-batch-expcat" value={r.categoryName}
                    onChange={(e) => setRow(r.key, "categoryName", e.target.value)} placeholder="選擇或輸入" />
                </td>
                <td style={{ minWidth: 140 }}><input className="pl-input" value={r.item} onChange={(e) => setRow(r.key, "item", e.target.value)} placeholder="支出品項" /></td>
                <td style={{ minWidth: 110 }}>
                  <select className="pl-input" value={r.vendorId} onChange={(e) => setRow(r.key, "vendorId", e.target.value)}>
                    <option value="">—</option>{vens.map((v) => <option key={v.id} value={v.id}>{v.name}</option>)}
                  </select>
                </td>
                <td style={{ minWidth: 90 }}><input className="pl-input" style={{ textAlign: "right" }} inputMode="decimal" value={r.amount} onChange={(e) => setRow(r.key, "amount", e.target.value)} placeholder="0" /></td>
                <td style={{ minWidth: 110 }}>
                  <select className="pl-input" value={r.payMethod} onChange={(e) => setRow(r.key, "payMethod", e.target.value)}>
                    {PAY_METHODS.map((p) => <option key={p}>{p}</option>)}
                  </select>
                </td>
                <td style={{ minWidth: 80 }}><input className="pl-input" value={r.payer} onChange={(e) => setRow(r.key, "payer", e.target.value)} /></td>
                <td style={{ minWidth: 100 }}><input className="pl-input" value={r.invoiceNo} onChange={(e) => setRow(r.key, "invoiceNo", e.target.value)} /></td>
                <DocTypeCell docType={r.docType} noDocReason={r.noDocReason} onChange={(patch) => patchRow(r.key, patch)} />
                <td style={{ minWidth: 100 }}><input className="pl-input" value={r.note} onChange={(e) => setRow(r.key, "note", e.target.value)} /></td>
                <td><button className="pl-btn small danger" onClick={() => delRow(r.key)}>✕</button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <datalist id="dl-batch-expcat">{cats.map((c) => <option key={c.id} value={c.name} />)}</datalist>

      <div style={{ fontSize: 12.5, color: T.sub, marginTop: 8 }}>付款方式選「現金」的品項會直接入帳；其餘會進入待審核。</div>
      <div style={{ display: "flex", alignItems: "center", marginTop: 12 }}>
        <button className="pl-btn" onClick={addRow}>＋ 新增一列</button>
        <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
          <button className="pl-btn" onClick={onClose}>取消</button>
          <button className="pl-btn primary" onClick={save}>全部送出</button>
        </div>
      </div>
    </Modal>
  );
}

function BatchOrderModal({ data, user, curStore, nameOf, onClose, onCommit }) {
  const blank = () => ({ key: uid("row"), vendorId: "", items: "", amount: "", billing: "現結", dueDate: "", docType: "", noDocReason: "", note: "" });
  const [date, setDate] = useState(todayStr());
  const [rows, setRows] = useState([blank(), blank(), blank()]);
  const vens = data.vendors.filter((v) => v.active !== false);

  const setRow = (key, k, v) => setRows(rows.map((r) => r.key === key ? { ...r, [k]: v } : r));
  const patchRow = (key, patch) => setRows(rows.map((r) => r.key === key ? { ...r, ...patch } : r));
  const addRow = () => setRows([...rows, blank()]);
  const delRow = (key) => setRows(rows.length > 1 ? rows.filter((r) => r.key !== key) : rows);
  const filled = rows.filter((r) => r.vendorId || r.items.trim() || num(r.amount) > 0);
  const total = filled.reduce((a, r) => a + num(r.amount), 0);

  const save = () => {
    if (!validDate(date)) return alert("請填寫正確日期（YYYY/MM/DD）");
    if (filled.length === 0) return alert("尚未輸入任何明細。");
    for (const r of filled) {
      const n = rows.indexOf(r) + 1;
      if (!r.vendorId) return alert(`第 ${n} 列：請選擇廠商`);
      if (num(r.amount) <= 0) return alert(`第 ${n} 列：金額需大於 0`);
      if (r.billing === "月結" && !validDate(r.dueDate)) return alert(`第 ${n} 列：月結請填寫預計付款日（YYYY/MM/DD）`);
      /* 月結叫貨的憑證由「月結對帳」頁的統一發票統一登錄，這裡不強制；現結叫貨才要求單據／憑證 */
      if (r.billing === "現結") {
        const docErr = validateDoc(r);
        if (docErr) return alert(`第 ${n} 列：${docErr}`);
      }
    }
    const recs = filled.map((r) => ({
      id: uid("po"), date, storeId: curStore, vendorId: r.vendorId, items: r.items.trim(),
      amount: num(r.amount), billing: r.billing,
      dueDate: r.billing === "月結" ? r.dueDate : "", paidDate: r.billing === "現結" ? date : "",
      payStatus: r.billing === "現結" ? "已付款" : "未付款", invoiceStatus: "未收到",
      invoiceNo: "", attachment: null,
      docType: r.billing === "現結" ? r.docType : "", noDocReason: r.billing === "現結" && r.docType === NO_DOC ? r.noDocReason.trim() : "",
      note: r.note.trim(), createdBy: user.id,
    }));
    onCommit(recs);
  };

  return (
    <Modal title="批次新增叫貨" onClose={onClose} width={900}>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 14, alignItems: "flex-end", marginBottom: 14 }}>
        <Field label="叫貨日期（本批共用）" required>
          <DateInput style={{ width: 150 }} value={date} onChange={(e) => setDate(e.target.value)} />
        </Field>
        <Field label="門店"><input className="pl-input" style={{ width: 110 }} value={nameOf(curStore)} disabled /></Field>
        <div style={{ marginLeft: "auto", fontSize: 13.5, color: T.sub, paddingBottom: 8 }}>
          已輸入 <b style={{ color: T.ink }}>{filled.length}</b> 筆・合計 <b style={{ color: T.ink }}>{fmt(total)}</b>
        </div>
      </div>

      <div className="pl-scroll-x" style={{ maxHeight: "48vh", overflowY: "auto" }}>
        <table className="pl-table">
          <thead><tr>
            <th style={{ width: 30 }}>#</th><th>廠商 *</th><th>品項說明</th>
            <th className="num">金額 *</th><th>結帳</th><th>預計付款日</th><th>單據／憑證（現結才需要）</th><th>備註</th><th></th>
          </tr></thead>
          <tbody>
            {rows.map((r, i) => (
              <tr key={r.key}>
                <td style={{ color: T.sub }}>{i + 1}</td>
                <td style={{ minWidth: 120 }}>
                  <select className="pl-input" value={r.vendorId} onChange={(e) => setRow(r.key, "vendorId", e.target.value)}>
                    <option value="">選擇</option>{vens.map((v) => <option key={v.id} value={v.id}>{v.name}</option>)}
                  </select>
                </td>
                <td style={{ minWidth: 150 }}><input className="pl-input" value={r.items} onChange={(e) => setRow(r.key, "items", e.target.value)} placeholder="品項說明" /></td>
                <td style={{ minWidth: 90 }}><input className="pl-input" style={{ textAlign: "right" }} inputMode="decimal" value={r.amount} onChange={(e) => setRow(r.key, "amount", e.target.value)} placeholder="0" /></td>
                <td style={{ minWidth: 85 }}>
                  <select className="pl-input" value={r.billing} onChange={(e) => setRow(r.key, "billing", e.target.value)}>
                    {ORDER_BILLING.map((b) => <option key={b}>{b}</option>)}
                  </select>
                </td>
                <td style={{ minWidth: 115 }}>
                  {r.billing === "月結"
                    ? <DateInput value={r.dueDate} onChange={(e) => setRow(r.key, "dueDate", e.target.value)} />
                    : <span style={{ color: T.sub, fontSize: 12.5 }}>現結・當日付清</span>}
                </td>
                {r.billing === "現結"
                  ? <DocTypeCell docType={r.docType} noDocReason={r.noDocReason} onChange={(patch) => patchRow(r.key, patch)} />
                  : <td style={{ fontSize: 12, color: T.sub }}>月結憑證於「月結對帳」登錄統一發票</td>}
                <td style={{ minWidth: 100 }}><input className="pl-input" value={r.note} onChange={(e) => setRow(r.key, "note", e.target.value)} /></td>
                <td><button className="pl-btn small danger" onClick={() => delRow(r.key)}>✕</button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div style={{ display: "flex", alignItems: "center", marginTop: 12 }}>
        <button className="pl-btn" onClick={addRow}>＋ 新增一列</button>
        <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
          <button className="pl-btn" onClick={onClose}>取消</button>
          <button className="pl-btn primary" onClick={save}>儲存全部明細</button>
        </div>
      </div>
    </Modal>
  );
}

function ExpenseModule({ data, update, user, users, logAudit, logApproval }) {
  const [editing, setEditing] = useState(null);
  const [batchOpenFor, setBatchOpenFor] = useState(null); // storeId：哪個門店區塊的「新增支出」批次視窗開著
  const [fixedModalOpenFor, setFixedModalOpenFor] = useState(null); // storeId：哪個門店區塊的「帶入固定支出」視窗開著
  const [kind, setKind] = useState("expense");
  const [selected, setSelected] = useState(new Set());
  const [flt, setFlt] = useState(() => {
    let month = monthOf(todayStr());
    try { const v = localStorage.getItem("pl_expenses_month"); if (v) month = JSON.parse(v); } catch (e) { /* 忽略 */ }
    return { month, date: "", storeId: "", q: "", payer: "", status: "" };
  });
  /* 只記住月份篩選，不記住其他篩選條件（類別/廠商/付款人等），避免重新整理後被舊篩選卡住 */
  useEffect(() => {
    try { localStorage.setItem("pl_expenses_month", JSON.stringify(flt.month)); } catch (e) { /* 忽略 */ }
  }, [flt.month]);
  const scope = perm.storeScope(user);
  const stores = data.stores.filter((s) => s.active && (!scope || scope.includes(s.id)));
  /* 門店分頁只列「會計主體」層級：烘豆場不再單獨列成一個可選門店分頁，
     選到中山店時會在頁面內以獨立區塊（中山門市／烘豆場）呈現，兩者資料各自獨立、
     合計自動加總，不需要跨分頁切換或自行加總 */
  const topStores = stores.filter((s) => !s.parentId);
  const [storeTab, setStoreTab] = usePersisted("pl_expenses_storeTab", "");
  const curStore = topStores.some((s) => s.id === storeTab) ? storeTab : (topStores[0]?.id || "");
  const childStores = stores.filter((s) => s.parentId === curStore);
  const blockStores = [...topStores.filter((s) => s.id === curStore), ...childStores];
  const nameOf = (id) => data.stores.find((s) => s.id === id)?.name || "—";
  const catOf = (id) => data.categories.find((c) => c.id === id)?.name || "—";
  const venOf = (id) => data.vendors.find((v) => v.id === id)?.name || "";
  const userName = (id) => users.find((u) => u.id === id)?.name || "—";

  const viewStoreIds = blockStores.map((s) => s.id);
  const rows = data.expenses.filter((r) => {
    if (flt.date ? r.date !== flt.date : monthOf(r.date) !== flt.month) return false;
    if (!perm.canSeeRecord(user, r)) return false;
    if (!viewStoreIds.includes(r.storeId)) return false;
    if (flt.q && ![catOf(r.categoryId), venOf(r.vendorId), r.item || "", String(num(r.amount))].some((s) => s.includes(flt.q))) return false;
    if (flt.payer && !(r.payer || "").includes(flt.payer)) return false;
    if (flt.status && r.status !== flt.status) return false;
    return true;
  }).sort((a, b) => cmpDate(a.date, b.date));

  /* 合計排除「已退回」（除非使用者特意篩選只看已退回），跟營運總覽的口徑一致；
     已退回紀錄本身仍留在表格裡可見，只是不計入合計。「固定支出」＝類別屬於營運總覽會
     獨立列卡片的那幾種（租金／電費／水費／勞保／勞退／健保／人事成本／營業稅），跟
     Dashboard 的「每日支出」用同一份判斷依據，不管這筆是手動輸入還是用「帶入固定支出」
     建立的都一樣算，這樣兩邊金額才會對得起來。這裡的合計已經是目前分頁涵蓋的所有門店
     區塊（例如中山門市＋烘豆場）加總後的結果 */
  const isItemizedExpCat = (categoryId) => ITEMIZED_EXP_CAT_NAMES.includes(catOf(categoryId));
  const countedRows = rows.filter((r) => flt.status === "已退回" || r.status !== "已退回");
  const total = countedRows.reduce((a, r) => a + num(r.amount), 0);
  const fixedTotal = countedRows.filter((r) => isItemizedExpCat(r.categoryId)).reduce((a, r) => a + num(r.amount), 0);
  const generalTotal = total - fixedTotal;
  const toggleSelAllIn = (list) => setSelected((s) => {
    const allSelected = list.length > 0 && list.every((r) => s.has(r.id));
    const n = new Set(s);
    list.forEach((r) => (allSelected ? n.delete(r.id) : n.add(r.id)));
    return n;
  });

  const save = (form) => {
    if (!form.date || !validDate(form.date)) return alert("請填寫正確支出日期（YYYY/MM/DD）");
    if (!form.storeId) return alert("請選擇門店或部門");
    if (!form.categoryId) return alert("請選擇支出類別");
    if (form.categoryId === ORDER_CAT_ID) return alert("「廠商原料叫貨」為系統保留類別（用於廠商叫貨自動歸類），一般支出請選擇其他類別。");
    if (!form.item.trim()) return alert("請填寫支出品項");
    if (num(form.amount) <= 0) return alert("金額需大於 0");
    const docErr = validateDoc(form);
    if (docErr) return alert(docErr);
    const old = form.id ? data.expenses.find((r) => r.id === form.id) : null;
    /* 過審的紀錄由管理者修改時維持過審；其餘一律依付款方式自動判斷（現金免審核直接入帳，否則待審核） */
    const status = old && old.status === "過審" ? old.status : autoStatus(form.payMethod);
    const rec = { ...form, amount: num(form.amount), status };
    if (!rec.id) {
      rec.id = uid("ex");
      rec.createdBy = user.id; rec.createdAt = nowStamp(); rec.reviewedBy = null; rec.reviewedAt = null;
      rec.postClose = isDayClosed(data, rec.date, rec.storeId);
      update((d) => ({ ...d, expenses: [...d.expenses, rec] }));
    } else {
      if (old.status === "過審") {
        if (!perm.isAdmin(user)) return alert("過審的支出僅系統管理者可修改。");
        logAudit("每日支出", rec.id, old, rec);
      }
      update((d) => ({ ...d, expenses: d.expenses.map((r) => (r.id === rec.id ? rec : r)) }));
    }
    setEditing(null);
  };

  const review = (rec, pass) => {
    const status = pass ? "過審" : "已退回";
    logApproval("每日支出", rec.id, status, `${rec.date}｜${rec.item}`);
    update((d) => ({ ...d, expenses: d.expenses.map((r) => r.id === rec.id ? { ...r, status, reviewedBy: user.id, reviewedAt: nowStamp() } : r) }));
  };

  const remove = (rec) => {
    if (rec.status === "過審" && !perm.isAdmin(user)) return alert("過審的支出無法刪除。");
    if (!confirm(`確定刪除支出「${rec.item}」（${rec.date}）？`)) return;
    logAudit("每日支出", rec.id, rec, { ...rec, deleted: true });
    update((d) => ({ ...d, expenses: d.expenses.filter((r) => r.id !== rec.id) }));
  };

  const selRows = rows.filter((r) => selected.has(r.id));
  const toggleSel = (id) => setSelected((s) => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const batchRemove = () => {
    const locked = selRows.filter((r) => r.status === "過審" && !perm.isAdmin(user));
    const targets = selRows.filter((r) => !locked.includes(r));
    if (targets.length === 0) return alert("選取的項目都是過審資料，無法刪除。");
    if (!confirm(`確定刪除選取的 ${targets.length} 筆支出？${locked.length ? `（另有 ${locked.length} 筆過審，不會刪除）` : ""}`)) return;
    targets.forEach((r) => logAudit("每日支出", r.id, r, { ...r, deleted: true }));
    const ids = new Set(targets.map((r) => r.id));
    update((d) => ({ ...d, expenses: d.expenses.filter((r) => !ids.has(r.id)) }));
    setSelected(new Set());
  };

  const fset = (k) => (e) => setFlt({ ...flt, [k]: e.target.value });

  /* 本月固定支出帶入：每個門店區塊各自獨立判斷待帶入清單（中山門市／烘豆場的固定支出
     項目各自設定，不會混在一起）。金額每月可能不同，帶入前先讓使用者逐筆確認／修改金額，
     金額欄也可清空或改 0，代表先帶入項目、實際金額之後再自行填寫（見 FixedBringInModal） */
  const fixedTodoFor = (storeId) => {
    const forStore = (data.fixedItems || []).filter((f) => f.active && f.storeId === storeId);
    const done = forStore.filter((f) => data.expenses.some((e) => e.fixedItemId === f.id && monthOf(e.date) === flt.month));
    return { forStore, todo: forStore.filter((f) => !done.includes(f)) };
  };

  const commitFixed = (picked, storeId) => {
    const date = flt.month + "/01";
    const dayClosed = isDayClosed(data, date, storeId);
    const recs = picked.map((f) => ({
      /* 固定支出項目本來就是預先核准的常態支出，帶入時跳過草稿／待審核，直接入帳 */
      ...EXP_EMPTY, id: uid("ex"),
      date, storeId, categoryId: f.categoryId, item: f.item,
      amount: num(f.amount), payMethod: f.payMethod || "銀行轉帳",
      payer: user.name, status: "過審", fixedItemId: f.id,
      docType: NO_DOC, noDocReason: num(f.amount) > 0 ? "固定支出項目自動帶入，如有憑證請補件" : "固定支出項目先帶入項目，金額待補",
      note: "固定支出帶入", createdBy: user.id, createdAt: nowStamp(),
      reviewedBy: null, reviewedAt: null, postClose: dayClosed,
    }));
    update((d) => ({ ...d, expenses: [...d.expenses, ...recs] }));
    setFixedModalOpenFor(null);
  };

  return (
    <div>
      <SectionTitle right={null}>
        每日收支
      </SectionTitle>

      <StoreTabs stores={topStores} value={curStore} onChange={setStoreTab} />

      {/* 支出／收入 分頁（明確區分） */}
      <div className="no-print" style={{ display: "inline-flex", border: `1px solid ${T.line}`, borderRadius: 10, overflow: "hidden", marginBottom: 14 }}>
        {[["expense", "支出"], ["income", "收入"]].map(([k, label]) => (
          <button key={k} onClick={() => setKind(k)} style={{
            padding: "7px 22px", border: "none", cursor: "pointer", fontSize: 13.5,
            background: kind === k ? (k === "income" ? T.green : T.brown) : "#fff",
            color: kind === k ? "#fff" : T.sub, fontWeight: kind === k ? 700 : 400,
          }}>{label}</button>
        ))}
      </div>

      {kind === "income" && <IncomeSection data={data} update={update} user={user} blockStores={blockStores} nameOf={nameOf} logAudit={logAudit} logApproval={logApproval} />}

      {kind === "expense" && <>
      <div className="pl-card no-print" style={{ padding: 12, marginBottom: 12, display: "flex", flexWrap: "wrap", gap: 8, alignItems: "center" }}>
        <MonthPicker value={flt.month} exactDate={flt.date} onChange={(m) => setFlt({ ...flt, month: m, date: "" })}
          onToday={(d) => setFlt({ ...flt, date: d, month: monthOf(d) })}
          onPickDate={(d) => setFlt({ ...flt, date: d, month: monthOf(d) })}
          onClearDate={() => setFlt({ ...flt, date: "" })} />
        <input className="pl-input" style={{ width: 180 }} placeholder="搜尋類別／廠商／品項／金額" value={flt.q} onChange={fset("q")} />
        <input className="pl-input" style={{ width: 100 }} placeholder="付款人" value={flt.payer} onChange={fset("payer")} />
        <select className="pl-input" style={{ width: 110 }} value={flt.status} onChange={fset("status")}>
          <option value="">全部狀態</option>{EXP_STATUS.map((s) => <option key={s}>{s}</option>)}
        </select>
        <div style={{ marginLeft: "auto", color: T.sub, fontSize: 13 }}>
          共 {rows.length} 筆・一般支出 <b style={{ color: T.ink }}>{fmt(generalTotal)}</b>・固定支出 <b style={{ color: T.brown }}>{fmt(fixedTotal)}</b>・合計 <b style={{ color: T.ink }}>{fmt(total)}</b>
        </div>
      </div>

      {selRows.length > 0 && (
        <div className="pl-card no-print" style={{ padding: 10, marginBottom: 12, display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 13 }}>已選 {selRows.length} 筆</span>
          <button className="pl-btn small danger" onClick={batchRemove}>批次刪除</button>
          <button className="pl-btn small" onClick={() => setSelected(new Set())}>取消選取</button>
        </div>
      )}

      {blockStores.map((s) => {
        const bRows = rows.filter((r) => r.storeId === s.id);
        const bCounted = bRows.filter((r) => flt.status === "已退回" || r.status !== "已退回");
        const bTotal = bCounted.reduce((a, r) => a + num(r.amount), 0);
        const bFixedTotal = bCounted.filter((r) => isItemizedExpCat(r.categoryId)).reduce((a, r) => a + num(r.amount), 0);
        const bGeneralTotal = bTotal - bFixedTotal;
        const bGeneralRows = bRows.filter((r) => !isItemizedExpCat(r.categoryId));
        const bFixedRows = bRows.filter((r) => isItemizedExpCat(r.categoryId));
        const { forStore: bFixedForStore, todo: bFixedTodo } = fixedTodoFor(s.id);
        return (
          <div key={s.id} style={{ marginBottom: 26 }}>
            <div style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: 8, marginBottom: 10 }}>
              <div className="pl-serif" style={{ fontWeight: 700, fontSize: 16 }}>{s.name}</div>
              {bFixedForStore.length > 0 && (
                <button className="pl-btn small" disabled={bFixedTodo.length === 0} onClick={() => setFixedModalOpenFor(s.id)}
                  title={bFixedTodo.length === 0 ? `本月${s.name}固定支出已全部帶入` : ""}>
                  {bFixedTodo.length === 0 ? "✓ 固定支出已帶入" : `帶入固定支出（${bFixedTodo.length}）`}
                </button>
              )}
              <button className="pl-btn primary small" onClick={() => setBatchOpenFor(s.id)}>＋ 新增支出</button>
              <span style={{ marginLeft: "auto", fontSize: 12.5, color: T.sub }}>
                {s.name}小計・一般 <b style={{ color: T.ink }}>{fmt(bGeneralTotal)}</b>・固定 <b style={{ color: T.brown }}>{fmt(bFixedTotal)}</b>・合計 <b style={{ color: T.ink }}>{fmt(bTotal)}</b>
              </span>
            </div>
            <div style={{ fontSize: 13, color: T.sub, margin: "0 0 6px" }}>一般支出（{bGeneralRows.length} 筆）</div>
            <ExpenseRowsTable rows={bGeneralRows} selected={selected} toggleSel={toggleSel} toggleSelAllIn={toggleSelAllIn}
              nameOf={nameOf} catOf={catOf} venOf={venOf} user={user} setEditing={setEditing} review={review} remove={remove} emptyText={`${s.name}本月尚無一般支出`} />
            <div style={{ fontSize: 13, color: T.sub, margin: "10px 0 6px" }}>固定支出（{bFixedRows.length} 筆）</div>
            <ExpenseRowsTable rows={bFixedRows} selected={selected} toggleSel={toggleSel} toggleSelAllIn={toggleSelAllIn}
              nameOf={nameOf} catOf={catOf} venOf={venOf} user={user} setEditing={setEditing} review={review} remove={remove} emptyText={`${s.name}本月尚無固定支出帶入紀錄`} />
          </div>
        );
      })}

      {blockStores.length > 1 && (
        <div className="pl-card" style={{ padding: 16, marginBottom: 14 }}>
          <div className="pl-serif" style={{ fontWeight: 700, marginBottom: 10 }}>{nameOf(curStore)}支出合計</div>
          <div style={{ display: "grid", gap: 6 }}>
            {blockStores.map((s) => (
              <StoreRow key={s.id} label={`${s.name}小計`}
                value={fmt(rows.filter((r) => r.storeId === s.id && (flt.status === "已退回" || r.status !== "已退回")).reduce((a, r) => a + num(r.amount), 0))} />
            ))}
            <StoreRow label={`${nameOf(curStore)}合計（${blockStores.map((s) => s.name).join("＋")}）`} value={fmt(total)} strong />
          </div>
        </div>
      )}

      </>}

      {batchOpenFor && (
        <BatchExpenseModal data={data} user={user} curStore={batchOpenFor} nameOf={nameOf}
          onClose={() => setBatchOpenFor(null)}
          onCommit={(recs, newCats) => { update((d) => ({ ...d, categories: [...d.categories, ...(newCats || [])], expenses: [...d.expenses, ...recs] })); setBatchOpenFor(null); }} />
      )}
      {editing && <ExpenseForm form={editing} setForm={setEditing} data={data} stores={stores} onSave={save} onClose={() => setEditing(null)} user={user} />}

      {fixedModalOpenFor && (() => {
        const { todo } = fixedTodoFor(fixedModalOpenFor);
        return (
          <FixedBringInModal items={todo} month={flt.month} storeName={nameOf(fixedModalOpenFor)} catOf={catOf}
            onClose={() => setFixedModalOpenFor(null)} onCommit={(picked) => commitFixed(picked, fixedModalOpenFor)} />
        );
      })()}
    </div>
  );
}

/* 每日收支・支出表格：一般支出／固定支出共用同一份表格結構，只是餵進去的 rows 不同 */
function ExpenseRowsTable({ rows, selected, toggleSel, toggleSelAllIn, nameOf, catOf, venOf, user, setEditing, review, remove, emptyText }) {
  const allSelected = rows.length > 0 && rows.every((r) => selected.has(r.id));
  return (
    <div className="pl-card pl-scroll-x" style={{ marginBottom: 14 }}>
      <table className="pl-table">
        <thead><tr>
          <th style={{ width: 30 }}><input type="checkbox" checked={allSelected} onChange={() => toggleSelAllIn(rows)} /></th>
          <th>日期</th><th>門店／部門</th><th>類別</th><th>品項</th><th>廠商</th>
          <th className="num">金額</th><th>付款方式</th><th>付款人</th><th>代墊</th><th>發票</th><th>附件</th><th>狀態</th><th></th>
        </tr></thead>
        <tbody>
          {rows.length === 0 && <tr><td colSpan={14}><Empty text={emptyText} /></td></tr>}
          {rows.map((r) => (
            <tr key={r.id}>
              <td><input type="checkbox" checked={selected.has(r.id)} onChange={() => toggleSel(r.id)} /></td>
              <td style={{ whiteSpace: "nowrap" }}>{r.date}</td>
              <td>{nameOf(r.storeId)}</td>
              <td>{catOf(r.categoryId)}</td>
              <td>{r.item}{r.postClose && <> <Badge text="日結後新增" tone="yellow" /></>}</td>
              <td>{venOf(r.vendorId) || "—"}</td>
              <td className="num" style={{ fontWeight: 600 }}>{fmtN(r.amount)}</td>
              <td>{r.payMethod}</td>
              <td>{r.payer}</td>
              <td>{r.isAdvance ? <Badge text={r.isReimbursed ? "已核銷" : "未核銷"} tone={r.isReimbursed ? "green" : "yellow"} /> : "—"}</td>
              <td style={{ fontSize: 12.5 }}>{r.invoiceNo || "—"}</td>
              <td><DocCell docType={r.docType} noDocReason={r.noDocReason} attachment={r.attachment} /></td>
              <td><Badge text={r.status} /></td>
              <td style={{ whiteSpace: "nowrap" }}>
                {perm.canEdit(user, r) &&
                  <button className="pl-btn small" onClick={() => setEditing({ ...r })}>編輯</button>}
                {r.status === "待審核" && perm.canApprove(user, r) && (
                  <>
                    {" "}<button className="pl-btn small" style={{ color: T.green }} onClick={() => review(r, true)}>通過</button>
                    {" "}<button className="pl-btn small danger" onClick={() => review(r, false)}>退回</button>
                  </>
                )}
                {" "}<button className="pl-btn small danger" onClick={() => remove(r)}>刪除</button>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

const INC_EMPTY = {
  date: "", storeId: "", categoryId: "", item: "", amount: "",
  payMethod: "現金", payer: "", invoiceNo: "", attachment: null, docType: "", noDocReason: "", note: "",
};

function IncomeSection({ data, update, user, blockStores, nameOf, logAudit, logApproval }) {
  const [editing, setEditing] = useState(null);
  const [month, setMonth] = usePersisted("pl_income_month", monthOf(todayStr()));
  const [selected, setSelected] = useState(new Set());
  const [fixedModalOpenFor, setFixedModalOpenFor] = useState(null); // storeId：哪個門店區塊的「帶入固定收入」視窗開著
  const cats = data.incomeCategories.filter((c) => c.active);
  const catOf = (id) => data.incomeCategories.find((c) => c.id === id)?.name || "—";
  const viewStoreIds = blockStores.map((s) => s.id);

  const rows = (data.incomes || []).filter((r) =>
    monthOf(r.date) === month && viewStoreIds.includes(r.storeId) &&
    perm.canSeeRecord(user, r)
  ).sort((a, b) => cmpDate(a.date, b.date));
  /* 合計排除「已退回」，跟營運總覽的口徑一致；已退回紀錄本身仍留在表格裡可見，只是不計入合計。
     另外把固定收入（有 fixedItemId，代表是從「主檔管理→固定收入項目」帶入的紀錄）獨立列出。
     這裡的合計已經是目前分頁涵蓋的所有門店區塊（例如中山門市＋烘豆場）加總後的結果 */
  const countedRows = rows.filter((r) => r.status !== "已退回");
  const total = countedRows.reduce((a, r) => a + num(r.amount), 0);
  const fixedTotal = countedRows.filter((r) => r.fixedItemId).reduce((a, r) => a + num(r.amount), 0);
  const generalTotal = total - fixedTotal;

  const save = (form) => {
    if (!form.date || !validDate(form.date)) return alert("請填寫正確收入日期（YYYY/MM/DD）");
    if (!form.storeId) return alert("請選擇門店");
    if (!form.categoryId) return alert("請選擇收入類別");
    if (!form.item.trim()) return alert("請填寫收入項目");
    if (num(form.amount) <= 0) return alert("金額需大於 0");
    const docErr = validateDoc(form);
    if (docErr) return alert(docErr);
    const old = form.id ? data.incomes.find((r) => r.id === form.id) : null;
    /* 過審的紀錄由管理者修改時維持過審；其餘一律依收款方式自動判斷（現金免審核直接入帳，否則待審核） */
    const status = old && old.status === "過審" ? old.status : autoStatus(form.payMethod);
    const rec = { ...form, amount: num(form.amount), status };
    if (!rec.id) {
      rec.id = uid("in");
      rec.createdBy = user.id; rec.createdAt = nowStamp(); rec.reviewedBy = null; rec.reviewedAt = null;
      rec.postClose = isDayClosed(data, rec.date, rec.storeId);
      update((d) => ({ ...d, incomes: [...(d.incomes || []), rec] }));
    } else {
      if (old.status === "過審") {
        if (!perm.isAdmin(user)) return alert("過審的收入僅系統管理者可修改。");
        logAudit("門店收入", rec.id, old, rec);
      }
      update((d) => ({ ...d, incomes: d.incomes.map((r) => (r.id === rec.id ? rec : r)) }));
    }
    setEditing(null);
  };

  const review = (rec, pass) => {
    const status = pass ? "過審" : "已退回";
    logApproval("門店收入", rec.id, status, `${rec.date}｜${rec.item}`);
    update((d) => ({ ...d, incomes: d.incomes.map((r) => r.id === rec.id ? { ...r, status, reviewedBy: user.id, reviewedAt: nowStamp() } : r) }));
  };

  const remove = (rec) => {
    if (rec.status === "過審" && !perm.isAdmin(user)) return alert("過審的收入無法刪除。");
    if (!confirm(`確定刪除收入「${rec.item}」（${rec.date}）？`)) return;
    logAudit("門店收入", rec.id, rec, { ...rec, deleted: true });
    update((d) => ({ ...d, incomes: d.incomes.filter((r) => r.id !== rec.id) }));
  };

  const selRows = rows.filter((r) => selected.has(r.id));
  const toggleSel = (id) => setSelected((s) => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const toggleSelAllIn = (list) => setSelected((s) => {
    const allSelected = list.length > 0 && list.every((r) => s.has(r.id));
    const n = new Set(s);
    list.forEach((r) => (allSelected ? n.delete(r.id) : n.add(r.id)));
    return n;
  });
  const batchRemove = () => {
    const locked = selRows.filter((r) => r.status === "過審" && !perm.isAdmin(user));
    const targets = selRows.filter((r) => !locked.includes(r));
    if (targets.length === 0) return alert("選取的項目都是過審資料，無法刪除。");
    if (!confirm(`確定刪除選取的 ${targets.length} 筆收入？${locked.length ? `（另有 ${locked.length} 筆過審，不會刪除）` : ""}`)) return;
    targets.forEach((r) => logAudit("門店收入", r.id, r, { ...r, deleted: true }));
    const ids = new Set(targets.map((r) => r.id));
    update((d) => ({ ...d, incomes: d.incomes.filter((r) => !ids.has(r.id)) }));
    setSelected(new Set());
  };

  /* 本月固定收入帶入：每個門店區塊各自獨立判斷待帶入清單。金額每月可能不同，帶入前先讓
     使用者逐筆確認／修改金額，金額欄也可清空或改 0，代表先帶入項目、實際金額之後再自行
     填寫（見 FixedBringInModal） */
  const fixedTodoFor = (storeId) => {
    const forStore = (data.fixedIncomeItems || []).filter((f) => f.active && f.storeId === storeId);
    const done = forStore.filter((f) => (data.incomes || []).some((r) => r.fixedItemId === f.id && monthOf(r.date) === month));
    return { forStore, todo: forStore.filter((f) => !done.includes(f)) };
  };

  const commitFixed = (picked, storeId) => {
    const date = month + "/01";
    const dayClosed = isDayClosed(data, date, storeId);
    const recs = picked.map((f) => ({
      /* 固定收入項目本來就是預先核准的常態收入，帶入時跳過草稿／待審核，直接入帳 */
      ...INC_EMPTY, id: uid("in"),
      date, storeId, categoryId: f.categoryId, item: f.item,
      amount: num(f.amount), payMethod: f.payMethod || "銀行轉帳",
      payer: user.name, status: "過審", fixedItemId: f.id,
      docType: NO_DOC, noDocReason: num(f.amount) > 0 ? "固定收入項目自動帶入，如有憑證請補件" : "固定收入項目先帶入項目，金額待補",
      note: "固定收入帶入", createdBy: user.id, createdAt: nowStamp(),
      reviewedBy: null, reviewedAt: null, postClose: dayClosed,
    }));
    update((d) => ({ ...d, incomes: [...(d.incomes || []), ...recs] }));
    setFixedModalOpenFor(null);
  };

  return (
    <div>
